<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>lumi — 내 작업실</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" />
<style>
:root{
  --bg:#0a0a0c;--bg-2:#0e0e12;--bg-3:#121218;
  --panel:rgba(255,255,255,.03);--panel-2:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.08);--line-strong:rgba(255,255,255,.14);
  --ink:#f4f3f6;--ink-2:#b7b5c2;--ink-3:#7d7b8a;--ink-4:#56545f;
  --c1:#ff7a5c;--c2:#ff4d8d;--c3:#a855f7;
  --grad:linear-gradient(100deg,var(--c1),var(--c2) 48%,var(--c3));
  --grad-soft:linear-gradient(100deg,rgba(255,122,92,.16),rgba(255,77,141,.14),rgba(168,85,247,.16));
  --ease:cubic-bezier(.22,.61,.36,1);
  -webkit-font-smoothing:antialiased;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Wanted Sans Variable","Wanted Sans",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;font-size:16px;line-height:1.6;letter-spacing:-.014em;min-height:100vh}
a{color:inherit;text-decoration:none}
::selection{background:rgba(255,77,141,.32);color:#fff}
body::before{content:"";position:fixed;inset:0;z-index:-2;background:radial-gradient(700px 520px at 82% -10%,rgba(255,77,141,.12),transparent 60%),radial-gradient(680px 560px at -5% 4%,rgba(168,85,247,.1),transparent 60%);pointer-events:none}
.serif{font-family:"Instrument Serif",serif;font-style:italic}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}

/* ===== 로그인 게이트 ===== */
#gate{display:none;min-height:100vh;align-items:center;justify-content:center;padding:40px 22px}
#gate.on{display:flex}
.gate-card{width:100%;max-width:420px;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:40px 32px;backdrop-filter:blur(14px)}
.gate-card .ico{width:54px;height:54px;border-radius:16px;background:var(--grad-soft);border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.gate-card .ico svg{width:26px;height:26px;color:var(--c2)}
.gate-card h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:10px}
.gate-card p{font-size:14.5px;color:var(--ink-2);line-height:1.65;margin-bottom:26px}
.kakao-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;height:52px;border-radius:14px;background:#FEE500;color:#191600;font-weight:700;font-size:15.5px;border:none;cursor:pointer;font-family:inherit;transition:filter .2s}
.kakao-btn:hover{filter:brightness(.96)}
.kakao-btn svg{width:19px;height:19px}

/* ===== 레이아웃 ===== */
.layout{display:none;min-height:100vh}
.layout.on{display:flex}
.sidebar{width:248px;flex-shrink:0;border-right:1px solid var(--line);padding:22px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;background:rgba(10,10,12,.55);backdrop-filter:blur(12px)}
.brand{display:inline-flex;align-items:center;margin:0 8px 18px}
.brand img{height:25px;width:auto;display:block}
.account{display:flex;align-items:center;gap:10px;padding:4px 10px 16px;border-bottom:1px solid var(--line);margin-bottom:12px}
.account .av{width:34px;height:34px;border-radius:50%;background:var(--grad-soft);border:1px solid var(--line-strong);flex-shrink:0}
.account .nm{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-nav{display:flex;flex-direction:column;gap:2px}
.side-nav a{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;color:var(--ink-3);font-size:14.5px;font-weight:600;transition:background .15s,color .15s}
.side-nav a svg{width:18px;height:18px}
.side-nav a:hover{background:var(--panel-2);color:var(--ink)}
.side-nav a.active{background:var(--grad-soft);color:var(--ink)}
.side-bottom{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-top:14px;border-top:1px solid var(--line)}
.credit-box{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 14px;font-size:13px;color:var(--ink-3)}
.credit-box .n{font-weight:700;color:var(--c2);font-size:16px;display:flex;align-items:center;gap:6px}
.credit-box .n svg{width:15px;height:15px}
.credit-box .up{display:inline-flex;align-items:center;gap:4px;margin-top:9px;font-size:12.5px;color:#140a10;font-weight:700;background:var(--grad);padding:6px 11px;border-radius:980px}
.side-bottom .lk{font-size:13px;color:var(--ink-4);padding:4px 12px;cursor:pointer;background:none;border:none;font-family:inherit;text-align:left}
.side-bottom .lk:hover{color:var(--ink)}

/* ===== 메인 ===== */
.main{flex:1;padding:42px 44px 90px;max-width:1120px;width:100%}
.greet h1{font-size:clamp(24px,4vw,33px);font-weight:800;letter-spacing:-.025em;margin-bottom:8px}
.greet p{color:var(--ink-2);font-size:15px;margin-bottom:30px}
.make-cta{display:flex;align-items:center;gap:18px;background:var(--grad);color:#140a10;border-radius:20px;padding:24px 28px;margin-bottom:44px;box-shadow:0 16px 44px -14px rgba(255,77,141,.6);transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
.make-cta:hover{transform:translateY(-3px);box-shadow:0 22px 54px -16px rgba(255,77,141,.7)}
.make-ic{width:50px;height:50px;border-radius:15px;background:rgba(20,10,16,.16);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.make-ic svg{width:26px;height:26px}
.make-t{font-size:19px;font-weight:800;letter-spacing:-.01em}
.make-s{font-size:14px;opacity:.78;font-weight:600;margin-top:2px}
.make-arrow{margin-left:auto}
.make-arrow svg{width:24px;height:24px}
.works-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.works-h h2{font-size:18px;font-weight:700;letter-spacing:-.01em}
.works-h .cnt{font-size:13px;color:var(--ink-4)}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:18px}
.work{background:var(--panel);border:1px solid var(--line);border-radius:15px;overflow:hidden;transition:transform .2s,border-color .2s}
.work:hover{border-color:var(--line-strong);transform:translateY(-2px)}
.work .thumb{width:100%;aspect-ratio:3/4;object-fit:cover;object-position:top;background:var(--bg-3);display:block}
.work .thumb-ph{width:100%;aspect-ratio:3/4;background:var(--grad-soft);display:flex;align-items:center;justify-content:center}
.work .thumb-ph svg{width:30px;height:30px;color:var(--ink-3)}
.work .meta{padding:12px 14px 4px}
.work .wt{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.work .wd{font-size:12px;color:var(--ink-4);margin-top:3px}
.work .acts{display:flex;gap:6px;padding:10px 14px 14px}
.work .acts a{flex:1;text-align:center;font-size:12.5px;font-weight:600;padding:7px 0;border-radius:9px;border:1px solid var(--line);color:var(--ink-2);transition:border-color .15s,color .15s}
.work .acts a:hover{border-color:var(--c2);color:var(--c2)}
.empty{text-align:center;padding:64px 24px;border:1px dashed var(--line-strong);border-radius:20px;background:var(--panel)}
.empty .eic{width:58px;height:58px;border-radius:17px;background:var(--grad-soft);border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.empty .eic svg{width:28px;height:28px;color:var(--c2)}
.empty h3{font-size:19px;font-weight:700;margin-bottom:9px}
.empty p{color:var(--ink-2);font-size:14.5px;line-height:1.6;margin-bottom:24px;max-width:380px;margin-left:auto;margin-right:auto}
.empty .btn{display:inline-flex;align-items:center;gap:8px;height:50px;padding:0 26px;border-radius:980px;background:var(--grad);color:#140a10;font-weight:700;font-size:15px;box-shadow:0 12px 32px -10px rgba(255,77,141,.55);transition:transform .3s var(--ease)}
.empty .btn:hover{transform:translateY(-2px)}
.empty .btn svg{width:18px;height:18px}
.loading{text-align:center;padding:50px;color:var(--ink-3);font-size:14px}

@media(max-width:820px){
  .layout.on{flex-direction:column}
  .sidebar{width:auto;height:auto;position:static;flex-direction:row;flex-wrap:wrap;align-items:center;gap:10px;border-right:none;border-bottom:1px solid var(--line);padding:12px 16px}
  .brand{margin:0 6px 0 0}
  .account{border-bottom:none;margin:0;padding:0;flex:1;min-width:0}
  .side-nav{flex-direction:row;order:3;width:100%;overflow-x:auto;gap:4px}
  .side-nav a{padding:9px 12px;white-space:nowrap}
  .side-bottom{margin:0;flex-direction:row;align-items:center;gap:10px;padding-top:0;border-top:none}
  .credit-box{padding:8px 12px;display:flex;align-items:center;gap:10px}
  .credit-box .n{font-size:14px}
  .credit-box .up{margin-top:0}
  .main{padding:26px 18px 60px}
  .make-cta{padding:20px 20px;gap:14px}
  .make-arrow{display:none}
}
</style>
</head>
<body>

<!-- ===== 미로그인 게이트 ===== -->
<div id="gate"><div class="gate-card">
  <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
  <h1>로그인이 필요해요</h1>
  <p>내 작업실은 로그인 후 이용할 수 있어요.<br>카카오로 3초면 시작합니다.</p>
  <button class="kakao-btn" id="kakaoLogin">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.76 1.86 5.18 4.66 6.56-.2.72-.74 2.7-.84 3.12-.13.52.19.52.4.38.16-.11 2.6-1.76 3.66-2.48.7.1 1.42.16 2.12.16 5.52 0 10-3.48 10-7.74C22 6.48 17.52 3 12 3z"/></svg>
    카카오로 시작하기
  </button>
</div></div>

<!-- ===== 작업실 ===== -->
<div class="layout" id="app">
  <aside class="sidebar">
    <a class="brand" href="/studio" aria-label="lumi"><img src="/assets/logo-wordmark.webp" alt="lumi"></a>
    <div class="account"><span class="av"></span><span class="nm" id="storeName">내 매장</span></div>
    <nav class="side-nav">
      <a class="active" href="/studio"><i data-lucide="home"></i> 홈</a>
      <a href="#works"><i data-lucide="layout-grid"></i> 내 상세페이지</a>
      <a href="/settings"><i data-lucide="settings"></i> 설정</a>
    </nav>
    <div class="side-bottom">
      <div class="credit-box" id="creditBox"><div class="n">···</div></div>
      <button class="lk" type="button" id="logout">로그아웃</button>
    </div>
  </aside>

  <main class="main">
    <div class="greet">
      <h1>안녕하세요, <span id="greetName" class="grad-text">사장님</span></h1>
      <p>사진이나 링크만 있으면 상세페이지가 3분이면 완성돼요.</p>
    </div>

    <a class="make-cta" href="/create">
      <div class="make-ic"><i data-lucide="plus"></i></div>
      <div>
        <div class="make-t">새 상세페이지 만들기</div>
        <div class="make-s">사진·링크 입력 → AI가 화보·카피·디자인까지</div>
      </div>
      <div class="make-arrow"><i data-lucide="arrow-right"></i></div>
    </a>

    <section id="works">
      <div class="works-h"><h2>내가 만든 상세페이지</h2><span class="cnt" id="workCount"></span></div>
      <div class="loading" id="loading">불러오는 중…</div>
      <div class="gallery" id="gallery"></div>
      <div class="empty" id="emptyState" hidden>
        <div class="eic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg></div>
        <h3>아직 만든 상세페이지가 없어요</h3>
        <p>위의 <b style="color:var(--ink-2)">＋ 새 상세페이지 만들기</b>를 눌러 첫 상세페이지를 만들어보세요.</p>
      </div>
    </section>
  </main>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
(function(){
  // ===== 로그인 게이트 =====
  if(location.hash && location.hash.indexOf('lumi_token=')!==-1){
    try{var hp=new URLSearchParams(location.hash.replace(/^#/,''));var ht=hp.get('lumi_token'),hrt=hp.get('lumi_refresh');if(ht)localStorage.setItem('lumi-auth',ht);if(hrt)localStorage.setItem('lumi_refresh',hrt);history.replaceState(null,'',location.pathname);}catch(e){}
  }
  var token=localStorage.getItem('lumi-auth')||localStorage.getItem('lumi_auth')||localStorage.getItem('seller_jwt')||'';
  var authHeaders={'Content-Type':'application/json'};
  if(token)authHeaders['Authorization']='Bearer '+token;
  var gate=document.getElementById('gate'),app=document.getElementById('app');
  document.getElementById('kakaoLogin').addEventListener('click',function(){location.href='/api/auth/kakao/start';});
  function icons(){try{if(window.lucide)lucide.createIcons();}catch(e){}}
  if(!token){gate.classList.add('on');icons();return;}
  app.classList.add('on');icons();

  // 로그아웃
  document.getElementById('logout').addEventListener('click',function(){['lumi-auth','lumi_auth','seller_jwt','lumi_refresh'].forEach(function(k){try{localStorage.removeItem(k);}catch(_){}});try{sessionStorage.clear();}catch(_){}location.href='/';});

  // 회원 정보 + 크레딧
  fetch('/api/me',{headers:authHeaders}).then(function(r){return r.json();}).then(function(d){
    if(d&&d.seller){
      var name=d.seller.storeName||d.seller.displayName||d.seller.ownerName||'사장님';
      document.getElementById('storeName').textContent=name;
      document.getElementById('greetName').textContent=name;
      renderCredit((typeof d.seller.freeCredits==='number')?d.seller.freeCredits:null);
    }
  }).catch(function(){});
  function renderCredit(fc){
    var box=document.getElementById('creditBox');
    if(fc===null){box.innerHTML='<div class="n"><i data-lucide="infinity"></i> 무제한</div>';icons();return;}
    if(fc<=0){box.innerHTML='<div>무료 횟수를 다 썼어요</div><a class="up" href="#" id="upBtn">업그레이드</a>';}
    else{box.innerHTML='<div class="n"><i data-lucide="zap"></i> 무료 '+fc+'개</div><div style="font-size:12px;margin-top:3px;color:var(--ink-4)">남은 무료 생성</div>';}
    icons();
  }

  // 내 작품 목록
  fetch('/api/generate-detail?action=list',{headers:authHeaders}).then(function(r){return r.json();}).then(function(d){
    var items=(d&&d.items)||[];
    var g=document.getElementById('gallery'),empty=document.getElementById('emptyState'),loading=document.getElementById('loading'),cnt=document.getElementById('workCount');
    loading.style.display='none';
    if(!items.length){g.style.display='none';empty.hidden=false;return;}
    cnt.textContent=items.length+'개';
    g.innerHTML=items.map(function(it){
      var url=it.result_url||'#';
      var isImg=(it.mode==='image')||/\.jpg($|\?)/.test(url);
      var dt='';try{if(it.created_at)dt=new Date(it.created_at).toLocaleDateString('ko-KR',{month:'long',day:'numeric'});}catch(e){}
      var title=(it.title||'상세페이지').replace(/</g,'&lt;');
      var thumb=isImg?'<img class="thumb" src="'+url+'" loading="lazy" alt="">':'<div class="thumb-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 6 6"/></svg></div>';
      return '<div class="work">'+thumb+
        '<div class="meta"><div class="wt">'+title+'</div><div class="wd">'+dt+'</div></div>'+
        '<div class="acts"><a href="'+url+'" target="_blank" rel="noopener">보기</a><a href="'+url+'" download>다운로드</a></div>'+
      '</div>';
    }).join('');
    icons();
  }).catch(function(){
    document.getElementById('loading').style.display='none';
    document.getElementById('emptyState').hidden=false;
  });
})();
</script>
</body>
</html>
