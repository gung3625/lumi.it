<style>
@font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/packages/pretendard/dist/web/static/woff2/Pretendard-Regular.woff2') format('woff2');font-weight:400;font-display:swap;}
@font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/packages/pretendard/dist/web/static/woff2/Pretendard-SemiBold.woff2') format('woff2');font-weight:600;font-display:swap;}
@font-face{font-family:'Jua';src:url('/assets/BMJUA.woff2') format('woff2');font-display:block;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{background:#f5f5f7;scrollbar-width:none;scroll-behavior:smooth;}
html::-webkit-scrollbar{display:none;}
body{font-family:'Pretendard','Jua',-apple-system,BlinkMacSystemFont,sans-serif;font-size:17px;font-weight:400;line-height:1.47;letter-spacing:-.374px;color:#1d1d1f;-webkit-font-smoothing:antialiased;padding-bottom:80px;}
body.dark-mode{background:#111;color:#f0f2f8;}

nav{position:sticky;top:0;z-index:100;max-width:100%;padding:0 24px;height:48px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:rgba(245,245,247,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
body.dark-mode nav{background:rgba(0,0,0,.88);}
.nav-logo{font-size:22px;font-weight:800;font-family:'Nunito',sans-serif;background:linear-gradient(90deg,#FF6B8B,#DDA0DD 50%,#EDD080 85%,#DABA65);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;justify-self:center;}
.nav-close{width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.06);color:#1d1d1f;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .25s,filter .25s;justify-self:end;}
.nav-close:hover{filter:brightness(.85);}
.nav-close:active{transform:scale(.9);}
body.dark-mode .nav-close{background:rgba(255,255,255,.1);color:#f0f2f8;}

.hero{max-width:960px;margin:0 auto;padding:48px 24px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;}
.hero-lumi{width:120px;height:120px;object-fit:contain;animation:lumiBounce 3s ease-in-out infinite;margin-bottom:12px;}
@keyframes lumiBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero h1{font-size:clamp(28px,5vw,40px);font-weight:600;letter-spacing:-.5px;margin-bottom:8px;}
.hero p{font-size:15px;color:#6e6e73;}
body.dark-mode .hero p{color:rgba(255,255,255,.5);}

/* 카테고리 탭 */
.tabs{max-width:960px;margin:0 auto;padding:0 24px 24px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:8px 18px;border-radius:980px;border:none;background:rgba(0,0,0,.05);color:#494949;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s,color .2s,transform .15s;min-height:44px;}
.tab:hover{background:rgba(0,0,0,.08);}
.tab:active{transform:scale(.97);}
.tab.active{background:#C8507A;color:#fff;}
body.dark-mode .tab{background:rgba(255,255,255,.08);color:rgba(255,255,255,.65);}
body.dark-mode .tab:hover{background:rgba(255,255,255,.12);}
body.dark-mode .tab.active{background:#C8507A;color:#fff;}

.grid{max-width:960px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media(max-width:700px){.grid{grid-template-columns:1fr;}}

.card{background:#fff;border-radius:8px;padding:24px;display:flex;flex-direction:column;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);opacity:0;transform:translateY(16px);transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1),box-shadow .25s;}
.card.visible{opacity:1;transform:translateY(0);}
@media(hover:hover){.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);transform:translateY(-2px);}}
body.dark-mode .card{background:#272729;box-shadow:none;}
.card.wide{grid-column:1/-1;}
.card-icon{font-size:22px;margin-bottom:2px;color:#C8507A;}
.card h2{font-size:17px;font-weight:600;line-height:1.4;}
.card .tag{display:inline-block;font-size:11px;font-weight:600;color:#C8507A;background:rgba(200,80,122,.08);padding:2px 8px;border-radius:4px;margin-bottom:4px;align-self:flex-start;letter-spacing:.3px;}
body.dark-mode .card .tag{color:#FF8FAB;background:rgba(255,143,171,.1);}
.card p{font-size:14px;line-height:1.75;color:#494949;}
body.dark-mode .card p{color:rgba(255,255,255,.65);}
.card .example{padding:12px 16px;border-radius:6px;background:rgba(0,0,0,.03);font-size:13px;color:#6e6e73;line-height:1.7;margin-top:4px;overflow-wrap:break-word;word-break:keep-all;border-left:2px solid rgba(200,80,122,.25);}
body.dark-mode .card .example{background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);border-left-color:rgba(255,143,171,.2);}

/* FAB */
#fab-dark{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:20px;z-index:200;width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.07);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .3s,transform .2s;}
#fab-dark:hover{transform:scale(1.08);}
body.dark-mode #fab-dark{background:rgba(255,255,255,.1);}

@media(max-width:480px){
  .hero{padding:32px 16px 14px;}
  .hero-lumi{width:88px;height:88px;}
  .tabs{padding:0 16px 16px;gap:6px;}
  .tab{padding:7px 14px;font-size:13px;}
  .grid{padding:0 16px;gap:12px;}
  .card{padding:18px;gap:8px;}
  .card h2{font-size:15px;}
  .card p{font-size:13px;}
  .card .example{padding:10px 12px;font-size:12px;}
}
</style>

<button id="fab-dark" onclick="toggleDark()" aria-label="다크/라이트 모드 전환"></button>
<script>
(function(){
  var btn = document.getElementById('fab-dark');
  function setIcon(dark) {
    btn.innerHTML = dark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#f0f2f8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#1d1d1f"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    btn.style.background = dark ? 'rgba(255,255,255,.1)' : 'rgba(0,0,0,.07)';
  }
  var isDark = document.body.classList.contains('dark-mode');
  setIcon(isDark);
  window.toggleDark = function() {
    isDark = !isDark;
    document.body.classList.toggle('dark-mode', isDark);
    document.documentElement.style.background = isDark ? '#111' : '#f5f5f7';
    localStorage.setItem('lumi_dark_mode', isDark ? '1' : '0');
    setIcon(isDark);
  };
})();
</script>

<script>
var guides = [
  {cat:'기본',title:'사진 업로드',tag:'기본 기능',desc:'매장 사진을 올리면 lumi가 자동으로 분석해서 캡션을 만들어요. 사진 속 음식, 인테리어, 분위기를 lumi가 파악합니다.',example:'카페 내부 사진 → "이 자리 앉으면 라떼 들고 한참 멍 때리게 됨"'},
  {cat:'기본',title:'자동 캡션',tag:'핵심 기능',desc:'사진을 올리면 lumi가 분석해서 인스타그램에 올릴 글(캡션)을 자동으로 작성해줘요. 업종과 말투에 맞게 생성됩니다.',example:'"오늘 들어온 딸기 한 접시면 봄이 온 거예요"'},
  {cat:'기본',title:'해시태그 자동',tag:'기본 기능',desc:'캡션에 맞는 해시태그를 자동으로 추천해요. 직접 고민할 필요 없이 노출에 효과적인 태그가 붙습니다.',example:'#라떼아트 #카페인테리어 #감성카페 #핑크카페'},
  {cat:'기본',title:'코멘트',tag:'기본 기능',desc:'캡션 생성 시 원하는 내용을 메모처럼 적으면 반영돼요. "신메뉴 가격 넣어줘", "좀 더 따뜻하게" 같은 한 줄이면 충분합니다.',example:'코멘트: "휴무일 안내" → 캡션: "내일(월요일)은 쉬어갑니다 화요일에 다시 만나요"'},
  {cat:'게시',title:'캐러셀',tag:'용어 설명',desc:'인스타그램에서 여러 장의 사진을 한 게시물로 묶어 올리는 걸 "캐러셀"이라고 해요. 좌우로 넘겨보는 그 형태입니다. lumi에서 사진 여러 장을 선택하면 자동으로 캐러셀로 올라가요.',example:'사진 5장 선택 → 인스타에 1개 게시물로 묶어서 업로드'},
  {cat:'게시',title:'스토리 자동 게시',tag:'프로 기능',desc:'피드 게시와 동시에 스토리에도 자동으로 올려줘요. 여러 장을 올려도 첫 번째 사진이 대표 사진으로 스토리에 올라갑니다.',example:'사진 5장 업로드 → 피드: 캐러셀 / 스토리: 첫 번째 사진'},
  {cat:'게시',title:'최적 시간 게시',tag:'프로 기능',desc:'내 팔로워가 가장 많이 활동하는 시간대를 분석해서 그 시간에 맞춰 게시해요. 같은 글이라도 올리는 시간에 따라 좋아요 수가 달라질 수 있어요.',example:'카페 팔로워 분석 → 오후 6:30이 최적 → 자동 게시'},
  {cat:'게시',title:'예약 게시',tag:'프로 기능',desc:'원하는 날짜와 시간을 지정하면 그때 자동으로 올라가요. 주말 이벤트를 미리 만들어두고 금요일 저녁에 올라가게 할 수 있어요.',example:'수요일에 작성 → 금요일 18:00 예약 → 자동 게시'},
  {cat:'맞춤',title:'업종 맞춤',tag:'핵심 기능',desc:'카페, 뷰티, 맛집, 꽃집, 피트니스 등 업종을 설정하면 그 업종에 맞는 말투와 표현으로 캡션을 만들어요.',example:'카페 → 친근한 말투 / 뷰티 → 전문적인 말투'},
  {cat:'맞춤',title:'말투 학습',tag:'스탠다드 이상',desc:'사장님이 평소 쓰는 말투를 lumi가 학습해요. 쓰면 쓸수록 우리 매장 스타일에 가까운 글을 써줍니다.',example:'처음: "맛있는 커피 한 잔" → 학습 후: "한 모금에 하루가 풀리는 그런 맛"'},
  {cat:'맞춤',title:'날씨 반영',tag:'자동 반영',desc:'오늘 날씨를 캡션에 자동으로 반영해요. 비 오는 날, 맑은 날에 맞는 분위기의 글이 나옵니다.',example:'맑음 24° → "오늘 같은 날은 아이스 라떼 한 잔이죠"'},
  {cat:'분석',title:'트렌드 분석',tag:'프로 기능',desc:'우리 업종에서 지금 뜨는 키워드를 실시간으로 보여줘요. 트렌드에 맞는 게시물을 올리면 노출이 올라갑니다.',example:'카페 트렌드: #크로플 #말차라떼 #당근케이크'},
  {cat:'분석',title:'월간 리포트',tag:'대시보드',desc:'이번 달 캡션 생성 수, 게시 완료 수, 절약한 시간을 한눈에 보여줘요.',example:'4월: 캡션 12개 생성, 8개 게시, 약 4시간 절약'},
  {cat:'연동',title:'인스타그램 연동',tag:'필수 설정',desc:'lumi가 게시물을 대신 올리려면 인스타그램 연동이 필요해요. 비밀번호는 절대 필요 없고, Meta 공식 API로 안전하게 연결됩니다.',example:'비즈니스 계정 전환 → 페이스북 연결 → lumi 연동 (3분)'},
  {cat:'연동',title:'비즈니스 계정',tag:'용어 설명',desc:'인스타그램 "비즈니스 계정"은 매장용 계정이에요. 개인 계정에서 무료로 전환할 수 있고, 기존 게시물이나 팔로워는 그대로 유지돼요. lumi 연동에 필수입니다.',example:'인스타 앱 → 설정 → 계정 → 프로페셔널 계정으로 전환'},
  {cat:'연동',title:'페이스북 페이지',tag:'용어 설명',desc:'인스타그램 비즈니스 계정은 페이스북 페이지와 연결해야 해요. 페이스북에 매장 페이지를 하나 만들고 인스타와 연결하면 됩니다. 페이스북에 글을 올릴 필요는 없어요.',example:'페이스북 → 페이지 만들기 → 매장명 입력 → 인스타 연결'}
];

var cats = [];
guides.forEach(function(g){if(cats.indexOf(g.cat)===-1)cats.push(g.cat);});

var tabsEl = document.getElementById('tabs');
var gridEl = document.getElementById('grid');
var activeCat = '전체';

function renderTabs(){
  tabsEl.innerHTML = '';
  var allBtn = document.createElement('button');
  allBtn.className = 'tab' + (activeCat==='전체'?' active':'');
  allBtn.textContent = '전체';
  allBtn.onclick = function(){activeCat='전체';renderTabs();renderGrid();};
  tabsEl.appendChild(allBtn);
  cats.forEach(function(c){
    var btn = document.createElement('button');
    btn.className = 'tab' + (activeCat===c?' active':'');
    btn.textContent = c;
    btn.onclick = function(){activeCat=c;renderTabs();renderGrid();};
    tabsEl.appendChild(btn);
  });
}

function renderGrid(){
  gridEl.innerHTML = '';
  var filtered = activeCat==='전체' ? guides : guides.filter(function(g){return g.cat===activeCat;});
  filtered.forEach(function(g){
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = '<span class="tag">'+g.tag+'</span>'
      +'<h2>'+g.title+'</h2>'
      +'<p>'+g.desc+'</p>'
      +'<div class="example">'+g.example+'</div>';
    gridEl.appendChild(card);
  });
  var io = new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});},{threshold:0.1});
  document.querySelectorAll('.card').forEach(function(c){io.observe(c);});
}

renderTabs();
renderGrid();
</script>
