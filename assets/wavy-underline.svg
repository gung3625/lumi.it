<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 6" preserveAspectRatio="none">
  <!-- R2: hand-drawn 느낌 활성 탭 underline. 기계 그라데이션 직선 탈피 (R1 5 Critic 합의 어법 1종 추가).
       4색 시그니처 그라 (golden → coral → pink → lavender) 를 잔물결 path 에 입힘. -->
  <defs>
    <linearGradient id="lumi-wavy-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EDD080"/>
      <stop offset="33%" stop-color="#FF8FA3"/>
      <stop offset="66%" stop-color="#FF6B8B"/>
      <stop offset="100%" stop-color="#DDA0DD"/>
    </linearGradient>
  </defs>
  <!-- R3: 잔물결 path 끝점 정렬 (35→36, viewBox 와 매칭). Q 시작/끝 대칭 + T 균등 간격 10. -->
  <path d="M1 3 Q 6 0.6, 11 3 T 21 3 T 31 3 Q 33.5 4.4, 36 3"
        stroke="url(#lumi-wavy-gradient)"
        stroke-width="2"
        stroke-linecap="round"
        fill="none"/>
</svg>
