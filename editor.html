<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>루미 상세페이지 에디터</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.3/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Jua&family=Gowun+Dodum&family=Nanum+Pen+Script&family=Gaegu&family=Sunflower:wght@500;700&display=swap">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0a0c;--bg-2:#0e0e12;--bg-3:#121218;--panel:rgba(255,255,255,.04);--panel-2:rgba(255,255,255,.06);--line:rgba(255,255,255,.1);--line-strong:rgba(255,255,255,.17);--ink:#f4f3f6;--ink-2:#b7b5c2;--mut:#7d7b8a;--c1:#ff7a5c;--c2:#ff4d8d;--c3:#a855f7;--grad:linear-gradient(100deg,var(--c1),var(--c2) 48%,var(--c3))}
  body{font-family:"Gowun Dodum","Wanted Sans Variable","Wanted Sans",'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.65;letter-spacing:0;height:100vh;overflow:hidden}
  /* 상단바: 로고 | 되돌리기 | (우)저장·내보내기·더보기 */
  .topbar{display:flex;align-items:center;gap:10px;height:58px;padding:0 16px;background:rgba(10,10,12,.86);backdrop-filter:saturate(160%) blur(18px);-webkit-backdrop-filter:saturate(160%) blur(18px);border-bottom:1px solid var(--line)}
  .logo{display:inline-flex;align-items:center;text-decoration:none}
  .logo img{height:22px;width:auto;display:block}
  .logo .ed{font-size:13px;color:var(--mut);font-weight:600;margin-left:7px}
  .tb-left{display:flex;gap:4px;align-items:center;margin-left:8px}
  .tb-right{margin-left:auto;display:flex;gap:8px;align-items:center;position:relative}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink-2);border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.15s}
  .btn:hover{border-color:var(--line-strong);color:var(--ink);background:rgba(255,255,255,.08)}
  .btn.solid{display:inline-flex;align-items:center;gap:6px;background:var(--grad);color:#140a10;border-color:transparent;box-shadow:0 6px 18px -8px rgba(255,77,141,.6)}
  .btn.solid:hover{filter:brightness(1.06);color:#140a10}
  .btn.solid svg{width:16px;height:16px}
  .ico-btn{width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--line);background:var(--panel);color:var(--ink-2);border-radius:10px;cursor:pointer;transition:.15s}
  .ico-btn:hover{border-color:var(--line-strong);color:var(--ink);background:rgba(255,255,255,.08)}
  .ico-btn svg{width:18px;height:18px}
  /* 더보기 드롭다운 */
  .more-menu{position:absolute;top:46px;right:0;min-width:168px;background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:6px;display:none;flex-direction:column;gap:2px;z-index:100;box-shadow:0 14px 36px rgba(0,0,0,.55)}
  .more-menu.on{display:flex}
  .more-menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;color:var(--ink-2);font-family:inherit;font-size:13.5px;font-weight:600;padding:10px 12px;border-radius:9px;cursor:pointer}
  .more-menu button:hover{background:var(--panel-2);color:var(--ink)}
  .more-menu svg{width:16px;height:16px}
  /* 작업 영역: 좌측 도구 + 캔버스 */
  .work{display:flex;height:calc(100vh - 58px)}
  .tools{width:88px;flex-shrink:0;border-right:1px solid var(--line);background:var(--bg-2);padding:14px 8px;display:flex;flex-direction:column;gap:6px;overflow-y:auto}
  .tool{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;border-radius:13px;border:1px solid transparent;background:none;color:var(--ink-2);font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .tool:hover{background:var(--panel);color:var(--ink);border-color:var(--line)}
  .tool svg{width:22px;height:22px}
  .stage{flex:1;overflow:auto;display:flex;justify-content:center;padding:28px 16px 150px}
  .canvas-wrap{align-self:flex-start;box-shadow:0 12px 50px rgba(0,0,0,.5);background:#fff;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  /* 하단 컨텍스트 패널 (객체 선택 시) */
  .panel{position:fixed;left:88px;right:0;bottom:0;z-index:60;background:rgba(14,14,18,.95);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid var(--line);box-shadow:0 -6px 24px rgba(0,0,0,.4);padding:11px 16px;display:none;gap:10px;align-items:center;flex-wrap:wrap}
  .panel.on{display:flex}
  .panel .grp{display:flex;align-items:center;gap:6px}
  .panel label{font-size:11px;color:var(--mut);font-weight:600}
  .panel select,.panel input[type=number]{border:1px solid var(--line);border-radius:8px;padding:7px 8px;font-size:13px;font-family:inherit;background:var(--bg-3);color:var(--ink)}
  .panel input[type=color]{width:34px;height:34px;border:1px solid var(--line);border-radius:8px;background:var(--bg-3);cursor:pointer;padding:2px}
  .obj-acts{display:flex;gap:4px}
  .obj-acts .ob{border:1px solid var(--line);background:var(--panel);color:var(--ink-2);border-radius:8px;padding:7px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .obj-acts .ob:hover{border-color:var(--c2);color:var(--c2)}
  .obj-acts .ob.danger:hover{border-color:#ff5c7a;color:#ff5c7a}
  .chip{border:1px solid var(--line);background:var(--panel);color:var(--ink-2);border-radius:8px;padding:7px 10px;font-size:13px;font-weight:700;cursor:pointer}
  .chip.act{background:var(--grad);color:#140a10;border-color:transparent}
  .divider{width:1px;height:26px;background:var(--line);margin:0 2px}
  .hint{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);font-size:12px;color:var(--mut);background:rgba(14,14,18,.82);padding:7px 16px;border-radius:980px;border:1px solid var(--line);z-index:55;pointer-events:none;white-space:nowrap}
  @media(max-width:640px){.tools{width:64px}.tool{font-size:10.5px;padding:10px 2px}.panel{left:64px}.btn{padding:9px 11px}}
</style>
</head>
<body>

<script>
// 로그인 게이트 — 미로그인 시 /create 로 (거기서 카카오 로그인). 카카오 콜백 해시 토큰도 흡수.
(function(){
  if(location.hash&&location.hash.indexOf('lumi_token=')!==-1){try{var p=new URLSearchParams(location.hash.replace(/^#/,''));var t=p.get('lumi_token'),rt=p.get('lumi_refresh');if(t)localStorage.setItem('lumi-auth',t);if(rt)localStorage.setItem('lumi_refresh',rt);history.replaceState(null,'',location.pathname);}catch(e){}}
  var token=localStorage.getItem('lumi-auth')||localStorage.getItem('lumi_auth')||localStorage.getItem('seller_jwt')||'';
  if(!token){location.replace('/create');}
})();
</script>

<!-- 상단바 -->
<div class="topbar">
  <a href="/studio" class="logo" aria-label="lumi"><img src="/assets/logo-wordmark.webp" alt="lumi"><span class="ed">에디터</span></a>
  <div class="tb-left">
    <button class="ico-btn" id="undo" title="실행취소 (Ctrl+Z)"><i data-lucide="undo-2"></i></button>
    <button class="ico-btn" id="redo" title="다시실행 (Ctrl+Y)"><i data-lucide="redo-2"></i></button>
  </div>
  <div class="tb-right">
    <button class="btn" id="save">저장</button>
    <button class="btn solid" id="export"><i data-lucide="download"></i> PNG 내보내기</button>
    <button class="ico-btn" id="moreBtn" title="더보기"><i data-lucide="more-horizontal"></i></button>
    <div class="more-menu" id="moreMenu">
      <button id="load"><i data-lucide="folder-open"></i> 불러오기</button>
      <button id="taller"><i data-lucide="chevrons-down"></i> 캔버스 늘리기</button>
    </div>
  </div>
</div>

<!-- 작업 영역: 좌측 도구 + 캔버스 -->
<div class="work">
  <aside class="tools" aria-label="추가 도구">
    <button class="tool" id="addText"><i data-lucide="type"></i> 글자</button>
    <button class="tool" id="addImg"><i data-lucide="image"></i> 사진</button>
    <button class="tool" id="addRect"><i data-lucide="square"></i> 사각형</button>
    <button class="tool" id="addCircle"><i data-lucide="circle"></i> 원</button>
    <button class="tool" id="addLine"><i data-lucide="minus"></i> 선</button>
  </aside>
  <div class="stage"><div class="canvas-wrap"><canvas id="c" width="720" height="1600"></canvas></div></div>
</div>

<div class="hint">글자를 더블클릭해 수정 · 끌어서 이동 · 모서리로 크기조절</div>

<!-- 선택 객체 편집 패널 (객체 선택 시에만 표시) -->
<div class="panel" id="panel">
  <div class="obj-acts">
    <button class="ob" id="dup">복제</button>
    <button class="ob" id="front">맨 앞</button>
    <button class="ob" id="back">맨 뒤</button>
    <button class="ob" id="center">가운데</button>
    <button class="ob danger" id="del">삭제</button>
  </div>
  <span class="divider"></span>
  <div class="grp" id="fontGrp">
    <label>폰트</label>
    <select id="fontFamily">
      <option value="Pretendard">프리텐다드(기본)</option>
      <option value="Black Han Sans">검은고딕(임팩트)</option>
      <option value="Do Hyeon">도현체</option>
      <option value="Jua">주아체(둥근)</option>
      <option value="Gowun Dodum">고운돋움</option>
      <option value="Sunflower">선플라워</option>
      <option value="Nanum Pen Script">나눔손글씨</option>
      <option value="Gaegu">개구체</option>
    </select>
  </div>
  <div class="grp" id="sizeGrp"><label>크기</label><input type="number" id="fontSize" min="8" max="200" value="40" style="width:64px"></div>
  <div class="grp"><label>색</label><input type="color" id="fill" value="#241a14"></div>
  <div class="grp" id="weightGrp"><span class="chip" id="bold">B</span><span class="chip" id="align">정렬</span></div>
  <div class="grp" id="fxGrp"><span class="chip" id="shadow">그림자</span><span class="chip" id="stroke">외곽선</span></div>
  <div class="grp"><label>투명도</label><input type="number" id="opacity" min="0" max="100" value="100" style="width:60px"></div>
</div>

<script>
(function(){
  if(typeof fabric==='undefined'){document.body.innerHTML='<p style="padding:40px;text-align:center">에디터 로딩 실패 — 인터넷 연결을 확인해 주세요.</p>';return;}
  var canvas=new fabric.Canvas('c',{backgroundColor:'#ffffff',preserveObjectStacking:true});
  var panel=document.getElementById('panel');

  // ---- 객체 추가 ----
  document.getElementById('addText').onclick=function(){
    var t=new fabric.IText('두 번 눌러 수정',{left:80,top:canvas.getHeight()/2-30,fontFamily:'Pretendard',fontSize:40,fill:'#241a14',fontWeight:'700'});
    canvas.add(t);canvas.setActiveObject(t);canvas.requestRenderAll();
  };
  document.getElementById('addImg').onclick=function(){
    var inp=document.createElement('input');inp.type='file';inp.accept='image/*';
    inp.onchange=function(){var f=inp.files[0];if(!f)return;var fr=new FileReader();fr.onload=function(){
      fabric.Image.fromURL(fr.result,function(img){
        var maxW=canvas.getWidth()*0.9; if(img.width>maxW)img.scaleToWidth(maxW);
        img.set({left:(canvas.getWidth()-img.getScaledWidth())/2,top:60});
        canvas.add(img);canvas.setActiveObject(img);canvas.requestRenderAll();
      });
    };fr.readAsDataURL(f);};
    inp.click();
  };

  // ---- 도형 추가 ----
  document.getElementById('addRect').onclick=function(){var r=new fabric.Rect({left:80,top:canvas.getHeight()/2-60,width:240,height:140,fill:'#C8507A',rx:6,ry:6});canvas.add(r);canvas.setActiveObject(r);canvas.requestRenderAll();};
  document.getElementById('addCircle').onclick=function(){var c=new fabric.Circle({left:120,top:120,radius:70,fill:'#F2A65A'});canvas.add(c);canvas.setActiveObject(c);canvas.requestRenderAll();};
  document.getElementById('addLine').onclick=function(){var l=new fabric.Line([80,120,400,120],{stroke:'#241a14',strokeWidth:4});canvas.add(l);canvas.setActiveObject(l);canvas.requestRenderAll();};

  // ---- 레이어/편집 ----
  function active(){return canvas.getActiveObject();}
  document.getElementById('del').onclick=function(){var o=active();if(o){canvas.remove(o);canvas.requestRenderAll();panel.classList.remove('on');}};
  document.getElementById('dup').onclick=function(){var o=active();if(!o)return;o.clone(function(c){c.set({left:o.left+24,top:o.top+24});canvas.add(c);canvas.setActiveObject(c);canvas.requestRenderAll();});};
  document.getElementById('front').onclick=function(){var o=active();if(o){canvas.bringToFront(o);canvas.requestRenderAll();}};
  document.getElementById('back').onclick=function(){var o=active();if(o){canvas.sendToBack(o);canvas.requestRenderAll();}};
  document.getElementById('center').onclick=function(){var o=active();if(o){canvas.centerObjectH(o);o.setCoords();canvas.requestRenderAll();}};
  document.getElementById('taller').onclick=function(){canvas.setHeight(canvas.getHeight()+800);canvas.requestRenderAll();};

  // ---- 실행취소 / 다시실행 (상태 스냅샷 스택) ----
  var history=[],hi=-1,locking=false,htimer=null;
  function snapshot(){if(locking)return;clearTimeout(htimer);htimer=setTimeout(function(){history=history.slice(0,hi+1);history.push(JSON.stringify(canvas.toJSON()));if(history.length>60)history.shift();hi=history.length-1;},250);}
  function restore(j){locking=true;canvas.loadFromJSON(JSON.parse(j),function(){canvas.requestRenderAll();locking=false;panel.classList.remove('on');});}
  function undo(){if(hi<=0)return;hi--;restore(history[hi]);}
  function redo(){if(hi>=history.length-1)return;hi++;restore(history[hi]);}
  canvas.on('object:added',snapshot);canvas.on('object:modified',snapshot);canvas.on('object:removed',snapshot);
  document.getElementById('undo').onclick=undo;document.getElementById('redo').onclick=redo;

  // ---- 키보드 단축키 ----
  var copied=null;
  document.addEventListener('keydown',function(e){
    if(/INPUT|SELECT|TEXTAREA/.test((e.target||{}).tagName||''))return;
    var o=active();
    if((e.key==='Delete'||e.key==='Backspace')&&o&&!o.isEditing){canvas.remove(o);canvas.requestRenderAll();panel.classList.remove('on');e.preventDefault();return;}
    if(e.ctrlKey||e.metaKey){
      var k=(e.key||'').toLowerCase();
      if(k==='z'){e.preventDefault();undo();}
      else if(k==='y'){e.preventDefault();redo();}
      else if(k==='c'&&o){copied=o;}
      else if(k==='v'&&copied){e.preventDefault();copied.clone(function(c){c.set({left:copied.left+24,top:copied.top+24});canvas.add(c);canvas.setActiveObject(c);canvas.requestRenderAll();});}
      else if(k==='d'&&o){e.preventDefault();o.clone(function(c){c.set({left:o.left+24,top:o.top+24});canvas.add(c);canvas.setActiveObject(c);canvas.requestRenderAll();});}
      return;
    }
    if(o&&!o.isEditing){var s=e.shiftKey?10:1;var mv={ArrowLeft:['left',-s],ArrowRight:['left',s],ArrowUp:['top',-s],ArrowDown:['top',s]}[e.key];if(mv){o.set(mv[0],o[mv[0]]+mv[1]);o.setCoords();canvas.requestRenderAll();e.preventDefault();}}
  });

  // ---- 선택 패널 동기화 ----
  function syncPanel(){
    var o=active();
    if(!o){panel.classList.remove('on');return;}
    panel.classList.add('on');
    var isText=o.type==='i-text'||o.type==='text'||o.type==='textbox';
    var isShape=/^(rect|circle|triangle|polygon|line|ellipse|path)$/.test(o.type);
    document.getElementById('fontGrp').style.display=isText?'':'none';
    document.getElementById('sizeGrp').style.display=isText?'':'none';
    document.getElementById('weightGrp').style.display=isText?'':'none';
    document.getElementById('fxGrp').style.display=isText?'':'none';
    document.getElementById('fill').parentElement.style.display=(isText||isShape)?'':'none';
    if(isText){
      document.getElementById('fontFamily').value=o.fontFamily||'Pretendard';
      document.getElementById('fontSize').value=Math.round(o.fontSize||40);
      document.getElementById('bold').classList.toggle('act',(o.fontWeight==='700'||o.fontWeight==='bold'||Number(o.fontWeight)>=600));
      document.getElementById('shadow').classList.toggle('act',!!o.shadow);
      document.getElementById('stroke').classList.toggle('act',!!(o.stroke&&o.strokeWidth));
    }
    if(isText||isShape){document.getElementById('fill').value=toHex(o.type==='line'?o.stroke:o.fill);}
    document.getElementById('opacity').value=Math.round((o.opacity==null?1:o.opacity)*100);
  }
  function toHex(c){try{return new fabric.Color(c).toHexa().slice(0,7);}catch(e){return '#241a14';}}
  canvas.on('selection:created',syncPanel);
  canvas.on('selection:updated',syncPanel);
  canvas.on('selection:cleared',function(){panel.classList.remove('on');});

  function setActive(prop,val){var o=active();if(!o)return;o.set(prop,val);canvas.requestRenderAll();}
  document.getElementById('fontFamily').onchange=function(e){var fam=e.target.value;loadFont(fam,function(){setActive('fontFamily',fam);});};
  document.getElementById('fontSize').oninput=function(e){setActive('fontSize',parseInt(e.target.value,10)||40);};
  document.getElementById('fill').oninput=function(e){var o=active();if(!o)return;if(o.type==='line')o.set('stroke',e.target.value);else o.set('fill',e.target.value);canvas.requestRenderAll();};
  document.getElementById('opacity').oninput=function(e){setActive('opacity',(parseInt(e.target.value,10)||0)/100);};
  document.getElementById('bold').onclick=function(){var o=active();if(!o)return;var b=(o.fontWeight==='700'||o.fontWeight==='bold');o.set('fontWeight',b?'400':'700');this.classList.toggle('act',!b);canvas.requestRenderAll();};
  document.getElementById('align').onclick=function(){var o=active();if(!o||!o.set)return;var seq=['left','center','right'];var cur=o.textAlign||'left';var nx=seq[(seq.indexOf(cur)+1)%3];o.set('textAlign',nx);canvas.requestRenderAll();};
  document.getElementById('shadow').onclick=function(){var o=active();if(!o)return;if(o.shadow){o.set('shadow',null);this.classList.remove('act');}else{o.set('shadow',new fabric.Shadow({color:'rgba(0,0,0,0.45)',blur:8,offsetX:0,offsetY:3}));this.classList.add('act');}canvas.requestRenderAll();};
  document.getElementById('stroke').onclick=function(){var o=active();if(!o)return;if(o.stroke&&o.strokeWidth){o.set({stroke:null,strokeWidth:0});this.classList.remove('act');}else{o.set({stroke:'#ffffff',strokeWidth:2,paintFirst:'stroke'});this.classList.add('act');}canvas.requestRenderAll();};

  // 웹폰트 로드 후 적용(fabric은 폰트 로드돼야 정확 렌더)
  function loadFont(fam,cb){if(fam==='Pretendard'){cb();return;}if(document.fonts&&document.fonts.load){document.fonts.load('40px "'+fam+'"').then(function(){canvas.requestRenderAll();cb();}).catch(cb);}else cb();}

  // ---- 저장/불러오기/내보내기 ----
  var KEY='lumi_editor_design';
  function design(){return JSON.stringify(canvas.toJSON());}
  document.getElementById('save').onclick=function(){
    var json=design();
    try{localStorage.setItem(KEY,json);}catch(e){}
    var blob=new Blob([json],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='상세페이지_디자인.json';a.click();
    toast('저장됐어요 (브라우저 + 파일)');
  };
  document.getElementById('load').onclick=function(){
    var inp=document.createElement('input');inp.type='file';inp.accept='application/json';
    inp.onchange=function(){var f=inp.files[0];if(!f){tryLocal();return;}var fr=new FileReader();fr.onload=function(){loadJSON(fr.result);};fr.readAsText(f);};
    // 파일 안 고르고 닫으면 로컬 시도
    inp.click();
  };
  function tryLocal(){var j=localStorage.getItem(KEY);if(j)loadJSON(j);else toast('저장된 디자인이 없어요');}
  function loadJSON(j){try{var o=JSON.parse(j);canvas.loadFromJSON(o,function(){canvas.requestRenderAll();toast('불러왔어요');});}catch(e){toast('불러오기 실패');}}
  document.getElementById('export').onclick=function(){
    canvas.discardActiveObject();canvas.requestRenderAll();
    var url=canvas.toDataURL({format:'png',multiplier:2});
    var a=document.createElement('a');a.href=url;a.download='상세페이지.png';a.click();
  };

  // 미니 토스트
  function toast(msg){var d=document.createElement('div');d.textContent=msg;d.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:linear-gradient(100deg,#ff7a5c,#ff4d8d);color:#140a10;padding:11px 18px;border-radius:980px;font-size:13px;font-weight:700;z-index:200;box-shadow:0 8px 24px rgba(255,77,141,.4)';document.body.appendChild(d);setTimeout(function(){d.style.transition='opacity .4s';d.style.opacity='0';setTimeout(function(){d.remove();},400);},1600);}

  // ---- AI 생성 결과(blocks) → fabric 레이어로 펼치기 (어려운 버전 진입) ----
  // 핵심: 히어로·라이프스타일·CTA는 글자를 "사진/색 위에 오버레이"(흰색+그림자) → 캔바식 화려함 + 글자 수정 가능.
  function loadBlocks(blocks,palette){
    palette=palette||{};var W=canvas.getWidth();
    var ACC=palette.accent||'#C8507A',INK=palette.ink||'#241a14';
    canvas.clear();canvas.backgroundColor='#ffffff';var y=24;
    function txt(text,o){if(text==null||text==='')return 0;o=o||{};var t=new fabric.Textbox(String(text),{left:o.left!=null?o.left:(o.center?W/2:40),top:o.top!=null?o.top:y,width:o.w||(W-80),fontFamily:o.ff||'Pretendard',fontSize:o.fs||26,fill:o.fill||INK,fontWeight:o.fw||'400',textAlign:o.center?'center':'left',originX:o.center?'center':'left'});if(o.shadow)t.set('shadow',new fabric.Shadow({color:'rgba(0,0,0,0.55)',blur:12,offsetX:0,offsetY:2}));canvas.add(t);return t.height||(o.fs||26)*1.4;}
    function flow(text,o){o=o||{};var h=txt(text,Object.assign({},o,{top:y}));if(h)y+=h+(o.mb==null?14:o.mb);}
    function over(text,top,o){o=o||{};return txt(text,{top:top,center:true,fill:'#ffffff',shadow:true,fs:o.fs||26,fw:o.fw||'700',w:W-100});}
    function darkBox(h){var top=y;canvas.add(new fabric.Rect({left:0,top:top,width:W,height:h,fill:INK}));return top;}
    function addImg(src){return new Promise(function(res){if(!src){res(null);return;}var uri=/^https?:|^data:/.test(src)?src:('data:image/png;base64,'+src);fabric.Image.fromURL(uri,function(img){if(!img){res(null);return;}img.scaleToWidth(W);var top=y;img.set({left:0,top:top});canvas.add(img);var h=img.getScaledHeight();y=top+h+10;canvas.requestRenderAll();res({top:top,h:h});},{crossOrigin:'anonymous'});});}
    var q=(blocks||[]).slice();
    function step(){
      if(!q.length){canvas.setHeight(y+40);locking=true;canvas.requestRenderAll();setTimeout(function(){history=[JSON.stringify(canvas.toJSON())];hi=0;locking=false;},200);return;}
      var b=q.shift(),p=Promise.resolve();
      if(b.type==='hero'){p=addImg(b.image).then(function(r){
        if(r){var ty=r.top+r.h*0.50;if(b.eyebrow){over(b.eyebrow,ty,{fs:14});ty+=36;}if(b.headline){over(b.headline,ty,{fs:42,fw:'800'});ty+=Math.ceil(String(b.headline).length/11)*52+14;}if(b.sub)over(b.sub,ty,{fs:18,fw:'500'});}
        else{flow(b.headline,{fs:40,fw:'800',center:true,mb:6});flow(b.sub,{fs:18,fill:'#6b6259',center:true,mb:30});}
      });}
      else if(b.type==='scene'){p=addImg(b.image).then(function(r){
        if(r){var ty=r.top+r.h*0.60;if(b.headline){over(b.headline,ty,{fs:30,fw:'800'});ty+=Math.ceil(String(b.headline).length/12)*40+12;}if(b.body)over(b.body,ty,{fs:16,fw:'500'});}
        else{flow(b.headline,{fs:25,fw:'800',mb:8});flow(b.body,{fs:16,fill:'#5f574e',mb:30});}
      });}
      else if(b.type==='image'){p=addImg(b.image);}
      else if(b.type==='concern'){flow(b.headline,{fs:26,fw:'800',center:true,mb:18});(b.items||[]).forEach(function(x){flow(x,{fs:17,fill:'#544c44',center:true,mb:10});});y+=20;}
      else if(b.type==='benefit'){flow(b.headline,{fs:26,fw:'800',center:true,mb:18});(b.items||[]).forEach(function(x,i){flow((i+1<10?'0':'')+(i+1)+'.  '+x,{fs:17,fw:'500',mb:10});});y+=20;}
      else if(b.type==='comparison'){flow(b.headline,{fs:24,fw:'800',fill:ACC,center:true,mb:16});(b.points||[]).forEach(function(x){flow(x,{fs:17,center:true,mb:10});});y+=20;}
      else if(b.type==='spec'){flow('제품 정보',{fs:22,fw:'800',mb:14});(b.rows||[]).forEach(function(r){flow(r[0]+' :  '+r[1],{fs:15,fill:'#6b6259',mb:8});});y+=20;}
      else if(b.type==='faq'){flow(b.headline,{fs:22,fw:'800',mb:14});(b.items||[]).forEach(function(f){flow('Q.  '+f.q,{fs:16,fw:'700',mb:4});flow(f.a,{fs:14,fill:'#6b6259',mb:16});});y+=20;}
      else if(b.type==='cta'){var ct=darkBox(220);over(b.headline,ct+88,{fs:26,fw:'800'});y=ct+220+20;}
      p.then(step);
    }
    canvas.setHeight(Math.max(1600,(blocks||[]).length*560));step();
  }

  // 시작 시: AI 생성 결과(blocks) 우선 → 없으면 로컬 복구
  try{
    var bj=sessionStorage.getItem('lumi_editor_blocks');
    if(bj){var dd=JSON.parse(bj);sessionStorage.removeItem('lumi_editor_blocks');loadBlocks(dd.blocks,dd.palette);toast('AI가 만든 결과를 불러왔어요');}
    else{var saved=localStorage.getItem(KEY);if(saved){loadJSON(saved);}setTimeout(function(){history=[JSON.stringify(canvas.toJSON())];hi=0;},600);}
  }catch(e){setTimeout(function(){history=[JSON.stringify(canvas.toJSON())];hi=0;},600);}
})();
</script>
<script>
// 더보기(⋯) 메뉴 토글 + Lucide 아이콘 렌더 (fabric 로직과 독립)
if(window.lucide)lucide.createIcons();
(function(){
  var mb=document.getElementById('moreBtn'),mm=document.getElementById('moreMenu');
  if(mb&&mm){
    mb.addEventListener('click',function(e){e.stopPropagation();mm.classList.toggle('on');});
    document.addEventListener('click',function(){mm.classList.remove('on');});
  }
})();
</script>
