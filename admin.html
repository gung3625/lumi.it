<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>Lumi 장부</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: #ff4081; color: white; }
    </style>
</head>
<body>
    <h1>📋 예약 현황</h1>
    <table id="table">
        <thead><tr><th>날짜</th><th>시간</th><th>성함</th><th>연락처</th><th>사진</th></tr></thead>
        <tbody id="list"></tbody>
    </table>
    <script>
        async function load() {
            const r = await fetch('/.netlify/functions/list');
            const data = await r.json();
            const list = document.getElementById('list');
            data.forEach(item => {
                list.innerHTML += `<tr>
                    <td>${item.metadata.resDate}</td>
                    <td>${item.metadata.resTime}</td>
                    <td>${item.metadata.userName}</td>
                    <td>${item.metadata.userPhone}</td>
                    <td><a href="/.netlify/functions/view?file=${item.key}" target="_blank">보기</a></td>
                </tr>`;
            });
        }
        load();
    </script>
</body>
</html>
