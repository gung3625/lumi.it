<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>옵션 대량 편집 — 루미</title>
  <link rel="stylesheet" href="/css/brand-tokens.css" />
  <link rel="stylesheet" href="/css/sprint3.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ── 전역 ────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  min-height: 100vh;
}

body.dark-mode {
  --bg: #000;
  --bg-alt: #111;
  --text: #f5f5f7;
  --text-soft: #aaa;
  --text-muted: #666;
  --border: rgba(255,255,255,0.10);
  --shadow: 0 1px 3px rgba(0,0,0,0.40);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.50);
  --surface: #1c1c1e;
}

:root { --surface: #fff; }
body.dark-mode { --surface: #1c1c1e; }

/* ── 레이아웃 ─────────────────────────────────────────────────────────── */
.page-shell {
  display: grid;
  grid-template-rows: 48px 1fr;
  min-height: 100vh;
}

/* ── 상단 바 ─────────────────────────────────────────────────────────── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 48px;
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: 0 var(--space-5);
  background: rgba(0,0,0,.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,.06);
}

.topbar__brand {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  text-decoration: none;
  color: #fff;
  font-weight: 700;
  font-size: 15px;
  flex-shrink: 0;
}

.topbar__brand img { height: 22px; width: auto; }

.topbar__sep {
  width: 1px;
  height: 18px;
  background: rgba(255,255,255,.2);
  flex-shrink: 0;
}

.topbar__title {
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  opacity: .8;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.topbar__actions {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-left: auto;
}

.topbar__theme {
  background: none;
  border: none;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  opacity: .7;
}
.topbar__theme:hover { opacity: 1; }

/* ── 본문 ─────────────────────────────────────────────────────────────── */
.main-content {
  display: grid;
  grid-template-columns: 240px 1fr;
  align-items: start;
  gap: 0;
  padding: 0;
  min-height: calc(100vh - 48px);
}

@media (max-width: 900px) {
  .main-content { grid-template-columns: 1fr; }
  .filter-panel { display: none; }
  .filter-panel.open { display: flex; }
}

/* ── 필터 패널 ───────────────────────────────────────────────────────── */
.filter-panel {
  position: sticky;
  top: 48px;
  height: calc(100vh - 48px);
  overflow-y: auto;
  border-right: 1px solid var(--border);
  background: var(--bg-alt);
  padding: var(--space-5) var(--space-4);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}

.filter-panel h3 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text-muted);
  margin: 0 0 var(--space-2) 0;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}

.filter-group label {
  font-size: 12px;
  color: var(--text-soft);
  font-weight: 500;
}

.filter-group select,
.filter-group input[type="number"],
.filter-group input[type="text"] {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
}

.filter-group select:focus,
.filter-group input:focus {
  outline: none;
  border-color: var(--pink);
}

.filter-check {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  cursor: pointer;
  font-size: 13px;
  color: var(--text);
}

.filter-actions {
  display: flex;
  gap: var(--space-2);
  margin-top: var(--space-2);
}

.btn-filter-apply {
  flex: 1;
  padding: 8px;
  background: var(--pink);
  color: #fff;
  border: none;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.btn-filter-apply:hover { background: var(--pink-deep); }

.btn-filter-reset {
  padding: 8px 12px;
  background: none;
  color: var(--text-soft);
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
}
.btn-filter-reset:hover { color: var(--text); }

/* ── 오른쪽 영역 ─────────────────────────────────────────────────────── */
.table-panel {
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - 48px);
}

/* ── 액션 바 ─────────────────────────────────────────────────────────── */
.action-bar {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-5);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-wrap: wrap;
  position: sticky;
  top: 48px;
  z-index: 50;
}

.action-bar__count {
  font-size: 13px;
  color: var(--text-soft);
  margin-right: auto;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 7px 16px;
  border-radius: var(--radius-pill);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: opacity .15s;
  border: none;
}
.btn:disabled { opacity: .45; cursor: not-allowed; }

.btn--primary {
  background: var(--pink);
  color: #fff;
}
.btn--primary:not(:disabled):hover { background: var(--pink-deep); }

.btn--secondary {
  background: var(--bg-alt);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn--secondary:hover { background: var(--border); }

.btn--ghost {
  background: none;
  color: var(--text-soft);
  border: 1px solid var(--border);
}
.btn--ghost:hover { color: var(--text); }

/* ── 일괄 적용 바 ────────────────────────────────────────────────────── */
.batch-bar {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-5);
  background: rgba(200, 80, 122, .06);
  border-bottom: 1px solid rgba(200, 80, 122, .15);
  flex-wrap: wrap;
}

.batch-bar__label {
  font-size: 12px;
  font-weight: 600;
  color: var(--pink);
  white-space: nowrap;
}

.batch-bar select,
.batch-bar input[type="number"],
.batch-bar input[type="text"] {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  width: 120px;
}

/* ── 테이블 ──────────────────────────────────────────────────────────── */
.table-wrap {
  flex: 1;
  overflow-x: auto;
  overflow-y: auto;
  padding: 0 var(--space-5) var(--space-7);
}

.options-table {
  width: 100%;
  min-width: 900px;
  border-collapse: collapse;
  font-size: 13px;
}

.options-table th {
  position: sticky;
  top: 0;
  background: var(--bg-alt);
  border-bottom: 2px solid var(--border);
  padding: 8px 10px;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
  z-index: 10;
}

.options-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.options-table tr:hover td {
  background: var(--bg-alt);
}

.options-table tr.row--selected td {
  background: rgba(200, 80, 122, .04);
}

.options-table tr.row--dirty td {
  background: rgba(255, 204, 0, .06);
}

.table-empty {
  text-align: center;
  color: var(--text-muted);
  padding: var(--space-7) !important;
}

/* ── 셀 입력 ─────────────────────────────────────────────────────────── */
.cell-input {
  width: 100%;
  padding: 4px 6px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  transition: border-color .12s, background .12s;
  min-width: 70px;
}

.cell-input:focus {
  outline: none;
  border-color: var(--pink);
  background: var(--surface);
}

.cell-input[data-changed="1"] {
  background: rgba(255, 200, 0, .12);
  border-color: rgba(200, 150, 0, .4);
}

/* ── 배지 ─────────────────────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  font-size: 11px;
  font-weight: 600;
}

.badge--changed  { background: rgba(255,200,0,.18); color: #996600; }
.badge--market   { background: var(--bg-alt); color: var(--text-soft); border: 1px solid var(--border); }
.badge--info     { background: #e8f4ff; color: #0066cc; }
.badge--success  { background: #e6f9ee; color: #1a7a3c; }
.badge--error    { background: #fff0f0; color: #cc2222; }

body.dark-mode .badge--changed  { background: rgba(255,200,0,.12); color: #ccaa00; }
body.dark-mode .badge--market   { background: #2a2a2a; color: #aaa; }
body.dark-mode .badge--info     { background: #001833; color: #66aaff; }
body.dark-mode .badge--success  { background: #001a0d; color: #44cc77; }
body.dark-mode .badge--error    { background: #1a0000; color: #ff6666; }

.text-soft  { color: var(--text-soft); }
.text--changed { color: #1a7a3c; font-weight: 600; }
body.dark-mode .text--changed { color: #44cc77; }

/* ── 로딩 오버레이 ───────────────────────────────────────────────────── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.3);
  z-index: 9000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.loading-overlay[hidden] { display: none; }

.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,.2);
  border-top-color: var(--pink);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── 미리보기 모달 ───────────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 8000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-4);
}

.modal-backdrop[hidden] { display: none; }

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 900px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow-md);
}

.modal__header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-4) var(--space-5);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.modal__title {
  font-size: 16px;
  font-weight: 700;
  margin: 0;
  flex: 1;
}

.modal__close {
  background: none;
  border: none;
  font-size: 20px;
  color: var(--text-soft);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
}
.modal__close:hover { color: var(--text); }

.modal__body {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-4) var(--space-5);
}

.modal__footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: var(--space-2);
  padding: var(--space-4) var(--space-5);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.preview-summary {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
  margin-bottom: var(--space-4);
}

.preview-errors {
  margin-bottom: var(--space-4);
  padding: var(--space-3);
  background: rgba(204,0,0,.06);
  border: 1px solid rgba(204,0,0,.15);
  border-radius: var(--radius);
  font-size: 13px;
  color: #cc2222;
}
.preview-errors ul { margin: var(--space-2) 0 0; padding-left: var(--space-4); }
.preview-errors li { margin-bottom: 4px; }

.preview-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.preview-table th {
  background: var(--bg-alt);
  border-bottom: 2px solid var(--border);
  padding: 7px 10px;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  white-space: nowrap;
}
.preview-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

/* ── 토스트 ──────────────────────────────────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: var(--space-5);
  right: var(--space-5);
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
  pointer-events: none;
}

.toast {
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  color: #fff;
  background: #333;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
  max-width: 320px;
}
.toast--visible { opacity: 1; transform: translateY(0); }
.toast--success { background: #1a7a3c; }
.toast--error   { background: #cc2222; }
.toast--warn    { background: #995500; }

/* ── 모바일 뷰 ───────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .table-panel { padding: 0; }
  .table-wrap { padding: var(--space-3); }
  .action-bar { padding: var(--space-2) var(--space-3); gap: var(--space-2); }
  .options-table { display: none; }
  .mobile-cards { display: flex; flex-direction: column; gap: var(--space-3); padding: var(--space-3); }
  .mobile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-4);
    box-shadow: var(--shadow);
  }
  .mobile-card__title { font-weight: 700; margin-bottom: var(--space-2); font-size: 14px; }
  .mobile-card__option { color: var(--text-soft); font-size: 13px; margin-bottom: var(--space-3); }
  .mobile-card__hint {
    font-size: 12px;
    color: var(--text-muted);
    border: 1px dashed var(--border);
    padding: var(--space-3);
    border-radius: var(--radius-sm);
    text-align: center;
  }
  .topbar__title { display: none; }
}

@media (min-width: 769px) {
  .mobile-cards { display: none; }
}

/* ── 파일 업로드 숨김 ─────────────────────────────────────────────────── */
#excelUploadInput { display: none; }
</style>
</head>
<body class="dark-mode">

<div id="loadingOverlay" class="loading-overlay" hidden>
  <div class="loading-spinner" aria-label="로딩 중"></div>
</div>

<div id="toastContainer" class="toast-container" aria-live="polite"></div>

<!-- ==================== 미리보기 모달 ==================== -->
<div id="previewModal" class="modal-backdrop" hidden aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="previewModalTitle">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="previewModalTitle">엑셀 변경 미리보기</h2>
      <button type="button" class="modal__close" id="btnClosePreview" aria-label="닫기">✕</button>
    </div>
    <div class="modal__body">
      <div class="preview-summary" id="previewSummary"></div>
      <div class="preview-errors" id="previewErrors" hidden></div>
      <div style="overflow-x:auto;">
        <table class="preview-table">
          <thead>
            <tr>
              <th>상품명</th>
              <th>옵션명</th>
              <th>필드</th>
              <th>기존값</th>
              <th>변경값</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="previewTbody"></tbody>
        </table>
      </div>
    </div>
    <div class="modal__footer">
      <button type="button" class="btn btn--ghost" id="btnCancelPreview">취소</button>
      <button type="button" class="btn btn--primary" id="btnApplyPreview">변경 적용</button>
    </div>
  </div>
</div>

<!-- ==================== 레이아웃 ==================== -->
<div class="page-shell">

  <!-- 상단 바 -->
  <nav class="topbar" aria-label="내비게이션">
    <a href="/dashboard.html" class="topbar__brand" aria-label="루미 대시보드">
      <img src="/assets/logo-wordmark.png" alt="루미" />
    </a>
    <div class="topbar__sep" aria-hidden="true"></div>
    <span class="topbar__title">옵션 대량 편집</span>
    <div class="topbar__actions">
      <button type="button" class="topbar__theme" id="themeToggle" aria-label="테마 전환">☀</button>
    </div>
  </nav>

  <!-- 본문 -->
  <div class="main-content">

    <!-- 좌측 필터 -->
    <aside class="filter-panel" aria-label="필터">
      <h3>필터</h3>

      <div class="filter-group">
        <label for="filterProduct">상품</label>
        <select id="filterProduct">
          <option value="">전체 상품</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filterMarket">마켓</label>
        <select id="filterMarket">
          <option value="">전체 마켓</option>
          <option value="coupang">쿠팡</option>
          <option value="naver">네이버</option>
          <option value="toss">토스</option>
        </select>
      </div>

      <div class="filter-group">
        <label class="filter-check">
          <input type="checkbox" id="filterZeroStock" />
          재고 0 만 보기
        </label>
      </div>

      <div class="filter-group">
        <label for="filterMinPrice">최소 가격</label>
        <input type="number" id="filterMinPrice" placeholder="0" min="0" />
      </div>

      <div class="filter-group">
        <label for="filterMaxPrice">최대 가격</label>
        <input type="number" id="filterMaxPrice" placeholder="10000000" min="0" />
      </div>

      <div class="filter-actions">
        <button type="button" class="btn-filter-apply" id="btnFilter">적용</button>
        <button type="button" class="btn-filter-reset" id="btnReset">초기화</button>
      </div>
    </aside>

    <!-- 오른쪽 테이블 영역 -->
    <section class="table-panel" aria-label="옵션 목록">

      <!-- 액션 바 -->
      <div class="action-bar" role="toolbar" aria-label="액션">
        <span class="action-bar__count" id="resultCount">옵션 로드 중…</span>
        <button type="button" class="btn btn--ghost" id="btnExcelDownload">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          엑셀 다운
        </button>
        <button type="button" class="btn btn--ghost" id="btnExcelUpload">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          엑셀 업로드
        </button>
        <input type="file" id="excelUploadInput" accept=".xlsx,.xls" aria-label="엑셀 파일 선택" />
        <button type="button" class="btn btn--primary" id="btnSave" disabled>변경 없음</button>
      </div>

      <!-- 일괄 적용 바 (행 선택 시 표시) -->
      <div class="batch-bar" id="batchBar" hidden role="toolbar" aria-label="일괄 적용">
        <span class="batch-bar__label" id="selectedCount">0개 선택됨</span>
        <select id="batchField" aria-label="필드 선택">
          <option value="price">판매가</option>
          <option value="stock">재고</option>
          <option value="extra_price">추가금액</option>
          <option value="sku">SKU</option>
        </select>
        <input type="number" id="batchValue" placeholder="값 입력" min="0" aria-label="적용할 값" />
        <button type="button" class="btn btn--primary" id="btnBatchApply">선택 행에 적용</button>
      </div>

      <!-- PC 테이블 -->
      <div class="table-wrap">
        <table class="options-table" aria-label="옵션 목록">
          <thead>
            <tr>
              <th class="col-check" style="width:36px;">
                <input type="checkbox" id="selectAll" aria-label="전체 선택" />
              </th>
              <th class="col-product">상품명</th>
              <th class="col-option">옵션명</th>
              <th class="col-sku">SKU</th>
              <th class="col-price" style="width:100px;">판매가</th>
              <th class="col-stock" style="width:80px;">재고</th>
              <th class="col-extra" style="width:90px;">추가금액</th>
              <th class="col-market">마켓</th>
              <th class="col-status" style="width:60px;"></th>
            </tr>
          </thead>
          <tbody id="optionsTbody">
            <tr>
              <td colspan="9" class="table-empty">필터를 선택하고 옵션을 불러오세요.</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 모바일: 카드 리스트 (테이블 불가) -->
      <div class="mobile-cards" id="mobileCards" aria-label="모바일 옵션 목록">
        <div style="text-align:center; padding: 32px 16px;">
          <p style="font-weight:700; margin-bottom:8px;">PC에서 더 편하게 편집하세요</p>
          <p style="color:var(--text-soft); font-size:13px; margin-bottom:16px;">
            모바일에서는 엑셀 다운로드 후 편집 → 업로드로 일괄 수정하세요.
          </p>
          <button type="button" class="btn btn--primary" id="btnExcelDownloadMobile"
            onclick="document.getElementById('btnExcelDownload').click()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            엑셀 다운로드
          </button>
        </div>
      </div>

    </section>
  </div>
</div>
