<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.3/dist/umd/supabase.min.js"></script>
<script>
  window.lumiSupa = window.supabase.createClient(
    'https://cldsozdocxpvkbuxwqep.supabase.co',
    'sb_publishable_WjWg5o05Y7lhib674Cr_fw_0mpY-ccG',
    { auth: { persistSession: true, autoRefreshToken: true, storageKey: 'lumi-auth' } }
  );
  window.lumiSupa.auth.onAuthStateChange(function(event, session){
    try {
      if (session && session.access_token) {
        localStorage.setItem('lumi_token', session.access_token);
        var u = session.user || {};
        var meta = u.user_metadata || {};
        var prev = {};
        try { prev = JSON.parse(localStorage.getItem('lumi_user') || '{}'); } catch(e){}
        var merged = Object.assign({}, prev, { email: u.email || prev.email, id: u.id || prev.id }, meta);
        localStorage.setItem('lumi_user', JSON.stringify(merged));
      } else if (event === 'SIGNED_OUT') {
        localStorage.removeItem('lumi_token');
        localStorage.removeItem('lumi_user');
      }
    } catch(e) { /* 무시 */ }
  });
</script>

<script>
var user = {};
try { user = JSON.parse(localStorage.getItem('lumi_user') || '{}'); } catch(e) {}
var settings = {};
try { settings = JSON.parse(localStorage.getItem('lumi_settings') || '{}'); } catch(e) {}
var authHeaders = function(){
  return { 'Authorization': 'Bearer ' + localStorage.getItem('lumi_token'), 'Content-Type': 'application/json' };
};

// localStorage 초기값 먼저 로드 (빠른 표시)
function applyUserToUI(u){
  if(u.storeName) document.getElementById('s-store').value = u.storeName;
  if(u.bizCategory) document.getElementById('s-biz').value = u.bizCategory;
  if(u.region) document.getElementById('s-region').value = u.region;
  applyIgStatus(u);
}
function applyIgStatus(u){
  if(u.igConnected){
    document.getElementById('ig-dot').className='ig-dot connected';
    document.getElementById('ig-text').textContent='연동됨';
    document.getElementById('ig-btn').textContent='연동 해제';
    document.getElementById('ig-btn').className='btn btn-danger';
    document.getElementById('ig-btn').onclick=function(){disconnectIg();};
  } else {
    document.getElementById('ig-dot').className='ig-dot disconnected';
    document.getElementById('ig-text').textContent='연동 안 됨';
    document.getElementById('ig-btn').textContent='연동하기';
    document.getElementById('ig-btn').className='btn btn-pink';
    document.getElementById('ig-btn').onclick=function(){location.href='/';};
  }
}
applyUserToUI(user);

// 알림 설정 로드
if(settings.kakaoNotif===false) document.getElementById('t-kakao').classList.remove('on');
if(settings.emailNotif===false) document.getElementById('t-email').classList.remove('on');

// API에서 최신 프로필 로드 — /api/get-profile (Bearer 검증, RLS 우회)
if(localStorage.getItem('lumi_token')){
  var _tokL = localStorage.getItem('lumi_token') || '';
  fetch('/api/get-profile', { method:'GET', headers:{ 'Authorization':'Bearer '+_tokL } })
    .then(function(r){ return r.json().catch(function(){ return {}; }); })
    .then(function(res){
      var d = res && res.user ? res.user : null;
      if(!d) return;
      var mapped = {
        name: d.name, storeName: d.store_name, phone: d.phone, email: d.email,
        bizCategory: d.biz_category, region: d.region, storeDesc: d.store_desc,
        captionTone: d.caption_tone, tagStyle: d.tag_style,
        sidoCode: d.sido_code, sigunguCode: d.sigungu_code, storeSido: d.store_sido,
        instagram: d.instagram_handle, autoStory: d.auto_story, autoFestival: d.auto_festival,
      };
      user = Object.assign(user, mapped);
      localStorage.setItem('lumi_user', JSON.stringify(user));
      applyUserToUI(user);
    })
    .catch(function(){});
}

function saveProfile(){
  var storeName = document.getElementById('s-store').value;
  var bizCategory = document.getElementById('s-biz').value;
  var region = document.getElementById('s-region').value;

  // localStorage 즉시 반영
  user.storeName = storeName;
  user.bizCategory = bizCategory;
  user.region = region;
  localStorage.setItem('lumi_user', JSON.stringify(user));

  if(!localStorage.getItem('lumi_token')){
    showToast('매장 정보가 저장됐어요');
    return;
  }

  // /api/update-profile — Bearer 검증 후 admin client로 업데이트
  var _tokSP = localStorage.getItem('lumi_token') || '';
  fetch('/api/update-profile', {
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+_tokSP },
    body: JSON.stringify({ storeName:storeName, bizCategory:bizCategory, region:region })
  }).then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
    .then(function(res){
      if(!res.ok || !res.data || !res.data.success){ showToast((res.data && res.data.error) || '저장에 실패했어요'); return; }
      var d = res.data.user || {};
      user = Object.assign(user, { storeName:d.store_name, bizCategory:d.biz_category, region:d.region });
      localStorage.setItem('lumi_user', JSON.stringify(user));
      showToast('매장 정보가 저장됐어요');
      setTimeout(function(){ location.reload(); }, 500);
    })
    .catch(function(){ showToast('네트워크 오류가 발생했어요'); });
}

function changePw(){
  var cur = document.getElementById('s-pw-cur').value;
  var nw = document.getElementById('s-pw-new').value;
  var cf = document.getElementById('s-pw-confirm').value;
  if(!cur||!nw||!cf){showToast('모든 항목을 입력해주세요');return;}
  if(nw!==cf){showToast('새 비밀번호가 일치하지 않아요');return;}
  if(nw.length<10){showToast('10자 이상 입력해주세요');return;}

  if(!localStorage.getItem('lumi_token')){
    showToast('로그인이 필요합니다');
    return;
  }

  var email = user.email || '';
  if(!email){ showToast('사용자 정보를 찾을 수 없어요'); return; }

  fetch('/api/reset-password', {
    method:'POST', headers:authHeaders(),
    body: JSON.stringify({ email:email, currentPassword:cur, password:nw })
  })
  .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
  .then(function(res){
    if(res.ok && res.data.success){
      showToast('비밀번호가 변경됐어요');
      document.getElementById('s-pw-cur').value='';
      document.getElementById('s-pw-new').value='';
      document.getElementById('s-pw-confirm').value='';
    } else {
      showToast(res.data.error || '비밀번호 변경에 실패했어요');
    }
  })
  .catch(function(){ showToast('네트워크 오류가 발생했어요'); });
}

function disconnectIg(){
  if(!confirm('인스타그램 연동을 해제할까요?')) return;

  // localStorage 즉시 반영
  user.igConnected = false;
  localStorage.setItem('lumi_user', JSON.stringify(user));
  applyIgStatus(user);

  if(!localStorage.getItem('lumi_token')){
    showToast('연동이 해제됐어요');
    return;
  }

  // /api/disconnect-ig — Bearer 검증 후 admin client로 삭제
  var _tokDG = localStorage.getItem('lumi_token') || '';
  fetch('/api/disconnect-ig', {
    method:'POST',
    headers:{ 'Authorization':'Bearer '+_tokDG }
  }).then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
    .then(function(res){
      if(!res.ok || !res.data || !res.data.success){
        showToast((res.data && res.data.error) || '연동 해제에 실패했어요');
        return;
      }
      showToast('연동이 해제됐어요');
    })
    .catch(function(){ showToast('네트워크 오류가 발생했어요'); });
}

function saveNotif(){
  settings.kakaoNotif = document.getElementById('t-kakao').classList.contains('on');
  settings.emailNotif = document.getElementById('t-email').classList.contains('on');
  localStorage.setItem('lumi_settings', JSON.stringify(settings));
  showToast('알림 설정이 저장됐어요');
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

var io=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){var delay=parseInt(e.target.dataset.delay||0);setTimeout(function(){e.target.classList.add('visible');},delay);io.unobserve(e.target);}});},{threshold:0.08});
document.querySelectorAll('.card').forEach(function(c,i){c.dataset.delay=i*60;io.observe(c);});
</script>
