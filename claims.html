<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>클레임 처리 — 루미</title>
  <meta name="description" content="취소·반품·교환·문의 클레임을 한 곳에서 처리해요." />
  <link rel="icon" href="/assets/logo-cloud.png" />
  <link rel="stylesheet" href="/css/brand-tokens.css" />
  <link rel="stylesheet" href="/css/sprint3.css" />
  <link rel="stylesheet" href="/css/canvas.css" />
<style>
/* ── Claims 전용 스타일 ───────────────────────────────── */

/* 탭 */
.claims-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--canvas-border, rgba(0,0,0,.1));
  overflow-x: auto;
  scrollbar-width: none;
  position: sticky;
  top: 48px; /* topbar 높이 */
  background: var(--canvas-bg, #fff);
  z-index: 10;
  padding: 0 16px;
}
.claims-tabs::-webkit-scrollbar { display: none; }

.claims-tab {
  flex-shrink: 0;
  padding: 12px 18px;
  border: none;
  background: transparent;
  font-size: 14px;
  font-weight: 500;
  color: var(--canvas-text-muted, #86868b);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
}
.claims-tab:hover { color: var(--canvas-text, #1d1d1f); }
.claims-tab--active {
  color: #C8507A;
  border-bottom-color: #C8507A;
  font-weight: 600;
}
.claims-tab__badge {
  background: #C8507A;
  color: #fff;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  min-width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
  line-height: 1;
}

/* 카드 리스트 */
.claims-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 16px;
}

.claims-card {
  background: var(--canvas-card, #fff);
  border-radius: 8px;
  padding: 14px 16px;
  cursor: pointer;
  border: 1px solid var(--canvas-border, rgba(0,0,0,.08));
  transition: box-shadow .15s, transform .1s;
}
.claims-card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
  transform: translateY(-1px);
}
.claims-card:focus { outline: 2px solid #C8507A; outline-offset: 2px; }
.claims-card__head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.claims-card__market {
  font-size: 12px;
  font-weight: 600;
  color: var(--canvas-text-muted, #86868b);
  background: var(--canvas-bg, #f5f5f7);
  border-radius: 4px;
  padding: 2px 7px;
}
.claims-card__reason {
  margin: 0 0 8px;
  font-size: 14px;
  color: var(--canvas-text, #1d1d1f);
  line-height: 1.5;
  word-break: keep-all;
  overflow-wrap: break-word;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.claims-card__meta {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--canvas-text-muted, #86868b);
  gap: 8px;
  flex-wrap: wrap;
}

/* 배지 */
.claims-badge {
  font-size: 11px;
  font-weight: 600;
  border-radius: 6px;
  padding: 2px 8px;
  white-space: nowrap;
}

/* 빈 상태 */
.claims-empty, .claims-loading {
  text-align: center;
  padding: 48px 16px;
  color: var(--canvas-text-muted, #86868b);
  font-size: 14px;
}

/* 페이지네이션 */
.claims-pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px;
}
.claims-page-btn {
  padding: 8px 16px;
  border-radius: 980px;
  border: 1px solid var(--canvas-border, rgba(0,0,0,.1));
  background: transparent;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  color: var(--canvas-text, #1d1d1f);
  transition: background .15s;
}
.claims-page-btn:hover:not(:disabled) { background: var(--canvas-bg, #f5f5f7); }
.claims-page-btn:disabled { opacity: .4; cursor: default; }
.claims-page-info { font-size: 13px; color: var(--canvas-text-muted, #86868b); }

/* 슬라이드오버 */
.claims-slideover {
  position: fixed;
  inset: 0;
  z-index: 200;
  pointer-events: none;
}
.claims-slideover--open { pointer-events: auto; }

.claims-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  opacity: 0;
  transition: opacity .2s;
  z-index: 200;
}
.claims-overlay--visible { opacity: 1; }

.claims-slideover__panel {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: min(440px, 100vw);
  background: var(--canvas-card, #fff);
  box-shadow: -4px 0 32px rgba(0,0,0,.12);
  transform: translateX(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  z-index: 201;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.claims-slideover--open .claims-slideover__panel {
  transform: translateX(0);
}

.claims-slideover__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--canvas-border, rgba(0,0,0,.08));
  flex-shrink: 0;
}
.claims-slideover__title {
  font-size: 16px;
  font-weight: 600;
  margin: 0;
  color: var(--canvas-text, #1d1d1f);
}
.claims-slideover__close {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--canvas-text-muted, #86868b);
  font-size: 18px;
  transition: background .15s;
  font-family: inherit;
  flex-shrink: 0;
}
.claims-slideover__close:hover { background: var(--canvas-bg, #f5f5f7); }

.claims-slideover__body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  -webkit-overflow-scrolling: touch;
}

/* 상세 DL */
.claims-dl {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 8px 16px;
  margin: 0 0 20px;
  font-size: 14px;
}
.claims-dl dt {
  color: var(--canvas-text-muted, #86868b);
  font-weight: 500;
  white-space: nowrap;
}
.claims-dl dd {
  margin: 0;
  color: var(--canvas-text, #1d1d1f);
  word-break: break-all;
}

/* 액션 영역 */
.claims-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 8px;
}
.claims-action-btns {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.claims-reason-input,
.claims-input {
  width: 100%;
  box-sizing: border-box;
  border: 1px solid var(--canvas-border, rgba(0,0,0,.12));
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 14px;
  font-family: inherit;
  background: var(--canvas-bg, #f5f5f7);
  color: var(--canvas-text, #1d1d1f);
  resize: vertical;
}
.claims-reason-input:focus,
.claims-input:focus {
  outline: 2px solid #C8507A;
  outline-offset: -1px;
}
.claims-action-done {
  color: var(--canvas-text-muted, #86868b);
  font-size: 14px;
  text-align: center;
  padding: 12px 0;
}

/* 버튼 */
.btn { border-radius: 980px; font-size: 14px; font-weight: 600; padding: 9px 20px; cursor: pointer; border: none; font-family: inherit; transition: opacity .15s, background .15s; }
.btn:disabled { opacity: .5; cursor: default; }
.btn--primary { background: #C8507A; color: #fff; }
.btn--primary:hover:not(:disabled) { background: #b04068; }
.btn--secondary { background: var(--canvas-bg, #f5f5f7); color: var(--canvas-text, #1d1d1f); border: 1px solid var(--canvas-border, rgba(0,0,0,.1)); }
.btn--secondary:hover:not(:disabled) { background: var(--canvas-border, rgba(0,0,0,.08)); }
.btn--ghost { background: transparent; color: #b91c1c; border: 1px solid #fca5a5; }
.btn--ghost:hover:not(:disabled) { background: #fef2f2; }

/* 토스트 */
.claims-toast {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1d1d1f;
  color: #fff;
  padding: 12px 20px;
  border-radius: 980px;
  font-size: 14px;
  font-weight: 500;
  z-index: 300;
  opacity: 0;
  transition: transform .2s, opacity .2s;
  white-space: nowrap;
  pointer-events: none;
}
.claims-toast--show { transform: translateX(-50%) translateY(0); opacity: 1; }
.claims-toast--error { background: #b91c1c; }

/* FAB 다크모드 */
.fab-dark {
  position: fixed;
  bottom: calc(24px + env(safe-area-inset-bottom, 0px));
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,.08);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: background .15s;
}
.fab-dark:hover { background: rgba(0,0,0,.14); }
body.dark-mode .fab-dark { background: rgba(255,255,255,.1); }
body.dark-mode .fab-dark:hover { background: rgba(255,255,255,.18); }

/* 다크모드 */
body.dark-mode {
  background: #000;
  color: #f5f5f7;
}
body.dark-mode .claims-tabs {
  background: #111;
  border-bottom-color: rgba(255,255,255,.08);
}
body.dark-mode .claims-tab { color: rgba(255,255,255,.5); }
body.dark-mode .claims-tab:hover { color: #f5f5f7; }
body.dark-mode .claims-card {
  background: #272729;
  border-color: rgba(255,255,255,.06);
}
body.dark-mode .claims-card__market { background: #1a1a1c; color: rgba(255,255,255,.5); }
body.dark-mode .claims-card__reason { color: #f5f5f7; }
body.dark-mode .claims-slideover__panel { background: #1a1a1c; }
body.dark-mode .claims-slideover__header { border-bottom-color: rgba(255,255,255,.08); }
body.dark-mode .claims-slideover__title { color: #f5f5f7; }
body.dark-mode .claims-dl dt { color: rgba(255,255,255,.5); }
body.dark-mode .claims-dl dd { color: #f5f5f7; }
body.dark-mode .claims-reason-input,
body.dark-mode .claims-input {
  background: #272729;
  border-color: rgba(255,255,255,.12);
  color: #f5f5f7;
}
body.dark-mode .btn--secondary { background: #272729; color: #f5f5f7; border-color: rgba(255,255,255,.1); }
body.dark-mode .btn--ghost { background: transparent; color: #fca5a5; border-color: rgba(252,165,165,.3); }
body.dark-mode .btn--ghost:hover:not(:disabled) { background: rgba(252,165,165,.1); }

/* 모바일 480px 대응 */
@media (max-width: 480px) {
  .claims-tab { padding: 10px 12px; font-size: 13px; }
  .claims-list { padding: 10px 12px; }
  .claims-card { padding: 12px 14px; }
  .claims-action-btns { flex-direction: column; }
  .claims-action-btns .btn { width: 100%; }
  .topbar__nav a { font-size: 13px; padding: 0 4px; }
}

/* 법적 고지 Footer */
.lumi-footer{border-top:1px solid rgba(0,0,0,.08);padding:28px 24px 36px;text-align:center;font-size:12px;color:#86868b;line-height:1.8;margin-top:48px;}
body.dark-mode .lumi-footer{border-top-color:rgba(255,255,255,.08);color:rgba(255,255,255,.3);}
.lumi-footer p{margin:0 0 2px;}
.lumi-footer__links{display:flex;flex-wrap:wrap;gap:8px 14px;justify-content:center;margin:10px 0 6px;}
.lumi-footer__links a{font-size:12px;color:#6e6e73;text-decoration:none;}
.lumi-footer__links a:hover{text-decoration:underline;}
body.dark-mode .lumi-footer__links a{color:rgba(255,255,255,.35);}
.lumi-footer__copy{font-size:11px;color:#aeaeb2;margin-top:6px!important;}
.lumi-footer__logo{height:28px;width:auto;display:block;margin:0 auto 8px;}
body.dark-mode .lumi-footer__logo{filter:invert(1) brightness(2);}
body.dark-mode .lumi-footer__copy{color:rgba(255,255,255,.2);}
@media(max-width:768px){.lumi-footer{padding:22px 16px 30px;}}
</style>
</head>
<body class="page-claims">

  <!-- Topbar -->
  <header class="topbar" role="banner">
    <a href="/dashboard.html" class="topbar__brand" aria-label="대시보드로 돌아가기"
       style="display:flex;align-items:center;gap:6px;color:inherit;text-decoration:none;">
      <i data-lucide="arrow-left" style="width:20px;height:20px;flex-shrink:0;"></i>
      <span style="font-size:15px;font-weight:600;">클레임 처리</span>
    </a>
    <nav class="topbar__nav" aria-label="메인">
      <a href="/tasks">오늘</a>
      <a href="/orders">주문</a>
      <a href="/cs-inbox">CS</a>
      <a href="/claims.html" class="active">클레임</a>
    </nav>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="cmdk-trigger" type="button" data-cmdk-open aria-label="명령창 열기">
        <span aria-hidden="true">⌘</span>
        <span>명령</span>
        <kbd>⌘K</kbd>
      </button>
    </div>
  </header>

  <main class="page-main" style="padding:0;max-width:720px;margin:0 auto;">

    <!-- 페이지 헤더 -->
    <section class="hero hero--compact" style="padding:20px 16px 8px;">
      <div>
        <h1 class="hero__title">클레임 처리</h1>
        <p class="hero__sub">취소·반품·교환·문의를 마켓별로 한 곳에서 처리해요.</p>
      </div>
    </section>

    <!-- 4개 탭 (sticky) -->
    <div class="claims-tabs" id="claimsTabs" role="tablist" aria-label="클레임 유형">
      <!-- JS로 렌더 -->
      <span style="padding:12px 0;color:var(--canvas-text-muted);font-size:13px;">불러오는 중…</span>
    </div>

    <!-- 카드 리스트 -->
    <div class="claims-list" id="claimsList" role="list" aria-live="polite">
      <div class="claims-loading">불러오는 중…</div>
    </div>

    <!-- 페이지네이션 -->
    <div class="claims-pagination" id="claimsPagination"></div>

  </main>

  <!-- 슬라이드오버 -->
  <div class="claims-slideover" id="claimsSlideover" role="dialog" aria-modal="true" aria-labelledby="slideoverTitle" tabindex="-1">
    <div class="claims-overlay" id="claimsOverlay"></div>
    <div class="claims-slideover__panel">
      <header class="claims-slideover__header">
        <h2 class="claims-slideover__title" id="slideoverTitle">클레임 상세</h2>
        <button class="claims-slideover__close" id="slideoverClose" aria-label="닫기" type="button">×</button>
      </header>
      <div class="claims-slideover__body" id="slideoverBody">
        <!-- JS로 렌더 -->
      </div>
    </div>
  </div>

  <!-- FAB 다크모드 토글 -->
  <button class="fab-dark" id="darkModeToggle" aria-label="다크/라이트 모드 전환" type="button">
    <i data-lucide="moon" style="width:18px;height:18px;" id="darkModeIcon"></i>
  </button>

  <!-- Footer -->
  <footer class="lumi-footer">
    <div class="lumi-footer__info">
      <img src="/assets/logo-wordmark.png" alt="루미" class="lumi-footer__logo" />
      <p>루미 · 사업자등록번호 000-00-00000</p>
    </div>
    <div class="lumi-footer__links">
      <a href="/terms.html">이용약관</a>
      <a href="/privacy.html">개인정보처리방침</a>
      <a href="/refund.html">환불정책</a>
    </div>
    <p class="lumi-footer__copy">© 2026 루미. All rights reserved.</p>
  </footer>

  <!-- 인증 가드 -->
  <script src="/js/_shared/auth-guard.js"></script>
  <script>
    (async function () {
      var ok = await window.lumiAuthGuard.ensureOnboarded();
      if (!ok) return;
    })();
  </script>

  <!-- 스크립트 -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
  <script src="/js/sprint5-claims.js"></script>

</body>
</html>
