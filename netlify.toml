[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = []

# 보안 헤더
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.portone.io https://code.iconify.design https://cdn.jsdelivr.net https://t1.kakaocdn.net https://developers.kakao.com https://www.googletagmanager.com https://www.google-analytics.com https://googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; connect-src 'self' https://*.netlify.com https://api.portone.io https://lumi.it.kr https://*.solapi.com https://api.resend.com https://unpkg.com https://www.google-analytics.com https://www.googletagmanager.com; frame-src https://checkout.portone.io https://service.iamport.kr;"

# 매일 자정 KST 기준 전후 트렌드 수집 (naver + google + gpt 파이프라인)
# 외부 릴레이 푸시는 폐지, scheduled-trends 자체 실행
[functions."scheduled-trends"]
  schedule = "0 15 * * *"

# 매일 오전 9시 KST (= UTC 00:00) 데일리 스케줄 알림톡 발송
[functions."send-daily-schedule"]
  schedule = "0 0 * * *"

# 매일 오전 9시 KST - 월간리포트/시즌이벤트/첫게시물코칭/구독만료 알림
[functions."send-notifications"]
  schedule = "0 0 * * *"

# 매일 오전 9시 KST (= UTC 00:00) 플랜 만료 알림 이메일 발송
[functions."check-expiry"]
  schedule = "0 0 * * *"

# 포스트 프로세싱 비활성화 (이메일 난독화 등 JS 삽입 방지)
[build.processing]
  skip_processing = true

[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.images]
  compress = false

# API 라우팅
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# 대시보드 라우팅
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

# 인스타 캘린더 라우팅
[[redirects]]
  from = "/calendar"
  to = "/calendar.html"
  status = 200

# lumi 링크 페이지 /p/:id → link.html
[[redirects]]
  from = "/p/:id"
  to = "/link.html"
  status = 200

# 에이전트 오피스 라우팅
[[redirects]]
  from = "/office"
  to = "/office/index.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/index.backup.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/prototype.html"
  to = "/"
  status = 301
