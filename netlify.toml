[build]
  publish = "."
  command = "npm install"

# PR branch / 일반 branch push 의 deploy preview·branch deploy 빌드 스킵.
# Netlify free/starter 플랜의 동시 build limit (=1) 이라 PR 머지 시점에
# preview build 와 production build 가 동시 큐 진입 → production build 가 큐에
# 막혀 lumi.it.kr 반영 지연됨 (검증 2026-05-13, 매 PR 머지마다 재현).
# lumi 는 PR preview URL 사용 X (사장님·Claude 둘만 작업) → preview 빌드는
# 자원 낭비 + 운영 사고 원인. ignore=exit 0 으로 해당 context build 자체 skip.
[context.deploy-preview]
  ignore = "exit 0"

[context.branch-deploy]
  ignore = "exit 0"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["ffmpeg-static"]
  # 영상 후처리용 한글 폰트 (drawtext + subtitles 의 force_style 'Pretendard Bold')
  # process-video-background.js 가 __dirname/_fonts/Pretendard-Bold.ttf 사용.
  included_files = ["netlify/functions/_fonts/**"]


# Phase 3 Long-tail 서브카테고리 주간 분류 cron (월요일 KST 04:00 = UTC 일요일 19:00)
[functions."scheduled-trends-longtail-background"]
  schedule = "0 19 * * 0"

# Phase 4 임베딩 + 클러스터 cron (매주 화요일 KST 03:00 = UTC 월요일 18:00)
[functions."scheduled-trends-embeddings-background"]
  schedule = "0 18 * * 1"

# 보안 헤더 + 베타 출시 전 캐시 무력화 (사장님 시연·디버깅 단계 — 정식 출시 후 재검토)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://code.iconify.design https://cdn.jsdelivr.net https://t1.kakaocdn.net https://developers.kakao.com https://www.googletagmanager.com https://www.google-analytics.com https://googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; media-src 'self' data: blob: https:; connect-src 'self' https://*.netlify.com https://*.supabase.co https://lumi.it.kr https://*.solapi.com https://api.resend.com https://unpkg.com https://cdn.jsdelivr.net https://www.google-analytics.com https://www.googletagmanager.com https://open.tiktokapis.com https://www.tiktok.com https://kauth.kakao.com https://kapi.kakao.com; frame-src 'none';"
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

# 매일 자정 KST 트렌드 파이프라인 — gpt-4o + 크로스소스 + velocity + 가중치 (v2)
# -background 접미사로 15분 타임아웃 확보. 5소스 + GPT 파이프라인은 30초 초과 가능.
# (v1 scheduled-trends-background 는 파일 삭제 — PR #147)
[functions."scheduled-trends-v2-background"]
  schedule = "0 15 * * *"

# 매일 오전 9시 KST (= UTC 00:00) 데일리 스케줄 알림톡 발송
[functions."send-daily-schedule"]
  schedule = "0 0 * * *"

# 매일 오전 9시 KST - 월간리포트/시즌이벤트/첫게시물코칭/구독만료 알림
[functions."send-notifications"]
  schedule = "0 0 * * *"


# 매일 오전 9시 KST (= UTC 00:00) 플랜 만료 알림 이메일 발송
# 베타 테스터 기간 중단 — 정식 오픈 시 주석 해제
# [functions."check-expiry"]
#   schedule = "0 0 * * *"

# 매시간 스테일/실패/완료 예약 스토리지 정리 (orphan 제거)
[functions."cleanup-stale-background"]
  schedule = "0 * * * *"

# 매일 04:00 KST (= 19:00 UTC) reservations row 없는 storage orphan 일괄 제거
# (cleanup-stale 가 잡지 못하는 row-less 파일 — 업로드 후 insert 실패 잔존, 옛 직삭제 등)
[functions."cleanup-orphan-storage-background"]
  schedule = "0 19 * * *"


# 매분 예약 게시 픽업 (scheduled_at 도달한 예약 자동 처리)
[functions."scheduler"]
  schedule = "* * * * *"

# cron 잠수 감시 — heartbeat stale 시 LUMI_ADMIN_EMAILS 로 메일 알림
# 매시간 실행. 6시간 cooldown 으로 동일 cron 반복 알림 억제.
# 2026-05-01~08 .catch 안티패턴이 9일 잠복하던 사고 재발 방지용.
[functions."cron-watchdog-background"]
  schedule = "0 * * * *"

# TikTok access_token 만료 임박 계정 일괄 갱신 (매 6시간)
[functions."tiktok-token-refresh-background"]
  schedule = "0 */6 * * *"

# 매일 KST 08:00 (= UTC 23:00 전날) 브랜드 자동 게시 파이프라인
# 라이브러리 pickup → reservations insert (image 1 + video 1)
[functions."daily-content-background"]
  schedule = "0 23 * * *"

# 매주 월요일 KST 03:00 (= UTC 일요일 18:00) 요일↔업종 주간 셔플
[functions."scheduled-weekday-shuffle-background"]
  schedule = "0 18 * * 0"

# 게시별 reach/saved/engagement 2-stage 측정 (베스트 시간 Tier 1 가중치 근거)
# 30분 주기 — 게시 후 1h(1차) / 24h(final) 시점 통과 row 픽업.
# 사장님 카드의 "측정 대기" 표시가 최대 30분 안에 측정 완료로 갱신되도록.
[functions."scheduled-post-insights-background"]
  schedule = "*/30 * * * *"

# Meta online_followers 누적 (베스트 시간 Tier 2 — 팔로워 활동 시간 매트릭스)
# 매일 KST 04:00 (= UTC 19:00). 사장님별 follower_activity_snapshots upsert.
[functions."scheduled-followers-snapshot-background"]
  schedule = "0 19 * * *"

# Vault orphan secret 청소 — 주 1회.
# 매주 월요일 KST 04:45 (= 일요일 UTC 19:45). followers-snapshot 과 시각 어긋내기.
[functions."scheduled-vault-cleanup-background"]
  schedule = "45 19 * * 0"


# 포스트 프로세싱 비활성화 (이메일 난독화 등 JS 삽입 방지)
