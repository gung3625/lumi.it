[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 매일 오전 9시 KST (= UTC 00:00) 트렌드 자동 업데이트
[functions."scheduled-trends"]
  schedule = "0 0 * * *"

# 포스트 프로세싱 비활성화 (이메일 난독화 등 JS 삽입 방지)
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.images]
  compress = false
