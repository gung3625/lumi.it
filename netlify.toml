[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["ffmpeg-static"]

# 마이그레이션 함수에 SQL 파일 번들 포함
[functions."admin-apply-trend-migration"]
  included_files = ["migrations/**"]

[functions."admin-apply-feedback-migration"]
  included_files = ["migrations/**"]

# 보안 헤더
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.portone.io https://code.iconify.design https://cdn.jsdelivr.net https://t1.kakaocdn.net https://developers.kakao.com https://www.googletagmanager.com https://www.google-analytics.com https://googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; media-src 'self' data: blob: https:; connect-src 'self' https://*.netlify.com https://*.supabase.co https://api.portone.io https://lumi.it.kr https://*.solapi.com https://api.resend.com https://unpkg.com https://cdn.jsdelivr.net https://www.google-analytics.com https://www.googletagmanager.com; frame-src https://checkout.portone.io https://service.iamport.kr;"

# 매일 자정 KST 기준 전후 트렌드 수집 (naver + google + gpt 파이프라인)
# 외부 릴레이 푸시는 폐지, scheduled-trends 자체 실행
# -background 접미사로 15분 타임아웃 확보 (5소스 + GPT 파이프라인은 30초 초과 가능)
# v1 롤백용 보존 — 필요 시 주석 해제
# [functions."scheduled-trends-background"]
#   schedule = "0 15 * * *"

# v2: gpt-4o + 크로스소스검증 + velocity + 가중치 + 신조어
[functions."scheduled-trends-v2-background"]
  schedule = "0 15 * * *"

# 매일 오전 9시 KST (= UTC 00:00) 데일리 스케줄 알림톡 발송
[functions."send-daily-schedule"]
  schedule = "0 0 * * *"

# 매일 오전 9시 KST - 월간리포트/시즌이벤트/첫게시물코칭/구독만료 알림
[functions."send-notifications"]
  schedule = "0 0 * * *"

# 매일 오전 9시 KST (= UTC 00:00) 플랜 만료 알림 이메일 발송
# 베타 테스터 기간 중단 — 정식 오픈 시 주석 해제
# [functions."check-expiry"]
#   schedule = "0 0 * * *"

# 매시간 스테일/실패/완료 예약 스토리지 정리 (orphan 제거)
[functions."cleanup-stale-background"]
  schedule = "0 * * * *"

# 매분 예약 게시 픽업 (scheduled_at 도달한 예약 자동 처리)
[functions."scheduler"]
  schedule = "* * * * *"

# 매일 KST 08:00 (= UTC 23:00 전날) 브랜드 자동 게시 파이프라인
# 라이브러리 pickup → reservations insert (image 1 + video 1)
[functions."daily-content-background"]
  schedule = "0 23 * * *"

# 매주 월요일 KST 03:00 (= UTC 일요일 18:00) 요일↔업종 주간 셔플
[functions."scheduled-weekday-shuffle-background"]
  schedule = "0 18 * * 0"

# 포스트 프로세싱 비활성화 (이메일 난독화 등 JS 삽입 방지)
[build.processing]
  skip_processing = true

[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.images]
  compress = false

# 카카오 OAuth 콜백
[[redirects]]
  from = "/api/auth/kakao/callback"
  to = "/.netlify/functions/auth-kakao-callback"
  status = 200

# 예약 홍보 게시 수동 트리거용 리다이렉트
[[redirects]]
  from = "/api/scheduled-promo-publisher"
  to = "/.netlify/functions/scheduled-promo-publisher"
  status = 200

# 비디오 blur-pad + 자막 burn-in (백그라운드, 15분 타임아웃)
# /api/* 일반 리다이렉트가 -background 접미사를 자동으로 붙여주지 않으므로 별도 리다이렉트 필요
[[redirects]]
  from = "/api/process-video"
  to = "/.netlify/functions/process-video-background"
  status = 200

# 트렌드 파이프라인 수동 트리거용 리다이렉트 (v2로 전환)
# v1 롤백: to = "/.netlify/functions/scheduled-trends-background"
[[redirects]]
  from = "/api/scheduled-trends"
  to = "/.netlify/functions/scheduled-trends-v2-background"
  status = 200

[[redirects]]
  from = "/api/rate-trend-keyword"
  to = "/.netlify/functions/rate-trend-keyword"
  status = 200

[[redirects]]
  from = "/api/admin-apply-feedback-migration"
  to = "/.netlify/functions/admin-apply-feedback-migration"
  status = 200

[[redirects]]
  from = "/api/pending-caption-rating"
  to = "/.netlify/functions/pending-caption-rating"
  status = 200

[[redirects]]
  from = "/api/rate-caption"
  to = "/.netlify/functions/rate-caption"
  status = 200

# 자동응답 설정 API (명시적 리다이렉트 — /api/* splat보다 먼저 매칭)
[[redirects]]
  from = "/api/auto-reply-settings"
  to = "/.netlify/functions/auto-reply-settings"
  status = 200

# 매장 컨텍스트 API (명시적 리다이렉트 — /api/* splat보다 먼저 매칭)
[[redirects]]
  from = "/api/store-context"
  to = "/.netlify/functions/store-context"
  status = 200

# 회원 탈퇴 API (PIPA §36 개인정보 파기 요구권)
[[redirects]]
  from = "/api/account-delete"
  to = "/.netlify/functions/account-delete"
  status = 200

# API 라우팅
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# IG 크롤러용 pretty 이미지 URL — splat을 path로 전달, serve-image가 event.path에서 추출
[[redirects]]
  from = "/ig-img/*"
  to = "/.netlify/functions/serve-image/:splat"
  status = 200

# 대시보드 라우팅
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200


# lumi 링크 페이지 /p/:id → link.html
[[redirects]]
  from = "/p/:id"
  to = "/link.html"
  status = 200

# 에이전트 오피스 라우팅
[[redirects]]
  from = "/office"
  to = "/office/index.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/index.backup.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/prototype.html"
  to = "/"
  status = 301
