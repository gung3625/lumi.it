[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 매일 오전 9시 KST (= UTC 00:00) 트렌드 자동 업데이트
[functions."scheduled-trends"]
  schedule = "0 0 * * *"

# 매일 오전 9시 KST (= UTC 00:00) 데일리 스케줄 알림톡 발송
[functions."send-daily-schedule"]
  schedule = "0 0 * * *"

# 매일 오전 9시 KST - 월간리포트/시즌이벤트/첫게시물코칭/구독만료 알림
[functions."send-notifications"]
  schedule = "0 0 * * *"

# 매일 오전 9시 KST (= UTC 00:00) 플랜 만료 알림 이메일 발송
[functions."check-expiry"]
  schedule = "0 0 * * *"

# 포스트 프로세싱 비활성화 (이메일 난독화 등 JS 삽입 방지)
[build.processing]
  skip_processing = true

[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.images]
  compress = false

# API 라우팅
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# 대시보드 라우팅
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

# 인스타 캘린더 라우팅
[[redirects]]
  from = "/calendar"
  to = "/calendar.html"
  status = 200

# lumi 링크 페이지 /p/:id → link.html
[[redirects]]
  from = "/p/:id"
  to = "/link.html"
  status = 200
