<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="루미 — 히스토리">
  <title>히스토리 · 루미</title>

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <meta name="view-transition" content="same-origin">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/motion.css">
  <link rel="stylesheet" href="/css/tabbar.css">

  <style>
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 56px); }

    .topbar {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      z-index: var(--z-sticky);
      min-height: 52px;
    }
    .topbar__back {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius-full);
      color: var(--ink);
    }
    .topbar__back:hover { background: var(--bg-soft); }
    .topbar__back svg { width: 20px; height: 20px; stroke-width: 2.2; }
    .topbar__title {
      font-size: var(--text-headline);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
      flex: 1;
    }

    .wrap { padding: var(--space-4); max-width: 600px; margin: 0 auto; }

    .section-title {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: var(--space-5) 0 var(--space-2);
    }
    .section-title:first-child { margin-top: 0; }

    .res-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--space-2); }
    .res {
      position: relative;
      display: flex;
      gap: var(--space-3);
      padding: var(--space-3);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      animation: rise 360ms var(--ease-toss) backwards;
      transition:
        border-color var(--duration-base) var(--ease-soft),
        box-shadow var(--duration-base) var(--ease-soft),
        background var(--duration-base) var(--ease-soft),
        transform var(--duration-snap) var(--ease-toss);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .res:nth-child(1) { animation-delay: 0ms; }
    .res:nth-child(2) { animation-delay: 60ms; }
    .res:nth-child(3) { animation-delay: 120ms; }
    .res:nth-child(4) { animation-delay: 180ms; }
    .res:nth-child(5) { animation-delay: 240ms; }
    /* hover 는 데스크톱(진짜 hover 디바이스)에서만 — 모바일 터치 시 sticky hover 방지 */
    @media (hover: hover) {
      .res:hover {
        border-color: var(--pink-200, #f7c5d3);
        box-shadow: var(--shadow-sm);
      }
    }
    /* 터치 직후 부드럽게 살짝 눌리는 피드백 */
    .res:active {
      transform: scale(0.992);
      background: linear-gradient(180deg, var(--bg) 0%, var(--pink-50) 220%);
      transition-duration: var(--duration-fast);
    }

    .res__thumb {
      width: 64px; height: 64px;
      flex-shrink: 0;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, #FF6B8B, #DDA0DD);
      background-size: cover;
      background-position: center;
    }
    .res__body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .res__time {
      font-size: var(--text-body-lg);
      font-weight: var(--weight-bold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
    }
    .res__caption {
      font-size: var(--text-caption);
      color: var(--ink-muted);
      line-height: var(--leading-snug);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .res__meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .res__badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      font-size: 10px;
      font-weight: var(--weight-bold);
      letter-spacing: 0.02em;
    }
    .badge--pending  { background: #fff8e8; color: #c08400; }
    .badge--ready    { background: #e8f4ff; color: #0867b8; }
    .badge--scheduled{ background: #fff0f5; color: #c8507a; }
    .badge--posting  { background: var(--gradient-signature); color: white; animation: posting-pulse 1.4s var(--ease-soft) infinite; }
    .badge--posted   { background: #e8f5ee; color: #00713c; }
    .badge--failed   { background: #fde8e8; color: #b8221c; }
    .badge--cancelled{ background: var(--bg-soft); color: var(--ink-muted); }
    @keyframes posting-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,139,0.5); }
      50%      { box-shadow: 0 0 0 8px rgba(255,107,139,0); }
    }

    .res__cancel {
      padding: var(--space-2) var(--space-3);
      background: transparent;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-pill);
      font-size: 11px;
      color: var(--ink-soft);
      align-self: flex-start;
      margin-top: var(--space-1);
    }
    .res__cancel:hover { border-color: #c8507a; color: #c8507a; }
    .res__cancel:active { transform: scale(0.95); }

    .empty {
      padding: var(--space-12) var(--space-5);
      text-align: center;
      color: var(--ink-muted);
    }
    .empty__icon {
      width: 64px; height: 64px;
      margin: 0 auto var(--space-4);
      border-radius: var(--radius-full);
      background: var(--bg-soft);
      display: flex; align-items: center; justify-content: center;
      color: var(--pink-500);
      animation: empty-bob 2.4s var(--ease-soft) infinite;
    }
    .empty__icon svg { width: 28px; height: 28px; stroke-width: 2; }
    @keyframes empty-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .empty__title {
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      margin-bottom: var(--space-2);
    }
    .empty__sub {
      font-size: var(--text-body);
      color: var(--ink-muted);
      line-height: var(--leading-snug);
      margin-bottom: var(--space-5);
    }
    .cta {
      display: inline-flex; align-items: center; gap: 6px;
      padding: var(--space-3) var(--space-5);
      background: var(--gradient-signature);
      color: var(--neutral-0);
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-glow-sm);
      text-decoration: none;
    }
    .cta:hover { box-shadow: var(--shadow-glow); transform: translateY(-1px); }

    .state { padding: var(--space-12); text-align: center; color: var(--ink-muted); }

    /* 평가 버튼 + 코멘트 (게시됨만) */
    .res__rate-wrap {
      margin-top: var(--space-2);
      display: flex; flex-direction: column;
      gap: var(--space-2);
    }
    .res__rate-row {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap;
    }
    .rate-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius-full);
      background: var(--bg-soft);
      border: 1px solid var(--line);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition:
        background var(--duration-snap) var(--ease-toss),
        border-color var(--duration-snap) var(--ease-toss),
        transform var(--duration-snap) var(--ease-toss);
    }
    .rate-btn:active { transform: scale(0.92); }
    @media (hover: hover) {
      .rate-btn:hover { background: var(--pink-50); border-color: var(--pink-300); }
    }
    .rate-btn.is-active--like {
      background: #e8f5ee; border-color: #00713c;
      animation: rate-pop 360ms var(--ease-toss);
    }
    .rate-btn.is-active--dislike {
      background: #fde8e8; border-color: #b8221c;
      animation: rate-pop 360ms var(--ease-toss);
    }
    .rate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    @keyframes rate-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    .rate-hint {
      font-size: var(--text-label);
      color: var(--ink-muted);
      line-height: 1.5;
    }
    .rate-comment {
      display: none; flex-direction: column; gap: 6px;
      padding: var(--space-2);
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      animation: comment-rise 280ms var(--ease-toss);
    }
    .rate-comment.is-open { display: flex; }
    @keyframes comment-rise {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rate-comment__input {
      width: 100%;
      padding: 8px 10px;
      font-size: max(16px, var(--text-body));
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--ink);
      font-family: inherit;
      resize: vertical;
      min-height: 44px;
    }
    .rate-comment__input:focus {
      outline: none;
      border-color: var(--pink-500);
      box-shadow: 0 0 0 3px rgba(255, 107, 139, 0.12);
    }
    .rate-comment__row {
      display: flex; justify-content: flex-end; gap: 6px;
    }
    .rate-comment__btn {
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--line-strong);
      background: var(--bg);
      color: var(--ink-soft);
      font-size: var(--text-caption);
      transition:
        background var(--duration-snap) var(--ease-toss),
        transform var(--duration-snap) var(--ease-toss);
    }
    .rate-comment__btn:active { transform: scale(0.96); }
    .rate-comment__btn--save {
      background: var(--gradient-signature);
      color: var(--neutral-0);
      border-color: transparent;
    }
    .rate-thanks {
      font-size: var(--text-caption);
      color: var(--ink-soft);
      animation: rate-pop 360ms var(--ease-toss);
    }

    /* 하단 탭바 — /css/tabbar.css 참조 */
  </style>
</head>
<body>
  <header class="topbar">
    <a class="topbar__back" href="/dashboard" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <h1 class="topbar__title">히스토리</h1>
  </header>

  <main class="wrap" role="main">
    <div class="state" data-state>예약을 가져오는 중…</div>

    <section data-upcoming hidden>
      <h2 class="section-title">다가올 예약</h2>
      <ul class="res-list" data-upcoming-list></ul>
    </section>

    <section data-past hidden>
      <h2 class="section-title">지난 게시</h2>
      <ul class="res-list" data-past-list></ul>
    </section>

    <div class="empty" data-empty hidden>
      <div class="empty__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
      </div>
      <div class="empty__title">예약이 없어요</div>
      <p class="empty__sub">사진을 올리면 캡션이 만들어져 여기에 쌓여요.</p>
      <a class="cta" href="/register-product">📷 사진 올리기</a>
    </div>
  </main>

  <nav class="tabbar" aria-label="메뉴">
    <a class="tab" href="/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12L12 3l9 9M5 10v11h14V10"/>
      </svg>
      홈
    </a>
    <a class="tab" href="/trends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 12l-4-4-4 4-6-6-6 6"/>
        <path d="M22 12v6H2"/>
      </svg>
      트렌드
    </a>
    <a class="tab-add" href="/register-product" aria-label="사진 올리기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </a>
    <a class="tab is-active" href="/history" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="9"/>
        <polyline points="12 7 12 12 15 14"/>
      </svg>
      히스토리
    </a>
    <a class="tab" href="/settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
      </svg>
      설정
    </a>
  </nav>

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt') || '';
      if (!token) { location.replace('/'); return; }
      const authHeaders = { Authorization: 'Bearer ' + token };

      const stateEl = document.querySelector('[data-state]');
      const upcomingSec = document.querySelector('[data-upcoming]');
      const pastSec = document.querySelector('[data-past]');
      const upcomingList = document.querySelector('[data-upcoming-list]');
      const pastList = document.querySelector('[data-past-list]');
      const emptyEl = document.querySelector('[data-empty]');

      function fmtTime(iso) {
        if (!iso) return '—';
        const t = new Date(iso);
        const today = new Date();
        const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
        const isToday = t.toDateString() === today.toDateString();
        const isTomorrow = t.toDateString() === tomorrow.toDateString();
        const hh = String(t.getHours()).padStart(2, '0');
        const mm = String(t.getMinutes()).padStart(2, '0');
        const day = isToday ? '오늘' : isTomorrow ? '내일' : `${t.getMonth() + 1}/${t.getDate()}`;
        return `${day} ${hh}:${mm}`;
      }

      function statusBadge(r) {
        if (r.cancelled) return { cls: 'cancelled', label: '취소됨' };
        if (r.is_sent) return { cls: 'posted', label: '게시됨' };
        const s = r.caption_status || 'pending';
        const map = {
          pending:  { cls: 'pending',   label: '캡션 작성 중' },
          ready:    { cls: 'ready',     label: '준비 완료' },
          scheduled:{ cls: 'scheduled', label: '예약됨' },
          posting:  { cls: 'posting',   label: '게시 중' },
          posted:   { cls: 'posted',    label: '게시됨' },
          failed:   { cls: 'failed',    label: '실패' },
        };
        return map[s] || map.pending;
      }

      function captionPreview(r) {
        if (Array.isArray(r.captions) && typeof r.selected_caption_index === 'number') {
          const c = r.captions[r.selected_caption_index];
          if (c) return (c.text || c).slice(0, 80);
        }
        if (r.user_message) return r.user_message.slice(0, 80);
        return '';
      }

      function thumb(r) {
        if (Array.isArray(r.image_urls) && r.image_urls[0]) return r.image_urls[0];
        return null;
      }

      function renderItem(r) {
        const badge = statusBadge(r);
        const time = fmtTime(r.scheduled_at);
        const caption = captionPreview(r);
        const t = thumb(r);
        const thumbStyle = t ? `background-image:url('${t}')` : '';
        // 게시 안 된 건은 취소 / 실패한 건은 삭제 — 같은 endpoint(cancel-reservation),
        //   서버가 is_sent=false 면 행+스토리지 모두 삭제. is_sent=true 만 cancelled=true 마킹.
        let actionBtn = '';
        if (!r.cancelled && !r.is_sent) {
          if (r.caption_status === 'failed') {
            actionBtn = `<button class="res__cancel" type="button" data-cancel="${r.reserve_key}" data-action="delete">삭제</button>`;
          } else if (['scheduled', 'ready', 'pending', 'error'].includes(r.caption_status)) {
            actionBtn = `<button class="res__cancel" type="button" data-cancel="${r.reserve_key}" data-action="cancel">취소</button>`;
          }
        }

        // 게시됨이면 캡션 평가 버튼 — tone_rated 가 false 일 때만 활성
        let rateBlock = '';
        if (r.is_sent && !r.cancelled) {
          const rated = r.tone_rated === true;
          rateBlock = `
            <div class="res__rate-wrap" data-rate-block data-rid="${r.id || ''}" ${rated ? 'data-rated="1"' : ''}>
              ${rated ? `
                <div class="rate-thanks">평가해주셔서 감사해요. 다음 캡션 만들 때 참고할게요.</div>
              ` : `
                <div class="res__rate-row">
                  <button class="rate-btn" type="button" data-rate="like" aria-label="좋은 캡션">👍</button>
                  <button class="rate-btn" type="button" data-rate="dislike" aria-label="아쉬운 캡션">👎</button>
                  <span class="rate-hint">평가 + 코멘트 남기시면 다음 캡션에 반영해요</span>
                </div>
                <div class="rate-comment" data-rate-comment>
                  <textarea class="rate-comment__input" data-rate-comment-input maxlength="300" placeholder="왜 좋았어요? / 어디가 아쉬웠어요? (선택)"></textarea>
                  <div class="rate-comment__row">
                    <button class="rate-comment__btn" type="button" data-rate-comment-skip>코멘트 없이 저장</button>
                    <button class="rate-comment__btn rate-comment__btn--save" type="button" data-rate-comment-save>저장</button>
                  </div>
                </div>
              `}
            </div>`;
        }

        return `
          <li class="res" data-key="${r.reserve_key}">
            <div class="res__thumb" style="${thumbStyle}"></div>
            <div class="res__body">
              <div class="res__time">${time}</div>
              ${caption ? `<div class="res__caption">${caption}</div>` : ''}
              <div class="res__meta">
                <span class="res__badge badge--${badge.cls}">${badge.label}</span>
                ${actionBtn}
              </div>
              ${rateBlock}
            </div>
          </li>
        `;
      }

      async function load() {
        try {
          const res = await fetch('/api/list-reservations', { headers: authHeaders });
          if (!res.ok) {
            stateEl.textContent = '예약을 가져오지 못했어요.';
            return;
          }
          const json = await res.json();
          const items = (json && json.items) || [];
          stateEl.hidden = true;

          if (items.length === 0) {
            emptyEl.hidden = false;
            return;
          }

          const now = Date.now();
          const upcoming = [];
          const past = [];
          for (const r of items) {
            const t = r.scheduled_at ? new Date(r.scheduled_at).getTime() : 0;
            const isPast = r.is_sent || r.cancelled || (t && t < now);
            if (isPast) past.push(r); else upcoming.push(r);
          }
          upcoming.sort((a, b) => new Date(a.scheduled_at) - new Date(b.scheduled_at));
          past.sort((a, b) => new Date(b.scheduled_at || b.submitted_at) - new Date(a.scheduled_at || a.submitted_at));

          if (upcoming.length) {
            upcomingList.innerHTML = upcoming.map(renderItem).join('');
            upcomingSec.hidden = false;
          }
          if (past.length) {
            pastList.innerHTML = past.slice(0, 30).map(renderItem).join('');
            pastSec.hidden = false;
          }

          // 캡션 평가 — 2단계: 등급 선택 → 코멘트 입력(선택) → 저장
          document.querySelectorAll('[data-rate-block]').forEach(block => {
            if (block.dataset.rated === '1') return;
            const rid = Number(block.dataset.rid);
            if (!rid) return;
            const commentBox = block.querySelector('[data-rate-comment]');
            const commentInput = block.querySelector('[data-rate-comment-input]');
            const saveBtn = block.querySelector('[data-rate-comment-save]');
            const skipBtn = block.querySelector('[data-rate-comment-skip]');
            let chosenRating = null;

            // 등급 클릭 → 코멘트 박스 펼치기 (아직 서버 호출 X)
            block.querySelectorAll('[data-rate]').forEach(btn => {
              btn.addEventListener('click', () => {
                if (block.dataset.rated === '1') return;
                chosenRating = btn.dataset.rate;
                block.querySelectorAll('[data-rate]').forEach(b => {
                  b.classList.remove('is-active--like', 'is-active--dislike');
                });
                btn.classList.add(chosenRating === 'like' ? 'is-active--like' : 'is-active--dislike');
                if (commentBox) commentBox.classList.add('is-open');
                if (commentInput) setTimeout(() => commentInput.focus(), 100);
              });
            });

            async function submit(comment) {
              if (!chosenRating) {
                alert('먼저 👍 또는 👎 를 선택해주세요.');
                return;
              }
              if (saveBtn) saveBtn.disabled = true;
              if (skipBtn) skipBtn.disabled = true;
              try {
                const r = await fetch('/api/rate-caption', {
                  method: 'POST',
                  headers: { ...authHeaders, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ reservation_id: rid, rating: chosenRating, comment }),
                });
                if (!r.ok) throw new Error('실패');
                block.dataset.rated = '1';
                // 평가 성공 — block 안 모든 요소를 감사 메시지로 교체
                block.innerHTML = '<div class="rate-thanks">평가해주셔서 감사해요. 다음 캡션 만들 때 참고할게요.</div>';
              } catch (e) {
                if (saveBtn) saveBtn.disabled = false;
                if (skipBtn) skipBtn.disabled = false;
                alert('평가 저장에 실패했어요. 잠시 후 다시 시도해주세요.');
              }
            }
            if (saveBtn) {
              saveBtn.addEventListener('click', () => submit((commentInput && commentInput.value || '').trim()));
            }
            if (skipBtn) {
              skipBtn.addEventListener('click', () => submit(''));
            }
          });

          // 취소/삭제 핸들러 (같은 endpoint — 서버가 미게시면 행+스토리지 삭제)
          // 더블탭 방지 + 15초 타임아웃 (네트워크/서버 지연 시 "삭제 중…" 매달림 방지)
          document.querySelectorAll('[data-cancel]').forEach(btn => {
            btn.addEventListener('click', async (e) => {
              e.preventDefault();
              if (btn.dataset.busy === '1') return;
              const action = btn.dataset.action || 'cancel';
              const isDelete = action === 'delete';
              const confirmMsg = isDelete ? '실패한 예약을 삭제할까요?' : '이 예약을 취소할까요?';
              if (!confirm(confirmMsg)) return;
              const key = btn.dataset.cancel;
              btn.dataset.busy = '1';
              btn.disabled = true;
              btn.textContent = isDelete ? '삭제 중…' : '취소 중…';
              const ctrl = new AbortController();
              const tid = setTimeout(() => ctrl.abort(), 15000);
              try {
                const r = await fetch('/api/cancel-reservation', {
                  method: 'POST',
                  headers: { ...authHeaders, 'Content-Type': 'application/json' },
                  body: JSON.stringify({ reserve_key: key }),
                  signal: ctrl.signal,
                });
                if (!r.ok) throw new Error('실패');
                load();
              } catch (e) {
                alert(isDelete ? '삭제에 실패했어요. 잠시 후 다시 시도해주세요.' : '취소에 실패했어요.');
                btn.disabled = false;
                btn.textContent = isDelete ? '삭제' : '취소';
                btn.dataset.busy = '0';
              } finally {
                clearTimeout(tid);
              }
            });
          });
        } catch (e) {
          stateEl.textContent = '예약을 가져오지 못했어요.';
        }
      }

      load();
    })();
  </script>
</body>
</html>
