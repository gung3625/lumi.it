<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="루미 — 새 댓글">
  <title>댓글 · 루미</title>

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <meta name="view-transition" content="same-origin">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/motion.css">
  <link rel="stylesheet" href="/css/tabbar.css">
  <link rel="stylesheet" href="/css/legal.css">

  <style>
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 56px); }

    .topbar {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      z-index: var(--z-sticky);
      min-height: 52px;
    }
    .topbar__back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      color: var(--ink);
    }
    .topbar__back:hover { background: var(--bg-soft); }
    .topbar__back svg { width: 20px; height: 20px; stroke-width: 2.2; }
    .topbar__title {
      font-size: var(--text-headline);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
      flex: 1;
    }

    .wrap { padding: var(--space-4); max-width: 600px; margin: 0 auto; }

    .empty {
      padding: var(--space-12) var(--space-5);
      text-align: center;
      color: var(--ink-muted);
    }
    .empty__icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-4);
      border-radius: var(--radius-full);
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink-500);
      animation: empty-bob 2.4s var(--ease-soft) infinite;
    }
    .empty__icon svg { width: 28px; height: 28px; stroke-width: 2; }
    @keyframes empty-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .empty__title {
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      margin-bottom: var(--space-2);
    }
    .empty__sub {
      font-size: var(--text-body);
      color: var(--ink-muted);
      line-height: var(--leading-snug);
      margin-bottom: var(--space-5);
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: var(--space-3) var(--space-5);
      background: var(--gradient-signature);
      color: var(--neutral-0);
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-glow-sm);
      text-decoration: none;
    }
    .cta:hover { box-shadow: var(--shadow-glow); transform: translateY(-1px); }

    /* 댓글 리스트 */
    .comments {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .comment {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      animation: rise 360ms var(--ease-toss) backwards;
      transition:
        border-color var(--duration-base) var(--ease-soft),
        box-shadow var(--duration-base) var(--ease-soft),
        background var(--duration-base) var(--ease-soft),
        transform var(--duration-snap) var(--ease-toss);
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .comment:nth-child(1) { animation-delay: 0ms; }
    .comment:nth-child(2) { animation-delay: 60ms; }
    .comment:nth-child(3) { animation-delay: 120ms; }
    .comment:nth-child(4) { animation-delay: 180ms; }
    .comment:nth-child(5) { animation-delay: 240ms; }
    @media (hover: hover) {
      .comment:hover { border-color: var(--pink-200, #f7c5d3); box-shadow: var(--shadow-sm); }
    }
    .comment:active { transform: scale(0.992); }

    .comment__avatar {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: var(--radius-full);
      background: var(--gradient-signature);
      color: var(--neutral-0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: var(--weight-bold);
    }
    .comment__body { flex: 1; min-width: 0; }
    .comment__user {
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      color: var(--ink);
    }
    .comment__time {
      margin-left: var(--space-2);
      font-size: var(--text-caption);
      color: var(--ink-muted);
      font-weight: var(--weight-regular);
    }
    .comment__text {
      margin-top: 4px;
      font-size: var(--text-body);
      color: var(--ink-soft);
      line-height: var(--leading-snug);
      word-break: break-word;
    }
    .comment__reply {
      margin-top: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      font-size: var(--text-caption);
      color: var(--ink-soft);
      line-height: var(--leading-snug);
    }
    .comment__reply::before {
      content: '↳ 자동 답장: ';
      color: var(--pink-500);
      font-weight: var(--weight-semibold);
    }

    /* 하단 탭바 — /css/tabbar.css 참조 */

    .state { padding: var(--space-12); text-align: center; color: var(--ink-muted); }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="topbar__back" href="/dashboard" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <h1 class="topbar__title">새 댓글</h1>
  </header>

  <main class="wrap" role="main">
    <div data-state class="state">댓글을 가져오는 중…</div>

    <ul class="comments" role="list" data-list hidden></ul>

    <div class="empty" data-empty hidden>
      <div class="empty__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="empty__title" data-empty-title>아직 새 댓글이 없어요</div>
      <p class="empty__sub" data-empty-sub>새 인스타 댓글이 들어오면 여기 모입니다.</p>
      <a class="cta" data-empty-cta href="/dashboard" hidden>📷 인스타 연동하기</a>
    </div>

    <footer class="app-footer">
      <img class="app-footer__logo" src="/assets/logo-wordmark.png" alt="루미" loading="lazy" decoding="async">
      <nav class="app-footer__links" aria-label="법적 정보">
        <a href="/terms">이용약관</a>
        <span class="app-footer__sep" aria-hidden="true">·</span>
        <a href="/privacy">개인정보처리방침</a>
      </nav>
      <div class="app-footer__biz">
        <div>루미 · 대표 김현 · 사업자등록번호 404-09-66416</div>
        <div>통신판매업 제2024-서울용산-1166호</div>
        <div>서울특별시 용산구 회나무로 32-7 04345</div>
        <div>문의 <a href="mailto:lumi@lumi.it.kr" style="color:inherit;">lumi@lumi.it.kr</a></div>
      </div>
      <div class="app-footer__copy">© 2026 lumi.it.kr</div>
    </footer>
  </main>

  <nav class="tabbar" aria-label="메뉴">
    <a class="tab" href="/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12L12 3l9 9M5 10v11h14V10"/>
      </svg>
      홈
    </a>
    <a class="tab" href="/trends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 12l-4-4-4 4-6-6-6 6"/>
        <path d="M22 12v6H2"/>
      </svg>
      트렌드
    </a>
    <a class="tab-add" href="/register-product" aria-label="사진 올리기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </a>
    <a class="tab" href="/history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="9"/>
        <polyline points="12 7 12 12 15 14"/>
      </svg>
      히스토리
    </a>
    <a class="tab" href="/settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
      </svg>
      설정
    </a>
  </nav>

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt') || '';
      if (!token) { location.replace('/'); return; }
      const authHeaders = { Authorization: 'Bearer ' + token };

      const stateEl = document.querySelector('[data-state]');
      const listEl = document.querySelector('[data-list]');
      const emptyEl = document.querySelector('[data-empty]');
      const emptyTitle = document.querySelector('[data-empty-title]');
      const emptySub = document.querySelector('[data-empty-sub]');
      const emptyCta = document.querySelector('[data-empty-cta]');

      function fmtTime(iso) {
        if (!iso) return '';
        try {
          const t = new Date(iso);
          const diff = (Date.now() - t.getTime()) / 1000;
          if (diff < 60) return '방금';
          if (diff < 3600) return Math.floor(diff / 60) + '분 전';
          if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
          return `${t.getMonth() + 1}/${t.getDate()}`;
        } catch { return ''; }
      }

      async function load() {
        try {
          const res = await fetch('/api/comments?limit=50', { headers: authHeaders });
          if (!res.ok) {
            stateEl.textContent = '댓글을 가져오지 못했어요.';
            return;
          }
          const json = await res.json();
          const items = (json && json.items) || [];
          stateEl.hidden = true;

          if (items.length === 0) {
            if (json.igConnected) {
              emptyTitle.textContent = '아직 새 댓글이 없어요';
              emptySub.textContent = '새 인스타 댓글이 들어오면 여기 모입니다.';
              emptyCta.hidden = true;
            } else {
              emptyTitle.textContent = '인스타 연동 후 댓글이 표시돼요';
              emptySub.textContent = '비즈니스/크리에이터 계정과 연동하면 받은 댓글이 한곳에 모입니다.';
              emptyCta.hidden = false;
            }
            emptyEl.hidden = false;
            return;
          }

          listEl.innerHTML = items.map(c => {
            const u = (c.username || c.from || '익명').slice(0, 24);
            const initial = (u[0] || '·').toUpperCase();
            const text = (c.text || '').slice(0, 240);
            const time = fmtTime(c.timestamp || c.created_at);
            const reply = c.reply_text ? `<div class="comment__reply">${c.reply_text}</div>` : '';
            return `
              <li class="comment">
                <span class="comment__avatar">${initial}</span>
                <div class="comment__body">
                  <span class="comment__user">${u}</span>
                  <span class="comment__time">${time}</span>
                  <div class="comment__text">${text}</div>
                  ${reply}
                </div>
              </li>
            `;
          }).join('');
          listEl.hidden = false;
        } catch (e) {
          stateEl.textContent = '댓글을 가져오지 못했어요.';
        }
      }

      load();
    })();
  </script>
</body>
</html>
