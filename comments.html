<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="루미 — 새 댓글">
  <title>댓글 · 루미</title>

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <meta name="view-transition" content="same-origin">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <script data-scroll-top-on-reload>if("scrollRestoration" in history)history.scrollRestoration="manual";window.scrollTo(0,0);window.addEventListener("DOMContentLoaded",function(){window.scrollTo(0,0)});</script>
  <link rel="stylesheet" href="/css/motion.css">
  <link rel="stylesheet" href="/css/tabbar.css">
  <link rel="stylesheet" href="/css/legal.css">

  <style>
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 56px); }

    .topbar {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      z-index: var(--z-sticky);
      min-height: 52px;
    }
    .topbar__back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      color: var(--ink);
    }
    .topbar__back:hover { background: var(--bg-soft); }
    .topbar__back svg { width: 20px; height: 20px; stroke-width: 2.2; }
    .topbar__title {
      font-size: var(--text-headline);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
      flex: 1;
    }
    .topbar__refresh {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius-full);
      color: var(--ink);
      cursor: pointer;
      transition: background 160ms var(--ease-toss);
    }
    .topbar__refresh:hover { background: var(--bg-soft); }
    .topbar__refresh:active { transform: scale(0.92); }
    .topbar__refresh svg { width: 20px; height: 20px; stroke-width: 2.2; }
    .topbar__refresh.is-spinning svg {
      animation: refresh-spin 800ms linear infinite;
    }
    @keyframes refresh-spin {
      to { transform: rotate(360deg); }
    }

    .wrap { padding: var(--space-4); max-width: 600px; margin: 0 auto; }

    .empty {
      padding: var(--space-12) var(--space-5);
      text-align: center;
      color: var(--ink-muted);
    }
    .empty__icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-4);
      border-radius: var(--radius-full);
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink-500);
      animation: empty-bob 2.4s var(--ease-soft) infinite;
    }
    .empty__icon svg { width: 28px; height: 28px; stroke-width: 2; }
    @keyframes empty-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }
    .empty__title {
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      margin-bottom: var(--space-2);
    }
    .empty__sub {
      font-size: var(--text-body);
      color: var(--ink-muted);
      line-height: var(--leading-snug);
      margin-bottom: var(--space-5);
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: var(--space-3) var(--space-5);
      background: var(--gradient-signature);
      color: var(--neutral-0);
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-glow-sm);
      text-decoration: none;
    }
    .cta:hover { box-shadow: var(--shadow-glow); transform: translateY(-1px); }

    /* 댓글 리스트 */
    .comments {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .comment {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      animation: rise 360ms var(--ease-toss) backwards;
      transition:
        border-color var(--duration-base) var(--ease-soft),
        box-shadow var(--duration-base) var(--ease-soft),
        background var(--duration-base) var(--ease-soft),
        transform var(--duration-snap) var(--ease-toss);
      /* 답글 컴포저가 본문 row 와 같은 flex 컨텍스트에 있으면 본문 column 이 squeeze 됨.
         flex-wrap 으로 composer 가 다음 줄로 내려가게 강제. */
      flex-wrap: wrap;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .comment:nth-child(1) { animation-delay: 0ms; }
    .comment:nth-child(2) { animation-delay: 60ms; }
    .comment:nth-child(3) { animation-delay: 120ms; }
    .comment:nth-child(4) { animation-delay: 180ms; }
    .comment:nth-child(5) { animation-delay: 240ms; }
    @media (hover: hover) {
      .comment:hover { border-color: var(--pink-200, #f7c5d3); box-shadow: var(--shadow-sm); }
    }
    .comment:active { transform: scale(0.992); }

    .comment__avatar {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: var(--radius-full);
      background: var(--gradient-signature);
      color: var(--neutral-0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: var(--weight-bold);
    }
    .comment__body { flex: 1; min-width: 0; }
    .comment__post-thumb {
      flex: 0 0 48px;
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      object-fit: cover;
      background: var(--neutral-200);
      align-self: center;
    }
    .comment__post-caption {
      font-size: var(--text-caption);
      color: var(--ink-muted);
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .comment__link {
      display: contents;
      color: inherit;
      text-decoration: none;
    }
    .comment__user {
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      color: var(--ink);
    }
    .comment__time {
      margin-left: var(--space-2);
      font-size: var(--text-caption);
      color: var(--ink-muted);
      font-weight: var(--weight-regular);
    }
    .comment__text {
      margin-top: 4px;
      font-size: var(--text-body);
      color: var(--ink-soft);
      line-height: var(--leading-snug);
      word-break: break-word;
    }
    .comment__reply {
      margin-top: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      font-size: var(--text-caption);
      color: var(--ink-soft);
      line-height: var(--leading-snug);
    }
    .comment__reply::before {
      content: '↳ 내 답글: ';
      color: var(--pink-500);
      font-weight: var(--weight-semibold);
    }

    /* 답글 작성 컴포저 */
    .comment__reply-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: var(--space-2);
      padding: 4px 10px;
      background: transparent;
      border: 1px solid var(--line);
      border-radius: var(--radius-full);
      font-size: var(--text-caption);
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 160ms var(--ease-toss);
    }
    @media (hover: hover) {
      .comment__reply-toggle:hover {
        border-color: var(--pink-200, #f7c5d3);
        color: var(--pink-600, #c8507a);
      }
    }
    .comment__reply-toggle:active { transform: scale(0.96); }
    .comment__reply-form {
      margin-top: var(--space-2);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .comment__reply-form[hidden] { display: none; }
    .comment__reply-textarea {
      width: 100%;
      min-height: 64px;
      max-height: 200px;
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      font-size: var(--text-body);
      font-family: inherit;
      line-height: var(--leading-snug);
      resize: vertical;
      background: var(--bg-card, #fff);
      color: var(--ink);
    }
    .comment__reply-textarea:focus {
      outline: none;
      border-color: var(--pink-400, #e8849c);
    }
    .comment__reply-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .comment__reply-btn {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      cursor: pointer;
      transition: all 160ms var(--ease-toss);
    }
    .comment__reply-btn--cancel {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink-muted);
    }
    .comment__reply-btn--send {
      background: var(--pink-500);
      border: 1px solid var(--pink-500);
      color: var(--neutral-0, #fff);
    }
    .comment__reply-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .comment__reply-btn:not(:disabled):active { transform: scale(0.96); }
    .comment__reply-error {
      font-size: var(--text-caption);
      color: var(--pink-600, #c8507a);
    }

    /* 하단 탭바 — /css/tabbar.css 참조 */

    .state { padding: var(--space-12); text-align: center; color: var(--ink-muted); }
  </style>
</head>
<body>

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt') || '';
      if (!token) { location.replace('/'); return; }
      const authHeaders = { Authorization: 'Bearer ' + token };

      const stateEl = document.querySelector('[data-state]');
      const listEl = document.querySelector('[data-list]');
      const emptyEl = document.querySelector('[data-empty]');
      const emptyTitle = document.querySelector('[data-empty-title]');
      const emptySub = document.querySelector('[data-empty-sub]');
      const emptyCta = document.querySelector('[data-empty-cta]');

      function fmtTime(iso) {
        if (!iso) return '';
        try {
          const t = new Date(iso);
          const diff = (Date.now() - t.getTime()) / 1000;
          if (diff < 60) return '방금';
          if (diff < 3600) return Math.floor(diff / 60) + '분 전';
          if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
          return `${t.getMonth() + 1}/${t.getDate()}`;
        } catch { return ''; }
      }

      // IG 댓글 텍스트·username 은 외부 입력 → innerHTML 삽입 전 escape 필수.
      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      // forceRefresh=true 면 서버 캐시 우회 (사장님이 IG 에서 게시물·답글 삭제 후 즉시 반영).
      async function load(forceRefresh = false) {
        try {
          const url = '/api/comments?limit=50' + (forceRefresh ? '&refresh=1' : '');
          const res = await fetch(url, { headers: authHeaders });
          if (!res.ok) {
            stateEl.textContent = '댓글을 가져오지 못했어요.';
            return;
          }
          const json = await res.json();
          const items = (json && json.items) || [];
          stateEl.hidden = true;

          if (items.length === 0) {
            if (json.igConnected) {
              emptyTitle.textContent = '아직 새 댓글이 없어요';
              emptySub.textContent = '새 인스타 댓글이 들어오면 여기 모입니다.';
              emptyCta.hidden = true;
            } else {
              emptyTitle.textContent = '인스타 연동 후 댓글이 표시돼요';
              emptySub.textContent = '비즈니스/크리에이터 계정과 연동하면 받은 댓글이 한곳에 모입니다.';
              emptyCta.hidden = false;
            }
            emptyEl.hidden = false;
            return;
          }

          listEl.innerHTML = items.map(c => {
            const u = (c.username || c.from || '익명').slice(0, 24);
            const initial = (u[0] || '·').toUpperCase();
            const text = (c.text || '').slice(0, 240);
            const time = fmtTime(c.timestamp || c.created_at);
            const replyText = (c.reply_text || '').slice(0, 240);
            const reply = replyText ? `<div class="comment__reply">${esc(replyText)}</div>` : '';
            const postCaption = (c.post_caption || '').slice(0, 40);
            const captionLine = postCaption
              ? `<div class="comment__post-caption">📷 ${esc(postCaption)}…</div>`
              : '';
            const thumb = c.post_thumb
              ? `<img class="comment__post-thumb" src="${esc(c.post_thumb)}" alt="댓글 달린 게시물" loading="lazy">`
              : '';
            // permalink 있으면 IG 게시물 새 탭으로 열기. display:contents 로 레이아웃 유지.
            const wrap = c.permalink
              ? (inner) => `<a href="${esc(c.permalink)}" target="_blank" rel="noopener noreferrer" class="comment__link">${inner}</a>`
              : (inner) => inner;
            // 답글 컴포저: 이미 사장님이 답글 단 댓글은 컴포저 숨김 (1회만 답글 가능 정책).
            const composer = !replyText && c.id ? `
              <button type="button" class="comment__reply-toggle" data-reply-toggle="${esc(c.id)}">↳ 답글 달기</button>
              <form class="comment__reply-form" data-reply-form="${esc(c.id)}" hidden>
                <textarea class="comment__reply-textarea" maxlength="2200" placeholder="답글을 적어주세요" data-reply-text></textarea>
                <div class="comment__reply-error" data-reply-error hidden></div>
                <div class="comment__reply-actions">
                  <button type="button" class="comment__reply-btn comment__reply-btn--cancel" data-reply-cancel>취소</button>
                  <button type="submit" class="comment__reply-btn comment__reply-btn--send" data-reply-send>전송</button>
                </div>
              </form>
            ` : '';
            return `
              <li class="comment" data-comment-id="${esc(c.id || '')}">
                ${wrap(`
                  <span class="comment__avatar">${esc(initial)}</span>
                  <div class="comment__body">
                    <span class="comment__user">${esc(u)}</span>
                    <span class="comment__time">${esc(time)}</span>
                    ${captionLine}
                    <div class="comment__text">${esc(text)}</div>
                    ${reply}
                  </div>
                  ${thumb}
                `)}
                ${composer}
              </li>
            `;
          }).join('');
          listEl.hidden = false;
        } catch (e) {
          stateEl.textContent = '댓글을 가져오지 못했어요.';
        }
      }

      // 답글 컴포저 동작 — 이벤트 위임으로 한 번만 바인딩.
      // 토글: "↳ 답글 달기" → 폼 펼침. 취소: 폼 접고 비움. 전송: POST /api/reply-comment.
      listEl.addEventListener('click', (e) => {
        const toggle = e.target.closest('[data-reply-toggle]');
        if (toggle) {
          e.preventDefault();
          const commentId = toggle.dataset.replyToggle;
          const form = listEl.querySelector(`[data-reply-form="${CSS.escape(commentId)}"]`);
          if (form) {
            form.hidden = false;
            toggle.style.display = 'none';
            form.querySelector('[data-reply-text]')?.focus();
          }
          return;
        }
        const cancel = e.target.closest('[data-reply-cancel]');
        if (cancel) {
          e.preventDefault();
          const form = cancel.closest('[data-reply-form]');
          if (form) {
            form.hidden = true;
            form.querySelector('[data-reply-text]').value = '';
            const errEl = form.querySelector('[data-reply-error]');
            errEl.hidden = true;
            errEl.textContent = '';
            // 토글 버튼 복원
            const commentId = form.dataset.replyForm;
            const toggle = listEl.querySelector(`[data-reply-toggle="${CSS.escape(commentId)}"]`);
            if (toggle) toggle.style.display = '';
          }
        }
      });

      listEl.addEventListener('submit', async (e) => {
        const form = e.target.closest('[data-reply-form]');
        if (!form) return;
        e.preventDefault();
        const commentId = form.dataset.replyForm;
        const textEl = form.querySelector('[data-reply-text]');
        const sendBtn = form.querySelector('[data-reply-send]');
        const errEl = form.querySelector('[data-reply-error]');
        const message = (textEl.value || '').trim();
        if (!message) {
          errEl.textContent = '답글 내용을 입력해주세요.';
          errEl.hidden = false;
          return;
        }
        sendBtn.disabled = true;
        sendBtn.textContent = '전송 중…';
        errEl.hidden = true;
        errEl.textContent = '';
        try {
          const res = await fetch('/api/reply-comment', {
            method: 'POST',
            headers: { ...authHeaders, 'Content-Type': 'application/json' },
            body: JSON.stringify({ commentId, message }),
          });
          const json = await res.json().catch(() => ({}));
          if (!res.ok || !json.ok) {
            if (json.tokenExpired) {
              errEl.textContent = 'IG 토큰이 만료됐어요. 설정에서 재연동해주세요.';
            } else {
              errEl.textContent = json.error || '답글 전송 실패';
            }
            errEl.hidden = false;
            return;
          }
          // 성공 — 답글을 즉시 화면에 반영 (낙관적 업데이트) 후 다음 load 시 fresh.
          const li = form.closest('.comment');
          const body = li?.querySelector('.comment__body');
          if (body && !body.querySelector('.comment__reply')) {
            const replyDiv = document.createElement('div');
            replyDiv.className = 'comment__reply';
            replyDiv.textContent = message;
            body.appendChild(replyDiv);
          }
          form.remove();
          const toggle = li?.querySelector('[data-reply-toggle]');
          if (toggle) toggle.remove();
        } catch (err) {
          errEl.textContent = '네트워크 오류 — 다시 시도해주세요.';
          errEl.hidden = false;
        } finally {
          sendBtn.disabled = false;
          sendBtn.textContent = '전송';
        }
      });

      // 새로고침 버튼 — 캐시 우회 fresh fetch + 회전 애니메이션.
      const refreshBtn = document.querySelector('[data-refresh]');
      let isRefreshing = false;
      async function manualRefresh() {
        if (isRefreshing) return;
        isRefreshing = true;
        refreshBtn?.classList.add('is-spinning');
        try {
          await load(true);
        } finally {
          isRefreshing = false;
          refreshBtn?.classList.remove('is-spinning');
        }
      }
      refreshBtn?.addEventListener('click', manualRefresh);

      // 페이지 가시성 변화 시 자동 갱신 — 다른 탭에서 IG 삭제 후 돌아왔을 때 즉시 반영.
      // 30초 이상 지났을 때만 (잦은 탭 전환 시 무한 fetch 방지).
      let lastLoadAt = Date.now();
      const AUTO_REFRESH_THRESHOLD_MS = 30 * 1000;
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState !== 'visible') return;
        if (Date.now() - lastLoadAt < AUTO_REFRESH_THRESHOLD_MS) return;
        lastLoadAt = Date.now();
        load(true);
      });

      load();
      lastLoadAt = Date.now();
    })();
  </script>
</body>
</html>
