<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi Photo Vault</title>
    <style>
        body { background: #fff5f8; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #eee; box-sizing: border-box; }
        button { background: #ff4081; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Lumi Start</h1>
        <form id="lumiForm">
            <input type="file" id="fileInput" accept="image/*" required>
            <input type="text" id="userInput" placeholder="성함" required>
            <button type="submit" id="btn">사진 전송</button>
        </form>
    </div>
    <script>
        document.getElementById('lumiForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.innerText = "전송 중...";
            btn.disabled = true;

            const fd = new FormData();
            fd.append('photo', document.getElementById('fileInput').files[0]);
            fd.append('user', document.getElementById('userInput').value);

            try {
                const r = await fetch('/.netlify/functions/reserve', { method: 'POST', body: fd });
                if (r.ok) alert("성공적으로 저장되었습니다!");
                else alert("전송 실패: " + await r.text());
            } catch (err) { alert("연결 오류가 발생했습니다."); }
            
            btn.innerText = "사진 전송";
            btn.disabled = false;
        };
    </script>
</body>
</html>
