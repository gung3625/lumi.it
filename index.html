<!DOCTYPE html>
<html lang="ko">
<body>
 <h1>Lumi 예약 시스템</h1>
 <form id="reservationForm">
 <input type="text" placeholder="성함" required>
 <input type="text" placeholder="연락처" required>
 <input type="date" required>
 <input type="time" required>
 <input type="file" id="fileInput" required>
 <button type="submit">예약하기</button>
 </form>
 <script>
 document.getElementById('reservationForm').onsubmit = async (e) => {
 e.preventDefault();
 const fd = new FormData();
 fd.append('photo', document.getElementById('fileInput').files[0]);
 const r = await fetch('/.netlify/functions/reserve', { method: 'POST', body: fd });
 alert(r.ok ? "전송 성공!" : "전송 실패");
 };
 </script>
</body>
</html>
