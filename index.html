<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="facebook-domain-verification" content="t18ls5bk3b508yf9kmizwr9fyild3s" />
    <title>Lumi 예약 시스템</title>
    <style>
        body { background: #fff5f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; padding: 20px; line-height: 1.5; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #ff4081; text-align: center; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #ff4081; outline: none; }
        
        .upload-section { margin-top: 20px; padding: 20px; border: 2px dashed #ffc1d6; border-radius: 12px; text-align: center; background: #fff9fb; }
        .status-msg { margin-top: 15px; text-align: center; font-weight: bold; color: #ff4081; min-height: 24px; font-size: 14px; }
        
        footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; font-size: 11px; color: #777; text-align: center; }
        footer b { color: #555; }
        .privacy-link { display: inline-block; margin-bottom: 12px; color: #ff4081; text-decoration: none; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Lumi 예약</h1>
        <form id="resForm">
            <input type="text" id="name" placeholder="성함" required>
            <input type="tel" id="phone" placeholder="연락처 (010-0000-0000)" required>
            <input type="date" id="date" required>
            <input type="time" id="time" required>
            
            <div class="upload-section">
                <p style="font-size: 13px; color: #ff4081; margin-bottom: 10px;"><b>[필수] 사진 선택 시 즉시 예약 완료</b></p>
                <input type="file" id="photo" accept="image/*" required>
            </div>
        </form>
        
        <div id="status" class="status-msg"></div>

        <footer>
            <a href="/privacy.html" class="privacy-link">개인정보처리방침 보기</a>
            <p>
                <b>상호명:</b> Lumi | <b>대표자:</b> 김현 <br>
                <b>사업자번호:</b> 330-04-03207 <br>
                <b>주소:</b> 서울특별시 용산구 회나무로 32-7 <br>
                <b>연락처:</b> 010-6424-6284 | <b>이메일:</b> gung3625@gmail.com
            </p>
            <p style="margin-top:10px;">© 2026 Lumi. All rights reserved.</p>
        </footer>
    </div>

    <script>
        const fileInput = document.getElementById('photo');
        const statusDiv = document.getElementById('status');

        fileInput.onchange = async () => {
            if (!fileInput.files[0]) return;

            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;

            if (!name || !phone || !date || !time) {
                alert("상단의 예약 정보를 모두 입력한 후 사진을 선택해 주세요!");
                fileInput.value = ""; 
                return;
            }

            statusDiv.innerText = "🚀 사진 및 예약 정보 전송 중...";
            fileInput.disabled = true;

            const fd = new FormData();
            fd.append('photo', fileInput.files[0]);
            fd.append('userName', name);
            fd.append('userPhone', phone);
            fd.append('resDate', date);
            fd.append('resTime', time);

            try {
                const r = await fetch('/.netlify/functions/reserve', { 
                    method: 'POST', 
                    body: fd 
                });

                if (r.ok) {
                    statusDiv.style.color = "#2e7d32";
                    statusDiv.innerText = "✅ 전송 완료! 예약이 접수되었습니다.";
                    alert("성공적으로 예약되었습니다.");
                } else {
                    throw new Error("전송 실패");
                }
            } catch (err) {
                statusDiv.style.color = "#d32f2f";
                statusDiv.innerText = "❌ 전송 실패. 다시 시도해 주세요.";
                alert("오류가 발생했습니다. 네트워크 상태를 확인해 주세요.");
            } finally {
                fileInput.disabled = false;
            }
        };
    </script>
</body>
</html>
