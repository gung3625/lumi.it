<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><title>Lumi 예약</title>
    <style>
        body { background: #fff5f8; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #ff4081; color: white; border: none; font-weight: bold; cursor: pointer; }
   footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; font-size: 12px; color: #888; line-height: 1.6; text-align: center; }
        footer a { color: #ff4081; text-decoration: none; font-weight: bold; }
        .privacy-link { margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color:#ff4081; text-align:center;">Lumi 예약</h1>
        <form id="resForm">
            <input type="text" id="name" placeholder="성함" required>
            <input type="tel" id="phone" placeholder="연락처" required>
            <input type="date" id="date" required>
            <input type="time" id="time" required>
            <input type="file" id="photo" accept="image/*" required>
            <button type="submit" id="btn">예약하기</button>
        </form>
    </div>
    <footer>
        <a href="/privacy.html" class="privacy-link">개인정보처리방침 보기</a>
        <p>
            <b>상호명:</b> [Lumi] | <b>대표자:</b> [김현] <br>
            <b>사업자등록번호:</b> [3300403207] <br>
            <b>주소:</b> [서울특별시 용산구 회나무로 32-7] <br>
            <b>고객센터:</b> [010-6424-6284] | <b>이메일:</b> [gung3625@gmail.com]
        </p>
        <p>© 2026 Lumi. All rights reserved.</p>
    </footer>
    <script>
        document.getElementById('resForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            btn.disabled = true; btn.innerText = "전송 중...";
            const fd = new FormData();
            fd.append('photo', document.getElementById('photo').files[0]);
            fd.append('userName', document.getElementById('name').value);
            fd.append('userPhone', document.getElementById('phone').value);
            fd.append('resDate', document.getElementById('date').value);
            fd.append('resTime', document.getElementById('time').value);
            try {
                const r = await fetch('/.netlify/functions/reserve', { method: 'POST', body: fd });
                if (r.ok) alert("예약 완료!"); else alert("에러 발생");
            } catch (err) { alert("연결 실패"); }
            btn.disabled = false; btn.innerText = "예약하기";
        };
    </script>
</body>
</html>
