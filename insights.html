<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="루미(lumi) — 인사이트">
  <title>인사이트 · 루미(lumi)</title>

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <meta name="view-transition" content="same-origin">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <script data-scroll-top-on-reload>if("scrollRestoration" in history)history.scrollRestoration="manual";window.scrollTo(0,0);window.addEventListener("DOMContentLoaded",function(){window.scrollTo(0,0)});</script>
  <link rel="stylesheet" href="/css/motion.css">
  <link rel="stylesheet" href="/css/tabbar.css">
  <link rel="stylesheet" href="/css/legal.css">

  <style>
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }

    .topbar {
      position: sticky; top: 0;
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      z-index: var(--z-sticky); min-height: 52px;
    }
    .topbar__back {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius-full); color: var(--ink);
    }
    .topbar__back:hover { background: var(--bg-soft); }
    .topbar__back svg { width: 20px; height: 20px; stroke-width: 2.2; }
    .topbar__title { font-size: var(--text-headline); font-weight: var(--weight-semibold); color: var(--ink); flex: 1; }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-1);
      padding: var(--space-2) var(--space-4);
      position: sticky;
      top: 52px;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      z-index: calc(var(--z-sticky) - 1);
      border-bottom: 1px solid var(--line);
    }
    .tab-btn {
      padding: var(--space-2) 0;
      background: transparent;
      border: none;
      font-size: var(--text-body);
      font-weight: var(--weight-medium);
      color: var(--ink-muted);
      position: relative;
    }
    .tab-btn.is-active { color: var(--ink); font-weight: var(--weight-semibold); }
    .tab-btn.is-active::after {
      content: '';
      position: absolute;
      left: 50%; bottom: -2px;
      width: 24px; height: 2px;
      background: var(--ink);
      transform: translateX(-50%);
      border-radius: var(--radius-pill);
    }

    .wrap { padding: var(--space-4); max-width: 600px; margin: 0 auto; }

    .pane { display: none; flex-direction: column; gap: var(--space-4); }
    .pane.is-active {
      display: flex;
      animation: pane-enter 320ms var(--ease-toss);
    }
    @keyframes pane-enter {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 통계 카드 */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }
    /* M4.2 — 채널 섹션 라벨 (인스타 / 쓰레드 구분) */
    .stat-section-label {
      grid-column: 1 / -1;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      text-transform: none;
      margin-top: 8px;
      margin-bottom: -4px;
    }
    .stat-section-label:first-child { margin-top: 0; }
    .stat--threads {
      border-color: #c7d2fe;
      background: #eef2ff;
    }
    .stat--threads .stat__label,
    .stat--threads .stat__value { color: #3730a3; }
    .stat--threads-expired {
      grid-column: 1 / -1;
      border-color: #f5a623;
      background: #fff8ea;
      color: #b45309;
    }
    .stat {
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      animation: rise 360ms var(--ease-toss) backwards;
    }
    .stat:nth-child(1) { animation-delay: 0ms; }
    .stat:nth-child(2) { animation-delay: 60ms; }
    .stat:nth-child(3) { animation-delay: 120ms; }
    .stat:nth-child(4) { animation-delay: 180ms; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stat__label {
      font-size: var(--text-caption);
      color: var(--ink-muted);
      letter-spacing: 0.02em;
      margin-bottom: var(--space-1);
    }
    .stat__value {
      font-size: 28px;
      font-weight: var(--weight-bold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
      line-height: 1.1;
    }
    .stat__delta {
      margin-top: 4px;
      font-size: var(--text-caption);
      color: var(--ink-muted);
    }
    .stat__delta--up { color: #00713c; }
    .stat__delta--down { color: #c8507a; }

    .summary-card {
      padding: var(--space-4);
      background: var(--pink-50);
      border: 1px solid var(--pink-300);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-glow-sm);
    }
    .summary-card__title {
      font-size: var(--text-caption);
      color: var(--pink-700);
      font-weight: var(--weight-semibold);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: var(--space-2);
    }
    .summary-card__text {
      font-size: var(--text-body);
      color: var(--ink);
      line-height: var(--leading-snug);
    }

    /* 베스트 시간 */
    .day-toggle {
      display: inline-flex;
      gap: var(--space-1);
      padding: 4px;
      background: var(--bg-soft);
      border-radius: var(--radius-pill);
      align-self: flex-start;
    }
    .day-toggle button {
      padding: 6px 14px;
      background: transparent;
      border: none;
      font-size: var(--text-caption);
      font-weight: var(--weight-medium);
      color: var(--ink-muted);
      border-radius: var(--radius-pill);
    }
    .day-toggle button.is-active {
      background: var(--bg);
      color: var(--ink);
      box-shadow: var(--shadow-sm);
    }

    .time-list { display: flex; flex-direction: column; gap: var(--space-2); }
    .time-card {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      animation: rise 360ms var(--ease-toss) backwards;
      transition:
        border-color var(--duration-base) var(--ease-soft),
        box-shadow var(--duration-base) var(--ease-soft),
        background var(--duration-base) var(--ease-soft),
        transform var(--duration-snap) var(--ease-toss);
    }
    .time-card:nth-child(1) { animation-delay: 0ms; }
    .time-card:nth-child(2) { animation-delay: 80ms; }
    .time-card:nth-child(3) { animation-delay: 160ms; }
    @media (hover: hover) {
      .time-card:hover { border-color: var(--pink-200, #f7c5d3); box-shadow: var(--shadow-sm); }
    }
    .time-card:active { transform: scale(0.992); }
    .time-card.is-best {
      border-color: var(--pink-500);
      background: var(--pink-50);
      box-shadow: var(--shadow-glow-sm);
    }
    .time-card__hour {
      font-size: 24px;
      font-weight: var(--weight-bold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
      width: 80px;
      flex-shrink: 0;
    }
    .time-card__reason {
      flex: 1;
      font-size: var(--text-body);
      color: var(--ink-soft);
      line-height: var(--leading-snug);
    }
    .time-card__badge {
      margin-left: auto;
      font-size: 12px;
      color: var(--pink-600, #c8507a);
      background: var(--pink-100, #ffeef3);
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: var(--weight-semibold);
      letter-spacing: -0.01em;
      flex-shrink: 0;
    }
    .bt-note {
      margin: 0 0 var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      color: var(--ink-muted);
      font-size: var(--text-caption);
    }
    /* 모드 배지 + 진행 카드 (PR #107) */
    .bt-mode {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: var(--weight-semibold);
      letter-spacing: -0.01em;
      padding: 3px 10px;
      border-radius: 999px;
      transition: background-color 200ms var(--ease-soft), color 200ms var(--ease-soft);
    }
    .bt-mode.is-personal {
      color: var(--pink-600, #c8507a);
      background: var(--pink-100, #ffeef3);
    }
    .bt-mode.is-seed {
      color: var(--ink-muted);
      background: var(--bg-soft);
    }
    .bt-mode__dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
    .day-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }
    .bt-progress {
      margin: 0 0 var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      animation: rise 400ms var(--ease-toss) backwards;
    }
    .bt-progress__hint {
      font-size: var(--text-caption);
      color: var(--ink-muted);
      letter-spacing: -0.01em;
      margin-bottom: var(--space-2);
    }
    .bt-progress__stage + .bt-progress__stage { margin-top: var(--space-3); }
    .bt-progress__stage-title {
      font-size: 12px;
      font-weight: var(--weight-semibold);
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .bt-progress__stage.is-locked { opacity: 0.55; }
    .bt-progress__stage.is-locked .bt-progress__stage-title::after {
      content: ' (1단계 후 활성)';
      color: var(--ink-muted);
      font-weight: var(--weight-medium);
    }
    .bt-progress__row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .bt-progress__row:first-of-type { margin-top: 0; }
    .bt-progress__label {
      flex-shrink: 0;
      width: 36px;
      font-size: var(--text-caption);
      color: var(--ink-muted);
    }
    .bt-progress__bar {
      flex: 1;
      height: 6px;
      background: var(--line, rgba(0,0,0,0.08));
      border-radius: 999px;
      overflow: hidden;
      display: flex;
    }
    .bt-progress__bar > i {
      display: block;
      height: 100%;
      width: 0%;
      transition: width 600ms var(--ease-toss);
    }
    .bt-progress__bar > i.is-measured { background: var(--gradient-signature); }
    .bt-progress__bar > i.is-pending { background: rgba(200, 80, 122, 0.28); }
    .bt-progress__row.is-ready .bt-progress__bar > i.is-measured {
      background: var(--pink-600, #c8507a);
    }
    .bt-progress__measure-note {
      font-size: 11px;
      color: var(--ink-muted);
      letter-spacing: -0.01em;
      margin-top: 4px;
      padding-left: 38px;
    }
    .bt-progress__measure-note strong {
      color: var(--ink);
      font-weight: var(--weight-semibold);
    }
    .bt-progress__count {
      flex-shrink: 0;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      color: var(--ink-muted);
      letter-spacing: -0.01em;
      min-width: 40px;
      text-align: right;
    }
    .bt-progress__row.is-ready .bt-progress__count {
      color: var(--pink-600, #c8507a);
      font-weight: var(--weight-semibold);
    }
    @media (prefers-reduced-motion: reduce) {
      .bt-mode, .bt-progress, .bt-progress__bar > i { transition: none; animation: none; }
    }
    /* time-card 가 <button> 으로 렌더 — 기본 스타일 reset */
    .time-card {
      width: 100%;
      text-align: left;
      font: inherit;
      color: inherit;
      cursor: pointer;
    }
    .time-card:focus-visible {
      outline: 2px solid var(--pink-400, #f17ba3);
      outline-offset: 2px;
    }
    /* "왜 이 시간?" sheet */
    .bt-sheet {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .bt-sheet__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      animation: fadeIn 200ms var(--ease-soft);
    }
    .bt-sheet__panel {
      position: relative;
      width: 100%;
      max-width: 520px;
      background: var(--bg);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: var(--space-5) var(--space-5) var(--space-6);
      box-shadow: var(--shadow-lg);
      animation: slideUp 280ms var(--ease-toss);
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .bt-sheet__close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: transparent;
      border: none;
      font-size: 24px;
      line-height: 1;
      color: var(--ink-muted);
      cursor: pointer;
      padding: 4px 8px;
      transition: color 160ms var(--ease-soft);
    }
    .bt-sheet__close:hover { color: var(--ink); }
    .bt-sheet__time {
      font-size: 28px;
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-tight);
      font-variant-numeric: tabular-nums;
    }
    .bt-sheet__day {
      display: inline-block;
      font-size: var(--text-caption);
      color: var(--ink-muted);
      background: var(--bg-soft);
      padding: 2px 10px;
      border-radius: 999px;
      margin-top: 4px;
    }
    .bt-sheet__body {
      margin-top: var(--space-4);
      font-size: var(--text-body);
      color: var(--ink);
      line-height: var(--leading-relaxed);
    }
    .bt-sheet__body p { margin: 0 0 var(--space-2); }
    .bt-sheet__body strong { color: var(--pink-600, #c8507a); font-weight: var(--weight-semibold); }
    .bt-sheet__tier {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: var(--weight-semibold);
      letter-spacing: -0.01em;
      padding: 2px 8px;
      border-radius: 999px;
      margin-top: 6px;
    }
    .bt-sheet__tier.is-tier1, .bt-sheet__tier.is-tier2 {
      color: var(--pink-600, #c8507a);
      background: var(--pink-100, #ffeef3);
    }
    .bt-sheet__tier.is-tier3, .bt-sheet__tier.is-tier4 {
      color: var(--ink-muted);
      background: var(--bg-soft);
    }
    @media (prefers-reduced-motion: reduce) {
      .bt-sheet__backdrop, .bt-sheet__panel { animation: none; }
    }

    .state { padding: var(--space-12); text-align: center; color: var(--ink-muted); }
    .empty { padding: var(--space-12) var(--space-5); text-align: center; color: var(--ink-muted); }
    .empty__title { font-size: var(--text-body-lg); font-weight: var(--weight-semibold); color: var(--ink); margin-bottom: var(--space-2); }
    .empty__sub { font-size: var(--text-body); color: var(--ink-muted); }

    /* IG 토큰 만료 — 인사이트 영역 inline 배너 (dashboard ig-reconnect 와 동일 톤) */
    .ig-expired {
      margin: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: #fff8ea;
      border: 1px solid #f5a623;
      border-radius: var(--radius-lg);
      color: #b45309;
      text-decoration: none;
      animation: ig-expired-pulse 1.6s var(--ease-soft) infinite alternate, rise 500ms var(--ease-toss) 80ms backwards;
      transition: transform var(--duration-snap) var(--ease-toss);
      text-align: left;
    }
    .ig-expired:active { transform: scale(0.992); }
    .ig-expired__icon {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, #f5a623, #ec4899);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .ig-expired__body { flex: 1; min-width: 0; }
    .ig-expired__title {
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      color: #b45309;
    }
    .ig-expired__sub {
      font-size: var(--text-caption);
      color: var(--ink-muted);
      margin-top: 2px;
    }
    .ig-expired__chev {
      font-size: 18px;
      color: #b45309;
      flex-shrink: 0;
    }
    @keyframes ig-expired-pulse {
      from { box-shadow: 0 0 0 0 rgba(245, 166, 35, 0.20); }
      to   { box-shadow: 0 0 0 8px rgba(245, 166, 35, 0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .ig-expired { animation: none; }
    }

    /* 탭바 — /css/tabbar.css 참조 */
  </style>
</head>
<body>
  <header class="topbar">
    <a class="topbar__back" href="/dashboard" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <h1 class="topbar__title">인사이트</h1>
  </header>

  <nav class="tabs" aria-label="탭">
    <button class="tab-btn is-active" type="button" data-tab="weekly">이번 주</button>
    <button class="tab-btn" type="button" data-tab="monthly">이번 달</button>
    <button class="tab-btn" type="button" data-tab="best-time">베스트 시간</button>
  </nav>

  <main class="wrap" role="main">
    <!-- 주간 -->
    <section class="pane is-active" data-pane="weekly">
      <div class="state" data-weekly-state>가져오는 중…</div>
      <div data-weekly-content hidden>
        <div class="stat-grid" data-weekly-grid></div>
        <div class="summary-card" data-weekly-summary hidden></div>
      </div>
    </section>

    <!-- 월간 -->
    <section class="pane" data-pane="monthly">
      <div class="state" data-monthly-state>가져오는 중…</div>
      <div data-monthly-content hidden>
        <div class="stat-grid" data-monthly-grid></div>
        <div class="summary-card" data-monthly-summary hidden></div>
      </div>
    </section>

    <!-- 베스트 시간 -->
    <section class="pane" data-pane="best-time">
      <div class="state" data-bt-state>가져오는 중…</div>
      <div data-bt-content hidden>
        <div class="day-row">
          <div class="day-toggle">
            <button type="button" data-day="weekday" class="is-active">평일</button>
            <button type="button" data-day="weekend">주말</button>
          </div>
          <span class="bt-mode is-seed" data-bt-mode hidden>
            <span class="bt-mode__dot" aria-hidden="true"></span>
            <span data-bt-mode-label>업종 평균</span>
          </span>
        </div>
        <div class="bt-progress" data-bt-progress hidden>
          <div class="bt-progress__hint" data-bt-progress-hint></div>
          <!-- 1단계: 내 게시물 도달 데이터 (Tier 1) -->
          <div class="bt-progress__stage" data-bt-progress-stage="t1">
            <div class="bt-progress__stage-title">1. 내 게시물 도달 데이터</div>
            <div class="bt-progress__row" data-bt-progress-row="weekday">
              <span class="bt-progress__label">평일</span>
              <span class="bt-progress__bar">
                <i class="is-measured" data-bt-progress-fill="weekday"></i>
                <i class="is-pending" data-bt-progress-fill-pending="weekday"></i>
              </span>
              <span class="bt-progress__count" data-bt-progress-count="weekday">0/5</span>
            </div>
            <div class="bt-progress__measure-note" data-bt-progress-measure-note="weekday" hidden></div>
            <div class="bt-progress__row" data-bt-progress-row="weekend">
              <span class="bt-progress__label">주말</span>
              <span class="bt-progress__bar">
                <i class="is-measured" data-bt-progress-fill="weekend"></i>
                <i class="is-pending" data-bt-progress-fill-pending="weekend"></i>
              </span>
              <span class="bt-progress__count" data-bt-progress-count="weekend">0/3</span>
            </div>
            <div class="bt-progress__measure-note" data-bt-progress-measure-note="weekend" hidden></div>
          </div>
          <!-- 2단계: 내 팔로워 활동 데이터 (Tier 2) -->
          <div class="bt-progress__stage" data-bt-progress-stage="t2">
            <div class="bt-progress__stage-title">2. 내 팔로워 활동 데이터</div>
            <div class="bt-progress__row" data-bt-progress-row-t2="weekday">
              <span class="bt-progress__label">평일</span>
              <span class="bt-progress__bar"><i data-bt-progress-fill-t2="weekday"></i></span>
              <span class="bt-progress__count" data-bt-progress-count-t2="weekday">0/15일</span>
            </div>
            <div class="bt-progress__row" data-bt-progress-row-t2="weekend">
              <span class="bt-progress__label">주말</span>
              <span class="bt-progress__bar"><i data-bt-progress-fill-t2="weekend"></i></span>
              <span class="bt-progress__count" data-bt-progress-count-t2="weekend">0/6일</span>
            </div>
          </div>
        </div>
        <div class="time-list" data-bt-list></div>
      </div>
    </section>

    <!-- "왜 이 시간?" sheet — time-card 클릭 시 등장 -->
    <div class="bt-sheet" data-bt-sheet hidden role="dialog" aria-modal="true" aria-labelledby="bt-sheet-title">

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt') || '';
      if (!token) { location.replace('/'); return; }
      const authHeaders = { Authorization: 'Bearer ' + token };

      // 탭 전환 — /insights/best-time 진입 시 자동으로 best-time 탭, 그 외엔 hash 또는 default
      const pathBased = location.pathname.includes('/insights/best-time') ? 'best-time' : '';
      const initialTab = pathBased || (location.hash || '').replace('#', '') || 'weekly';
      function switchTab(name) {
        document.querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('is-active', b.dataset.tab === name));
        document.querySelectorAll('[data-pane]').forEach(p => p.classList.toggle('is-active', p.dataset.pane === name));
        if (location.hash !== '#' + name) history.replaceState(null, '', '#' + name);
      }
      document.querySelectorAll('[data-tab]').forEach(b => {
        b.addEventListener('click', () => switchTab(b.dataset.tab));
      });
      switchTab(['weekly','monthly','best-time'].includes(initialTab) ? initialTab : 'weekly');

      // ── 통계 렌더 ──
      function fmtNum(n) {
        if (typeof n !== 'number') return '—';
        if (n >= 10000) return (n / 10000).toFixed(1) + '만';
        return n.toLocaleString();
      }
      function fmtDelta(n) {
        if (typeof n !== 'number' || n === 0) return '';
        const sign = n > 0 ? '+' : '';
        return `${sign}${n.toLocaleString()}`;
      }
      function deltaClass(n) {
        if (typeof n !== 'number' || n === 0) return '';
        return n > 0 ? 'stat__delta--up' : 'stat__delta--down';
      }
      function renderStats(grid, data, period) {
        const followers = data.followers;
        const likes = data.likesTotal;
        const reach = data.reach;
        const profileViews = data.profileViews;
        const followersChange = data.followersChange;
        const items = [
          { label: '팔로워', value: fmtNum(followers), delta: fmtDelta(followersChange), deltaCls: deltaClass(followersChange) },
          { label: period === 'weekly' ? '이번 주 좋아요' : '이번 달 좋아요', value: fmtNum(likes), delta: '', deltaCls: '' },
          { label: '도달', value: fmtNum(reach), delta: '', deltaCls: '' },
          { label: '프로필 조회', value: fmtNum(profileViews), delta: '', deltaCls: '' },
        ];
        let html = '<div class="stat-section-label">인스타그램</div>' + items.map(it => `
          <div class="stat">
            <div class="stat__label">${it.label}</div>
            <div class="stat__value">${it.value}</div>
            ${it.delta ? `<div class="stat__delta ${it.deltaCls}">${it.delta}</div>` : ''}
          </div>
        `).join('');

        // M4.2 — Threads 섹션 (연동된 사장님만).
        // tokenExpired 시 안내 카드, 정상 시 views/likes/replies/reposts/quotes.
        const t = data.threads;
        if (t && t.connected) {
          if (t.tokenExpired) {
            html += `<div class="stat-section-label">쓰레드</div>
              <div class="stat stat--threads-expired">
                <div class="stat__label">⚠️ 쓰레드 재연동 필요</div>
                <div class="stat__value" style="font-size:14px;">설정에서 토큰 갱신</div>
              </div>`;
          } else {
            const threadsItems = [
              { label: period === 'weekly' ? '이번 주 조회' : '이번 달 조회',   value: fmtNum(t.views) },
              { label: period === 'weekly' ? '이번 주 좋아요' : '이번 달 좋아요', value: fmtNum(t.likes) },
              { label: '답글',     value: fmtNum(t.replies) },
              { label: '리포스트', value: fmtNum(t.reposts) },
            ];
            html += '<div class="stat-section-label">쓰레드</div>' + threadsItems.map(it => `
              <div class="stat stat--threads">
                <div class="stat__label">${it.label}</div>
                <div class="stat__value">${it.value}</div>
              </div>
            `).join('');
          }
        }
        grid.innerHTML = html;
      }

      // 토큰 만료 응답일 때 stateEl 영역을 재연동 배너로 교체.
      // 백엔드(insight-weekly/monthly)는 토큰 만료 시 200 + { error: 'token_expired', data: null } 응답.
      function renderTokenExpiredBanner(stateEl) {
        stateEl.classList.remove('state');
        stateEl.removeAttribute('hidden');
        stateEl.innerHTML = `
          <a class="ig-expired" href="/settings">
            <span class="ig-expired__icon" aria-hidden="true">⚠️</span>
            <div class="ig-expired__body">
              <div class="ig-expired__title">인스타 재연동이 필요해요</div>
              <div class="ig-expired__sub">토큰이 만료돼서 인사이트를 못 가져왔어요. 설정에서 재연동.</div>
            </div>
            <span class="ig-expired__chev" aria-hidden="true">→</span>
          </a>
        `;
      }

      async function loadInsight(period) {
        const stateEl = document.querySelector(`[data-${period}-state]`);
        const contentEl = document.querySelector(`[data-${period}-content]`);
        const gridEl = document.querySelector(`[data-${period}-grid]`);
        const summaryEl = document.querySelector(`[data-${period}-summary]`);
        try {
          const url = period === 'weekly' ? '/api/insight-weekly' : '/api/insight-monthly';
          const res = await fetch(url, { headers: authHeaders });
          if (!res.ok) {
            stateEl.textContent = '인사이트를 가져오지 못했어요. 인스타가 연동돼 있나요?';
            return;
          }
          const json = await res.json();
          // 토큰 만료 — 인사이트 데이터 없음. 재연동 배너로 교체.
          // tokenExpired 표준 키 우선, error='token_expired' 는 옛 호환 (PR #169).
          if (json && (json.tokenExpired || json.error === 'token_expired')) {
            renderTokenExpiredBanner(stateEl);
            return;
          }
          const data = (json && json.data) || {};
          stateEl.hidden = true;
          contentEl.hidden = false;
          renderStats(gridEl, data, period);
          if (data.mediaCountInRange != null) {
            const days = period === 'weekly' ? '이번 주' : '이번 달';
            summaryEl.innerHTML = `<div class="summary-card__title">${days} 게시물</div><div class="summary-card__text">총 ${data.mediaCountInRange}건 게시했어요${data.commentsTotal ? `, 댓글 ${data.commentsTotal}개` : ''}.</div>`;
            summaryEl.hidden = false;
          }
        } catch (e) {
          stateEl.textContent = '인사이트를 가져오지 못했어요.';
        }
      }
      loadInsight('weekly');
      loadInsight('monthly');

      // ── 베스트 시간 ──
      let btCache = null;
      let currentDay = 'weekday';
      // 응답의 modes/progress/thresholds 를 받아 모드 배지·진행 카드 갱신.
      // currentDay 가 'personal' 이면 핑크 "내 데이터", 아니면 회색 "업종 평균".
      function renderModeAndProgress() {
        if (!btCache) return;
        const modes = btCache.modes || {};
        const progress = btCache.progress || null;
        const thresholds = btCache.thresholds || { weekday: 5, weekend: 3 };

        // 모드 배지 (현재 탭 요일군 기준)
        const modeEl = document.querySelector('[data-bt-mode]');
        const modeLabelEl = document.querySelector('[data-bt-mode-label]');
        if (modeEl && modeLabelEl) {
          const personal = modes[currentDay] === 'personal';
          modeEl.classList.toggle('is-personal', personal);
          modeEl.classList.toggle('is-seed', !personal);
          modeLabelEl.textContent = personal ? '내 데이터' : '업종 평균';
          modeEl.hidden = false;
        }

        // 진행 카드 — 1·2 단계 둘 다 완료면 숨김
        const progEl = document.querySelector('[data-bt-progress]');
        const hintEl = document.querySelector('[data-bt-progress-hint]');
        if (!progEl) return;
        const tier2 = btCache.tier2_progress || null;
        const t1BothReady = !!(progress && progress.ready);
        const t2BothReady = !!(tier2 && tier2.weekday && tier2.weekday.ready && tier2.weekend && tier2.weekend.ready);
        if (t1BothReady && t2BothReady) {
          progEl.hidden = true;
          return;
        }
        progEl.hidden = false;
        // 1단계 — 내 게시물 도달 데이터
        // 막대 measured + pending 두 segment. pending > 0 이면 "측정 대기 N건 · 30분 안에 자동 측정".
        ['weekday', 'weekend'].forEach((dow) => {
          const p = (progress && progress[dow]) || { have: 0, pending: 0, need: thresholds[dow], ready: false };
          const have = Math.max(0, Number(p.have) || 0);
          const pending = Math.max(0, Number(p.pending) || 0);
          const need = Math.max(1, Number(p.need) || thresholds[dow]);
          const measuredRatio = Math.min(100, Math.round((have / need) * 100));
          const pendingRatio = Math.min(100 - measuredRatio, Math.round((pending / need) * 100));
          const fill = document.querySelector(`[data-bt-progress-fill="${dow}"]`);
          const fillPending = document.querySelector(`[data-bt-progress-fill-pending="${dow}"]`);
          const count = document.querySelector(`[data-bt-progress-count="${dow}"]`);
          const row = document.querySelector(`[data-bt-progress-row="${dow}"]`);
          const note = document.querySelector(`[data-bt-progress-measure-note="${dow}"]`);
          if (fill) fill.style.width = (p.ready ? 100 : measuredRatio) + '%';
          if (fillPending) fillPending.style.width = (p.ready ? 0 : pendingRatio) + '%';
          if (count) count.textContent = `${have}/${need}`;
          if (row) row.classList.toggle('is-ready', !!p.ready);
          if (note) {
            if (pending > 0 && !p.ready) {
              note.innerHTML = `<strong>측정 대기 ${pending}건</strong> · 30분 안에 자동 측정`;
              note.hidden = false;
            } else {
              note.hidden = true;
            }
          }
        });
        // 2단계 — 내 팔로워 활동 데이터. 1단계 미완료면 locked.
        const stage2El = document.querySelector('[data-bt-progress-stage="t2"]');
        if (stage2El) stage2El.classList.toggle('is-locked', !t1BothReady);
        ['weekday', 'weekend'].forEach((dow) => {
          const p2 = (tier2 && tier2[dow]) || { snapshot_days: 0, needed_days: dow === 'weekend' ? 6 : 15, ready: false };
          const have = Math.max(0, Number(p2.snapshot_days) || 0);
          const need = Math.max(1, Number(p2.needed_days) || (dow === 'weekend' ? 6 : 15));
          const ratio = Math.min(100, Math.round((have / need) * 100));
          const fill = document.querySelector(`[data-bt-progress-fill-t2="${dow}"]`);
          const count = document.querySelector(`[data-bt-progress-count-t2="${dow}"]`);
          const row = document.querySelector(`[data-bt-progress-row-t2="${dow}"]`);
          if (fill) fill.style.width = (p2.ready ? 100 : ratio) + '%';
          if (count) count.textContent = `${have}/${need}일`;
          if (row) row.classList.toggle('is-ready', !!p2.ready);
        });
        // hint — 단계별 카피. 1·2단계 진행 상황을 한 줄로 표현.
        if (t2BothReady) {
          hintEl.textContent = '내 팔로워 활동 데이터로 추천 중. 가장 정확한 단계예요.';
        } else if (t1BothReady) {
          hintEl.textContent = '내 게시물 도달 데이터 기준 추천 중. 팔로워 활동이 더 모이면 정확도가 올라요.';
        } else {
          hintEl.textContent = '사람들이 많이 볼 만한 시간대 평균을 보여드려요. 도달 데이터가 모이면 내 팔로워 기준으로 자동 전환돼요.';
        }
      }
      function renderBest() {
        const listEl = document.querySelector('[data-bt-list]');
        if (!btCache) return;
        renderModeAndProgress();
        const items = btCache[currentDay] || [];
        if (!items.length) {
          listEl.innerHTML = '<div class="empty"><div class="empty__title">데이터가 부족해요</div><div class="empty__sub">게시물이 좀 더 쌓이면 정확해집니다.</div></div>';
          return;
        }
        // 현재 시각 + 30분 이후 가장 가까운 슬롯에 "다음 임박" 강조.
        // 단 현재 탭이 오늘 요일과 일치할 때만 (평일 탭 + 오늘 평일, 주말 탭 + 오늘 주말).
        // 그 외엔 강조 없음 — 다른 요일 참고용으로만 보임.
        const today = new Date().getDay();
        const todayIsWeekend = today === 0 || today === 6;
        const tabMatchesToday = (currentDay === 'weekday' && !todayIsWeekend) || (currentDay === 'weekend' && todayIsWeekend);
        let nowIdx = -1;
        if (tabMatchesToday) {
          const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
          const slotMins = items.map(it => {
            const [hh, mm] = String(it.time || '0:0').split(':').map(Number);
            return hh * 60 + mm;
          });
          nowIdx = slotMins.findIndex(m => m > nowMin + 30);
        }
        const note = (tabMatchesToday && nowIdx === -1)
          ? '<div class="bt-note">오늘 추천 시간은 모두 지났어요. 내일 다시 알려드릴게요.</div>'
          : '';
        const esc = (s) => String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        listEl.innerHTML = note + items.map((it, i) => {
          const isNow = i === nowIdx;
          const badge = isNow ? '<span class="time-card__badge">다음 임박</span>' : '';
          return `
            <button type="button" class="time-card${isNow ? ' is-best' : ''}"
                    data-card-time="${esc(it.time || '')}"
                    data-card-reason="${esc(it.reason || '')}">
              <div class="time-card__hour">${esc(it.time || '—')}</div>
              <div class="time-card__reason">${esc(it.reason || '')}</div>
              ${badge}
            </button>
          `;
        }).join('');
      }
      // time-card 는 button 으로 렌더 — 기본 스타일 reset (인라인 가벼움)
      // sheet open / close / tier 별 카피
      const sheetEl = document.querySelector('[data-bt-sheet]');
      const sheetTime = document.querySelector('[data-bt-sheet-time]');
      const sheetDay = document.querySelector('[data-bt-sheet-day]');
      const sheetTier = document.querySelector('[data-bt-sheet-tier]');
      const sheetBody = document.querySelector('[data-bt-sheet-body]');
      let lastFocused = null;

      function tierMeta(tier) {
        // tier1 = 본인 게시 도달(reach) 기반 / tier2 = 팔로워 활동 매트릭스 / tier4 = 업종 평균
        if (tier === 'tier2') return { label: '내 팔로워 활동', cls: 'is-tier2' };
        if (tier === 'tier1') return { label: '내 데이터', cls: 'is-tier1' };
        return { label: '업종 평균', cls: 'is-tier4' };
      }
      const THRESHOLDS_LABEL = { weekday: 5, weekend: 3 };
      function sheetCopy(tier, day, reason, ctx) {
        const dayLabel = day === 'weekend' ? '주말' : '평일';
        const p = ctx.progress || {};
        const t2 = ctx.tier2_progress || {};
        const dayP = p[day] || { have: 0, need: THRESHOLDS_LABEL[day] };
        const dayT2 = t2[day] || { snapshot_days: 0, needed_days: day === 'weekend' ? 6 : 15 };
        if (tier === 'tier2') {
          return `
            <p>${dayLabel} 이 시각대에 <strong>내 팔로워가 인스타에서 가장 활발</strong>해요.</p>
            <p>최근 ${dayLabel} ${dayT2.snapshot_days}일 분 누적된 인스타 활동 데이터 기준입니다. 이 시간 게시는 첫 1시간 노출량이 평균보다 높을 가능성이 큽니다.</p>
          `;
        }
        if (tier === 'tier1') {
          return `
            <p>이 시각에 올린 <strong>내 게시물을 팔로워가 가장 많이 본 시간</strong>이에요.</p>
            <p>${dayLabel} 게시 ${dayP.have || 0}건의 도달(reach)·저장 데이터를 가중 평균한 결과입니다. 팔로워 활동 데이터가 ${dayT2.needed_days}일 분 누적되면 더 정확해져요.</p>
          `;
        }
        // tier4 (시드)
        return `
          <p>아직 내 데이터가 부족해 <strong>사람들이 많이 볼 만한 시간대 평균</strong>을 보여드려요.</p>
          <p>${dayLabel} 게시물의 도달(reach) 데이터가 ${dayP.have || 0}/${dayP.need || THRESHOLDS_LABEL[day]}건 모이면 내 팔로워가 실제로 본 시간으로 자동 전환됩니다. (인스타 도달 메트릭은 게시 후 24~72시간 안에 채워져요.)</p>
        `;
      }

      function openSheet(time, reason) {
        if (!btCache) return;
        const tier = (btCache.sources && btCache.sources[currentDay]) || 'tier4';
        const meta = tierMeta(tier, btCache.modes && btCache.modes[currentDay]);
        sheetTime.textContent = time || '—';
        sheetDay.textContent = currentDay === 'weekend' ? '주말' : '평일';
        sheetTier.className = 'bt-sheet__tier ' + meta.cls;
        sheetTier.textContent = meta.label;
        sheetBody.innerHTML = sheetCopy(tier, currentDay, reason, btCache);
        lastFocused = document.activeElement;
        sheetEl.hidden = false;
        // panel 에 focus — esc 처리 위해
        const closeBtn = sheetEl.querySelector('.bt-sheet__close');
        if (closeBtn) closeBtn.focus();
        document.addEventListener('keydown', onSheetKey);
      }
      function closeSheet() {
        sheetEl.hidden = true;
        document.removeEventListener('keydown', onSheetKey);
        if (lastFocused && typeof lastFocused.focus === 'function') {
          try { lastFocused.focus(); } catch {}
        }
      }
      function onSheetKey(e) {
        if (e.key === 'Escape') closeSheet();
      }
      document.querySelectorAll('[data-bt-sheet-close]').forEach((el) => {
        el.addEventListener('click', closeSheet);
      });
      // 카드 클릭(이벤트 위임) — listEl 안의 button 만
      const listElForSheet = document.querySelector('[data-bt-list]');
      if (listElForSheet) {
        listElForSheet.addEventListener('click', (e) => {
          const card = e.target.closest('[data-card-time]');
          if (!card) return;
          openSheet(card.getAttribute('data-card-time'), card.getAttribute('data-card-reason'));
        });
      }
      document.querySelectorAll('[data-day]').forEach(b => {
        b.addEventListener('click', () => {
          currentDay = b.dataset.day;
          document.querySelectorAll('[data-day]').forEach(x => x.classList.toggle('is-active', x === b));
          renderBest();
        });
      });
      async function loadBest() {
        const stateEl = document.querySelector('[data-bt-state]');
        const contentEl = document.querySelector('[data-bt-content]');
        try {
          const meRes = await fetch('/api/me', { headers: authHeaders });
          const meJson = await meRes.json();
          const cat = (meJson.seller || meJson).industry || 'cafe';
          const res = await fetch('/api/get-best-time', {
            method: 'POST',
            headers: { ...authHeaders, 'Content-Type': 'application/json' },
            body: JSON.stringify({ category: cat }),
          });
          const json = await res.json();
          if (!res.ok) {
            stateEl.textContent = '베스트 시간을 가져오지 못했어요.';
            return;
          }
          btCache = json && (json.data || json);
          stateEl.hidden = true;
          contentEl.hidden = false;
          renderBest();
        } catch (e) {
          stateEl.textContent = '베스트 시간을 가져오지 못했어요.';
        }
      }
      loadBest();
    })();
  </script>
</body>
</html>
