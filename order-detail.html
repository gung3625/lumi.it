<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>주문 상세 — 루미</title>
  <link rel="stylesheet" href="/css/brand-tokens.css" />
  <link rel="stylesheet" href="/css/sprint3.css" />
<style>
/* ── Lumi 법적 고지 Footer ──────────────────────────── */
.lumi-footer{border-top:1px solid rgba(0,0,0,.08);padding:28px 24px 36px;text-align:center;font-size:12px;color:#86868b;line-height:1.8;margin-top:48px;}
body.dark-mode .lumi-footer{border-top-color:rgba(255,255,255,.08);color:rgba(255,255,255,.3);}
.lumi-footer p{margin:0 0 2px;}
.lumi-footer__links{display:flex;flex-wrap:wrap;gap:8px 14px;justify-content:center;margin:10px 0 6px;}
.lumi-footer__links a{font-size:12px;color:#6e6e73;text-decoration:none;}
.lumi-footer__links a:hover{text-decoration:underline;}
body.dark-mode .lumi-footer__links a{color:rgba(255,255,255,.35);}
.lumi-footer__copy{font-size:11px;color:#aeaeb2;margin-top:6px!important;}
.lumi-footer__logo{height:28px;width:auto;display:block;margin:0 auto 8px;}
body.dark-mode .lumi-footer__logo{filter:invert(1) brightness(2);}
body.dark-mode .lumi-footer__copy{color:rgba(255,255,255,.2);}
@media(max-width:768px){.lumi-footer{padding:22px 16px 30px;}}
/* ── 모바일 특화 수정 (인라인 전용) ── */

/* 1. topbar 뒤로 버튼 터치 타겟 */
.topbar__back {
  min-width: 44px;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

/* 2. 액션 버튼 full-width + 44px 터치 타겟 */
@media (max-width: 767px) {
  .actions {
    flex-direction: column;
    gap: 8px;
  }
  .actions .btn {
    width: 100%;
    min-height: 48px;
    font-size: 16px;
  }
}

/* 3. word-break: keep-all */
.order-summary,
.tracking-stepper h2,
.stepper__title,
.order-cs h2 {
  word-break: keep-all;
  overflow-wrap: break-word;
}

/* 4. 페이지 최하단 safe-area (FAB 위) */
@media (max-width: 767px) {
  .page-main {
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  }
}

/* 5. order-summary 가로 스크롤 방지 */
.order-summary {
  overflow-x: hidden;
}
.order-summary table,
.order-summary dl {
  width: 100%;
  word-break: keep-all;
}

/* 다크모드 FAB */
#fab-dark{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:20px;z-index:200;width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.07);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .3s,transform .2s;}
#fab-dark:hover{transform:scale(1.08);}
body.dark-mode #fab-dark{background:rgba(255,255,255,.1);}
</style>
</head>
<body class="page-order-detail">
<script>if(localStorage.getItem('lumi_dark_mode')==='1'){document.body.classList.add('dark-mode');document.documentElement.style.background='#111';}</script>
  <header class="topbar" role="banner">
    <a href="/orders" class="topbar__back" aria-label="뒤로">←</a>
    <h1 class="topbar__title">주문 상세</h1>
    <span></span>
  </header>

  <main class="page-main">
    <section class="order-summary" id="orderSummary">
      <div class="empty-state"><p>주문을 가져오는 중…</p></div>
    </section>

    <section class="tracking-stepper" id="trackingStepper" hidden>
      <h2>배송 진행</h2>
      <ol class="stepper" id="stepperList"></ol>
      <button class="btn btn--ghost btn--sm" type="button" id="refreshTrackingBtn">새로고침</button>
    </section>

    <section class="actions" id="orderActions">
      <button class="btn btn--primary" type="button" id="actionTrackingBtn">송장 입력</button>
      <button class="btn btn--ghost" type="button" id="actionReturnBtn">반품 처리</button>
    </section>

    <section class="order-cs" id="orderCsSection">
      <h2>관련 문의</h2>
      <div class="cs-list" id="orderCsList"><p class="muted">관련 문의가 없어요.</p></div>
    </section>
  </main>

  <script src="/js/sprint3-order-detail.js"></script>

<!-- 다크모드 FAB -->
<button id="fab-dark" onclick="toggleDark()" aria-label="다크/라이트 모드 전환"></button>
<script>
(function(){
  var btn = document.getElementById('fab-dark');
  function setIcon(dark) {
    btn.innerHTML = dark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#f0f2f8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#1d1d1f"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    btn.style.background = dark ? 'rgba(255,255,255,.1)' : 'rgba(0,0,0,.07)';
  }
  var isDark = document.body.classList.contains('dark-mode');
  setIcon(isDark);
  window.toggleDark = function() {
    isDark = !isDark;
    document.body.classList.toggle('dark-mode', isDark);
    document.documentElement.style.background = isDark ? '#111' : '#f5f5f7';
    localStorage.setItem('lumi_dark_mode', isDark ? '1' : '0');
    setIcon(isDark);
  };
})();
</script>
