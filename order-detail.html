body.dark-mode .lumi-footer{border-top-color:rgba(255,255,255,.08);color:rgba(255,255,255,.3);}
.lumi-footer p{margin:0 0 2px;}
.lumi-footer__links{display:flex;flex-wrap:wrap;gap:8px 14px;justify-content:center;margin:10px 0 6px;}
.lumi-footer__links a{font-size:12px;color:#6e6e73;text-decoration:none;}
.lumi-footer__links a:hover{text-decoration:underline;}
body.dark-mode .lumi-footer__links a{color:rgba(255,255,255,.35);}
.lumi-footer__copy{font-size:11px;color:#aeaeb2;margin-top:6px!important;}
body.dark-mode .lumi-footer__copy{color:rgba(255,255,255,.2);}

    <section class="actions" id="orderActions">

    <section class="order-cs" id="orderCsSection">

      <div class="cs-list" id="orderCsList"><p class="muted">관련 문의가 없어요.</p></div>
    </section>
