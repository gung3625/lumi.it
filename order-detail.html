<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>주문 상세 — 루미</title>
  <link rel="stylesheet" href="/css/sprint3.css" />
</head>
<body class="page-order-detail">
  <header class="topbar" role="banner">
    <a href="/orders" class="topbar__back" aria-label="뒤로">←</a>
    <h1 class="topbar__title">주문 상세</h1>
    <span></span>
  </header>

  <main class="page-main">
    <section class="order-summary" id="orderSummary">
      <div class="empty-state"><p>주문을 가져오는 중…</p></div>
    </section>

    <section class="tracking-stepper" id="trackingStepper" hidden>
      <h2>배송 진행</h2>
      <ol class="stepper" id="stepperList"></ol>
      <button class="btn btn--ghost btn--sm" type="button" id="refreshTrackingBtn">새로고침</button>
    </section>

    <section class="actions" id="orderActions">
      <button class="btn btn--primary" type="button" id="actionTrackingBtn">송장 입력</button>
      <button class="btn btn--ghost" type="button" id="actionReturnBtn">반품 처리</button>
    </section>

    <section class="order-cs" id="orderCsSection">
      <h2>관련 문의</h2>
      <div class="cs-list" id="orderCsList"><p class="muted">관련 문의가 없어요.</p></div>
    </section>
  </main>

  <script src="/js/sprint3-order-detail.js"></script>
</body>
</html>
