name: Apply Supabase migrations

# 트리거:
#   - main 에 supabase/migrations/ 변경이 머지되면 자동 적용
#   - workflow_dispatch — Actions 탭에서 수동 실행 (catch-up 용)
#
# 필요한 GitHub Secret (1개만):
#   SUPABASE_DB_URL — postgresql://postgres.{ref}:{password}@{host}:5432/postgres
#                     (Netlify env 의 동일 키 값을 그대로 복사)
#
# `supabase db push --db-url` 은 적용된 migration 은 다시 안 돌리는 idempotent 명령.
# DB URL 안에 비번이 포함되어 있어 access token / project ref 등 별도 인증 불필요.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::SUPABASE_DB_URL secret 미설정. Netlify env 의 동일 키 값을 GitHub Settings → Secrets and variables → Actions 에 등록하세요."
            exit 1
          fi

      - name: Push migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: supabase db push --include-all --db-url "$SUPABASE_DB_URL"

      - name: Summary
        if: always()
        run: |
          echo "### Supabase migration push 결과" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- conclusion: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
