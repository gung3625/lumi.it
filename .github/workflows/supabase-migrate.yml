name: Apply Supabase migrations

# 트리거:
#   - main 에 supabase/migrations/ 변경이 머지되면 자동 적용
#   - workflow_dispatch — Actions 탭에서 수동 실행 (누적 미적용분 일괄 처리, 신규 secret 등록 직후 catch-up 용)
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — https://supabase.com/dashboard/account/tokens 에서 발급
#   SUPABASE_DB_PASSWORD  — Project Settings → Database → Connection string 의 비번
#   SUPABASE_PROJECT_ID   — Project Settings → General → Reference ID (예: abcdefghijklmnop)
#
# `supabase db push` 는 적용된 migration 은 다시 안 돌리는 idempotent 명령.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrate.yml'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD  }}
      SUPABASE_PROJECT_ID:   ${{ secrets.SUPABASE_PROJECT_ID   }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        run: |
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && { echo "::error::SUPABASE_ACCESS_TOKEN secret 미설정"; exit 1; } || true
          [ -z "$SUPABASE_DB_PASSWORD"  ] && { echo "::error::SUPABASE_DB_PASSWORD secret 미설정"; exit 1; } || true
          [ -z "$SUPABASE_PROJECT_ID"   ] && { echo "::error::SUPABASE_PROJECT_ID secret 미설정"; exit 1; } || true

      - name: Link to remote project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        run: supabase db push --include-all

      - name: Summary
        if: always()
        run: |
          echo "### Supabase migration push 결과" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "프로젝트: \`$SUPABASE_PROJECT_ID\`" >> "$GITHUB_STEP_SUMMARY"
