<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="루미 — 요즘 뜨는 키워드">
  <title>트렌드 · 루미</title>

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <meta name="view-transition" content="same-origin">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <script data-scroll-top-on-reload>if("scrollRestoration" in history)history.scrollRestoration="manual";window.scrollTo(0,0);window.addEventListener("DOMContentLoaded",function(){window.scrollTo(0,0)});</script>
  <link rel="stylesheet" href="/css/motion.css">
  <link rel="stylesheet" href="/css/legal.css">

  <script src="/assets/categories.js"></script>

  <style>
    body {
      padding-bottom: calc(env(safe-area-inset-bottom) + 56px);
    }

    /* 상단 헤더 */
    .topbar {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      padding: max(env(safe-area-inset-top), var(--space-2)) var(--space-4) 0;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      z-index: var(--z-sticky);
    }
    .topbar__icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      transition: transform var(--duration-snap) var(--ease-toss);
    }
    .topbar__icon:active { transform: scale(0.9); }
    .topbar__icon svg { width: 24px; height: 24px; stroke-width: 2; }
    .topbar__title {
      font-size: var(--text-body-lg);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-tight);
    }

    /* 본문 */
    .wrap {
      padding: var(--space-5) var(--space-4) var(--space-12);
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--space-4);
    }
    .meta-cat {
      font-size: var(--text-headline);
      font-weight: var(--weight-bold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
    }
    .meta-time {
      font-size: var(--text-caption);
      color: var(--ink-muted);
    }

    /* 대분류 탭 (4개 균등) */
    .major-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-1);
      padding: var(--space-2) var(--space-4);
      position: sticky;
      top: 52px;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      z-index: var(--z-sticky);
    }
    .major-tab {
      padding: var(--space-2) 0;
      border-radius: var(--radius-md);
      background: transparent;
      border: none;
      font-size: var(--text-body);
      font-weight: var(--weight-medium);
      color: var(--ink-muted);
      letter-spacing: var(--tracking-snug);
      transition: color var(--duration-snap) var(--ease-toss);
      position: relative;
    }
    .major-tab:active { transform: scale(0.96); }
    .major-tab.is-active {
      color: var(--ink);
      font-weight: var(--weight-semibold);
    }
    .major-tab.is-active::after {
      content: '';
      position: absolute;
      left: 50%; bottom: -2px;
      width: 24px; height: 2px;
      background: var(--ink);
      transform: translateX(-50%);
      border-radius: var(--radius-pill);
    }

    /* 세부 카테고리 칩 (가로 스크롤) */
    .cat-tabs {
      display: flex;
      gap: var(--space-2);
      padding: 0 var(--space-4) var(--space-3);
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      position: sticky;
      top: calc(52px + 44px);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      padding-top: var(--space-3);
      z-index: calc(var(--z-sticky) - 1);
    }
    .cat-tabs {
      max-height: 80px;
      opacity: 1;
      transition:
        max-height var(--duration-base) var(--ease-soft),
        opacity   var(--duration-base) var(--ease-soft),
        padding   var(--duration-base) var(--ease-soft),
        border-color var(--duration-base) var(--ease-soft);
    }
    .cat-tabs.is-hidden {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-color: transparent;
      pointer-events: none;
      overflow: hidden;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex: 0 0 auto;
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-pill);
      background: transparent;
      border: 1px solid var(--line-strong);
      font-size: var(--text-body);
      font-weight: var(--weight-medium);
      color: var(--ink-soft);
      letter-spacing: var(--tracking-snug);
      transition:
        background var(--duration-snap) var(--ease-toss),
        color var(--duration-snap) var(--ease-toss),
        border-color var(--duration-snap) var(--ease-toss),
        transform var(--duration-snap) var(--ease-toss);
    }
    .cat-tab:active { transform: scale(0.96); }
    .cat-tab.is-active {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--neutral-0);
    }

    /* 키워드 리스트 */
    .kw-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .kw-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      transition:
        background var(--duration-snap) var(--ease-toss),
        transform var(--duration-snap) var(--ease-toss),
        border-color var(--duration-snap) var(--ease-toss);
      text-align: left;
    }
    .kw-item:active { transform: scale(0.98); }
    .kw-item:hover { background: var(--pink-50); border-color: var(--pink-300); }
    .kw-item__rank {
      font-size: var(--text-body);
      font-weight: var(--weight-bold);
      color: var(--ink-muted);
      min-width: 24px;
      letter-spacing: var(--tracking-tight);
    }
    .kw-item__text {
      flex: 1;
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      letter-spacing: var(--tracking-snug);
    }
    .kw-item__trend {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: var(--text-caption);
      color: var(--ink-muted);
    }
    .kw-item__trend--up   { color: #00a368; }
    .kw-item__trend--down { color: #c8507a; }
    .kw-item__trend svg { width: 14px; height: 14px; stroke-width: 2.5; }

    /* 신호 메타 배지 (NEW · 급등 등) */
    .kw-item__badges {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .kw-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: var(--radius-pill);
      font-size: 10px;
      font-weight: var(--weight-bold);
      letter-spacing: 0.02em;
      line-height: 1.4;
      white-space: nowrap;
    }
    .kw-badge--new { background: #fff0f5; color: #c8507a; }
    .kw-badge--hot { background: #fff4e8; color: #c2410c; }
    /* 약신호 (signalTier=weak) — 카드 살짝 흐리게 */
    .kw-item--weak .kw-item__text { color: var(--ink-soft); }
    .kw-item--weak .kw-item__rank { opacity: 0.6; }

    /* 빈 / 로딩 안내 */
    .state {
      padding: var(--space-12) var(--space-4);
      text-align: center;
      color: var(--ink-muted);
      font-size: var(--text-body);
    }

    /* === Bottom Sheet (AI 해석) === */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--duration-fast) var(--ease-soft);
      z-index: var(--z-overlay);
    }
    .sheet-backdrop.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 85dvh;
      background: var(--bg);
      border-top-left-radius: var(--radius-2xl);
      border-top-right-radius: var(--radius-2xl);
      box-shadow: var(--shadow-xl);
      transform: translateY(100%);
      transition: transform var(--duration-base) var(--ease-toss);
      overflow-y: auto;
      z-index: var(--z-modal);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .sheet.is-open { transform: translateY(0); }

    .sheet__handle {
      display: flex;
      justify-content: center;
      padding: var(--space-3) 0 var(--space-1);
    }
    .sheet__handle::before {
      content: "";
      width: 36px;
      height: 4px;
      border-radius: var(--radius-pill);
      background: var(--neutral-300);
    }

    .sheet__head {
      padding: var(--space-3) var(--space-5) var(--space-4);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
      border-bottom: 1px solid var(--line);
    }
    .sheet__title {
      flex: 1;
      font-size: var(--text-headline);
      font-weight: var(--weight-bold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
      line-height: var(--leading-tight);
      word-break: keep-all;
    }
    .sheet__close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--bg-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-soft);
      flex-shrink: 0;
    }
    .sheet__close svg { width: 18px; height: 18px; stroke-width: 2; }

    .sheet__body {
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }
    .sheet__section { display: flex; flex-direction: column; gap: var(--space-2); }
    .sheet__label {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--pink-500);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .sheet__text {
      font-size: var(--text-body-lg);
      line-height: var(--leading-relaxed);
      color: var(--ink);
    }
    .sheet__list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .sheet__list li {
      padding: var(--space-3);
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      font-size: var(--text-body);
      color: var(--ink);
      line-height: var(--leading-snug);
    }
    .sheet__chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    .sheet__chip {
      padding: var(--space-2) var(--space-3);
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-pill);
      font-size: var(--text-body);
      color: var(--ink-soft);
    }

    /* sheet 안 v2 메타 섹션 — 수집 시 모은 신호 (narrative / origin / sources / saturation) */
    .sheet__meta-line {
      font-size: var(--text-caption);
      color: var(--ink-muted);
      line-height: var(--leading-snug);
    }
    .sheet__source-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
    }
    .sheet__source-chip {
      padding: 2px 8px;
      background: var(--bg-soft);
      border-radius: var(--radius-pill);
      font-size: 11px;
      color: var(--ink-soft);
    }
    .sheet__source-chip strong { color: var(--ink); margin-left: 3px; }
    .sheet__divider {
      height: 1px;
      background: var(--line);
      margin: var(--space-2) 0;
    }

    /* 하단 탭바 (대시보드와 동일) */
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: grid;
      grid-template-columns: 1fr 1fr auto 1fr 1fr;
      align-items: center;
      padding:
        var(--space-2)
        var(--space-3)
        calc(env(safe-area-inset-bottom) + var(--space-2));
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid var(--line);
      z-index: var(--z-sticky);
    }
    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: var(--space-2) var(--space-1);
      font-size: var(--text-label);
      font-weight: var(--weight-medium);
      color: var(--ink-muted);
      transition: color var(--duration-snap) var(--ease-toss), transform var(--duration-snap) var(--ease-toss);
    }
    .tab:active { transform: scale(0.94); }
    .tab.is-active { color: var(--ink); }
    .tab.is-active svg { stroke-width: 2.5; }
    .tab svg { width: 22px; height: 22px; stroke-width: 2; }

    .tab-add {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-2xl);
      background: var(--gradient-signature);
      box-shadow: var(--shadow-glow);
      color: var(--neutral-0);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--duration-snap) var(--ease-toss), box-shadow var(--duration-fast) var(--ease-toss);
    }
    .tab-add:active { transform: scale(0.94); box-shadow: var(--shadow-glow-sm); }
    .tab-add svg { width: 28px; height: 28px; stroke-width: 2.5; }

    @media (prefers-reduced-motion: reduce) {
      .sheet, .sheet-backdrop, .kw-item { transition: none; }
    }
  </style>
</head>
<body>

  <!-- 상단 -->
  <header class="topbar" role="banner">
    <a class="topbar__icon" href="/dashboard" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

      </svg>
    </a>
    <span class="topbar__title">요즘 뜨는 키워드</span>
    <span class="topbar__icon" aria-hidden="true"></span>
  </header>

  <!-- 대분류 탭 (5개) — JS에서 동적 렌더. 소분류는 사용하지 않음 (그룹 내 모든 sub 키워드를 머지 표시). -->
  <nav class="major-tabs" data-major-tabs aria-label="대분류"></nav>

  <main class="wrap" role="main">

        <div>서울특별시 용산구 회나무로 32-7 04345</div>
        <div>문의 <a href="mailto:lumi@lumi.it.kr" style="color:inherit;">lumi@lumi.it.kr</a> · <a href="tel:010-6424-6284" style="color:inherit;">010-6424-6284</a></div>
      </div>
      <div class="app-footer__copy">© 2026 lumi.it.kr</div>
    </footer>
  </main>

  <!-- 하단 탭바 -->
  <nav class="tabbar" aria-label="메뉴">
    <a class="tab" href="/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12L12 3l9 9M5 10v11h14V10"/>

    </a>
    <a class="tab is-active" href="/trends" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

  <!-- Bottom sheet — AI 해석 -->
  <div class="sheet-backdrop" data-sheet-backdrop></div>
  <div class="sheet" data-sheet role="dialog" aria-modal="true" aria-labelledby="sheet-title">
    <div class="sheet__handle" aria-hidden="true"></div>
    <header class="sheet__head">
      <h2 class="sheet__title" id="sheet-title" data-sheet-title>키워드</h2>
      <button class="sheet__close" type="button" data-sheet-close aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </header>
    <div class="sheet__body" data-sheet-body>
      <div class="state" data-sheet-loading>잠시만요…</div>
    </div>
  </div>

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt');
      const authHeaders = token ? { Authorization: 'Bearer ' + token } : {};

      const listEl = document.querySelector('[data-kw-list]');
      const stateEl = document.querySelector('[data-state]');
      const catLabel = document.querySelector('[data-cat-label]');
      const catTime = document.querySelector('[data-cat-time]');
      const majorTabsEl = document.querySelector('[data-major-tabs]');
      const sheet = document.querySelector('[data-sheet]');
      const backdrop = document.querySelector('[data-sheet-backdrop]');
      const sheetTitle = document.querySelector('[data-sheet-title]');
      const sheetBody = document.querySelector('[data-sheet-body]');

      const C = window.LumiCategories;
      // 트렌드 페이지에서 그룹 머지 시 제외할 sub (categories.js 전역 정의는 유지)
      const HIDDEN_CATS = new Set(['pet']);
      function visibleSubs(group) {
        return (group && group.subs) ? group.subs.filter(s => !HIDDEN_CATS.has(s.id)) : [];
      }
      // 트렌드는 대분류 단위로만 표시 — 소분류 칩 없음.
      // currentCategory 는 keyword-detail 호출용 fallback sub id (sheet 클릭 시 각 item.sourceSub 우선).
      let currentMajor = C.findMajorBySub(C.defaultSub).id;
      let currentCategory = (visibleSubs(C.findGroup(currentMajor))[0] || { id: C.defaultSub }).id;
      // 마지막으로 렌더한 키워드 객체들 — sheet 클릭 시 v2 메타 즉시 표시용
      let lastItems = [];

      function fmtTime(iso) {
        if (!iso) return '';
        try {
          const t = new Date(iso);
          return `${t.getMonth() + 1}/${t.getDate()} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')} 갱신`;
        } catch { return ''; }
      }

      // 대분류 5탭 렌더 — 소분류 칩은 없음 (그룹 안 모든 sub 키워드 머지 표시)
      function renderMajorTabs() {
        majorTabsEl.innerHTML = C.MAJOR_GROUPS.map(g =>
          `<button class="major-tab${g.id === currentMajor ? ' is-active' : ''}" type="button" data-major="${g.id}">${g.label}</button>`
        ).join('');
        majorTabsEl.querySelectorAll('.major-tab').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.major;
            if (!id || id === currentMajor) return;
            currentMajor = id;
            const group = C.findGroup(id);
            const visible = visibleSubs(group);
            // currentCategory 는 sheet 의 keyword-detail 호출용 fallback sub id
            currentCategory = (visible[0] || group.subs[0]).id;
            renderMajorTabs();
            stateEl.textContent = '키워드를 가져오는 중…';
            listEl.innerHTML = '<li class="state" data-state>키워드를 가져오는 중…</li>';
            loadTrends();
          });
        });
      }

      // 사장님 매장 카테고리 결정 (실패 시 기본 그룹 유지). sub → 대분류 자동 도출.
      async function detectCategory() {
        try {
          const res = await fetch('/api/me', { headers: authHeaders });
          if (!res.ok) return;
          const data = await res.json();
          // /api/me 는 sellers.industry 를 그대로 반환 (data.seller.industry).
          const cat =
            (data.seller && (data.seller.industry || data.seller.category)) ||
            data.category ||
            (data.user && data.user.category);
          if (cat) {
            const sub = String(cat).toLowerCase();
            // 대분류만 도출 — currentCategory(fallback sub) 도 visible sub 으로 갱신.
            if (C.SUB_TO_MAJOR[sub]) {
              currentMajor = C.SUB_TO_MAJOR[sub];
              const grp = C.findGroup(currentMajor);
              const visible = visibleSubs(grp);
              currentCategory = (visible.find(s => s.id === sub) || visible[0] || { id: sub }).id;
            }
          }
        } catch {}
      }

      // 그룹 안 모든 visible sub 를 parallel fetch 후 키워드 머지.
      // 같은 키워드가 여러 sub 에 있으면 sourceRank 작은 쪽 우선 + isNew/velocityPct 보존.
      // 정렬: isNew > velocityPct desc > sourceRank asc.
      async function fetchGroupTrends(group) {
        const subs = visibleSubs(group);
        if (subs.length === 0) return { items: [], categoryLabel: group.label, updatedAt: null };
        const settled = await Promise.allSettled(
          subs.map(s => fetch(`/api/get-trends?category=${encodeURIComponent(s.id)}`).then(r => r.ok ? r.json() : null).then(d => ({ sub: s, data: d })))
        );
        const merged = new Map();
        let latestUpdatedAt = null;
        for (const r of settled) {
          if (r.status !== 'fulfilled' || !r.value || !r.value.data) continue;
          const { sub, data } = r.value;
          if (data.updatedAt && (!latestUpdatedAt || data.updatedAt > latestUpdatedAt)) latestUpdatedAt = data.updatedAt;
          const arr = Array.isArray(data.keywords) ? data.keywords : [];
          arr.forEach((kw, idx) => {
            const key = (kw.keyword || '').trim();
            if (!key) return;
            const prev = merged.get(key);
            // sourceSub 보존 — sheet 클릭 시 keyword-detail 의 category 파라미터로 사용
            if (!prev || idx < prev.sourceRank) {
              merged.set(key, { ...kw, sourceSub: sub.id, sourceRank: idx });
            } else {
              // 다른 sub 에서 같은 키워드 isNew/velocity 가 더 강하면 메타만 보강
              const v = typeof kw.velocityPct === 'number' ? kw.velocityPct : -Infinity;
              const pv = typeof prev.velocityPct === 'number' ? prev.velocityPct : -Infinity;
              if (kw.isNew && !prev.isNew) prev.isNew = true;
              if (v > pv) prev.velocityPct = kw.velocityPct;
            }
          });
        }
        const sorted = Array.from(merged.values()).sort((a, b) => {
          if (!!a.isNew !== !!b.isNew) return a.isNew ? -1 : 1;
          const va = typeof a.velocityPct === 'number' ? a.velocityPct : 0;
          const vb = typeof b.velocityPct === 'number' ? b.velocityPct : 0;
          if (va !== vb) return vb - va;
          return a.sourceRank - b.sourceRank;
        });
        return { items: sorted, categoryLabel: group.label, updatedAt: latestUpdatedAt };
      }

      async function loadTrends() {
        try {
          const group = C.findGroup(currentMajor);
          const data = await fetchGroupTrends(group);
          if (catLabel) catLabel.textContent = data.categoryLabel || '트렌드';
          if (catTime) catTime.textContent = fmtTime(data.updatedAt);
          const items = (data.items || []).slice(0, 30);
          lastItems = items;
          if (items.length === 0) {
            stateEl.textContent = '아직 수집된 키워드가 없어요.';
            return;
          }
          listEl.innerHTML = items.map((item, idx) => {
            const rank = idx + 1;
            const kw = item.keyword || '';
            const trend = item.trend || '';
            const trendClass = trend === 'up' ? ' kw-item__trend--up' : trend === 'down' ? ' kw-item__trend--down' : '';
            const trendIcon = trend === 'up'
              ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 9 12 3 6 9"/><line x1="12" y1="3" x2="12" y2="21"/></svg>'
              : trend === 'down'
              ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 21 18 15"/><line x1="12" y1="3" x2="12" y2="21"/></svg>'
              : '';
            // v2 신호 메타 배지: NEW (신규 등장) · 🔥 급등 (velocity ≥ 50%)
            const isNew = item.isNew === true;
            const velocity = typeof item.velocityPct === 'number' ? item.velocityPct : null;
            const isHot = velocity !== null && velocity >= 50;
            const isWeak = item.signalTier === 'weak';
            const badges = [];
            if (isNew) badges.push('<span class="kw-badge kw-badge--new">NEW</span>');
            if (isHot) badges.push(`<span class="kw-badge kw-badge--hot">🔥 +${Math.round(velocity)}%</span>`);
            const badgeHtml = badges.length ? `<span class="kw-item__badges">${badges.join('')}</span>` : '';
            const itemClass = 'kw-item' + (isWeak ? ' kw-item--weak' : '');
            return `
              <li>
                <button class="${itemClass}" type="button" data-kw="${encodeURIComponent(kw)}">
                  <span class="kw-item__rank">${rank}</span>
                  <span class="kw-item__text">${kw}</span>
                  ${badgeHtml}
                  <span class="kw-item__trend${trendClass}">${trendIcon}</span>
                </button>
              </li>
            `;
          }).join('');

          // 클릭 핸들러 — idx 기반으로 lastItems 객체 전달
          listEl.querySelectorAll('.kw-item').forEach((btn, idx) => {
            btn.addEventListener('click', () => {
              const item = lastItems[idx] || { keyword: decodeURIComponent(btn.dataset.kw) };
              openSheet(item);
            });
          });

          // ?q=KEYWORD 자동 펼치기 — lastItems 에서 일치 검색, 없으면 minimal
          const params = new URLSearchParams(location.search);
          const q = params.get('q');
          if (q) {
            const found = lastItems.find(i => i.keyword === q) || { keyword: q };
            openSheet(found);
          }
        } catch (e) {
          stateEl.textContent = '키워드를 가져오지 못했어요.';
        }
      }

      // sheet 안 v2 메타(narrative/origin/sources/saturation) — 수집 시점에 cron 이 모은 신호.
      // keyword-detail 의 GPT 즉석 해석 도착 전에 즉시 보여줌.
      function renderV2MetaSection(item) {
        if (!item) return '';
        const blocks = [];

        // 1) cron 이 추출 시 GPT 가 만든 한줄 요약 (narrative) + 출처 단서 (origin)
        if (item.narrative || item.origin) {
          const lines = [];
          if (item.narrative) lines.push(`<p class="sheet__text">${item.narrative}</p>`);
          if (item.origin)    lines.push(`<p class="sheet__meta-line">${item.origin}</p>`);
          blocks.push(`
            <div class="sheet__section">
              <div class="sheet__label">루미 수집 메모</div>
              ${lines.join('')}
            </div>
          `);
        }

        // 2) 어디서 발견됐나 — sources 분포 (네이버/블로그/유튜브/인스타/구글/뉴스/커뮤니티)
        const SOURCE_LABELS = {
          naver: '네이버', datalab: '네이버', blog: '블로그',
          youtube: '유튜브', yt: '유튜브', ytKR: '유튜브',
          ig: '인스타', insta: '인스타', google: '구글',
          news: '뉴스', community: '커뮤니티',
        };
        if (item.sources && typeof item.sources === 'object') {
          const chips = Object.entries(item.sources)
            .filter(([, count]) => Number(count) > 0)
            .sort(([, a], [, b]) => Number(b) - Number(a))
            .map(([key, count]) =>
              `<span class="sheet__source-chip">${SOURCE_LABELS[key] || key}<strong>${count}</strong></span>`
            );
          if (chips.length) {
            blocks.push(`
              <div class="sheet__section">
                <div class="sheet__label">어디서 봤나요</div>
                <div class="sheet__source-chips">${chips.join('')}</div>
              </div>
            `);
          }
        }

        // 3) 신호 강도 — saturationLevel / signalTier / 사용자 피드백
        const signals = [];
        if (item.signalTier === 'real') signals.push('확실 신호 (2개 이상 소스에서 발견)');
        if (item.signalTier === 'weak') signals.push('약한 신호 (1개 소스만)');
        if (item.saturationLevel === 'low')    signals.push('포화도 낮음 (덜 흔함)');
        if (item.saturationLevel === 'high')   signals.push('포화도 높음 (이미 흔함)');
        if (typeof item.likes === 'number'    && item.likes > 0)    signals.push(`👍 ${item.likes}`);
        if (typeof item.dislikes === 'number' && item.dislikes > 0) signals.push(`👎 ${item.dislikes}`);
        if (signals.length) {
          blocks.push(`
            <div class="sheet__section">
              <div class="sheet__label">신호</div>
              <p class="sheet__meta-line">${signals.join(' · ')}</p>
            </div>
          `);
        }

        if (!blocks.length) return '';
        return blocks.join('') + '<div class="sheet__divider"></div>';
      }

      function openSheet(item) {
        // 호환: 옛 호출이 keyword 문자열만 넘기면 객체로 감싸기
        if (typeof item === 'string') item = { keyword: item };
        const keyword = item.keyword || '';
        // 머지 결과 item 에 sourceSub 있으면 우선 — keyword-detail 의 category 파라미터로 사용
        const cat = item.sourceSub || currentCategory;
        sheetTitle.textContent = '#' + keyword;
        const metaHtml = renderV2MetaSection(item);
        sheetBody.innerHTML = metaHtml + '<div class="state" data-detail-loading>잠시만요…</div>';
        backdrop.classList.add('is-open');
        sheet.classList.add('is-open');
        document.body.style.overflow = 'hidden';
        loadDetail(keyword, metaHtml, cat);
      }

      function closeSheet() {
        backdrop.classList.remove('is-open');
        sheet.classList.remove('is-open');
        document.body.style.overflow = '';
      }

      backdrop.addEventListener('click', closeSheet);
      document.querySelector('[data-sheet-close]')?.addEventListener('click', closeSheet);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

      async function loadDetail(keyword, metaHtml = '', cat) {
        try {
          const useCat = cat || currentCategory;
          const url = `/api/keyword-detail?keyword=${encodeURIComponent(keyword)}&category=${encodeURIComponent(useCat)}`;
          const res = await fetch(url);
          const json = await res.json();
          if (!json.ok || !json.data) {
            sheetBody.innerHTML = metaHtml + '<div class="state">해석을 가져오지 못했어요.</div>';
            return;
          }
          const d = json.data;
          const sections = [];
          if (d.definition) {
            sections.push(`
              <div class="sheet__section">
                <div class="sheet__label">키워드</div>
                <p class="sheet__text">${d.definition}</p>
              </div>
            `);
          }
          if (d.audience) {
            sections.push(`
              <div class="sheet__section">
                <div class="sheet__label">누가 쓰나요</div>
                <p class="sheet__text">${d.audience}</p>
              </div>
            `);
          }
          if (d.why) {
            sections.push(`
              <div class="sheet__section">
                <div class="sheet__label">왜 뜨나요</div>
                <p class="sheet__text">${d.why}</p>
              </div>
            `);
          }
          if (Array.isArray(d.ideas) && d.ideas.length > 0) {
            sections.push(`
              <div class="sheet__section">
                <div class="sheet__label">활용 아이디어</div>
                <ul class="sheet__list">
                  ${d.ideas.map(i => `<li>${i}</li>`).join('')}
                </ul>
              </div>
            `);
          }
          if (Array.isArray(d.hashtags) && d.hashtags.length > 0) {
            sections.push(`
              <div class="sheet__section">
                <div class="sheet__label">관련 해시태그</div>
                <div class="sheet__chips">
                  ${d.hashtags.map(h => `<span class="sheet__chip">#${String(h).replace(/^#/, '')}</span>`).join('')}
                </div>
              </div>
            `);
          }
          const detailHtml = sections.join('') || '<div class="state">해석이 비어 있어요.</div>';
          sheetBody.innerHTML = metaHtml + detailHtml;
        } catch {
          sheetBody.innerHTML = metaHtml + '<div class="state">해석을 가져오지 못했어요.</div>';
        }
      }

      // 시작
      (async () => {
        await detectCategory();
        renderMajorTabs();
        await loadTrends();
      })();
    })();
  </script>
</body>
</html>
