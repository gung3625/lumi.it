<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:320px;font-family:-apple-system,'Malgun Gothic',sans-serif;background:#fff;color:#1a1613;padding:18px}
  .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1px;color:#C8507A;border:1px solid #C8507A;border-radius:999px;padding:3px 10px;margin-bottom:12px}
  h1{font-size:16px;font-weight:800;line-height:1.35;margin-bottom:6px}
  p.desc{font-size:12px;color:#8c8279;line-height:1.5;margin-bottom:16px}
  .btn{width:100%;background:#C8507A;color:#fff;border:none;border-radius:980px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  #msg{font-size:12.5px;color:#5b5249;margin-top:12px;line-height:1.5;text-align:center;min-height:18px}
  .preview{margin-top:12px;display:none}
  .preview img{width:100%;border-radius:8px;border:1px solid #e9e3d9}
  .preview .pt{font-size:12px;font-weight:600;margin:8px 0 4px}
  .preview .ptt{font-size:11.5px;color:#8c8279;line-height:1.4}
</style>
</head>
<body>
  <div class="badge">LUMI · AI 상세페이지</div>
  <h1>이 상품으로<br>상세페이지 만들기</h1>
  <p class="desc">지금 보고 있는 쇼핑몰 상품 페이지에서 제목·사진을 읽어 AI가 화보·카피·디자인을 만들어 드립니다.</p>
  <button class="btn" id="go">상세페이지 만들기</button>
  <div id="msg"></div>
  <div class="preview" id="preview">
    <img id="thumb">
    <div class="pt" id="ptitle"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
