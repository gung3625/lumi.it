    <script type="module" crossorigin src="./assets/index-BzX4D-bO.js"></script>

    <script>
      (function() {
        var ALLOWED = ['gung3625@gmail.com'];
        var stored = localStorage.getItem('lumi_office_email');
        if (stored && ALLOWED.indexOf(stored) !== -1) return;
        var email = prompt('Lumi Office 접근 인증\n관리자 이메일을 입력하세요:');
        if (!email || ALLOWED.indexOf(email.trim().toLowerCase()) === -1) {
          document.documentElement.innerHTML = '<body style="background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif"><h1>접근 권한이 없습니다</h1></body>';
          throw new Error('Unauthorized');
        }
        localStorage.setItem('lumi_office_email', email.trim().toLowerCase());
      })();
    </script>
    <script>
      (function() {
        var WS_URL = 'ws://127.0.0.1:7743';
        var ws;
        var layoutReady = false;
        function sendReady() {
          if (ws && ws.readyState === 1 && layoutReady) {
            ws.send(JSON.stringify({ type: 'ready' }));
          }
        }
        window.addEventListener('message', function(e) {
          if (e.data && e.data.type === 'layoutLoaded') {
            layoutReady = true;
            sendReady();
          }
        });
        function connect() {
          try { ws = new WebSocket(WS_URL); } catch(e) { setTimeout(connect, 3000); return; }
          ws.onopen = function() { document.title = 'Lumi Office — 연결됨'; sendReady(); };
          ws.onmessage = function(e) {
            try { window.dispatchEvent(new MessageEvent('message', { data: JSON.parse(e.data) })); } catch(err) {}
          };
          ws.onclose = function() { document.title = 'Lumi Office — 연결 끊김'; setTimeout(connect, 3000); };
          ws.onerror = function() { try { ws.close(); } catch(e) {} };
        }
        connect();
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
