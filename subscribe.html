<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>구독 시작 — lumi</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <style>
html::-webkit-scrollbar,body::-webkit-scrollbar,*::-webkit-scrollbar{display:none;}html,body,*{scrollbar-width:none;}
        :root {
            --pink: #C8507A; --pink-light: #D4758F; --pink-soft: rgba(200,80,122,.15);
            --pink-pale: rgba(200,80,122,.08); --pink-ultra: rgba(200,80,122,.04);
            --g900: #ffffff; --g700: rgba(255,255,255,.8); --g500: rgba(255,255,255,.5);
            --g400: rgba(255,255,255,.4); --g200: rgba(255,255,255,.08); --g100: rgba(255,255,255,.06); --g50: #000000;
            --white: rgba(255,255,255,.04);
            --ease: cubic-bezier(0.16,1,0.3,1);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;word-break:keep-all;}
        body{font-family:'Pretendard Variable','Noto Sans KR',sans-serif;background:var(--g50);color:var(--g700);min-height:100vh;}
        nav{position:sticky;top:0;background:rgba(0,0,0,.8);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(255,255,255,.08);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:center;z-index:100;}
        .nav-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:900px;}
        .nav-logo-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;text-decoration:none;}
        .nav-logo{height:44px;width:44px;object-fit:cover;border-radius:50%;}
        .nav-logo-txt{font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-.5px;}
        .nav-back{font-size:14px;font-weight:600;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s;}
        .nav-back:hover{color:#ffffff;}
        .page{max-width:560px;margin:0 auto;padding:48px 24px 100px;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        .page-title{font-size:1.6rem;font-weight:900;color:var(--g900);letter-spacing:-.03em;margin-bottom:6px;animation:fadeUp .5s var(--ease);}
        .page-sub{font-size:.88rem;color:var(--g400);margin-bottom:32px;animation:fadeUp .5s var(--ease) .05s both;}

        /* 플랜 카드 */
        .plan-card{background:var(--white);border-radius:20px;border:2px solid var(--pink);padding:28px 24px;margin-bottom:16px;position:relative;box-shadow:0 8px 32px rgba(200,80,122,.12);animation:fadeUp .5s var(--ease) .1s both;}
        .plan-badge{position:absolute;top:-12px;left:20px;background:var(--pink);color:#fff;font-size:11px;font-weight:800;padding:4px 14px;border-radius:99px;}
        .plan-name{font-size:.85rem;font-weight:700;color:var(--g500);margin-bottom:8px;}
        .plan-price{display:flex;align-items:baseline;gap:4px;margin-bottom:4px;}
        .plan-price-orig{font-size:.9rem;color:var(--g400);text-decoration:line-through;margin-right:6px;}
        .plan-price-num{font-size:2.4rem;font-weight:900;color:var(--g900);letter-spacing:-.04em;line-height:1;}
        .plan-price-unit{font-size:.9rem;color:var(--g400);}
        .plan-price-tag{font-size:.75rem;color:var(--pink);font-weight:700;margin-bottom:16px;}
        .plan-divider{height:1px;background:var(--g100);margin:16px 0;}
        .plan-features{display:flex;flex-direction:column;gap:8px;}
        .plan-feat{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--g700);}
        .feat-check{width:18px;height:18px;border-radius:50%;background:var(--pink-pale);color:var(--pink);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-weight:900;}
        .plan-options{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;animation:fadeUp .5s var(--ease) .1s both;}
        .plan-option{background:rgba(255,255,255,.04);border-radius:16px;border:1px solid rgba(255,255,255,.08);padding:20px 16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
        .plan-option:hover{border-color:rgba(255,255,255,.15);}
        .plan-option.selected{border-color:#C8507A;background:rgba(200,80,122,.08);box-shadow:none;}
        .plan-opt-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#C8507A;color:#fff;font-size:11px;font-weight:800;padding:2px 12px;border-radius:99px;white-space:nowrap;}
        .plan-opt-badge.best{background:#ffffff;color:#000000;}
        .plan-opt-name{font-size:.85rem;font-weight:700;color:var(--g500);margin-bottom:8px;}
        .plan-opt-num{font-size:1.5rem;font-weight:900;color:var(--g900);letter-spacing:-.03em;}
        .plan-opt-unit{font-size:.75rem;color:var(--g400);margin-left:2px;}
        .plan-opt-per{font-size:.72rem;color:var(--pink);font-weight:700;margin-top:6px;}
        .plan-features-common{background:var(--white);border-radius:16px;padding:20px 24px;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;border:1.5px solid var(--g100);}
        @media(max-width:480px){.plan-options{grid-template-columns:1fr;}.plan-opt-num{font-size:1.3rem;}}

        /* 결제 수단 */
        .section-title{font-size:.8rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);margin-bottom:12px;margin-top:28px;}
        .pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
        .pay-method{padding:14px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(255,255,255,.04);font-size:.85rem;font-weight:700;color:var(--g700);cursor:pointer;text-align:center;transition:all .2s;}
        .pay-method:hover{border-color:rgba(255,255,255,.15);}
        .pay-method.active{border-color:#C8507A;background:rgba(200,80,122,.08);color:#C8507A;}
        .pay-method-icon{font-size:1.2rem;margin-bottom:4px;}

        /* 약관 동의 */
        .agree-wrap{background:rgba(255,255,255,.04);border-radius:14px;padding:18px 20px;margin-top:16px;border:1px solid rgba(255,255,255,.08);animation:fadeUp .5s var(--ease) .2s both;}
        .agree-all{display:flex;align-items:center;gap:10px;cursor:pointer;padding-bottom:12px;border-bottom:1px solid var(--g100);margin-bottom:12px;}
        .agree-all span{font-size:.9rem;font-weight:800;color:var(--g900);}
        .agree-items{display:flex;flex-direction:column;gap:8px;}
        .agree-item{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.83rem;color:var(--g700);}
        .agree-item a{color:var(--pink);font-weight:700;text-decoration:underline;}
        input[type=checkbox]{accent-color:var(--pink);width:20px;height:20px;flex-shrink:0;cursor:pointer;}
        .agree-all input[type=checkbox]{width:22px;height:22px;}
        .agree-item,.agree-all{min-height:44px;}

        /* 무료체험 안내 */
        .trial-banner{background:rgba(200,80,122,.06);border:1px solid rgba(200,80,122,.12);border-radius:14px;padding:16px 20px;margin-top:16px;display:flex;align-items:center;gap:14px;animation:fadeUp .5s var(--ease) .15s both;}
        .trial-icon{font-size:1.8rem;flex-shrink:0;}
        .trial-title{font-size:.88rem;font-weight:800;color:var(--g900);margin-bottom:2px;}
        .trial-desc{font-size:.78rem;color:var(--g500);line-height:1.6;}

        /* CTA 버튼 */
        .cta-wrap{margin-top:24px;animation:fadeUp .5s var(--ease) .25s both;}
        .btn-pay{width:100%;padding:16px;border:none;background:#C8507A;color:#fff;font-size:16px;font-weight:800;border-radius:980px;cursor:pointer;font-family:inherit;transition:all .25s var(--ease);box-shadow:0 6px 24px rgba(200,80,122,.3);letter-spacing:-.01em;}
        .btn-pay:hover{background:var(--pink-light);transform:translateY(-2px);box-shadow:0 10px 32px rgba(200,80,122,.4);}
        .btn-pay:active{transform:scale(.98);}
        .btn-pay:disabled{background:var(--g200);color:var(--g400);box-shadow:none;transform:none;cursor:not-allowed;}
        .cta-note{text-align:center;font-size:.75rem;color:var(--g400);margin-top:10px;line-height:1.6;}

        /* 에러/성공 */
        .field-err{font-size:12px;font-weight:600;color:#E53E3E;margin:6px 0 0 4px;}
        .toast{position:fixed;bottom:calc(32px + env(safe-area-inset-bottom, 0px));left:50%;transform:translateX(-50%) translateY(16px);background:rgba(255,255,255,.1);color:#fff;padding:12px 24px;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .35s var(--ease);pointer-events:none;white-space:nowrap;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .toast.pink{background:var(--pink);}
    </style>
</head>
<body>
<nav>
    <div class="nav-inner">
    <a href="/" class="nav-logo-wrap"><img src="/assets/logo.png" class="nav-logo" alt="lumi"><span class="nav-logo-txt">lumi</span></a>
    <a href="/" class="nav-back">← 홈으로</a>
    </div>
</nav>

<div class="page">
    <h1 class="page-title">구독 시작하기</h1>
    <p class="page-sub">우리 매장에 맞는 플랜을 선택하세요.</p>

    <!-- 플랜 선택 -->
    <div class="plan-options">
        <div class="plan-option" data-plan="basic" onclick="selectPlan(this)">
            <p class="plan-opt-name">베이직</p>
            <div class="plan-opt-price"><span class="plan-opt-num">19,000</span><span class="plan-opt-unit">원/월</span></div>
        </div>
        <div class="plan-option selected" data-plan="standard" onclick="selectPlan(this)">
            <div class="plan-opt-badge">추천</div>
            <p class="plan-opt-name">스탠다드</p>
            <div class="plan-opt-price"><span class="plan-opt-num">29,000</span><span class="plan-opt-unit">원/월</span></div>
        </div>
        <div class="plan-option" data-plan="pro" onclick="selectPlan(this)">
            <p class="plan-opt-name">프로</p>
            <div class="plan-opt-price"><span class="plan-opt-num">39,000</span><span class="plan-opt-unit">원/월</span></div>
        </div>
    </div>
    <div id="plan-features" class="plan-features-common"></div>

    <!-- 갱신 알림 배너 -->
    <div class="trial-banner">
        <div class="trial-icon"><i data-lucide="gift" style="width:28px;height:28px;color:var(--pink);"></i></div>
        <div>
            <div class="trial-title">만료 전 갱신 알림</div>
            <div class="trial-desc">플랜 만료 7일 전에 이메일로 알려드려요.<br>자동 결제 없이, 원할 때만 갱신하세요.</div>
        </div>
    </div>

    <!-- 결제 수단 -->
    <div class="section-title">결제 수단</div>
    <div class="pay-methods">
        <div class="pay-method active" data-method="CARD" onclick="selectMethod(this)">
            <div class="pay-method-icon"><i data-lucide="credit-card" style="width:20px;height:20px;"></i></div>신용/체크카드
        </div>
        <div class="pay-method" data-method="EASY_PAY" onclick="selectMethod(this)">
            <div class="pay-method-icon"><i data-lucide="smartphone" style="width:20px;height:20px;"></i></div>간편결제
        </div>
    </div>

    <!-- 약관 동의 -->
    <div class="agree-wrap">
        <label class="agree-all">
            <input type="checkbox" id="agree-all" onchange="toggleAll(this.checked)">
            <span>전체 동의하기</span>
        </label>
        <div class="agree-items">
            <label class="agree-item">
                <input type="checkbox" id="agree-terms" onchange="syncAll()">
                <span>(필수) <a href="/terms" target="_blank">이용약관</a> 동의</span>
            </label>
            <label class="agree-item">
                <input type="checkbox" id="agree-privacy" onchange="syncAll()">
                <span>(필수) <a href="/privacy" target="_blank">개인정보 처리방침</a> 동의</span>
            </label>
            <label class="agree-item">
                <input type="checkbox" id="agree-pay" onchange="syncAll()">
                <span>(필수) 유료 서비스 이용 및 <a href="/terms#refund" target="_blank">환불 정책</a> 동의</span>
            </label>
        </div>
        <div id="agree-err" class="field-err" style="display:none;">필수 항목에 모두 동의해 주세요.</div>
    </div>

    <!-- CTA -->
    <div class="cta-wrap">
        <button class="btn-pay" id="pay-btn" onclick="startPayment()">lumi 스탠다드 결제하기</button>
        <p class="cta-note">일시불 결제 · 31일간 이용 · 자동 갱신 없음</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let selectedMethod = 'CARD';
    let selectedPlan = 'standard';
    const PLAN_DATA = {
        basic:    { amount: 19000, name: 'lumi 베이직', features: ['캡션 주 3개 생성','해시태그 자동 생성','바로 게시'] },
        standard: { amount: 29000, name: 'lumi 스탠다드', features: ['무제한 캡션 생성','해시태그 자동 생성','예약 게시','날씨·행사 반영 캡션','1:1 말투 학습','사진 최대 10장'] },
        pro:      { amount: 39000, name: 'lumi 프로', features: ['무제한 캡션 생성','해시태그 자동 생성','예약 게시','날씨·행사 반영 캡션','1:1 말투 학습','사진 최대 10장','캘린더 관리','트렌드 분석','최적 시간 자동 게시','스토리 캡션','링크 페이지'] }
    };

    function renderFeatures(plan) {
        const box = document.getElementById('plan-features');
        box.innerHTML = PLAN_DATA[plan].features.map(f => `<div class="plan-feat"><div class="feat-check">✓</div>${f}</div>`).join('');
    }

    function selectPlan(el) {
        document.querySelectorAll('.plan-option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selectedPlan = el.dataset.plan;
        const p = PLAN_DATA[selectedPlan];
        document.getElementById('pay-btn').textContent = p.name + ' 결제하기';
        document.querySelector('.cta-note').innerHTML = '일시불 결제 · 31일간 이용 · 자동 갱신 없음';
        renderFeatures(selectedPlan);
    }

    // URL 파라미터로 플랜 선택
    (function() {
        const params = new URLSearchParams(window.location.search);
        const planParam = params.get('plan');
        if (planParam && PLAN_DATA[planParam]) {
            selectedPlan = planParam;
            document.querySelectorAll('.plan-option').forEach(o => {
                o.classList.toggle('selected', o.dataset.plan === planParam);
            });
            const p = PLAN_DATA[planParam];
            document.getElementById('pay-btn').textContent = p.name + ' 결제하기';
        }
        renderFeatures(selectedPlan);
    })();

    function selectMethod(el) {
        document.querySelectorAll('.pay-method').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
        selectedMethod = el.dataset.method;
    }

    function toggleAll(checked) {
        ['agree-terms','agree-privacy','agree-pay'].forEach(id => {
            document.getElementById(id).checked = checked;
        });
        document.getElementById('agree-err').style.display = 'none';
    }

    function syncAll() {
        const all = ['agree-terms','agree-privacy','agree-pay'].every(id => document.getElementById(id).checked);
        document.getElementById('agree-all').checked = all;
        document.getElementById('agree-err').style.display = 'none';
    }

    function showToast(msg, type='') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show' + (type ? ' ' + type : '');
        setTimeout(() => t.className = 'toast', 3000);
    }

    async function startPayment() {
        // 약관 검증
        const terms = document.getElementById('agree-terms').checked;
        const privacy = document.getElementById('agree-privacy').checked;
        const pay = document.getElementById('agree-pay').checked;
        if (!terms || !privacy || !pay) {
            document.getElementById('agree-err').style.display = 'block';
            document.getElementById('agree-err').scrollIntoView({behavior:'smooth', block:'center'});
            return;
        }

        // 로그인 확인
        const token = localStorage.getItem('lumi_token');
        if (!token) {
            showToast('로그인이 필요해요.', '');
            setTimeout(() => window.location.href = '/', 1500);
            return;
        }

        const btn = document.getElementById('pay-btn');
        btn.disabled = true;
        btn.textContent = '결제 준비 중...';

        try {
            // 결제 준비 (orderId 발급)
            const prepRes = await fetch('/.netlify/functions/payment-prepare', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ planType: selectedPlan })
            });
            const prepData = await prepRes.json();
            if (!prepRes.ok) throw new Error(prepData.error || '결제 준비 실패');

            // 포트원 결제창 호출
            if (typeof PortOne === 'undefined') throw new Error('결제 모듈을 불러오지 못했어요. 페이지를 새로고침해 주세요.');
            const response = await PortOne.requestPayment({
                storeId: 'store-23f87009-a63a-4e6e-831e-a89ea9145102',
                channelKey: 'channel-key-80e3e34a-9fe6-4bdb-8011-7504f6fb10f7',
                paymentId: prepData.orderId,
                orderName: PLAN_DATA[selectedPlan].name,
                totalAmount: PLAN_DATA[selectedPlan].amount,
                currency: 'KRW',
                payMethod: selectedMethod,
                customer: { fullName: prepData.name || '고객', email: prepData.email || '' },
            });

            if (response.code) throw new Error(response.message || '결제 취소');

            // 결제 확인
            const confirmRes = await fetch('/.netlify/functions/payment-confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ paymentId: response.paymentId, orderId: prepData.orderId })
            });
            const confirmData = await confirmRes.json();
            if (!confirmRes.ok) throw new Error(confirmData.error || '결제 확인 실패');

            showToast('구독이 시작됐어요! 🎉', 'pink');
            setTimeout(() => window.location.href = '/', 2000);

        } catch(e) {
            showToast(e.message || '결제 중 오류가 발생했어요.', '');
            btn.disabled = false;
            btn.textContent = PLAN_DATA[selectedPlan].name + ' 결제하기';
        }
    }
</script>
<script>if(typeof lucide!=='undefined')lucide.createIcons();</script>
</body>
</html>
