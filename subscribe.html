<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>구독 시작 — lumi</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <style>
html::-webkit-scrollbar,body::-webkit-scrollbar,*::-webkit-scrollbar{display:none;}html,body,*{scrollbar-width:none;}
        :root{
          --pink:#C8507A;--accent:#C8507A;
          --bg:#000000;--surface-2:#272729;--surface-3:#28282a;
          --text:#f5f5f7;--text-80:rgba(255,255,255,.8);--text-48:rgba(255,255,255,.48);
          --nav-bg:rgba(0,0,0,.88);
          --light-bg:#f5f5f7;--light-text:#1d1d1f;
          --shadow-card:rgba(0,0,0,.5) 3px 5px 30px 0px;
          --r-full:980px;--ease:cubic-bezier(0.16,1,0.3,1);
        }
        *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;word-break:keep-all;}
        body{font-family:'Pretendard Variable','Pretendard',-apple-system,sans-serif;background:#000000;color:var(--text-80);min-height:100vh;font-size:17px;font-weight:400;line-height:1.47;letter-spacing:-0.374px;}
        /* NAV */
        nav{position:sticky;top:0;z-index:100;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 32px;height:48px;background:var(--nav-bg);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);}
        .nav-logo-wrap{display:flex;align-items:center;gap:8px;text-decoration:none;justify-content:flex-start;}
        .nav-logo{height:24px;width:24px;object-fit:cover;border-radius:50%;}
        .nav-logo-txt{font-size:15px;font-weight:600;color:#f5f5f7;letter-spacing:-0.28px;}
        .nav-back{font-size:12px;font-weight:400;color:rgba(255,255,255,.7);text-decoration:none;transition:color .15s;justify-self:end;}
        .nav-back:hover{color:#f5f5f7;}
        .page{max-width:560px;margin:0 auto;padding:48px 24px 100px;}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
        /* 타이포 — Apple 스펙 */
        .page-title{font-size:40px;font-weight:600;line-height:1.10;letter-spacing:-0.28px;color:#f5f5f7;margin-bottom:6px;animation:fadeUp .5s var(--ease);}
        .page-sub{font-size:17px;font-weight:400;letter-spacing:-0.374px;color:rgba(255,255,255,.48);margin-bottom:32px;animation:fadeUp .5s var(--ease) .05s both;}
        /* 플랜 옵션 — 다크 카드 #272729 */
        .plan-options{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;animation:fadeUp .5s var(--ease) .1s both;}
        .plan-option{background:var(--surface-2);border-radius:8px;padding:20px 16px;text-align:center;cursor:pointer;transition:box-shadow .2s;position:relative;}
        .plan-option:hover{box-shadow:var(--shadow-card);}
        .plan-option.selected{box-shadow:0 0 0 2px var(--accent);}
        .plan-opt-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;font-size:11px;font-weight:600;padding:2px 12px;border-radius:var(--r-full);white-space:nowrap;}
        .plan-opt-name{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.48);margin-bottom:8px;}
        .plan-opt-num{font-size:28px;font-weight:400;letter-spacing:0.196px;color:#f5f5f7;line-height:1.14;}
        .plan-opt-unit{font-size:12px;font-weight:400;letter-spacing:-0.12px;color:rgba(255,255,255,.48);}
        .plan-features-common{background:var(--surface-2);border-radius:8px;padding:20px 24px;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
        .plan-feat{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:400;letter-spacing:-0.224px;color:rgba(255,255,255,.7);}
        .feat-check{color:var(--accent);font-weight:600;}
        @media(max-width:480px){.plan-options{grid-template-columns:1fr;}.plan-opt-num{font-size:1.3rem;}}
        /* 결제 수단 */
        .section-title{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:rgba(255,255,255,.48);margin-bottom:12px;margin-top:28px;}
        .pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
        .pay-method{padding:14px;border-radius:8px;background:var(--surface-2);font-size:14px;font-weight:400;letter-spacing:-0.224px;color:rgba(255,255,255,.7);cursor:pointer;text-align:center;transition:box-shadow .2s;}
        .pay-method:hover{box-shadow:var(--shadow-card);}
        .pay-method.active{box-shadow:0 0 0 2px var(--accent);color:var(--accent);}
        .pay-method-icon{margin-bottom:4px;}
        /* 약관 동의 */
        .agree-wrap{background:var(--surface-2);border-radius:8px;padding:18px 20px;margin-top:16px;animation:fadeUp .5s var(--ease) .2s both;}
        .agree-all{display:flex;align-items:center;gap:10px;cursor:pointer;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:12px;}
        .agree-all span{font-size:17px;font-weight:600;letter-spacing:-0.374px;color:#f5f5f7;}
        .agree-items{display:flex;flex-direction:column;gap:8px;}
        .agree-item{display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;font-weight:400;letter-spacing:-0.224px;color:rgba(255,255,255,.7);}
        .agree-item a{color:var(--accent);text-decoration:underline;}
        input[type=checkbox]{accent-color:var(--accent);width:20px;height:20px;flex-shrink:0;cursor:pointer;}
        .agree-all input[type=checkbox]{width:22px;height:22px;}
        .agree-item,.agree-all{min-height:44px;}
        /* 갱신 배너 */
        .trial-banner{background:rgba(200,80,122,.08);border-radius:8px;padding:16px 20px;margin-top:16px;display:flex;align-items:center;gap:14px;animation:fadeUp .5s var(--ease) .15s both;}
        .trial-title{font-size:17px;font-weight:600;letter-spacing:-0.374px;color:#f5f5f7;margin-bottom:2px;}
        .trial-desc{font-size:14px;font-weight:400;letter-spacing:-0.224px;color:rgba(255,255,255,.7);line-height:1.43;}
        /* CTA 버튼 — Apple pill 스펙 */
        .cta-wrap{margin-top:24px;animation:fadeUp .5s var(--ease) .25s both;}
        .btn-pay{width:100%;padding:8px 22px;border:none;background:var(--accent);color:#fff;font-size:17px;font-weight:400;letter-spacing:-0.374px;border-radius:var(--r-full);cursor:pointer;font-family:inherit;transition:opacity .15s;}
        .btn-pay:hover{opacity:.88;}
        .btn-pay:disabled{background:rgba(255,255,255,.12);color:rgba(255,255,255,.3);cursor:not-allowed;opacity:1;}
        .cta-note{text-align:center;font-size:12px;font-weight:400;letter-spacing:-0.12px;color:rgba(255,255,255,.48);margin-top:10px;}
        /* 에러/성공 */
        .field-err{font-size:12px;font-weight:600;color:#ff453a;margin:6px 0 0 4px;}
        .toast{position:fixed;bottom:calc(32px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(16px);background:rgba(255,255,255,.1);color:#fff;padding:10px 22px;border-radius:var(--r-full);font-size:14px;font-weight:400;letter-spacing:-0.224px;z-index:9999;opacity:0;transition:all .3s var(--ease);pointer-events:none;backdrop-filter:blur(12px);}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
        .toast.pink{background:var(--accent);}
        /* ── 라이트모드 ── */
        body:not(.dark-mode){background:#f5f5f7;color:rgba(0,0,0,.8);}
        body:not(.dark-mode) nav{background:rgba(255,255,255,.88)!important;border-bottom:1px solid rgba(0,0,0,.08);}
        body:not(.dark-mode) .nav-logo-txt{color:#1d1d1f;}
        body:not(.dark-mode) .nav-back{color:rgba(0,0,0,.5);}
        body:not(.dark-mode) .nav-back:hover{color:#1d1d1f;}
        body:not(.dark-mode) .page-title{color:#1d1d1f;}
        body:not(.dark-mode) .page-sub{color:rgba(0,0,0,.48);}
        body:not(.dark-mode) .plan-option{background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06);}
        body:not(.dark-mode) .plan-option.selected{box-shadow:0 0 0 2px var(--accent);}
        body:not(.dark-mode) .plan-opt-name{color:rgba(0,0,0,.48);}
        body:not(.dark-mode) .plan-opt-num{color:#1d1d1f;}
        body:not(.dark-mode) .plan-opt-unit{color:rgba(0,0,0,.48);}
        body:not(.dark-mode) .plan-features-common{background:#fff;}
        body:not(.dark-mode) .plan-feat{color:rgba(0,0,0,.7);}
        body:not(.dark-mode) .section-title{color:rgba(0,0,0,.48);}
        body:not(.dark-mode) .pay-method{background:#fff;color:rgba(0,0,0,.7);}
        body:not(.dark-mode) .agree-wrap{background:#fff;}
        body:not(.dark-mode) .agree-all span{color:#1d1d1f;}
        body:not(.dark-mode) .agree-all{border-bottom-color:rgba(0,0,0,.08);}
        body:not(.dark-mode) .agree-item{color:rgba(0,0,0,.7);}
        body:not(.dark-mode) .trial-banner{background:rgba(200,80,122,.06);}
        body:not(.dark-mode) .trial-title{color:#1d1d1f;}
        body:not(.dark-mode) .trial-desc{color:rgba(0,0,0,.6);}
        body:not(.dark-mode) .btn-pay:disabled{background:rgba(0,0,0,.06);color:rgba(0,0,0,.3);}
        body:not(.dark-mode) .cta-note{color:rgba(0,0,0,.48);}
        body:not(.dark-mode) .toast{background:rgba(0,0,0,.8);}
        .dark-toggle-fab{position:fixed;right:16px;bottom:calc(20px + env(safe-area-inset-bottom,0px));z-index:9999;width:48px;height:48px;border-radius:50%;border:none;background:#191F28;color:#fff;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;transition:all .3s;-webkit-tap-highlight-color:transparent;}
        .dark-toggle-fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(0,0,0,.3);}
        .dark-toggle-fab:active{transform:scale(.95);}
        body:not(.dark-mode) .dark-toggle-fab{background:#fff;color:#191F28;box-shadow:0 4px 16px rgba(0,0,0,.1);}
    </style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo-wrap">
    <img src="/assets/logo.png" class="nav-logo" alt="lumi">
    <span class="nav-logo-txt">lumi</span>
  </a>
  <span></span>
  <a href="/" class="nav-back">← 홈으로</a>
</nav>

<div class="page">
    <h1 class="page-title">구독 시작하기</h1>
    <p class="page-sub">우리 매장에 맞는 플랜을 선택하세요.</p>

    <!-- 플랜 선택 -->
    <div class="plan-options">
        <div class="plan-option" data-plan="basic" onclick="selectPlan(this)">
            <p class="plan-opt-name">베이직</p>
            <div class="plan-opt-price"><span class="plan-opt-num">19,000</span><span class="plan-opt-unit">원/월</span></div>
        </div>
        <div class="plan-option selected" data-plan="standard" onclick="selectPlan(this)">
            <div class="plan-opt-badge">가장 많이 선택</div>
            <p class="plan-opt-name">스탠다드</p>
            <div class="plan-opt-price"><span class="plan-opt-num">29,000</span><span class="plan-opt-unit">원/월</span></div>
        </div>
        <div class="plan-option" data-plan="pro" onclick="selectPlan(this)">
            <p class="plan-opt-name">프로</p>
            <div class="plan-opt-price"><span class="plan-opt-num">39,000</span><span class="plan-opt-unit">원/월</span></div>
        </div>
    </div>
    <div id="plan-features" class="plan-features-common"></div>

    <!-- 갱신 알림 배너 -->
    <div class="trial-banner">
        <div class="trial-icon"><i data-lucide="gift" style="width:28px;height:28px;color:var(--pink);"></i></div>
        <div>
            <div class="trial-title">만료 전 갱신 알림</div>
            <div class="trial-desc">플랜 만료 7일 전에 이메일로 알려드려요.<br>자동 결제 없이, 원할 때만 갱신하세요.</div>
        </div>
    </div>

    <!-- 결제 수단 -->
    <div class="section-title">결제 수단</div>
    <div class="pay-methods">
        <div class="pay-method active" data-method="CARD" onclick="selectMethod(this)">
            <div class="pay-method-icon"><i data-lucide="credit-card" style="width:20px;height:20px;"></i></div>신용/체크카드
        </div>
        <div class="pay-method" data-method="EASY_PAY" onclick="selectMethod(this)">
            <div class="pay-method-icon"><i data-lucide="smartphone" style="width:20px;height:20px;"></i></div>간편결제
        </div>
    </div>

    <!-- 약관 동의 -->
    <div class="agree-wrap">
        <label class="agree-all">
            <input type="checkbox" id="agree-all" onchange="toggleAll(this.checked)">
            <span>전체 동의하기</span>
        </label>
        <div class="agree-items">
            <label class="agree-item">
                <input type="checkbox" id="agree-terms" onchange="syncAll()">
                <span>(필수) <a href="/terms" target="_blank">이용약관</a> 동의</span>
            </label>
            <label class="agree-item">
                <input type="checkbox" id="agree-privacy" onchange="syncAll()">
                <span>(필수) <a href="/privacy" target="_blank">개인정보 처리방침</a> 동의</span>
            </label>
            <label class="agree-item">
                <input type="checkbox" id="agree-pay" onchange="syncAll()">
                <span>(필수) 유료 서비스 이용 및 <a href="/terms#refund" target="_blank">환불 정책</a> 동의</span>
            </label>
        </div>
        <div id="agree-err" class="field-err" style="display:none;">필수 항목에 모두 동의해 주세요.</div>
    </div>

    <!-- CTA -->
    <div class="cta-wrap">
        <button class="btn-pay" id="pay-btn" onclick="startPayment()">lumi 스탠다드 결제하기</button>
        <p class="cta-note">일시불 결제 · 31일간 이용 · 자동 갱신 없음</p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    let selectedMethod = 'CARD';
    let selectedPlan = 'standard';
    const PLAN_DATA = {
        basic: {
            amount: 19000, name: 'lumi 베이직',
            target: '막 시작하는 사장님께',
            features: [
                ['캡션 주 3개 생성', '매주 3번, AI가 캡션을 써드려요'],
                ['해시태그 자동 생성', '업종·지역 맞춤 해시태그 자동 추천'],
                ['바로 게시', '캡션 확인 후 인스타에 바로 올려요']
            ]
        },
        standard: {
            amount: 29000, name: 'lumi 스탠다드',
            target: '꾸준히 올리고 싶은 사장님께',
            badge: '가장 많이 선택하는 플랜',
            features: [
                ['무제한 캡션 생성', '하루에 몇 개든 제한 없이'],
                ['해시태그 자동 생성', '대형+중형+소형+트렌드+지역 믹스'],
                ['예약 게시', '원하는 시간에 자동으로 올려요'],
                ['날씨·트렌드 반영 캡션', '오늘 날씨·실시간 트렌드가 캡션에 녹아요'],
                ['1:1 말투 학습', '피드백할수록 우리 매장 말투에 가까워져요'],
                ['사진 최대 10장', '여러 장 사진도 한 번에 분석']
            ]
        },
        pro: {
            amount: 39000, name: 'lumi 프로',
            target: '인스타를 본격적으로 굴리는 사장님께',
            features: [
                ['스탠다드 전체 포함', '무제한 캡션 + 예약 게시 + 말투 학습'],
                ['7일 콘텐츠 캘린더', '이번 주 뭘 올릴지 AI가 계획해줘요'],
                ['트렌드 분석', '우리 업종 인기 키워드를 매일 알려줘요'],
                ['최적 시간 자동 게시', '팔로워가 가장 활발한 시간에 맞춰요'],
                ['스토리 캡션', '피드 게시 시 스토리도 자동으로'],
                ['링크 페이지', '인스타 프로필 링크 페이지 제공']
            ]
        }
    };

    function renderFeatures(plan) {
        const box = document.getElementById('plan-features');
        const d = PLAN_DATA[plan];
        let html = `<div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:10px;">${d.target}</div>`;
        html += d.features.map(([title, desc]) =>
            `<div class="plan-feat"><div class="feat-check">✓</div><div><span style="font-weight:600;color:${document.body.classList.contains('dark-mode')?'#f5f5f7':'#1d1d1f'}">${title}</span><br><span style="font-size:12px;color:${document.body.classList.contains('dark-mode')?'rgba(255,255,255,.48)':'rgba(0,0,0,.48)'}">${desc}</span></div></div>`
        ).join('');
        box.innerHTML = html;
    }

    function selectPlan(el) {
        document.querySelectorAll('.plan-option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selectedPlan = el.dataset.plan;
        const p = PLAN_DATA[selectedPlan];
        document.getElementById('pay-btn').textContent = p.name + ' 결제하기';
        document.querySelector('.cta-note').innerHTML = '일시불 결제 · 31일간 이용 · 자동 갱신 없음';
        renderFeatures(selectedPlan);
    }

    // URL 파라미터로 플랜 선택
    (function() {
        const params = new URLSearchParams(window.location.search);
        const planParam = params.get('plan');
        if (planParam && PLAN_DATA[planParam]) {
            selectedPlan = planParam;
            document.querySelectorAll('.plan-option').forEach(o => {
                o.classList.toggle('selected', o.dataset.plan === planParam);
            });
            const p = PLAN_DATA[planParam];
            document.getElementById('pay-btn').textContent = p.name + ' 결제하기';
        }
        renderFeatures(selectedPlan);
    })();

    function selectMethod(el) {
        document.querySelectorAll('.pay-method').forEach(m => m.classList.remove('active'));
        el.classList.add('active');
        selectedMethod = el.dataset.method;
    }

    function toggleAll(checked) {
        ['agree-terms','agree-privacy','agree-pay'].forEach(id => {
            document.getElementById(id).checked = checked;
        });
        document.getElementById('agree-err').style.display = 'none';
    }

    function syncAll() {
        const all = ['agree-terms','agree-privacy','agree-pay'].every(id => document.getElementById(id).checked);
        document.getElementById('agree-all').checked = all;
        document.getElementById('agree-err').style.display = 'none';
    }

    function showToast(msg, type='') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show' + (type ? ' ' + type : '');
        setTimeout(() => t.className = 'toast', 3000);
    }

    async function startPayment() {
        // 약관 검증
        const terms = document.getElementById('agree-terms').checked;
        const privacy = document.getElementById('agree-privacy').checked;
        const pay = document.getElementById('agree-pay').checked;
        if (!terms || !privacy || !pay) {
            document.getElementById('agree-err').style.display = 'block';
            document.getElementById('agree-err').scrollIntoView({behavior:'smooth', block:'center'});
            return;
        }

        // 로그인 확인
        const token = localStorage.getItem('lumi_token');
        if (!token) {
            showToast('로그인이 필요해요.', '');
            setTimeout(() => window.location.href = '/', 1500);
            return;
        }

        const btn = document.getElementById('pay-btn');
        btn.disabled = true;
        btn.textContent = '결제 준비 중...';

        try {
            // 결제 준비 (orderId 발급)
            const prepRes = await fetch('/.netlify/functions/payment-prepare', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ planType: selectedPlan })
            });
            const prepData = await prepRes.json();
            if (!prepRes.ok) throw new Error(prepData.error || '결제 준비 실패');

            // 포트원 결제창 호출
            if (typeof PortOne === 'undefined') throw new Error('결제 모듈을 불러오지 못했어요. 페이지를 새로고침해 주세요.');
            const response = await PortOne.requestPayment({
                storeId: 'store-23f87009-a63a-4e6e-831e-a89ea9145102',
                channelKey: 'channel-key-80e3e34a-9fe6-4bdb-8011-7504f6fb10f7',
                paymentId: prepData.orderId,
                orderName: PLAN_DATA[selectedPlan].name,
                totalAmount: PLAN_DATA[selectedPlan].amount,
                currency: 'KRW',
                payMethod: selectedMethod,
                customer: { fullName: prepData.name || '고객', email: prepData.email || '' },
            });

            if (response.code) throw new Error(response.message || '결제 취소');

            // 결제 확인
            const confirmRes = await fetch('/.netlify/functions/payment-confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ paymentId: response.paymentId, orderId: prepData.orderId })
            });
            const confirmData = await confirmRes.json();
            if (!confirmRes.ok) throw new Error(confirmData.error || '결제 확인 실패');

            showToast('구독이 시작됐어요! 🎉', 'pink');
            setTimeout(() => window.location.href = '/', 2000);

        } catch(e) {
            showToast(e.message || '결제 중 오류가 발생했어요.', '');
            btn.disabled = false;
            btn.textContent = PLAN_DATA[selectedPlan].name + ' 결제하기';
        }
    }
</script>
<script>if(typeof lucide!=='undefined')lucide.createIcons();</script>
<button class="dark-toggle-fab" id="dark-toggle-fab" onclick="toggleDarkMode(!document.body.classList.contains('dark-mode'))" aria-label="다크모드 전환">☀️</button>
<script>
if(localStorage.getItem('lumi_dark_mode')!=='0')document.body.classList.add('dark-mode');
function toggleDarkMode(on){document.body.classList.toggle('dark-mode',on);localStorage.setItem('lumi_dark_mode',on?'1':'0');var f=document.getElementById('dark-toggle-fab');if(f)f.textContent=on?'☀️':'🌙';}
(function(){var f=document.getElementById('dark-toggle-fab');if(f&&document.body.classList.contains('dark-mode'))f.textContent='☀️';else if(f)f.textContent='🌙';})();
</script>
