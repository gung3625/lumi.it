<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="index, follow">
  <title>링크 페이지 | lumi</title>
  <style>
html::-webkit-scrollbar,body::-webkit-scrollbar,*::-webkit-scrollbar{display:none;}html,body,*{scrollbar-width:none;}
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #FF2D8A;
      --pink-light: #FADCE6;
      --g900: #191F28;
      --g600: #555;
      --g400: #999;
      --g100: #f5f5f5;
    }
    body.dark-mode{
      --g900:#F2F4F6;--g700:#D1D5DB;--g500:#9CA3AF;--g400:#6B7684;
      --g200:#2D3748;--g100:#1E2533;--g50:#151B26;--white:#1A202C;
      --pink-pale:#2D1F2B;--pink-ultra:#1F1923;--pink-soft:#3D2536;
    }
    body.dark-mode nav{background:rgba(26,32,44,.94)!important;border-bottom-color:var(--g200)!important;}
    body.dark-mode .toast{background:var(--g200);color:var(--g700);}
    body.dark-mode input,body.dark-mode select,body.dark-mode textarea{background:var(--g100);border-color:var(--g200);color:var(--g900);}
    .dark-toggle-fab{position:fixed;right:16px;bottom:calc(24px + env(safe-area-inset-bottom, 0px));z-index:9999;width:44px;height:44px;border-radius:50%;border:none;background:#191F28;color:#fff;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;transition:all .3s;-webkit-tap-highlight-color:transparent;}
    .dark-toggle-fab:active{transform:scale(.95);}
    body.dark-mode .dark-toggle-fab{background:#fff;color:#191F28;box-shadow:0 4px 16px rgba(0,0,0,.15);}
    body {
      font-family: 'Pretendard Variable', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #fff0f6 0%, #f9f9ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }
    .container { width: 100%; max-width: 420px; }

    /* 프로필 */
    .profile { text-align: center; margin-bottom: 32px; }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), #ff9dc8);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 14px;
      box-shadow: 0 4px 20px rgba(255,45,138,.3);
    }
    .profile-name { font-size: 1.3rem; font-weight: 800; color: var(--g900); margin-bottom: 6px; }
    .profile-desc { font-size: .88rem; color: var(--g600); line-height: 1.6; margin-bottom: 10px; }
    .profile-meta {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; font-size: .78rem; color: var(--g400);
    }
    .profile-meta span { display: flex; align-items: center; gap: 4px; }

    /* 링크 버튼 */
    .links { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
    .link-btn {
      display: flex; align-items: center; gap: 14px;
      background: #fff; border: 1.5px solid rgba(255,45,138,.15);
      border-radius: 14px; padding: 16px 20px;
      text-decoration: none; color: var(--g900);
      font-size: .95rem; font-weight: 600;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      transition: all .2s;
    }
    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,45,138,.15);
      border-color: rgba(255,45,138,.4);
    }
    .link-btn .icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--pink-light); display: flex;
      align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .link-btn .label { flex: 1; }
    .link-btn .arrow { color: var(--g400); font-size: .85rem; }

    /* 인스타 최근 게시물 */
    .recent-section { margin-bottom: 32px; }
    .recent-title {
      font-size: .8rem; font-weight: 700; color: var(--g400);
      text-align: center; margin-bottom: 14px;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .recent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .recent-item {
      aspect-ratio: 1; border-radius: 10px;
      background: var(--g100); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .recent-item img { width: 100%; height: 100%; object-fit: cover; }
    .recent-placeholder { font-size: 1.5rem; color: var(--g400); }

    /* 푸터 */
    .footer {
      text-align: center;
      font-size: .75rem; color: var(--g400);
    }
    .footer a {
      color: var(--pink); text-decoration: none; font-weight: 700;
    }
    .footer img { height: 20px; vertical-align: middle; margin-bottom: 6px; }

    /* 에러/로딩 */
    .loading { text-align: center; padding: 60px 20px; color: var(--g400); }
    .error-page { text-align: center; padding: 60px 20px; }
    .error-page h2 { font-size: 1.2rem; color: var(--g900); margin-bottom: 8px; }
    .error-page p { font-size: .88rem; color: var(--g600); }
  </style>
</head>
<body>
<div class="container">
  <div id="loading" class="loading">불러오는 중...</div>
  <div id="content" style="display:none;">
    <div class="profile">
      <div class="profile-avatar" id="profile-avatar">🏪</div>
      <p class="profile-name" id="profile-name"></p>
      <p class="profile-desc" id="profile-desc"></p>
      <div class="profile-meta">
        <span id="profile-region"></span>
        <span id="profile-biz"></span>
      </div>
    </div>

    <div class="links" id="links-container"></div>

    <div class="recent-section" id="recent-section" style="display:none;">
      <p class="recent-title">최근 게시물</p>
      <div class="recent-grid" id="recent-grid"></div>
    </div>

    <div class="footer">
      <div><img src="/assets/logo.png" alt="lumi"></div>
      <p>이 페이지는 <a href="https://lumi.it.kr">lumi</a>로 만들어졌어요</p>
    </div>
  </div>
  <div id="error-page" class="error-page" style="display:none;">
    <h2>페이지를 찾을 수 없어요</h2>
    <p>링크가 잘못됐거나 삭제된 페이지예요.</p>
  </div>
</div>

<script>
const BIZ_MAP = {
  cafe:'☕ 카페', bakery:'🥐 베이커리', dessert:'🍰 디저트', juice:'🥤 주스',
  restaurant:'🍽️ 레스토랑', korean:'🍚 한식', chinese:'🥢 중식', japanese:'🍣 일식',
  western:'🍝 양식', fastfood:'🍔 분식', bar:'🍺 술집', chicken:'🍗 치킨',
  beauty:'💅 뷰티', hair:'💇 헤어', nail:'💅 네일', skincare:'✨ 피부관리',
  makeup:'💄 메이크업', massage:'🧘 마사지',
  fashion:'👗 패션', accessories:'💍 액세서리', flower:'💐 꽃집',
  pet:'🐾 반려동물', kids:'🧸 아동', interior:'🪑 인테리어',
  fitness:'💪 헬스', yoga:'🧘 요가', sports:'⚽ 스포츠', health:'💊 건강식품',
  photo:'📷 사진', art:'🎨 공방', music:'🎵 음악', travel:'✈️ 여행'
};

const STORE_ICONS = {
  cafe:'☕', bakery:'🥐', dessert:'🍰', beauty:'💅', hair:'💇',
  nail:'💅', restaurant:'🍽️', fashion:'👗', flower:'💐', pet:'🐾',
  fitness:'💪', yoga:'🧘', photo:'📷', art:'🎨'
};

async function loadPage() {
  // URL에서 인스타 아이디 추출 (/p/cafelumi 또는 ?id=cafelumi)
  const path = window.location.pathname;
  const match = path.match(/\/p\/([^/]+)/);
  const params = new URLSearchParams(window.location.search);
  const instaId = match ? match[1] : params.get('id');

  if (!instaId) {
    showError();
    return;
  }

  try {
    const res = await fetch(`/.netlify/functions/get-link-page?id=${encodeURIComponent(instaId)}`);
    if (!res.ok) { showError(); return; }
    const data = await res.json();

    // 메타태그 업데이트
    document.title = `${data.storeName} | lumi 링크`;

    // 프로필 렌더링
    const bizKey = data.bizCategory || 'cafe';
    const icon = STORE_ICONS[bizKey] || '🏪';
    document.getElementById('profile-avatar').textContent = icon;
    document.getElementById('profile-name').textContent = data.storeName || '';
    document.getElementById('profile-desc').textContent = data.storeDesc || '';

    if (data.region) {
      document.getElementById('profile-region').innerHTML = `📍 ${data.region}`;
    }
    if (data.bizCategory) {
      document.getElementById('profile-biz').innerHTML = BIZ_MAP[data.bizCategory] || data.bizCategory;
    }

    // 링크 버튼 렌더링
    const linksEl = document.getElementById('links-container');
    if (data.links && data.links.length > 0) {
      linksEl.innerHTML = data.links.map(link => `
        <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener" class="link-btn">
          <div class="icon">${link.icon || '🔗'}</div>
          <span class="label">${escapeHtml(link.label)}</span>
          <span class="arrow">›</span>
        </a>
      `).join('');
    } else {
      // 기본 링크 (인스타그램만)
      linksEl.innerHTML = `
        <a href="https://instagram.com/${escapeHtml(data.instagram)}" target="_blank" rel="noopener" class="link-btn">
          <div class="icon">📸</div>
          <span class="label">Instagram</span>
          <span class="arrow">›</span>
        </a>
      `;
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } catch(e) {
    showError();
  }
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-page').style.display = 'block';
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

loadPage();
</script>
<button class="dark-toggle-fab" id="dark-toggle-fab" onclick="toggleDarkMode(!document.body.classList.contains('dark-mode'))" aria-label="다크모드 전환">☀️</button>
<script>
if(localStorage.getItem('lumi_dark_mode')!=='0')document.body.classList.add('dark-mode');
function toggleDarkMode(on){document.body.classList.toggle('dark-mode',on);localStorage.setItem('lumi_dark_mode',on?'1':'0');var f=document.getElementById('dark-toggle-fab');if(f)f.textContent=on?'☀️':'🌙';}
(function(){var f=document.getElementById('dark-toggle-fab');if(f&&document.body.classList.contains('dark-mode'))f.textContent='☀️';})();
</script>
</body>
</html>
