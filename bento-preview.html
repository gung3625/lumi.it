/* ---- GRID: nevflynn.com CSS 통째 복사 ---- */

/* RGL base CSS (from nevflynn.com 0fe8871e.css) */
.react-grid-layout { position: relative; transition: height 0.2s; }
.react-grid-item { transition: left 0.2s, top; }
.react-grid-item img { pointer-events: none; user-select: none; }
.react-grid-item.cssTransforms { transition-property: transform; }
.react-grid-item.resizing { z-index: 1; will-change: width, height; }
.react-grid-item.react-draggable-dragging { transition: none; z-index: 3; will-change: transform; }
.react-grid-item.dropping { visibility: hidden; }
.react-grid-item.react-grid-placeholder { background: transparent; opacity: 0; transition-duration: 0.1s; z-index: 2; user-select: none; }
.react-grid-item > .react-resizable-handle { position: absolute; width: 20px; height: 20px; }
.react-resizable-hide > .react-resizable-handle { display: none; }

/* nevflynn styled-components: .gjQtXz (ItemGrab) */
.react-grid-item { overflow: hidden; border-radius: 32px; user-select: none; }
.react-grid-item:hover { cursor: grab; }
.react-grid-item:active { cursor: grabbing; }

/* nevflynn styled-components: .fubZvu (Item) */
.react-grid-item { transition: 0.25s; }
.react-grid-item:hover { box-shadow: rgba(100, 100, 111, 0.1) 0px 5px 24px 0px; }

/* nevflynn styled-components: .iXylth (Grid container) — THIS IS THE KEY */
.grid-wrap { max-width: 1200px; position: relative; margin: -16px auto 0; padding-bottom: 80px; }
.grid-wrap .react-grid-item { transition: 500ms; will-change: transform; }
.grid-wrap .react-grid-item.react-draggable-dragging { transition: none; }
.grid-wrap .react-grid-item.react-grid-placeholder { opacity: 0.3; background: rgba(200,200,200,.3) !important; border-radius: 32px !important; }

@media (max-width: 1200px) { .grid-wrap { max-width: 800px; } }
@media (max-width: 799px) { .grid-wrap { max-width: 375px; } }
@media (max-width: 374px) { .grid-wrap { max-width: 320px; } }

/* RESIZE HANDLE */
.react-grid-item > .react-resizable-handle {

.react-resizable-hide > .react-resizable-handle { display:none !important; }

/* UPLOAD CARD */
.upload-wrap { display:flex; align-items:center; width:100%; height:100%; position:relative; }

/* 루미 후광 효과 */
.lumi-aura {
  position:absolute; top:50%; left:50%;
  width:200px; height:200px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,107,139,.6) 0%, rgba(221,160,221,.4) 40%, transparent 70%);
  filter:blur(8px);
  animation: auraPulse 2.5s ease-in-out infinite;

}

  100% { transform:translate(-50%,-50%) scale(.8); opacity:.4; }

/* LUMI CAPTION DEMO ANIMATION */
.caption-demo { position:absolute; inset:0; overflow:hidden; }
.demo-scene {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; opacity:0; padding:24px;
}
.demo-scene:nth-child(1) { animation: scenePlay 18s infinite 0s; }
.demo-scene:nth-child(2) { animation: scenePlay 18s infinite 3s; }
.demo-scene:nth-child(3) { animation: scenePlay 18s infinite 6s; }
.demo-scene:nth-child(4) { animation: scenePlay 18s infinite 9s; }
.demo-scene:nth-child(5) { animation: scenePlay 18s infinite 12s; }
.demo-scene:nth-child(6) { animation: scenePlay 18s infinite 15s; }
@keyframes scenePlay {
  0% { opacity:0; transform:translateY(16px); }
  3% { opacity:1; transform:translateY(0); }
  14% { opacity:1; transform:translateY(0); }
  18% { opacity:0; transform:translateY(-16px); }
  100% { opacity:0; }
}

/* scene 1: photo upload — 사진 드롭 애니메이션 */
.demo-scene.scene-photo {
  background: linear-gradient(135deg,#a8e6cf 0%,#88d8b0 50%,#dcedc1 100%);
}
.demo-photo-drop {
  width: 80%; aspect-ratio: 3/4; border-radius: 16px; overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
  animation: photoDrop 18s infinite;
}
.demo-photo-drop img { width:100%; height:100%; object-fit:cover; }
body.dark-mode .demo-photo-drop img { filter: grayscale(1) brightness(.8); }
@keyframes photoDrop {
  0% { opacity:0; transform:scale(1.15); }
  2.5% { opacity:1; transform:scale(1); }
  14% { opacity:1; transform:scale(1); }
  18% { opacity:0; }
  100% { opacity:0; }
}

/* scene 2: scanning — 카드 전체에 스캔 효과 */
.demo-scene.scene-scan {
  background: linear-gradient(135deg,#a8e6cf 0%,#88d8b0 50%,#dcedc1 100%);
}
.demo-scan-line {
  position:absolute; left:0; right:0; height:4px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.95) 50%, transparent 100%);
  box-shadow: 0 0 20px 6px rgba(255,255,255,.5);
  animation: scanMove 1.8s ease-in-out infinite;
}
@keyframes scanMove { 0%{top:5%} 50%{top:90%} 100%{top:5%} }
.demo-scan-dots {
  position:absolute; bottom:20%; left:0; right:0; display:flex; justify-content:center; gap:8px;
}
.demo-scan-dot {
  width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.7);
  animation: dotPulse 1.2s ease-in-out infinite;
}
.demo-scan-dot:nth-child(2) { animation-delay:.2s; }
.demo-scan-dot:nth-child(3) { animation-delay:.4s; }
@keyframes dotPulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.3)} }

/* scene 3: caption typing */
.demo-caption-text {
  font-size:18px; color:#fff; text-align:center; line-height:1.8;
  max-width:90%; text-shadow: 0 1px 8px rgba(0,0,0,.1);
  word-break:keep-all;
  letter-spacing:-.2px;
}
.demo-typing::after {
  content:'|'; animation: blink .6s steps(2) infinite; margin-left:2px;
  color:rgba(255,255,255,.7);
}
@keyframes blink { 0%{opacity:1} 100%{opacity:0} }

/* scene 4: hashtags */
.demo-tags {
  display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:90%; padding:0 8px;
}
.demo-tag {
  font-size:15px; color:#fff; background:rgba(255,255,255,.22); padding:8px 18px;
  border-radius:20px; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  font-weight:500; animation: tagPop .5s cubic-bezier(.34,1.56,.64,1) backwards;
}
.demo-tag:nth-child(1) { animation-delay:0s; }
.demo-tag:nth-child(2) { animation-delay:.12s; }
.demo-tag:nth-child(3) { animation-delay:.24s; }
.demo-tag:nth-child(4) { animation-delay:.36s; }
.demo-tag:nth-child(5) { animation-delay:.48s; }
@keyframes tagPop { 0%{opacity:0;transform:scale(.4) translateY(10px)} 100%{opacity:1;transform:scale(1) translateY(0)} }

/* scene 5: done */
.demo-check-circle {
  width:88px; height:88px; border-radius:50%; background:rgba(255,255,255,.22);
  display:flex; align-items:center; justify-content:center;

}
.demo-check-circle svg { width:44px; height:44px; }

/* TREND CARD */

/* RESET CARD */
.reset-card {
  background:#fff; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; position:relative;
  transition:background .3s;
}
.reset-blocks {
  display:grid; grid-template-columns:repeat(3,1fr); gap:6px;
  width:80px; height:56px;
}
.reset-block {
  border-radius:6px; transition:all .5s cubic-bezier(.4,0,.2,1);
}
.rb-1 { background:#FF6B8B; transform:translate(-4px,-6px) rotate(-8deg); }
.rb-2 { background:#DDA0DD; transform:translate(2px,5px) rotate(5deg); }
.rb-3 { background:#9DCBF5; transform:translate(6px,-3px) rotate(12deg); }
.rb-4 { background:#6ED2B7; transform:translate(-3px,4px) rotate(-5deg); }
.rb-5 { background:#F5D89A; transform:translate(5px,-5px) rotate(10deg); }
.rb-6 { background:#F5B5C8; transform:translate(-6px,2px) rotate(-12deg); }

.reset-card:hover .rb-2,
.reset-card:hover .rb-3,
.reset-card:hover .rb-4,

  transform:translate(0,0) rotate(0deg);

}
.reset-card:hover .rb-1 { background:#FF6B8B; }
.reset-card:hover .rb-2 { background:#DDA0DD; }
.reset-card:hover .rb-3 { background:#9DCBF5; }
.reset-card:hover .rb-4 { background:#6ED2B7; }
.reset-card:hover .rb-5 { background:#F5D89A; }
.reset-card:hover .rb-6 { background:#F5B5C8; }

<script>
(function(){
  var overlay = document.getElementById('page-overlay');
  var bg = document.body.classList.contains('dark-mode') ? '#111' : '#fdf2f4';
  overlay.style.background = bg;
  overlay.style.opacity = '1';
  overlay.style.transition = 'opacity .4s ease-out';
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ overlay.style.opacity = '0'; });
  });

  window.navigateOut = function(url) {
    overlay.style.transition = 'opacity .3s ease-in';
    overlay.style.opacity = '1';
    setTimeout(function(){ window.location.href = url; }, 280);
  };

  window.addEventListener('pageshow', function(e) {
    if (e.persisted) {
      overlay.style.transition = 'opacity .4s ease-out';
      overlay.style.opacity = '0';
    }
  });
})();
</script>

      var src = apiData[scope] || (scope==='domestic'?fallbackDomestic:fallbackGlobal);

                var delta = 0;

                  var oldRank = prevOrder.indexOf(idx);
                  if(oldRank!==-1) delta = oldRank - rank;

                var kw = (t.keyword||'').replace(/^#/,'');

// 레이아웃 버전 관리 — 레이아웃 변경 시 버전 올리면 캐시 무시
var LAYOUT_VERSION = 7;
var savedLayout = null;
try {
  var raw = localStorage.getItem('lumi_grid_layout');
  var ver = localStorage.getItem('lumi_grid_version');
  if (raw && Number(ver) === LAYOUT_VERSION) savedLayout = JSON.parse(raw);
  else localStorage.removeItem('lumi_grid_layout');
} catch(e) {}

function BentoGrid() {
  var _useState = React.useState(savedLayout || layout);
  var currentLayout = _useState[0];
  var setLayout = _useState[1];

  var children = currentLayout.map(function(item) {
    var cardFn = cards[item.i];
    return e('div', {key: item.i}, cardFn ? cardFn() : null);
  });

  return e(RGL, {
    className: 'layout',
    layout: currentLayout,
    cols: 4,
    rowHeight: 280,
    width: 1200,
    margin: [16, 16],
    compactType: 'vertical',
    isDraggable: true,
    isResizable: true,
    useCSSTransforms: false,
    preventCollision: false,
    onLayoutChange: function(newLayout) { setLayout(newLayout); try { localStorage.setItem('lumi_grid_layout', JSON.stringify(newLayout)); localStorage.setItem('lumi_grid_version', LAYOUT_VERSION); } catch(e) {} }
  }, children);
}

// ---- Mount ----
var root = ReactDOM.createRoot(document.getElementById('grid-root'));
root.render(e(BentoGrid));

function openSignupGrid() {
  document.querySelector('.grid-wrap').style.display = 'none';
  document.getElementById('signup-grid').classList.add('open');
}
function closeSignupGrid() {
  document.getElementById('signup-grid').classList.remove('open');
  document.querySelector('.grid-wrap').style.display = '';
}
function suGridComplete() {
  var required = Array.from(document.querySelectorAll('.su-agree-each')).slice(0, 2);
  if (!required.every(function(c) { return c.checked; })) {
    alert('필수 약관에 동의해주세요.');
    return;
  }
  alert('가입 기능은 대시보드 연동 후 활성화됩니다.');
}

// ---- NON-REACT FUNCTIONS ----
var characterImages = ['/assets/lumi-character.png', '/assets/lumi-character-2.png'];
var currentChar = 0;
function toggleLockdown() {
  currentChar = (currentChar + 1) % characterImages.length;
  document.querySelectorAll('.bio-avatar, .map-avatar img').forEach(function(img) {
    img.src = characterImages[currentChar];
  });
}

function toggleDarkMode() {
  var isDark = document.body.classList.toggle('dark-mode');
  localStorage.setItem('lumi_dark_mode', isDark ? '1' : '0');
  document.documentElement.style.background = isDark ? '#111' : '#fdf2f4';
}

function filterGrid(category, btnEl) {
  document.querySelectorAll('.nav-pill').forEach(function(p) { p.classList.remove('active'); });
  if (btnEl) btnEl.classList.add('active');
  // TODO: filter implementation with React state
}

function resetGrid() {
  localStorage.removeItem('lumi_grid_layout');
  localStorage.removeItem('lumi_grid_version');
  location.reload();
}
</script>
</body>
</html>
