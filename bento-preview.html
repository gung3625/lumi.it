/* nevflynn styled-components: .iXylth (Grid container) — THIS IS THE KEY */
.grid-wrap { max-width: 1200px; width:100%; position: relative; margin: -16px auto 0; padding-bottom: 80px; overflow: hidden; border-radius: 32px; box-sizing:border-box; }
.grid-glow-line { position:absolute; z-index:99; pointer-events:none; border-radius:32px; opacity:0; transition:opacity .15s; }

.grid-glow-line.top { left:0; right:0; top:0; height:6px; background:linear-gradient(to bottom, rgba(255,107,139,.6), transparent); box-shadow:0 -4px 20px 4px rgba(255,107,139,.3); }
.grid-glow-line.bottom { left:0; right:0; bottom:0; height:6px; background:linear-gradient(to top, rgba(255,107,139,.6), transparent); box-shadow:0 4px 20px 4px rgba(255,107,139,.3); }
.grid-glow-line.active { opacity:1; }
.grid-wrap .react-grid-item { transition: transform .5s cubic-bezier(.4,0,.2,1); }
.grid-wrap .react-grid-item.react-draggable-dragging { transition: none; }

.card-text {

.card-text.pad-bio {

}
.card-text.pad-bio::before {
  content:''; position:absolute; inset:0; z-index:0; pointer-events:none;
  background: linear-gradient(
    90deg,
    rgba(255,182,193,.23) 0%,
    rgba(186,218,255,.23) 20%,
    rgba(221,160,221,.18) 40%,
    rgba(255,218,185,.18) 60%,
    rgba(186,255,201,.15) 80%,

  background-size: 200% 100%;
  animation: auroraFlow 8s ease-in-out infinite;
}

  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* BIO */
.bio-top { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }

/* UPLOAD CARD */
.upload-wrap { display:flex; align-items:center; width:100%; height:100%; position:relative; }
.upload-left { flex:0 0 35%; display:flex; align-items:center; justify-content:center; overflow:visible; position:relative; padding:8px; }
.upload-left.hidden { display:none; }
.upload-right { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; gap:clamp(10px, 2vw, 14px); padding:clamp(16px, 3vw, 24px) clamp(24px, 5vw, 48px) clamp(16px, 3vw, 24px) clamp(16px, 3vw, 24px); overflow:hidden; min-height:0; min-width:0; }
.upload-lumi { width:100%; height:auto; object-fit:contain; cursor:pointer; transition:transform .2s; }
.upload-lumi { animation: lumiIdle 3s ease-in-out infinite; }
.upload-lumi:hover { transform:scale(1.05); }
.upload-lumi.surprised { animation: lumiFloat 2s ease-in-out infinite; }
@keyframes lumiIdle {
  0% { transform:translateY(0); }
  50% { transform:translateY(-6px); }
  100% { transform:translateY(0); }
}
@keyframes lumiFloat {
  0% { transform:translateY(0) scale(1); }
  50% { transform:translateY(-12px) scale(1.03); }
  100% { transform:translateY(0) scale(1); }
}

/* 루미 후광 효과 */
.lumi-aura {
  position:absolute; top:50%; left:50%;
  width:200px; height:200px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,107,139,.6) 0%, rgba(221,160,221,.4) 40%, transparent 70%);
  filter:blur(8px);
  animation: auraPulse 2.5s ease-in-out infinite;
  pointer-events:none;
}
@keyframes auraPulse {
  0% { transform:translate(-50%,-50%) scale(.8); opacity:.4; }
  50% { transform:translate(-50%,-50%) scale(1.15); opacity:.8; }
  100% { transform:translate(-50%,-50%) scale(.8); opacity:.4; }
}

/* PRICE FLIP CARD */
.price-flip-container {
  perspective: 600px;
  cursor: pointer;
  margin-top: 16px;
}
.price-flip-inner {
  position: relative;
  width: 100%;
  height: 44px;
  transition: transform 0.6s cubic-bezier(.4,0,.2,1);
  transform-style: preserve-3d;
}
.price-flip-container:hover .price-flip-inner,
.price-flip-container.flipped .price-flip-inner {
  transform: rotateX(180deg);
}
.price-flip-front, .price-flip-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.3px;
}
.price-flip-front {
  background: #1c1c1e;
  color: rgba(255,255,255,.8);
}
.price-flip-back {
  background: linear-gradient(135deg, #FF6B9D, #DDA0DD);
  color: #fff;
  transform: rotateX(180deg);
}
body.dark-mode .price-flip-front {
  background: #2c2c2e;
}

/* RESET CARD */
.reset-card {
  background:#fff; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; position:relative;
  transition:background .3s;
}
.reset-card::after {
  content:''; position:absolute; inset:-8px; z-index:1;
}
.reset-blocks {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
  width:120px; height:84px;
}
.reset-block {
  border-radius:6px; transition:all .5s cubic-bezier(.4,0,.2,1);
}
.rb-1 { background:#FF6B8B; transform:translate(-4px,-6px) rotate(-8deg); }
.rb-2 { background:#DDA0DD; transform:translate(2px,5px) rotate(5deg); }
.rb-3 { background:#9DCBF5; transform:translate(6px,-3px) rotate(12deg); }
.rb-4 { background:#6ED2B7; transform:translate(-3px,4px) rotate(-5deg); }
.rb-5 { background:#F5D89A; transform:translate(5px,-5px) rotate(10deg); }
.rb-6 { background:#F5B5C8; transform:translate(-6px,2px) rotate(-12deg); }
.reset-card:hover .rb-1,
.reset-card:hover .rb-2,
.reset-card:hover .rb-3,
.reset-card:hover .rb-4,
.reset-card:hover .rb-5,
.reset-card:hover .rb-6 {
  transform:translate(0,0) rotate(0deg);
  border-radius:4px;
}
.reset-card:hover .rb-1 { background:#FF6B8B; }
.reset-card:hover .rb-2 { background:#DDA0DD; }
.reset-card:hover .rb-3 { background:#9DCBF5; }
.reset-card:hover .rb-4 { background:#6ED2B7; }
.reset-card:hover .rb-5 { background:#F5D89A; }
.reset-card:hover .rb-6 { background:#F5B5C8; }
.reset-label {
  font-size:11px; color:rgba(0,0,0,.25); letter-spacing:.5px;
  transition:color .3s;
}
.reset-card:hover .reset-label { color:rgba(0,0,0,.45); }
body.dark-mode .reset-card { background:#1c1c1e; }
body.dark-mode .reset-label { color:rgba(255,255,255,.2); }
body.dark-mode .reset-card:hover .reset-label { color:rgba(255,255,255,.4); }
/* SIGNUP CONVERSATION */
.signup-grid-wrap{display:none;position:fixed;inset:0;z-index:200;}
.signup-grid-wrap.open{display:flex;align-items:center;justify-content:center;animation:suFadeIn .3s ease-out;}
@keyframes suFadeIn{from{opacity:0}to{opacity:1}}
.su-chat-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.su-chat-box{position:relative;width:100%;max-width:420px;margin:0 20px;background:#fff;border-radius:32px;z-index:1;display:flex;flex-direction:column;align-items:center;padding:36px 32px 28px;animation:suSlideUp .5s cubic-bezier(.16,1,.3,1);overflow:hidden;}
body.dark-mode .su-chat-box{background:#1c1c1e;color:#f0f2f8;}
@keyframes suSlideUp{from{opacity:0;transform:translateY(40px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.su-chat-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:16px;border:none;background:rgba(0,0,0,.05);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;z-index:2;}
body.dark-mode .su-chat-close{background:rgba(255,255,255,.1);}
.su-chat-close:hover{transform:scale(1.1);}
.su-chat-close svg{width:10px;height:10px;stroke:#0d1117;stroke-width:2.5;}
body.dark-mode .su-chat-close svg{stroke:#f0f2f8;}
/* lumi character */
.su-lumi-big{width:180px;height:180px;object-fit:contain;margin-bottom:8px;animation:lumiFloat 3s ease-in-out infinite;}
.su-lumi-big.bounce{animation:lumiBigBounce .6s cubic-bezier(.16,1,.3,1), lumiFloat 3s ease-in-out .6s infinite;}
.su-lumi-big.shake{animation:lumiShake .5s ease-in-out, lumiFloat 3s ease-in-out .5s infinite;}
@keyframes lumiBigBounce{0%{transform:scale(.7) translateY(20px);opacity:0}50%{transform:scale(1.08) translateY(-5px)}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes lumiFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes lumiShake{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
/* speech bubble */
.su-speech{position:relative;background:rgba(0,0,0,.04);border-radius:20px;padding:16px 22px;margin-bottom:20px;text-align:center;font-size:16px;line-height:1.7;color:#0d1117;min-height:60px;width:100%;transition:opacity .3s;}
body.dark-mode .su-speech{background:rgba(255,255,255,.08);color:#f0f2f8;}
.su-speech::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid rgba(0,0,0,.04);}
body.dark-mode .su-speech::before{border-bottom-color:rgba(255,255,255,.08);}
.su-speech-typing{display:flex;gap:5px;justify-content:center;align-items:center;padding:16px 22px;}
.su-speech-dot{width:8px;height:8px;border-radius:4px;background:rgba(0,0,0,.2);animation:typingBounce 1.2s infinite;}
body.dark-mode .su-speech-dot{background:rgba(255,255,255,.3);}
.su-speech-dot:nth-child(2){animation-delay:.2s;}
.su-speech-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
/* progress dots */
.su-progress{display:flex;gap:6px;justify-content:center;margin-bottom:16px;}
.su-progress-dot{width:8px;height:8px;border-radius:4px;background:rgba(0,0,0,.1);transition:all .3s;}

.su-progress-dot.active{width:20px;background:linear-gradient(135deg,#FF6B8B,#DDA0DD);}
.su-progress-dot.done{background:#4ade80;}

.su-label{font-size:11px;font-weight:600;color:rgba(0,0,0,.35);margin-bottom:5px;display:block;letter-spacing:.3px;}

<div id="page-overlay" style="position:fixed;inset:0;z-index:9999;pointer-events:none;"></div>
<script>
(function(){
  var overlay = document.getElementById('page-overlay');
  var bg = document.body.classList.contains('dark-mode') ? '#111' : '#fdf2f4';
  overlay.style.background = bg;
  overlay.style.opacity = '1';
  overlay.style.transition = 'opacity .4s ease-out';
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ overlay.style.opacity = '0'; });
  });

  window.navigateOut = function(url) {
    overlay.style.transition = 'opacity .3s ease-in';
    overlay.style.opacity = '1';
    setTimeout(function(){ window.location.href = url; }, 280);
  };

  window.addEventListener('pageshow', function(e) {
    if (e.persisted) {
      overlay.style.transition = 'opacity .4s ease-out';
      overlay.style.opacity = '0';
    }
  });
})();
</script>

var LAYOUT_VERSION = 16;
var savedLayout = null;
try {
  var raw = localStorage.getItem('lumi_grid_layout');
  var ver = localStorage.getItem('lumi_grid_version');
  if (raw && Number(ver) === LAYOUT_VERSION) savedLayout = JSON.parse(raw);
  else localStorage.removeItem('lumi_grid_layout');
} catch(e) {}

function BentoGrid() {
  // 컨테이너 너비 추적
  var _ws = React.useState(function(){
    var root = document.getElementById('grid-root');
    return root ? root.offsetWidth : Math.min(window.innerWidth, 1200);
  });
  var gridWidth = _ws[0], setGridWidth = _ws[1];

  React.useEffect(function(){
    function onResize(){
      var root = document.getElementById('grid-root');
      setGridWidth(root ? root.offsetWidth : Math.min(window.innerWidth, 1200));
    }
    onResize();
    window.addEventListener('resize', onResize);
    return function(){ window.removeEventListener('resize', onResize); };
  },[]);

  // 브레이크포인트 판단
  var isMobile = gridWidth < 500;
  var isTablet = gridWidth >= 500 && gridWidth < 900;

  // 데스크톱 레이아웃만 저장/복원
  var _ls = React.useState(savedLayout || layout);
  var desktopLayout = _ls[0], setDesktopLayout = _ls[1];
  window._setGridLayout = setDesktopLayout;

  var cols, rowH, mgn, activeLayout, canDrag;
  if (isMobile) {
    cols = 1; rowH = 280; mgn = [12, 12]; activeLayout = mobileLayout; canDrag = false;
  } else if (isTablet) {
    cols = 2; rowH = 260; mgn = [14, 14]; activeLayout = tabletLayout; canDrag = false;
  } else {
    cols = 4; rowH = 280; mgn = [16, 16]; activeLayout = desktopLayout; canDrag = true;
  }

  var children = activeLayout.map(function(item) {
    var cardFn = cards[item.i];
    return e('div', {key: item.i}, cardFn ? cardFn() : null);
  });

  return e(RGL, {
    className: 'layout',
    layout: activeLayout,
    cols: cols,
    rowHeight: rowH,
    width: gridWidth,
    margin: mgn,
    compactType: 'vertical',
    isDraggable: canDrag,
    isResizable: false,
    useCSSTransforms: true,
    preventCollision: false,
    onLayoutChange: function(newLayout) {
      if (canDrag) {
        setDesktopLayout(newLayout);
        try { localStorage.setItem('lumi_grid_layout', JSON.stringify(newLayout)); localStorage.setItem('lumi_grid_version', LAYOUT_VERSION); } catch(ex) {}
      }
    }
  }, children);
}

function suRenderProgress() {
  var el = document.getElementById('su-progress');
  var html = '';
  for (var i = 0; i < suFlow.length; i++) {
    html += '<div class="su-progress-dot' + (i < suPhase ? ' done' : i === suPhase ? ' active' : '') + '"></div>';
  }
  el.innerHTML = html;
}

function suTypeText(text, callback) {
  var speech = document.getElementById('su-speech');
  // 타이핑 인디케이터
  speech.innerHTML = '<div class="su-speech-typing"><div class="su-speech-dot"></div><div class="su-speech-dot"></div><div class="su-speech-dot"></div></div>';
  setTimeout(function() {
    // 줄 단위로 부드럽게 나타나기
    var lines = text.split('\n');
    var i = 0;
    speech.innerHTML = '';
    function showLine() {
      if (i >= lines.length) { if (callback) callback(); return; }
      var line = lines[i].replace(/lumi(?!-)/g, '<span class="lumi-brand">lumi</span>');
      var span = document.createElement('span');
      span.innerHTML = (i > 0 ? '<br>' : '') + line;
      span.style.cssText = 'opacity:0;transform:translateY(6px);display:inline;transition:opacity .4s,transform .4s;';
      speech.appendChild(span);
      requestAnimationFrame(function(){ requestAnimationFrame(function(){
        span.style.opacity = '1';
        span.style.transform = 'translateY(0)';
      }); });
      i++;
      setTimeout(showLine, 500);
    }
    showLine();
  }, 800);
}

function suChangeLumi(imgSrc, isError) {
  var img = document.getElementById('su-lumi-img');
  if (isError) {
    img.src = imgSrc;
    img.className = '';
    void img.offsetHeight;
    img.className = 'su-lumi-big shake';
  } else {
    img.className = 'su-lumi-big';
    img.style.transform = 'scale(0.7)';
    img.style.opacity = '0.3';
    img.style.transition = 'transform .25s, opacity .25s';
    setTimeout(function() {
      img.src = imgSrc;
      img.className = '';
      void img.offsetHeight;
      img.className = 'su-lumi-big bounce';
      img.style.transform = '';
      img.style.opacity = '';
      img.style.transition = '';
    }, 250);
  }
}

function suSkipEmail() {
  var id = document.getElementById('su-email-id').value.trim();
  var domain = document.getElementById('su-email-domain').value;
  if (!id) {
    suChangeLumi('/assets/lumi-sad.png', true);
    document.getElementById('su-speech').innerHTML = '이메일을 입력해주세요!';
    return;
  }
  if (/[ㄱ-ㅎㅏ-ㅣ가-힣]/.test(id)) {
    suChangeLumi('/assets/lumi-sad.png', true);
    document.getElementById('su-speech').innerHTML = '앗! 한글은 입력할 수 없어요<br>영문, 숫자만 사용해주세요';
    return;
  }
  if (!/^[a-zA-Z0-9._-]+$/.test(id)) {
    suChangeLumi('/assets/lumi-sad.png', true);
    document.getElementById('su-speech').innerHTML = '이메일에 사용할 수 없는<br>문자가 포함되어 있어요';
    return;
  }
  suData.email = id + '@' + domain;
  suNextPhase();
}

function suSendOtp() {
  var id = document.getElementById('su-email-id').value.trim();
  var domain = document.getElementById('su-email-domain').value;
  if (!id) { alert('이메일을 입력해주세요.'); return; }
  suData.email = id + '@' + domain;
  var btn = document.getElementById('su-otp-btn');
  btn.textContent = '전송 중...';
  btn.disabled = true;
  fetch('/.netlify/functions/send-otp', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: suData.email})
  }).then(function(r){ return r.json(); }).then(function(data) {
    if (data.error) { alert(data.error); btn.textContent = '인증번호 받기'; btn.disabled = false; return; }
    btn.textContent = '전송 완료';
    document.getElementById('su-otp-area').style.display = 'block';
    document.getElementById('su-otp-code').focus();
    // lumi 표정 변경
    suChangeLumi('/assets/lumi-wink.png');
    var speech = document.getElementById('su-speech');
    speech.innerHTML = '인증번호를 보냈어요!<br>이메일을 확인해주세요';
  }).catch(function() {
    alert('전송에 실패했어요. 다시 시도해주세요.');
    btn.textContent = '인증번호 받기';
    btn.disabled = false;
  });
}

function suVerifyOtp() {
  var otp = document.getElementById('su-otp-code').value.trim();
  if (!otp || otp.length !== 6) { alert('인증번호 6자리를 입력해주세요.'); return; }
  fetch('/.netlify/functions/verify-otp', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: suData.email, otp: otp})
  }).then(function(r){ return r.json(); }).then(function(data) {
    if (data.error) { alert(data.error); return; }
    suData.emailVerified = true;
    suNextPhase();
  }).catch(function() {
    alert('인증에 실패했어요. 다시 시도해주세요.');
  });
}
function suSubmitPw() {
  var pw = document.getElementById('su-pw').value;
  var pw2 = document.getElementById('su-pw2').value;
  var pwRegex = /^(?=.*[!@#$%^&*()_+\-=\[\]{};':"\|,.<>\/?]).{10,}$/;
  if (!pw) {
    suChangeLumi('/assets/lumi-sad.png', true);
    document.getElementById('su-speech').innerHTML = '비밀번호를 입력해주세요!';
    return;
  }
  if (!pwRegex.test(pw)) {
    suChangeLumi('/assets/lumi-sad.png', true);
    document.getElementById('su-speech').innerHTML = '특수문자를 포함해서<br>10자 이상으로 만들어주세요';
    return;
  }
  if (pw !== pw2) {
    suChangeLumi('/assets/lumi-sad.png', true);
    document.getElementById('su-speech').innerHTML = '앗! 비밀번호가<br>일치하지 않아요';
    return;
  }
  suData.password = pw;
  suNextPhase();
}

    document.getElementById('su-speech').innerHTML = '성함과 매장 이름을<br>모두 입력해주세요!';

  if (!pw) {
    liChangeLumi('/assets/lumi-sad.png', true);
    document.getElementById('li-speech').innerHTML = '비밀번호를 입력해주세요!';
    return;
  }
  liData.password = pw;
  // 테스트용: 바로 로그인 성공
  document.getElementById('li-form-area').innerHTML = '';
  localStorage.setItem('lumi_token', 'test-token');
  localStorage.setItem('lumi_user', JSON.stringify({email: liData.email, name:'테스트'}));
  liChangeLumi('/assets/lumi-smile.png');
  document.getElementById('li-speech').innerHTML = '로그인 성공!<br>환영해요 🎉';
  setTimeout(function(){
    closeLogin();
    location.reload();
  }, 1500);
}

function liGoBack() {
  liPhase = 0;
  liRunPhase();
}

function openLogin() {
  liPhase = 0;
  liData = {};
  document.getElementById('login-modal').classList.add('open');
  var img = document.getElementById('li-lumi-img');
  img.className = 'su-lumi-big bounce';
  liRunPhase();
}

function closeLogin() {
  document.getElementById('login-modal').classList.remove('open');
}

function logoutLumi() {
  localStorage.removeItem('lumi_token');
  localStorage.removeItem('lumi_user');
  location.reload();
}

function suGoBack() {
  if (suPhase <= 0) return;
  suPhase--;
  suRunPhase();
}

function suNextPhase() {
  suPhase++;
  if (suPhase < suFlow.length) { suRunPhase(); }
}

// 방향별 경계 glow 효과
(function(){
  var wrap = document.querySelector('.grid-wrap');
  ['left','right','top','bottom'].forEach(function(dir){
    var el = document.createElement('div');
    el.className = 'grid-glow-line ' + dir;
    wrap.appendChild(el);
  });
  var lines = {
    left: wrap.querySelector('.grid-glow-line.left'),
    right: wrap.querySelector('.grid-glow-line.right'),
    top: wrap.querySelector('.grid-glow-line.top'),
    bottom: wrap.querySelector('.grid-glow-line.bottom')
  };
  var clearTimer = null;
  document.addEventListener('mousemove', function(ev){
    if(ev.buttons !== 1) { Object.keys(lines).forEach(function(k){lines[k].classList.remove('active');}); return; }
    var rect = wrap.getBoundingClientRect();
    var m = 30;
    lines.left.classList.toggle('active', ev.clientX < rect.left + m);
    lines.right.classList.toggle('active', ev.clientX > rect.right - m);
    lines.top.classList.toggle('active', ev.clientY < rect.top + m);
    lines.bottom.classList.toggle('active', ev.clientY > rect.bottom - m);
  });
  document.addEventListener('mouseup', function(){
    Object.keys(lines).forEach(function(k){lines[k].classList.remove('active');});
  });
})();

function buildFilterLayout(category) {
  var fl = filterLayouts[category];
  return {layout: fl.layout, matchedIds: fl.matched};
}

function applyCardStyles(matchedIds) {
  var gridItems = document.querySelectorAll('.react-grid-item');
  var currentLayout = window._currentLayout || layout;
  gridItems.forEach(function(el, idx) {
    if (!currentLayout[idx]) return;
    var key = currentLayout[idx].i;
    var isMatch = matchedIds.indexOf(key) !== -1;
    el.style.opacity = isMatch ? '1' : '0.15';
    el.style.filter = 'none';
    el.style.pointerEvents = isMatch ? 'auto' : 'none';
  });
}

function filterGrid(category, btnEl) {
  document.querySelectorAll('.nav-pill').forEach(function(p) { p.classList.remove('active'); });
  if (btnEl) btnEl.classList.add('active');
  currentFilter = category;

  if (category === 'all') {
    var origLayout = layout.map(function(l){return Object.assign({},l);});
    if (window._setGridLayout) {
      window._setGridLayout(origLayout);
      window._currentLayout = origLayout;
    }
    setTimeout(function() {
      document.querySelectorAll('.react-grid-item').forEach(function(el) {
        el.style.transition = 'opacity .4s ease, filter .4s ease, transform .4s ease';
        el.style.opacity = '1';
        el.style.filter = 'none';
        el.style.pointerEvents = 'auto';
      });
    }, 50);
    return;
  }

  var result = buildFilterLayout(category);
  if (window._setGridLayout) {
    window._setGridLayout(result.layout);
    window._currentLayout = result.layout;
  }
  setTimeout(function() {
    applyCardStyles(result.matchedIds);
  }, 50);
}

function resetGrid() {
  localStorage.removeItem('lumi_grid_layout');
  localStorage.removeItem('lumi_grid_version');
  if (window._setGridLayout) window._setGridLayout(layout.map(function(l){return Object.assign({},l);}));
}
