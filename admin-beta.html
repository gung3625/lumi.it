<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>lumi 베타 신청자 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--pink:#FF6B9D;--dark:#191F28;--g5:#6B7684;--g2:#E8ECF0;--g1:#F2F4F6;--w:#fff;--g900:#191F28;--g700:#333D4B;--g500:#6B7684;--g400:#8B95A1;--g200:#E8ECF0;--g100:#F2F4F6;--g50:#F9FAFB;--white:#FFFFFF;}
    body.dark-mode{
      --g900:#F2F4F6;--g700:#D1D5DB;--g500:#9CA3AF;--g400:#6B7684;
      --g200:#2D3748;--g100:#1E2533;--g50:#151B26;--white:#1A202C;
      --pink-pale:#2D1F2B;--pink-ultra:#1F1923;--pink-soft:#3D2536;
    }
    body.dark-mode nav{background:rgba(26,32,44,.94)!important;border-bottom-color:var(--g200)!important;}
    body.dark-mode .toast{background:var(--g200);color:var(--g700);}
    body.dark-mode input,body.dark-mode select,body.dark-mode textarea{background:var(--g100);border-color:var(--g200);color:var(--g900);}
    .dark-toggle-fab{position:fixed;right:16px;bottom:calc(24px + env(safe-area-inset-bottom, 0px));z-index:9999;width:44px;height:44px;border-radius:50%;border:none;background:#191F28;color:#fff;font-size:1.1rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;transition:all .3s;-webkit-tap-highlight-color:transparent;}
    .dark-toggle-fab:active{transform:scale(.95);}
    body.dark-mode .dark-toggle-fab{background:#fff;color:#191F28;box-shadow:0 4px 16px rgba(0,0,0,.15);}
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans KR',sans-serif;}
    body{background:var(--g1);color:var(--dark);min-height:100vh;}
    .header{background:var(--dark);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;}
    .logo{color:#fff;font-size:1.1rem;font-weight:800;letter-spacing:-.02em;}
    .logo span{color:var(--pink);}
    .badge{background:var(--pink);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;}
    .login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:12px;}
    .login-card{background:var(--w);border-radius:16px;padding:32px 28px;width:100%;max-width:360px;border:1px solid var(--g2);}
    .login-title{font-size:1rem;font-weight:800;margin-bottom:16px;color:var(--dark);}
    input[type=password]{width:100%;padding:11px 14px;border:1.5px solid var(--g2);border-radius:10px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;}
    input[type=password]:focus{border-color:var(--pink);}
    .btn{width:100%;padding:12px;background:var(--pink);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
    .btn:hover{background:#e05588;}
    .main{padding:24px;max-width:1000px;margin:0 auto;}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
    .stat{background:var(--w);border-radius:14px;padding:20px;border:1px solid var(--g2);text-align:center;}
    .stat-num{font-size:2rem;font-weight:900;color:var(--pink);}
    .stat-lbl{font-size:12px;color:var(--g5);margin-top:4px;}
    .progress-bar{background:var(--g2);border-radius:4px;height:8px;margin-top:8px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--pink);border-radius:4px;transition:width .5s;}
    table{width:100%;border-collapse:collapse;background:var(--w);border-radius:14px;overflow:hidden;border:1px solid var(--g2);}
    th{padding:12px 16px;text-align:left;font-size:11px;font-weight:800;color:var(--g5);letter-spacing:.06em;background:var(--g1);border-bottom:1px solid var(--g2);}
    td{padding:14px 16px;font-size:13px;border-bottom:1px solid var(--g1);vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tr:hover td{background:#fffaf9;}
    .chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--g1);color:var(--g5);}
    .empty{text-align:center;padding:48px;color:var(--g5);}
    .refresh{background:none;border:1.5px solid var(--g2);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--g5);font-family:inherit;}
    .refresh:hover{border-color:var(--pink);color:var(--pink);}
    .row-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .tbl-title{font-size:.95rem;font-weight:800;color:var(--dark);}
  </style>
</head>
<body>
<div class="header">
  <div class="logo">lumi <span>admin</span></div>
  <div class="badge" id="hd-badge">베타 신청자</div>
</div>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-title">관리자 로그인</div>
    <input type="password" id="token-input" placeholder="관리자 토큰 입력" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">확인</button>
  </div>
</div>

<div class="main" id="main-wrap" style="display:none">
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="s-count">-</div>
      <div class="stat-lbl">총 신청자</div>
      <div class="progress-bar"><div class="progress-fill" id="s-bar" style="width:0%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-num" id="s-remain">-</div>
      <div class="stat-lbl">잔여 자리</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="s-latest">-</div>
      <div class="stat-lbl">최근 신청</div>
    </div>
  </div>

  <div class="row-hd">
    <div class="tbl-title">신청자 목록</div>
    <button class="refresh" onclick="load()">새로고침</button>
  </div>
  <table>
    <thead>
      <tr>
        <th>#</th><th>이름</th><th>매장명</th><th>업종</th><th>연락처</th><th>인스타</th><th>신청일시</th>
      </tr>
    </thead>
    <tbody id="tbl-body"><tr><td colspan="7" class="empty">로딩 중...</td></tr></tbody>
  </table>
</div>

<script>
let savedToken = '';
function login(){
  const t = document.getElementById('token-input').value.trim();
  if(!t){alert('토큰을 입력해주세요.');return;}
  savedToken = t;
  load();
}
async function load(){
  try {
    const res = await fetch(`/api/beta-admin?token=${encodeURIComponent(savedToken)}`);
    if(res.status===401){alert('인증 실패. 토큰을 확인해주세요.');return;}
    const data = await res.json();
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('main-wrap').style.display='block';
    document.getElementById('s-count').textContent = data.count;
    document.getElementById('s-remain').textContent = data.max - data.count;
    document.getElementById('s-bar').style.width = (data.count/data.max*100)+'%';
    document.getElementById('hd-badge').textContent = `${data.count}/${data.max}명`;
    if(data.applicants.length > 0){
      const latest = new Date(data.applicants[0].appliedAt);
      document.getElementById('s-latest').textContent = `${latest.getMonth()+1}/${latest.getDate()}`;
    } else {
      document.getElementById('s-latest').textContent = '-';
    }
    const tbody = document.getElementById('tbl-body');
    if(data.applicants.length === 0){
      tbody.innerHTML = '<tr><td colspan="7" class="empty">아직 신청자가 없어요.</td></tr>';
      return;
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    tbody.innerHTML = data.applicants.map((a,i) => {
      const d = new Date(a.appliedAt);
      const dt = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `<tr>
        <td><b>${i+1}</b></td>
        <td>${esc(a.name||'')}</td>
        <td>${esc(a.store||'')}</td>
        <td><span class="chip">${esc(a.type||'')}</span></td>
        <td>${esc(a.phone||'')}</td>
        <td>${esc(a.insta||'-')}</td>
        <td style="color:var(--g5);font-size:12px">${dt}</td>
      </tr>`;
    }).join('');
  } catch(e){
    alert('오류: '+e.message);
  }
}
</script>
<button class="dark-toggle-fab" id="dark-toggle-fab" onclick="toggleDarkMode(!document.body.classList.contains('dark-mode'))" aria-label="다크모드 전환">🌙</button>
<script>
if(localStorage.getItem('lumi_dark_mode')==='1')document.body.classList.add('dark-mode');
function toggleDarkMode(on){document.body.classList.toggle('dark-mode',on);localStorage.setItem('lumi_dark_mode',on?'1':'0');var f=document.getElementById('dark-toggle-fab');if(f)f.textContent=on?'☀️':'🌙';}
(function(){var f=document.getElementById('dark-toggle-fab');if(f&&document.body.classList.contains('dark-mode'))f.textContent='☀️';})();
</script>
</body>
</html>
