<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="루미 — 사장님 대시보드">
  <title>루미 대시보드</title>

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">

  <style>
    .dash {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: calc(env(safe-area-inset-bottom) + 64px + var(--space-5));
      background: var(--bg);
      isolation: isolate;
    }
    .dash::before {
      content: "";
      position: absolute;
      top: 25%;
      left: 50%;
      width: 130vmax;
      height: 70vmax;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(ellipse at center,
          rgba(255, 107, 139, 0.08) 0%,
          rgba(221, 160, 221, 0.05) 30%,
          rgba(237, 208, 128, 0.03) 55%,
          transparent 70%);
      pointer-events: none;
      z-index: -1;
      animation: drift 18s var(--ease-soft) infinite alternate;
    }
    @keyframes drift {
      0%   { transform: translate(-50%, -50%) scale(1)    rotate(0deg);   }
      100% { transform: translate(-48%, -52%) scale(1.08) rotate(8deg);   }
    }

    /* 인사 */
    .dash-greet {
      padding:
        calc(env(safe-area-inset-top) + var(--space-8))
        var(--space-5)
        var(--space-8);
      animation: rise 600ms var(--ease-toss) 80ms backwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .dash-greet__line {
      font-size: var(--text-body);
      color: var(--ink-muted);
      letter-spacing: var(--tracking-snug);
      margin-bottom: var(--space-2);
    }
    .dash-greet__store {
      font-size: var(--text-headline);
      font-weight: var(--weight-bold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
      line-height: var(--leading-tight);
    }

    /* 메인 액션 — 거대 + 버튼 */
    .dash-action {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-5);
      animation: rise 600ms var(--ease-toss) 240ms backwards;
    }
    .dash-add {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-4);
      width: 100%;
      max-width: 420px;
      padding: var(--space-12) var(--space-6);
      border-radius: var(--radius-2xl);
      background: var(--gradient-signature);
      box-shadow: var(--shadow-glow-lg);
      color: var(--neutral-0);
      transition:
        transform var(--duration-snap) var(--ease-toss),
        box-shadow var(--duration-fast) var(--ease-toss);
    }
    .dash-add:active {
      transform: scale(0.98);
      box-shadow: var(--shadow-glow);
    }
    .dash-add svg {
      width: 56px;
      height: 56px;
      stroke-width: 2.5;
    }
    .dash-add span {
      font-size: var(--text-title);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-snug);
    }
    .dash-add::before,
    .dash-add::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--radius-2xl);
      border: 2px solid rgba(255, 107, 139, 0.35);
      animation: pulse 2.4s var(--ease-soft) infinite;
      pointer-events: none;
    }
    .dash-add::after { animation-delay: 1.2s; }
    @keyframes pulse {
      0%   { transform: scale(1);    opacity: 0.6; }
      80%  { opacity: 0; }
      100% { transform: scale(1.08); opacity: 0; }
    }

    /* 통계 — 이번 달 */
    .dash-stats {
      padding: 0 var(--space-5) var(--space-8);
      animation: rise 600ms var(--ease-toss) 380ms backwards;
    }
    .dash-stats__title {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: var(--space-3);
    }
    .dash-stats__grid {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }
    .dash-stats__grid li {
      padding: var(--space-4);
      background: var(--bg-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
    }
    .dash-stat__label {
      font-size: var(--text-caption);
      color: var(--ink-muted);
      margin-bottom: var(--space-1);
    }
    .dash-stat__value {
      font-size: var(--text-headline);
      font-weight: var(--weight-bold);
      color: var(--ink);
      letter-spacing: var(--tracking-tight);
      line-height: var(--leading-tight);
    }

    /* 하단 탭바 */
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      padding:
        var(--space-2)
        var(--space-2)
        calc(env(safe-area-inset-bottom) + var(--space-2));
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid var(--line);
      z-index: var(--z-sticky);
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: var(--space-2) var(--space-1);
      font-size: var(--text-label);
      font-weight: var(--weight-medium);
      color: var(--ink-muted);
      letter-spacing: var(--tracking-normal);
      transition:
        color var(--duration-snap) var(--ease-toss),
        transform var(--duration-snap) var(--ease-toss);
    }
    .tab:active { transform: scale(0.94); }
    .tab.is-active { color: var(--pink-500); }
    .tab svg {
      width: 22px;
      height: 22px;
      stroke-width: 2;
    }

    @media (prefers-reduced-motion: reduce) {
      .dash::before,
      .dash-add::before,
      .dash-add::after,
      .dash-greet,
      .dash-action,
      .dash-stats { animation: none; }
    }
  </style>
</head>
<body>
  <main class="dash" role="main">

    <header class="dash-greet">
      <p class="dash-greet__line">안녕하세요</p>
      <h1 class="dash-greet__store" data-store-name>매장 이름</h1>
    </header>

    <div class="dash-action">
      <a class="dash-add" href="/register-product" aria-label="사진 올리기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        <span>사진 올리기</span>
      </a>
    </div>

    <section class="dash-stats" aria-label="이번 달 통계">
      <h2 class="dash-stats__title">이번 달</h2>
      <ul class="dash-stats__grid" role="list">
        <li>
          <div class="dash-stat__label">좋아요</div>
          <div class="dash-stat__value" data-stat-likes>—</div>
        </li>
        <li>
          <div class="dash-stat__label">도달</div>
          <div class="dash-stat__value" data-stat-reach>—</div>
        </li>
      </ul>
    </section>

  </main>

  <nav class="tabbar" aria-label="메뉴">
    <a class="tab is-active" href="/dashboard" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12L12 3l9 9M5 10v11h14V10"/>
      </svg>
      홈
    </a>
    <a class="tab" href="/reservations">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
      예약
    </a>
    <a class="tab" href="/trends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 12l-4-4-4 4-6-6-6 6"/>
        <path d="M22 12v6H2"/>
      </svg>
      트렌드
    </a>
    <a class="tab" href="/settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
      </svg>
      설정
    </a>
  </nav>

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt');

      async function loadMe() {
        try {
          const res = await fetch('/api/me', {
            headers: token ? { Authorization: 'Bearer ' + token } : {},
          });
          if (!res.ok) return;
          const data = await res.json();
          const name =
            (data && (data.store_name || (data.seller && data.seller.store_name) || (data.user && data.user.store_name)));
          if (name) {
            const el = document.querySelector('[data-store-name]');
            if (el) el.textContent = name + ' 사장님';
          }
        } catch {}
      }

      async function loadStats() {
        try {
          const res = await fetch('/api/insight-monthly', {
            headers: token ? { Authorization: 'Bearer ' + token } : {},
          });
          if (!res.ok) return;
          const data = await res.json();
          const likes = (data && (data.likes !== undefined ? data.likes : data.total_likes));
          const reach = (data && (data.reach !== undefined ? data.reach : data.total_reach));
          if (typeof likes === 'number') {
            const el = document.querySelector('[data-stat-likes]');
            if (el) el.textContent = likes.toLocaleString();
          }
          if (typeof reach === 'number') {
            const el = document.querySelector('[data-stat-reach]');
            if (el) el.textContent = reach.toLocaleString();
          }
        } catch {}
      }

      loadMe();
      loadStats();
    })();
  </script>
</body>
</html>
