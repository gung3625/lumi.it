<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="루미 — 사장님 대시보드">
  <title>루미</title>

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">

  <style>
    body {
      padding-bottom: calc(env(safe-area-inset-bottom) + 56px);
    }

    /* === 상단 헤더 === */
    .topbar {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      padding:
        env(safe-area-inset-top)
        var(--space-4)
        0;
      padding-top: max(env(safe-area-inset-top), var(--space-2));
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      z-index: var(--z-sticky);
    }
    .topbar__icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      transition: transform var(--duration-snap) var(--ease-toss);
    }
    .topbar__icon:active { transform: scale(0.9); }
    .topbar__icon svg { width: 24px; height: 24px; stroke-width: 2; }
    .topbar__brand {
      display: inline-flex;
      align-items: center;
    }
    .topbar__brand img { height: 22px; width: auto; }

    /* === 스토리 트레이 === */
    .stories {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-4);
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid var(--line);
    }
    .stories::-webkit-scrollbar { display: none; }
    .story {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 72px;
      scroll-snap-align: start;
    }
    .story__avatar {
      position: relative;
      width: 64px;
      height: 64px;
      border-radius: var(--radius-full);
      padding: 3px;
      background: var(--gradient-signature);
      transition: transform var(--duration-snap) var(--ease-toss);
    }
    .story:active .story__avatar { transform: scale(0.94); }
    .story__avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--bg);
      padding: 2px;
      box-sizing: border-box;
    }
    .story__avatar-bg {
      width: 100%;
      height: 100%;
      border-radius: var(--radius-full);
      background-size: cover;
      background-position: center;
    }
    /* 첫 슬롯 = 내 매장 (+ 마크) */
    .story--mine .story__avatar { background: var(--neutral-200); padding: 2px; }
    .story--mine .story__avatar-inner { padding: 0; }
    .story--mine .story__avatar-bg {
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pink-500);
    }
    .story--mine .story__avatar-bg svg { width: 22px; height: 22px; stroke-width: 2.5; }
    .story__label {
      font-size: var(--text-label);
      color: var(--ink-soft);
      letter-spacing: var(--tracking-normal);
      max-width: 72px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* === 메인 피드 (인스타 카드) === */
    .feed {
      padding-bottom: var(--space-6);
    }
    .post {
      border-bottom: 1px solid var(--line);
      animation: rise 500ms var(--ease-toss) backwards;
    }
    .post:nth-child(2) { animation-delay: 80ms; }
    .post:nth-child(3) { animation-delay: 160ms; }

    .post__head {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
    }
    .post__avatar {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      background: var(--gradient-signature);
      padding: 1.5px;
      flex-shrink: 0;
    }
    .post__avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--bg);
      background-size: cover;
      background-position: center;
    }
    .post__name {
      flex: 1;
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      letter-spacing: var(--tracking-snug);
    }
    .post__menu {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-soft);
    }
    .post__menu svg { width: 18px; height: 18px; }

    .post__media {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--bg-deep);
    }

    .post__actions {
      display: flex;
      gap: var(--space-4);
      padding: var(--space-3) var(--space-4) var(--space-2);
    }
    .post__action {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      transition: transform var(--duration-snap) var(--ease-toss);
    }
    .post__action:active { transform: scale(0.85); }
    .post__action svg { width: 24px; height: 24px; stroke-width: 2; }
    .post__action--like.is-liked svg { fill: #ff3a4f; color: #ff3a4f; }
    .post__action--save { margin-left: auto; }

    .post__likes {
      padding: 0 var(--space-4) var(--space-2);
      font-size: var(--text-body);
      font-weight: var(--weight-semibold);
      color: var(--ink);
    }
    .post__caption {
      padding: 0 var(--space-4) var(--space-2);
      font-size: var(--text-body);
      line-height: var(--leading-snug);
      color: var(--ink);
    }
    .post__caption strong {
      font-weight: var(--weight-semibold);
      margin-right: 6px;
    }
    .post__time {
      padding: 0 var(--space-4) var(--space-3);
      font-size: var(--text-label);
      color: var(--ink-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* 빈 피드 안내 */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-16) var(--space-5);
      text-align: center;
    }
    .empty__icon {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-full);
      background: var(--bg-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-muted);
    }
    .empty__icon svg { width: 28px; height: 28px; stroke-width: 1.8; }
    .empty__title {
      font-size: var(--text-title);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      letter-spacing: var(--tracking-snug);
    }
    .empty__sub {
      font-size: var(--text-body);
      color: var(--ink-muted);
    }

    /* === 하단 탭바 (5개, 가운데 = 큰 + 액션) === */
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: grid;
      grid-template-columns: 1fr 1fr auto 1fr 1fr;
      align-items: center;
      gap: 0;
      padding:
        var(--space-2)
        var(--space-3)
        calc(env(safe-area-inset-bottom) + var(--space-2));
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid var(--line);
      z-index: var(--z-sticky);
    }
    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: var(--space-2) var(--space-1);
      font-size: var(--text-label);
      font-weight: var(--weight-medium);
      color: var(--ink-muted);
      transition:
        color var(--duration-snap) var(--ease-toss),
        transform var(--duration-snap) var(--ease-toss);
    }
    .tab:active { transform: scale(0.94); }
    .tab.is-active { color: var(--ink); }
    .tab.is-active svg { stroke-width: 2.5; }
    .tab svg { width: 22px; height: 22px; stroke-width: 2; }

    /* 가운데 + 큰 액션 버튼 */
    .tab-add {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-2xl);
      background: var(--gradient-signature);
      box-shadow: var(--shadow-glow);
      color: var(--neutral-0);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition:
        transform var(--duration-snap) var(--ease-toss),
        box-shadow var(--duration-fast) var(--ease-toss);
    }
    .tab-add:active {
      transform: scale(0.94);
      box-shadow: var(--shadow-glow-sm);
    }
    .tab-add svg {
      width: 28px;
      height: 28px;
      stroke-width: 2.5;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    @media (prefers-reduced-motion: reduce) {
      .post { animation: none; }
    }
  </style>
</head>

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt');

      // 매장 이름 채우기
      async function loadMe() {
        try {
          const res = await fetch('/api/me', {
            headers: token ? { Authorization: 'Bearer ' + token } : {},
          });
          if (!res.ok) return;
          const data = await res.json();
          const name =
            (data && (data.store_name || (data.seller && data.seller.store_name) || (data.user && data.user.store_name)));
          if (name) {
            document.querySelectorAll('[data-store-name]').forEach(el => { el.textContent = name; });
          }
        } catch {}
      }

      // 좋아요 토글 (인터랙션만, 백엔드 호출 X)
      document.querySelectorAll('.post__action--like').forEach(btn => {
        btn.addEventListener('click', () => btn.classList.toggle('is-liked'));
      });

      // 로그아웃: 클라이언트 토큰 삭제 + 메인 redirect
      const logoutBtn = document.querySelector('[data-logout]');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          ['lumi-auth', 'lumi_auth', 'seller_jwt'].forEach(k => {
            try { localStorage.removeItem(k); } catch {}
          });
          try { sessionStorage.clear(); } catch {}
          window.location.href = '/';
        });
      }

      loadMe();
    })();
  </script>
</body>
</html>
