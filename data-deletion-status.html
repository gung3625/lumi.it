<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <meta name="view-transition" content="same-origin">
  <title>데이터 삭제 처리 상황 · 루미(lumi)</title>
  <!-- /assets/css/ 는 존재하지 않음 (404). 실제 CSS 경로는 /css/. tokens.css 우선 필요. -->
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/motion.css">
  <style>
    body { background: var(--bg-soft, #fafafa); }
    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: var(--space-6, 24px);
    }
    .card {
      background: #fff;
      border: 1px solid var(--line, #e5e7eb);
      border-radius: var(--radius-xl, 16px);
      padding: var(--space-6, 24px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: var(--ink, #111);
    }
    .sub {
      font-size: 14px;
      color: var(--ink-muted, #6b7280);
      margin: 0 0 20px 0;
      line-height: 1.5;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }
    .status--pending   { background: #fff8e8; color: #b45309; }
    .status--completed { background: #e8f5ee; color: #00713c; }
    .status--not_found { background: #fde8e8; color: #b8221c; }
    .status--failed    { background: #fde8e8; color: #b8221c; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line, #f3f4f6);
      font-size: 14px;
    }
    .row:last-child { border-bottom: none; }
    .row__label { color: var(--ink-muted, #6b7280); }
    .row__value { color: var(--ink, #111); font-weight: 500; word-break: break-all; }
    .note {
      margin-top: 16px;
      padding: 12px;
      background: var(--bg-soft, #fafafa);
      border-radius: 8px;
      font-size: 13px;
      color: var(--ink-soft, #4b5563);
      line-height: 1.5;
    }
    .note a { color: var(--pink-600, #be185d); }
    .code-line {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      background: var(--bg-soft, #fafafa);
      padding: 8px 10px;
      border-radius: 6px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>데이터 삭제 처리 상황</h1>
      <p class="sub">Meta 측에서 권한을 회수하신 결과를 보여드려요. 처리 코드와 일정이 아래 표시됩니다.</p>

      <div id="state" class="sub">조회 중…</div>

      <div id="detail" hidden>
        <div class="row">
          <span class="row__label">처리 상태</span>
          <span class="row__value"><span id="status-badge" class="status"></span></span>
        </div>
        <div class="row">
          <span class="row__label">대상 채널</span>
          <span class="row__value" id="channel-val">-</span>
        </div>
        <div class="row">
          <span class="row__label">요청 시각</span>
          <span class="row__value" id="created-val">-</span>
        </div>
        <div class="row">
          <span class="row__label">처리 완료</span>
          <span class="row__value" id="completed-val">-</span>
        </div>
        <div class="row">
          <span class="row__label">처리 코드</span>
          <span class="row__value code-line" id="code-val">-</span>
        </div>
        <div id="error-row" class="row" hidden>
          <span class="row__label">오류</span>
          <span class="row__value" id="error-val">-</span>
        </div>
      </div>

      <div class="note">
        매칭되는 계정을 찾지 못했거나 처리 중 문제가 있으면 <a href="mailto:lumi@lumi.it.kr">lumi@lumi.it.kr</a> 로 처리 코드와 함께 문의해주세요. 사장님 본 계정(lumi 가입 정보)은 Meta 권한 회수와 별도로 보존됩니다 — 전체 회원 탈퇴를 원하시면 lumi 설정에서 진행해주세요.
      </div>
    </div>
  </main>

  <script>
    (function () {
      const qs = new URLSearchParams(location.search);
      const code = qs.get('code') || '';
      const stateEl = document.getElementById('state');
      const detailEl = document.getElementById('detail');

      if (!code) {
        stateEl.textContent = '처리 코드가 없습니다.';
        return;
      }
      document.getElementById('code-val').textContent = code;

      function fmtTs(iso) {
        if (!iso) return '-';
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '-';
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      }
      const STATUS_KR = {
        pending:   '처리 중',
        completed: '삭제 완료',
        not_found: '계정 매칭 실패',
        failed:    '처리 실패',
      };
      const CHANNEL_KR = { ig: '인스타그램', threads: '쓰레드', unknown: '확인 불가' };

      (async () => {
        try {
          const r = await fetch('/api/data-deletion-lookup?code=' + encodeURIComponent(code));
          if (r.status === 404) {
            stateEl.textContent = '이 처리 코드에 해당하는 요청이 없습니다.';
            return;
          }
          if (!r.ok) {
            stateEl.textContent = '조회에 실패했습니다. 잠시 후 다시 시도해주세요.';
            return;
          }
          const j = await r.json();
          stateEl.hidden = true;
          detailEl.hidden = false;

          const badge = document.getElementById('status-badge');
          badge.textContent = STATUS_KR[j.status] || j.status;
          badge.classList.add(`status--${j.status}`);

          document.getElementById('channel-val').textContent = CHANNEL_KR[j.channel] || j.channel || '-';
          document.getElementById('created-val').textContent = fmtTs(j.createdAt);
          document.getElementById('completed-val').textContent = fmtTs(j.completedAt);
          if (j.errorMessage) {
            document.getElementById('error-row').hidden = false;
            document.getElementById('error-val').textContent = j.errorMessage;
          }
        } catch (e) {
          stateEl.textContent = '조회 중 오류가 발생했습니다.';
        }
      })();
    })();
  </script>
</body>
</html>
