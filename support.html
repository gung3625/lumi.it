.hero{max-width:960px;margin:0 auto;padding:48px 24px 40px;text-align:center;display:flex;flex-direction:column;align-items:center;}

/* CONTACT CARDS */
.contact-card{background:#fff;border-radius:8px;padding:24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;text-decoration:none;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);opacity:0;transform:translateY(16px);transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1),box-shadow .25s;}

.faq-a{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1);}
.faq-item.open .faq-a{max-height:600px;}
.faq-a-inner{padding:0 22px 18px;font-size:14px;line-height:1.8;color:#494949;border-top:1px solid rgba(0,0,0,.06);}

<script>
(function(){
  var btn = document.getElementById('fab-dark');
  function setIcon(dark) {
    btn.innerHTML = dark
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#f0f2f8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#0d1117"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    btn.style.background = dark ? 'rgba(255,255,255,.1)' : 'rgba(0,0,0,.08)';
  }
  var isDark = document.body.classList.contains('dark-mode');
  setIcon(isDark);
  window.toggleDark = function() {
    isDark = !isDark;
    document.body.classList.toggle('dark-mode', isDark);
    document.documentElement.style.background = isDark ? '#111' : '#fdf2f4';
    localStorage.setItem('lumi_dark_mode', isDark ? '1' : '0');
    setIcon(isDark);
  };
})();
</script>

<script>
var faqs = [
  {q:'캡션 생성은 얼마나 걸리나요?', a:'사진·영상 한 건당 약 1분이면 완성됩니다.'},

  {q:'개인 정보는 안전한가요?', a:'OpenAI Zero Data Retention 계약으로 사진·데이터가 학습에 사용되지 않습니다.'},
  {q:'결제 수단은 무엇이 있나요?', a:'신용/체크카드와 간편결제를 지원합니다.'},
  {q:'인스타그램 비밀번호를 알려줘야 하나요?', a:'아니요. Meta 공식 API를 통해 연동하기 때문에 비밀번호 없이 안전하게 연결돼요.'},
  {q:'7일 무료체험 후 자동으로 결제되나요?', a:'아니요. 카드 등록 없이 시작하기 때문에 자동 결제는 없어요. 7일 후 계속 쓰고 싶으시면 그때 구독을 시작하시면 돼요.'},
  {q:'구독 취소는 어떻게 하나요?', a:'언제든 취소 가능하고 위약금 없어요. 대시보드에서 직접 취소하거나, gung3625@gmail.com으로 메일 보내주시면 바로 처리해드려요.'},
  {q:'환불이 가능한가요?', a:'결제 후 7일 이내 + 미이용 시 전액 환불돼요. 7일 경과 시 다음 결제일 전에 취소하면 이후 결제는 진행되지 않아요.'},

  {q:'비밀번호를 잊어버렸어요', a:'로그인 화면 → "비밀번호 찾기" → 가입 이메일로 인증번호 → 새 비밀번호 설정'},
  {q:'회원 탈퇴는?', a:'위 "탈퇴 요청" 버튼 또는 gung3625@gmail.com으로 요청하시면 1~2 영업일 내 처리돼요. 모든 데이터가 삭제되며 복구 불가능해요.'}
];

var arrow='<svg class="faq-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
var wrap=document.getElementById('faq');
faqs.forEach(function(f){
  var el=document.createElement('div');
  el.className='faq-item';
  el.innerHTML='<div class="faq-q" onclick="this.parentElement.classList.toggle(\'open\')"><span>'+f.q+'</span>'+arrow+'</div><div class="faq-a"><div class="faq-a-inner">'+f.a+'</div></div>';

var io=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){var delay=parseInt(e.target.dataset.delay||0);setTimeout(function(){e.target.classList.add('visible');},delay);io.unobserve(e.target);}});},{threshold:0.06});
