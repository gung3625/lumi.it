<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>고객센터 — lumi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap" rel="stylesheet">
<style>
@font-face{font-family:'Jua';src:url('/assets/BMJUA.woff2') format('woff2');font-display:block;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{background:#fdf2f4;scrollbar-width:none;scroll-behavior:smooth;overscroll-behavior:none;}
html::-webkit-scrollbar{display:none;}
body{font-family:'Jua',-apple-system,BlinkMacSystemFont,sans-serif;color:#0d1117;-webkit-font-smoothing:antialiased;padding-bottom:80px;overscroll-behavior:none;}
body.dark-mode{background:#111;color:#f0f2f8;}

nav{max-width:960px;margin:0 auto;padding:32px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-size:28px;font-weight:800;font-family:'Nunito',sans-serif;background:linear-gradient(90deg,#FF6B8B,#DDA0DD 50%,#EDD080 85%,#DABA65);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
.nav-close{width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.06);color:#0d1117;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .3s cubic-bezier(.4,0,.2,1),background .3s cubic-bezier(.4,0,.2,1);}
.nav-close:active{transform:scale(.9);}
body.dark-mode .nav-close{background:rgba(255,255,255,.08);color:#f0f2f8;}

.hero{max-width:960px;margin:0 auto;padding:48px 24px 40px;text-align:center;display:flex;flex-direction:column;align-items:center;}
.hero-lumi{width:120px;height:120px;object-fit:contain;animation:lumiBounce 3s ease-in-out infinite;margin-bottom:12px;}
@keyframes lumiBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero h1{font-size:clamp(28px,5vw,44px);margin-bottom:10px;}
.hero p{font-size:14px;color:rgba(0,0,0,.35);}
body.dark-mode .hero p{color:rgba(255,255,255,.3);}

.grid{max-width:960px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media(max-width:700px){.grid{grid-template-columns:1fr;}}

.section-label{max-width:960px;margin:48px auto 16px;padding:0 24px;font-size:13px;color:rgba(0,0,0,.35);}
body.dark-mode .section-label{color:rgba(255,255,255,.3);}

/* CONTACT CARDS */
.contact-card{background:#fff;border-radius:24px;padding:28px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;text-decoration:none;cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,.06);opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s cubic-bezier(.4,0,.2,1),box-shadow .4s cubic-bezier(.4,0,.2,1);}
.contact-card.visible{opacity:1;transform:translateY(0);}
.contact-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.1);transform:translateY(-4px);}
.contact-card.visible:hover{transform:translateY(-4px);}
body.dark-mode .contact-card{background:#1c1c1e;box-shadow:none;}
body.dark-mode .contact-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.3);}
.contact-icon{font-size:32px;}
.contact-name{font-size:17px;font-weight:400;}
.contact-desc{font-size:12px;color:rgba(0,0,0,.4);line-height:1.6;}
body.dark-mode .contact-desc{color:rgba(255,255,255,.4);}
.contact-btn{padding:12px 28px;border-radius:980px;border:none;font-family:inherit;font-size:14px;cursor:pointer;min-height:44px;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.contact-btn:active{transform:scale(.95);}
.contact-btn.yellow{background:#FEE500;color:#3A1D1D;}
.contact-btn.dark{background:#0d1117;color:#fff;}
body.dark-mode .contact-btn.dark{background:#f0f2f8;color:#0d1117;}
.contact-btn.pink{background:linear-gradient(135deg,#FF6B8B,#DDA0DD);color:#fff;}

.contact-card.kakao{border:2px solid #FEE500;}
body.dark-mode .contact-card.kakao{border-color:rgba(254,229,0,.3);}

/* FAQ */
.faq-wrap{max-width:960px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:10px;}
.faq-item{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.06);opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.faq-item.visible{opacity:1;transform:translateY(0);}
body.dark-mode .faq-item{background:#1c1c1e;box-shadow:none;}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;cursor:pointer;gap:12px;font-size:15px;user-select:none;transition:opacity .3s cubic-bezier(.4,0,.2,1);}
.faq-q:active{opacity:.7;}
.faq-arrow{width:18px;height:18px;flex-shrink:0;color:rgba(0,0,0,.25);transition:transform .4s cubic-bezier(.4,0,.2,1);}
body.dark-mode .faq-arrow{color:rgba(255,255,255,.25);}
.faq-item.open .faq-arrow{transform:rotate(180deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1);}
.faq-item.open .faq-a{max-height:300px;}
.faq-a-inner{padding:0 24px 20px;font-size:13px;line-height:1.9;color:rgba(0,0,0,.5);border-top:1px solid rgba(0,0,0,.06);}
body.dark-mode .faq-a-inner{color:rgba(255,255,255,.45);border-top-color:rgba(255,255,255,.06);}

/* ACTION CARDS */
.action-grid{max-width:960px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
@media(max-width:700px){.action-grid{grid-template-columns:1fr;}}
.action-card{background:#fff;border-radius:24px;padding:28px;box-shadow:0 2px 16px rgba(0,0,0,.06);opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.action-card.visible{opacity:1;transform:translateY(0);}
body.dark-mode .action-card{background:#1c1c1e;box-shadow:none;}
.action-card h3{font-size:17px;margin-bottom:8px;}
.action-card p{font-size:13px;color:rgba(0,0,0,.5);line-height:1.8;margin-bottom:16px;}
body.dark-mode .action-card p{color:rgba(255,255,255,.45);}
.action-card a{display:inline-block;padding:12px 28px;border-radius:980px;font-size:14px;text-decoration:none;font-family:inherit;min-height:44px;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.action-card a:active{transform:scale(.95);}
.action-card a.dark{background:#0d1117;color:#fff;}
body.dark-mode .action-card a.dark{background:#f0f2f8;color:#0d1117;}
.action-card a.danger{background:rgba(255,59,48,.1);color:#FF3B30;}

@media(max-width:480px){
  nav{padding:20px 16px 0;}
  .hero{padding:32px 16px 28px;}
  .hero-lumi{width:88px;height:88px;}
  .grid{padding:0 16px;gap:12px;}
  .section-label{padding:0 16px;margin:36px auto 12px;}
  .faq-wrap{padding:0 16px;gap:8px;}
  .faq-q{padding:16px 16px;min-height:48px;font-size:14px;}
  .faq-a-inner{padding:0 16px 16px;font-size:12px;}
  .action-grid{padding:0 16px;gap:12px;}
  .action-card{padding:22px 20px;}
  .contact-card{padding:22px 20px;}
}
</style>
</head>
<body>
<script>if(localStorage.getItem('lumi_dark_mode')!=='0'){document.body.classList.add('dark-mode');document.documentElement.style.background='#111';}</script>

<nav>
  <a href="/bento-preview.html" class="nav-logo">lumi</a>
  <button class="nav-close" onclick="location.href='/bento-preview.html'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
</nav>

<div class="hero">
  <img src="/assets/lumi-curious.png" class="hero-lumi" alt="lumi">
  <h1>무엇이든 물어보세요</h1>
  <p>편하신 방법으로 연락해 주세요</p>
</div>

<!-- 연락 방법 -->
<div class="grid">
  <a href="https://pf.kakao.com/_lumi_it" target="_blank" class="contact-card kakao">
    <span class="contact-icon">💛</span>
    <span class="contact-name">카카오톡</span>
    <span class="contact-desc">가장 빠른 응답<br>평일 10시 ~ 18시</span>
    <span class="contact-btn yellow">채널 추가</span>
  </a>
  <a href="mailto:gung3625@gmail.com" class="contact-card">
    <span class="contact-icon">📧</span>
    <span class="contact-name">이메일</span>
    <span class="contact-desc">gung3625@gmail.com<br>1~2 영업일 내 답변</span>
    <span class="contact-btn dark">메일 보내기</span>
  </a>
</div>

<!-- FAQ -->
<p class="section-label">자주 묻는 질문</p>
<div class="faq-wrap" id="faq"></div>

<!-- 구독 취소 / 탈퇴 -->
<p class="section-label">구독 취소 · 회원 탈퇴</p>
<div class="action-grid">
  <div class="action-card">
    <h3>구독 취소</h3>
    <p>다음 결제일부터 자동결제가 중단돼요. 현재 결제 기간 만료까지 정상 이용 가능하고, 위약금은 없어요.</p>
    <a href="mailto:gung3625@gmail.com?subject=구독 취소 요청" class="dark">구독 취소 요청</a>
  </div>
  <div class="action-card">
    <h3>회원 탈퇴</h3>
    <p>탈퇴 시 모든 데이터가 삭제되며 복구할 수 없어요. 신중하게 결정해 주세요.</p>
    <a href="mailto:gung3625@gmail.com?subject=회원 탈퇴 요청" class="danger">탈퇴 요청</a>
  </div>
</div>

<script>
var faqs = [
  {q:'인스타그램 비밀번호를 알려줘야 하나요?', a:'아니요. Meta 공식 API를 통해 연동하기 때문에 비밀번호 없이 안전하게 연결돼요.'},
  {q:'7일 무료체험 후 자동으로 결제되나요?', a:'아니요. 카드 등록 없이 시작하기 때문에 자동 결제는 없어요. 7일 후 계속 쓰고 싶으시면 그때 구독을 시작하시면 돼요.'},
  {q:'구독 취소는 어떻게 하나요?', a:'언제든 취소 가능하고 위약금 없어요. 대시보드에서 직접 취소하거나, gung3625@gmail.com으로 메일 보내주시면 바로 처리해드려요.'},
  {q:'환불이 가능한가요?', a:'결제 후 7일 이내 + 미이용 시 전액 환불돼요. 7일 경과 시 다음 결제일 전에 취소하면 이후 결제는 진행되지 않아요.'},
  {q:'게시물이 마음에 안 들면?', a:'코멘트 칸에 원하는 방향을 적어주세요. "좀 더 따뜻하게", "신메뉴 가격도 넣어줘" 같은 메모면 충분해요. 인스타그램에서 직접 수정도 가능해요.'},
  {q:'비즈니스 계정이 없어도 되나요?', a:'자동 게시는 비즈니스 또는 크리에이터 계정이 필요해요. 개인 → 비즈니스 전환은 인스타 앱에서 무료로 할 수 있고, 기존 게시물이나 팔로워에는 영향 없어요.'},
  {q:'사진은 몇 장까지?', a:'한 번에 최대 10장. 여러 장이면 캐러셀(묶음 게시물) 형태로 자동 업로드돼요.'},
  {q:'예약 게시는 어떻게?', a:'사진과 코멘트를 올린 후 날짜·시간 선택하고 "예약 저장"을 누르면 돼요. lumi가 해당 시간에 자동 게시해요.'},
  {q:'비밀번호를 잊어버렸어요', a:'로그인 화면 → "비밀번호 찾기" → 가입 이메일로 인증번호 → 새 비밀번호 설정'},
  {q:'회원 탈퇴는?', a:'위 "탈퇴 요청" 버튼 또는 gung3625@gmail.com으로 요청하시면 1~2 영업일 내 처리돼요. 모든 데이터가 삭제되며 복구 불가능해요.'}
];

var arrow='<svg class="faq-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
var wrap=document.getElementById('faq');
faqs.forEach(function(f){
  var el=document.createElement('div');
  el.className='faq-item';
  el.innerHTML='<div class="faq-q" onclick="this.parentElement.classList.toggle(\'open\')"><span>'+f.q+'</span>'+arrow+'</div><div class="faq-a"><div class="faq-a-inner">'+f.a+'</div></div>';
  wrap.appendChild(el);
});

var io=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});},{threshold:0.1});
document.querySelectorAll('.contact-card,.faq-item,.action-card').forEach(function(c){io.observe(c);});
</script>
</body>
</html>
