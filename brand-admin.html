<style>
@font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/packages/pretendard/dist/web/static/woff2/Pretendard-Regular.woff2') format('woff2');font-weight:400;font-display:swap;}
@font-face{font-family:'Pretendard';src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/packages/pretendard/dist/web/static/woff2/Pretendard-SemiBold.woff2') format('woff2');font-weight:600;font-display:swap;}
@font-face{font-family:'Jua';src:url('/assets/BMJUA.woff2') format('woff2');font-display:block;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{background:#f5f5f7;scrollbar-width:none;scroll-behavior:smooth;}
html::-webkit-scrollbar{display:none;}
body{font-family:'Pretendard','Jua',-apple-system,BlinkMacSystemFont,sans-serif;font-size:17px;font-weight:400;line-height:1.47;letter-spacing:-.374px;color:#1d1d1f;-webkit-font-smoothing:antialiased;padding-bottom:80px;}
body.dark-mode{background:#111;color:#f0f2f8;}

/* nav */
nav{position:sticky;top:0;z-index:100;max-width:100%;padding:0 24px;height:48px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;background:rgba(245,245,247,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
body.dark-mode nav{background:rgba(0,0,0,.88);}
.nav-logo{font-size:22px;font-weight:800;font-family:'Nunito',sans-serif;background:linear-gradient(90deg,#FF6B8B,#DDA0DD 50%,#EDD080 85%,#DABA65);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;justify-self:center;}
.nav-back{width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.06);color:#1d1d1f;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .25s,filter .25s;justify-self:start;}
.nav-back:hover{filter:brightness(.85);}
.nav-back:active{transform:scale(.9);}
body.dark-mode .nav-back{background:rgba(255,255,255,.1);color:#f0f2f8;}

/* hero */
.hero{max-width:960px;margin:0 auto;padding:48px 24px 32px;display:flex;flex-direction:column;align-items:flex-start;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:#C8507A;color:#fff;font-size:12px;font-weight:600;padding:4px 12px;border-radius:980px;margin-bottom:16px;letter-spacing:.3px;}
.hero h1{font-size:clamp(26px,5vw,38px);font-weight:600;letter-spacing:-.5px;margin-bottom:8px;}
.hero p{font-size:15px;color:#6e6e73;}
body.dark-mode .hero p{color:rgba(255,255,255,.5);}

/* grid */
.grid{max-width:960px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:1fr;gap:20px;}

/* section card */
.section-card{background:#fff;border-radius:8px;padding:28px;display:flex;flex-direction:column;gap:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
body.dark-mode .section-card{background:#272729;box-shadow:none;}

.section-card-header{display:flex;align-items:center;gap:12px;}
.section-card-icon{display:flex;align-items:center;color:#C8507A;}
.section-card-title{font-size:18px;font-weight:600;}
.section-card-badge{font-size:11px;font-weight:600;color:#6e6e73;background:rgba(0,0,0,.05);padding:3px 10px;border-radius:980px;letter-spacing:.4px;}
body.dark-mode .section-card-badge{background:rgba(255,255,255,.08);color:rgba(255,255,255,.45);}

.placeholder-body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:32px 0;border:1.5px dashed rgba(0,0,0,.1);border-radius:8px;text-align:center;}
body.dark-mode .placeholder-body{border-color:rgba(255,255,255,.1);}
.placeholder-body svg{opacity:.25;}
.placeholder-body p{font-size:14px;color:#6e6e73;line-height:1.6;}
body.dark-mode .placeholder-body p{color:rgba(255,255,255,.35);}
.placeholder-body strong{font-weight:600;color:#C8507A;}

/* loading overlay */
#admin-loading{position:fixed;inset:0;background:#f5f5f7;display:flex;align-items:center;justify-content:center;z-index:999;}
body.dark-mode #admin-loading{background:#111;}
.spinner{width:32px;height:32px;border:3px solid rgba(200,80,122,.15);border-top-color:#C8507A;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* FAB */
#fab-dark{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:20px;z-index:200;width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,.07);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .3s,transform .2s;}
#fab-dark:hover{transform:scale(1.08);}
body.dark-mode #fab-dark{background:rgba(255,255,255,.1);}

/* library grid */
.lib-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:980px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .15s;min-height:44px;}
.btn:active{transform:scale(.95);}
.btn-primary{background:#C8507A;color:#fff;}
.btn-primary:hover{opacity:.88;}
.btn-secondary{background:rgba(0,0,0,.07);color:#1d1d1f;}
.btn-secondary:hover{opacity:.75;}
body.dark-mode .btn-secondary{background:rgba(255,255,255,.1);color:#f0f2f8;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

.industry-group{display:flex;flex-direction:column;gap:10px;}
.industry-label{font-size:13px;font-weight:600;color:#6e6e73;letter-spacing:.3px;text-transform:uppercase;}
body.dark-mode .industry-label{color:rgba(255,255,255,.4);}
.lib-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
.lib-card{background:#f5f5f7;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;}
body.dark-mode .lib-card{background:#1c1c1e;}
.lib-thumb{width:100%;aspect-ratio:9/16;object-fit:cover;background:#e5e5ea;display:flex;align-items:center;justify-content:center;color:#c7c7cc;}
body.dark-mode .lib-thumb{background:#2c2c2e;}
.lib-thumb img,.lib-thumb video{width:100%;height:100%;object-fit:cover;}
.lib-thumb-placeholder{display:flex;align-items:center;justify-content:center;width:100%;height:100%;aspect-ratio:9/16;background:#e5e5ea;}
body.dark-mode .lib-thumb-placeholder{background:#2c2c2e;}
.lib-info{padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.lib-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.lib-type-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:980px;letter-spacing:.3px;}
.lib-type-badge.image{background:rgba(200,80,122,.12);color:#C8507A;}
.lib-type-badge.video{background:rgba(52,120,246,.12);color:#3478f6;}
.status-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:980px;}
.status-badge.ready{background:rgba(52,199,89,.12);color:#34c759;}
.status-badge.generating{background:rgba(255,159,10,.12);color:#ff9f0a;}
.status-badge.failed{background:rgba(255,59,48,.12);color:#ff3b30;}
.lib-date{font-size:11px;color:#6e6e73;}
body.dark-mode .lib-date{color:rgba(255,255,255,.55);}
.lib-count{font-size:11px;color:#6e6e73;}
body.dark-mode .lib-count{color:rgba(255,255,255,.55);}
.lib-regen-btn{margin:0 12px 12px;padding:6px 0;border-radius:980px;border:none;background:rgba(0,0,0,.06);color:#1d1d1f;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s;min-height:44px;}
.lib-regen-btn:hover{opacity:.7;}
body.dark-mode .lib-regen-btn{background:rgba(255,255,255,.08);color:#f0f2f8;}

/* progress bar */
.progress-wrap{display:none;margin:12px 0 4px;padding:14px 16px;background:rgba(200,80,122,.08);border-radius:12px;}
.progress-wrap.active{display:block;}
.progress-label{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#C8507A;font-weight:600;margin-bottom:10px;}
.progress-bar{height:8px;background:rgba(200,80,122,.15);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#C8507A,#f093b0);border-radius:4px;transition:width .5s ease;width:0%;}
body.dark-mode .progress-wrap{background:rgba(200,80,122,.14);}
body.dark-mode .progress-bar{background:rgba(200,80,122,.22);}

/* schedule table */
.schedule-actions{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.schedule-table{width:100%;border-collapse:collapse;}
.schedule-table th,.schedule-table td{padding:10px 14px;text-align:left;font-size:14px;border-bottom:1px solid rgba(0,0,0,.06);}
body.dark-mode .schedule-table th,body.dark-mode .schedule-table td{border-color:rgba(255,255,255,.06);}
.schedule-table th{font-weight:600;color:#6e6e73;font-size:12px;letter-spacing:.3px;text-transform:uppercase;}
body.dark-mode .schedule-table th{color:rgba(255,255,255,.4);}
.schedule-table tr:last-child td{border-bottom:none;}
.schedule-table tbody tr:hover{background:rgba(0,0,0,.02);}
body.dark-mode .schedule-table tbody tr:hover{background:rgba(255,255,255,.03);}
.weekday-label{font-weight:600;}
.today-row{background:rgba(200,80,122,.04);}
body.dark-mode .today-row{background:rgba(200,80,122,.06);}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:#fff;border-radius:16px;padding:28px;max-width:380px;width:100%;display:flex;flex-direction:column;gap:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
body.dark-mode .modal-box{background:#272729;}
.modal-title{font-size:18px;font-weight:600;}
.modal-desc{font-size:14px;color:#6e6e73;line-height:1.6;}
body.dark-mode .modal-desc{color:rgba(255,255,255,.5);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}

/* toast */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;font-size:14px;font-weight:500;padding:10px 20px;border-radius:980px;z-index:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
body.dark-mode .toast{background:#f0f2f8;color:#1d1d1f;}
.toast.show{opacity:1;}

@media(max-width:767px){
  .hero{padding:32px 20px 24px;}
  .section-card{padding:20px 18px;}
  .lib-cards{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  .schedule-table th,.schedule-table td{padding:8px 10px;font-size:13px;}
  .modal-box{padding:22px;}
}
</style>
</head>

<script>
// ── 업종 한글 매핑
var INDUSTRY_KO = {cafe:'카페',restaurant:'음식점',beauty:'뷰티샵',nail:'네일샵',flower:'꽃집',clothing:'의류매장',gym:'헬스장'};
var WEEKDAY_KO = ['일','월','화','수','목','금','토'];
var INDUSTRIES = ['cafe','restaurant','beauty','nail','flower','clothing','gym'];

// ── 인증 토큰
function getToken() { return localStorage.getItem('lumi_token') || ''; }
function authHeaders() { return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' }; }

// ── 토스트
var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ── 모달
var modalCallback = null;
function showModal(title, desc, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-desc').textContent = desc;
  modalCallback = cb;
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
  modalCallback = null;
}
document.getElementById('modal-confirm-btn').onclick = function() {
  closeModal();
  if (modalCallback) modalCallback();
};
document.getElementById('modal').onclick = function(e) { if (e.target === this) closeModal(); };

// ── admin 인증 체크
(function() {
  var token = getToken();
  if (!token) { window.location = '/'; return; }
  fetch('/api/admin-auth-check', { method: 'POST', headers: authHeaders() })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (!res.ok || !res.data || !res.data.is_admin) { window.location = '/'; return; }
      var loading = document.getElementById('admin-loading');
      if (loading) loading.style.display = 'none';
      loadLibrary();
      loadTesters();
    })
    .catch(function() { window.location = '/'; });
})();

// ── 라이브러리 로드
function loadLibrary() {
  fetch('/api/admin-library-list', { method: 'GET', headers: authHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      renderLibrary(d.library || []);
      renderSchedule(d.schedule || []);
    })
    .catch(function(e) {
      var p = document.createElement('p');
      p.style.cssText = 'color:#ff3b30;font-size:14px;padding:16px 0;';
      p.textContent = '라이브러리 로드 실패: ' + e.message;
      var el = document.getElementById('library-body');
      el.innerHTML = '';
      el.appendChild(p);
    });
}

// ── 라이브러리 렌더링
function renderLibrary(library) {
  var body = document.getElementById('library-body');

  // 업종별 그룹화 — 라이브러리가 비어 있어도 28개 빈 슬롯 카드 렌더
  var grouped = {};
  INDUSTRIES.forEach(function(ind) { grouped[ind] = { image: [], video: [] }; });
  library.forEach(function(item) {
    if (grouped[item.industry] && grouped[item.industry][item.content_type]) {
      grouped[item.industry][item.content_type].push(item);
    }
  });

  var html = '';
  INDUSTRIES.forEach(function(ind) {
    html += '<div class="industry-group" style="margin-bottom:20px;">';
    html += '<div class="industry-label">' + INDUSTRY_KO[ind] + '</div>';
    html += '<div class="lib-cards">';
    ['image','video'].forEach(function(ct) {
      var slots = grouped[ind][ct];
      // 항상 2슬롯 표시
      for (var i = 0; i < 2; i++) {
        var item = slots[i];
        html += renderLibCard(ind, ct, i, item);
      }
    });
    html += '</div></div>';
  });
  body.innerHTML = html;
}

function renderLibCard(industry, ct, slotIdx, item) {
  var statusLabel = item ? item.status : 'none';
  var statusText = {ready:'준비완료', generating:'생성중', failed:'실패', none:'미생성'}[statusLabel] || statusLabel;
  var statusClass = {ready:'ready', generating:'generating', failed:'failed', none:'failed'}[statusLabel] || 'failed';

  var thumbHtml = '<div class="lib-thumb-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".3"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg></div>';
  if (item && item.status === 'ready' && item.public_url) {
    if (ct === 'image') {
      thumbHtml = '<div class="lib-thumb"><img src="' + item.public_url + '" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;aspect-ratio:9/16;"></div>';
    } else {
      thumbHtml = '<div class="lib-thumb"><video src="' + item.public_url + '" muted loop playsinline style="width:100%;height:100%;object-fit:cover;aspect-ratio:9/16;" onmouseenter="this.play()" onmouseleave="this.pause()"></video></div>';
    }
  } else {
    thumbHtml = '<div class="lib-thumb-placeholder" style="aspect-ratio:9/16;">' + thumbHtml + '</div>';
  }

  var lastUsed = item && item.last_used_at ? new Date(item.last_used_at).toLocaleDateString('ko-KR') : '-';
  var useCount = item ? (item.use_count || 0) : 0;
  var genDate = item && item.generated_at ? new Date(item.generated_at).toLocaleDateString('ko-KR') : '-';

  var regenDisabled = item && item.status === 'generating' ? 'disabled' : '';
  var regenLabel = item && item.status === 'generating' ? '생성중...' : '재생성';

  return '<div class="lib-card">'
    + thumbHtml
    + '<div class="lib-info">'
    + '<div class="lib-meta">'
    + '<span class="lib-type-badge ' + ct + '">' + (ct === 'image' ? '이미지' : '영상') + '</span>'
    + (item ? '<span class="status-badge ' + statusClass + '">' + statusText + '</span>' : '<span class="status-badge failed">미생성</span>')
    + '</div>'
    + '<div class="lib-date">생성 ' + genDate + '</div>'
    + '<div class="lib-count">사용 ' + useCount + '회 · 최근 ' + lastUsed + '</div>'
    + '</div>'
    + '<button class="lib-regen-btn" ' + regenDisabled + ' onclick="regenSlot(\'' + industry + '\',\'' + ct + '\',' + slotIdx + ',this)">' + regenLabel + '</button>'
    + '</div>';
}

// ── 전체 생성 확인
function confirmGenAll() {
  showModal(
    '전체 라이브러리 생성',
    '28개(7업종 × 이미지 2 + 영상 2)를 새로 생성합니다. 기존 콘텐츠는 덮어씌워지고 약 15~30분 소요됩니다. 계속하시겠습니까?',
    function() { triggerGenAll(); }
  );
}

function triggerGenAll() {
  var btn = document.getElementById('btn-gen-all');
  btn.disabled = true;
  btn.textContent = '생성중...';
  showToast('전체 생성이 시작되었습니다. 완료까지 15~30분 소요됩니다.');

  fetch('/api/admin-library-regenerate', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ mode: 'all' })
  })
  .then(function(r) { return r.json().then(function(d){ return { ok:r.ok, d:d }; }); })
  .then(function(res) {
    if (!res.ok) throw new Error(res.d && res.d.error || '트리거 실패');
    showToast(res.d.message || '생성 트리거 완료');
    startGenProgress('전체 생성 중', 28);
  })
  .catch(function(e) {
    showToast('생성 중 오류: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> 전체 생성';
  });
}

// ── 단일 슬롯 재생성
function regenSlot(industry, contentType, slotIndex, btnEl) {
  btnEl.disabled = true;
  btnEl.textContent = '요청중...';
  showToast(INDUSTRY_KO[industry] + ' ' + (contentType === 'image' ? '이미지' : '영상') + ' 재생성 요청...');

  fetch('/api/admin-library-regenerate', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ industry: industry, content_type: contentType, slot_index: slotIndex })
  })
  .then(function(r) { return r.json().then(function(d){ return { ok:r.ok, d:d }; }); })
  .then(function(res) {
    if (!res.ok) throw new Error(res.d && res.d.error || '요청 실패');
    showToast(res.d.message || '재생성 시작됨');
    btnEl.textContent = '생성중...';
    startGenProgress(INDUSTRY_KO[industry] + ' ' + (contentType === 'image' ? '이미지' : '영상') + ' 생성 중', 1);
  })
  .catch(function(e) {
    showToast('재생성 요청 실패: ' + e.message);
    btnEl.disabled = false;
    btnEl.textContent = '재생성';
  });
}

// ── 생성 진행 게이지바 (자동 폴링)
var genPollTimer = null;
var genPollExpected = 0;
var genPollBaseline = 0;
var genPollStartAt = 0;

function startGenProgress(label, expectedDelta) {
  // 현재 이미 ready/failed 인 항목 수를 baseline 으로 기록 → 이후 증가분을 진행률로 계산
  fetch('/api/admin-library-list', { method: 'GET', headers: authHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var lib = d.library || [];
      genPollBaseline = lib.filter(function(i){ return i.status === 'ready' || i.status === 'failed'; }).length;
      genPollExpected = expectedDelta;
      genPollStartAt = Date.now();

      var wrap = document.getElementById('gen-progress');
      wrap.classList.add('active');
      document.getElementById('gen-progress-text').textContent = label;
      document.getElementById('gen-progress-count').textContent = '0 / ' + expectedDelta;
      document.getElementById('gen-progress-fill').style.width = '0%';

      if (genPollTimer) clearInterval(genPollTimer);
      pollGenProgress();
      genPollTimer = setInterval(pollGenProgress, 3000);
    });
}

function pollGenProgress() {
  // 안전 타임아웃 45분
  if (Date.now() - genPollStartAt > 45 * 60 * 1000) {
    stopGenProgress('시간 초과 (45분) — 수동으로 확인해주세요', null);
    return;
  }
  fetch('/api/admin-library-list', { method: 'GET', headers: authHeaders() })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      var lib = d.library || [];
      var doneItems = lib.filter(function(i){ return i.status === 'ready' || i.status === 'failed'; });
      var failedItems = lib.filter(function(i){ return i.status === 'failed'; });
      var doneNow = doneItems.length;
      var progress = Math.max(0, doneNow - genPollBaseline);
      if (progress > genPollExpected) progress = genPollExpected;
      var pct = Math.min(100, Math.round(progress / genPollExpected * 100));
      var failedCount = failedItems.length;
      document.getElementById('gen-progress-count').textContent = progress + ' / ' + genPollExpected + (failedCount ? ' (실패 ' + failedCount + ')' : '');
      document.getElementById('gen-progress-fill').style.width = pct + '%';

      // 최근 실패 메시지 노출 (개인정보 없음 — OpenAI/Storage 에러 그대로)
      var noteEl = document.getElementById('gen-progress-note');
      if (failedCount > 0 && noteEl) {
        var latestFail = failedItems.sort(function(a,b){ return (b.generated_at || '').localeCompare(a.generated_at || ''); })[0];
        var msg = latestFail && latestFail.error_message ? latestFail.error_message : '알 수 없는 오류';
        // OpenAI 크레딧/쿼터 에러 친절한 힌트
        var hint = '';
        if (/insufficient|quota|credit|billing|payment/i.test(msg)) hint = ' — OpenAI 크레딧/결제 확인 필요';
        else if (/organization|verification|verify/i.test(msg)) hint = ' — OpenAI 조직 인증 필요';
        else if (/rate|429/i.test(msg)) hint = ' — 요청 속도 제한 (잠시 후 재시도)';
        noteEl.style.display = 'block';
        noteEl.textContent = '최근 실패: ' + msg + hint;
      } else if (noteEl) {
        noteEl.style.display = 'none';
        noteEl.textContent = '';
      }

      renderLibrary(lib);
      renderSchedule(d.schedule || []);

      if (progress >= genPollExpected) {
        var succCount = progress - failedCount;
        var summary;
        if (failedCount === 0) summary = '완료 ✓ 성공 ' + progress + '개';
        else if (succCount === 0) summary = '완료 — 전부 실패 ' + failedCount + '개';
        else summary = '완료 — 성공 ' + succCount + '개 / 실패 ' + failedCount + '개';
        stopGenProgress(summary, failedItems);
      }
    })
    .catch(function(){});
}

function stopGenProgress(finalText, failedItems) {
  if (genPollTimer) { clearInterval(genPollTimer); genPollTimer = null; }
  document.getElementById('gen-progress-text').textContent = finalText || '완료';
  document.getElementById('gen-progress-fill').style.width = '100%';
  var btn = document.getElementById('btn-gen-all');
  if (btn) {
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> 전체 생성';
  }
  // 실패 있으면 토스트로도 명시 — 실패 없으면 성공 토스트
  if (failedItems && failedItems.length) {
    showToast('일부 실패: ' + failedItems.length + '개 — 아래 메시지 확인');
  } else if (failedItems) {
    showToast('생성 완료 ✓');
  }
  // 실패 없을 때만 자동 숨김, 실패 있으면 계속 노출해 에러 확인 가능
  if (!failedItems || !failedItems.length) {
    setTimeout(function() {
      var wrap = document.getElementById('gen-progress');
      if (wrap) wrap.classList.remove('active');
    }, 5000);
  }
}

// ── 스케줄 렌더링
function renderSchedule(schedule) {
  var body = document.getElementById('schedule-body');
  if (!schedule.length) {
    body.innerHTML = '<div class="placeholder-body"><p>스케줄 데이터가 없습니다.</p></div>';
    return;
  }

  var todayWeekday = new Date().getDay();
  var html = '<div style="overflow-x:auto;"><table class="schedule-table"><thead><tr><th>요일</th><th>업종</th><th>설정일</th></tr></thead><tbody>';
  schedule.forEach(function(row) {
    var isToday = row.weekday === todayWeekday;
    var weekStartStr = row.week_start_date ? new Date(row.week_start_date).toLocaleDateString('ko-KR') : '-';
    html += '<tr class="' + (isToday ? 'today-row' : '') + '">'
      + '<td><span class="weekday-label">' + WEEKDAY_KO[row.weekday] + '요일</span>' + (isToday ? ' <span style="font-size:10px;color:#C8507A;font-weight:600;">오늘</span>' : '') + '</td>'
      + '<td>' + (INDUSTRY_KO[row.industry] || row.industry) + '</td>'
      + '<td><span class="lib-date">' + weekStartStr + '~</span></td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  body.innerHTML = html;
}

// ── 베타 테스터 신청 목록
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function formatDateShort(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    if (isNaN(d.getTime())) return '';
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    var hh = String(d.getHours()).padStart(2, '0');
    var mi = String(d.getMinutes()).padStart(2, '0');
    return mm + '/' + dd + ' ' + hh + ':' + mi;
  } catch (_) { return ''; }
}

function loadTesters() {
  var list = document.getElementById('testers-list');
  var countEl = document.getElementById('testers-count');
  if (list) list.innerHTML = '<p style="font-size:13px;color:#6e6e73;margin:0;">불러오는 중…</p>';
  fetch('/api/admin-list-testers', { method: 'GET', headers: authHeaders() })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (!res.ok) { throw new Error((res.data && res.data.error) || '조회 실패'); }
      renderTesters(res.data.testers || []);
    })
    .catch(function(e) {
      if (list) list.innerHTML = '<p style="font-size:13px;color:#C8507A;margin:0;">' + escapeHtml(e.message || '조회 실패') + '</p>';
      if (countEl) countEl.textContent = '오류';
    });
}

function renderTesters(testers) {
  var list = document.getElementById('testers-list');
  var countEl = document.getElementById('testers-count');
  if (!list) return;

  var pending = testers.filter(function(t) { return t.tester_invite_status !== 'invited'; }).length;
  if (countEl) countEl.textContent = '신청 ' + testers.length + '명 · 대기 ' + pending + '명';

  if (testers.length === 0) {
    list.innerHTML = '<p style="font-size:13px;color:#6e6e73;margin:0;">아직 신청한 테스터가 없어요.</p>';
    return;
  }

  var isDark = document.body.classList.contains('dark-mode');
  var rowBg = isDark ? 'rgba(255,255,255,.04)' : '#f5f5f7';
  var subColor = isDark ? 'rgba(255,255,255,.55)' : '#6e6e73';
  var pink = '#C8507A';

  list.innerHTML = testers.map(function(t) {
    var invited = t.tester_invite_status === 'invited';
    var handle = t.tester_ig_handle ? '@' + t.tester_ig_handle : '(핸들 없음)';
    var who = [t.name || '', t.email || ''].filter(Boolean).join(' · ');
    var when = formatDateShort(t.tester_submitted_at);
    var btnLabel = invited ? '대기로 되돌리기' : '초대 완료';
    var btnBg = invited ? (isDark ? 'rgba(255,255,255,.1)' : 'rgba(0,0,0,.06)') : pink;
    var btnColor = invited ? (isDark ? '#f0f2f8' : '#1d1d1f') : '#fff';
    var statusBadge = invited
      ? '<span style="font-size:11px;font-weight:600;color:' + pink + ';background:rgba(200,80,122,.1);padding:3px 10px;border-radius:980px;">초대 완료</span>'
      : '<span style="font-size:11px;font-weight:600;color:' + subColor + ';background:rgba(0,0,0,.05);padding:3px 10px;border-radius:980px;">대기</span>';

    var igLink = t.tester_ig_handle
      ? '<a href="https://instagram.com/' + escapeHtml(t.tester_ig_handle) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">' + escapeHtml(handle) + '</a>'
      : escapeHtml(handle);

    return (
      '<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:' + rowBg + ';border-radius:8px;flex-wrap:wrap;">' +
        '<div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;">' +
          '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
            '<span style="font-size:14px;font-weight:600;">' + igLink + '</span>' +
            statusBadge +
          '</div>' +
          '<span style="font-size:12px;color:' + subColor + ';">' + escapeHtml(who) + (when ? ' · ' + escapeHtml(when) : '') + '</span>' +
        '</div>' +
        '<button class="tester-btn" data-user-id="' + escapeHtml(t.id) + '" data-action="' + (invited ? 'pending' : 'invited') + '" ' +
          'style="border:none;border-radius:980px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;background:' + btnBg + ';color:' + btnColor + ';white-space:nowrap;">' +
          btnLabel +
        '</button>' +
      '</div>'
    );
  }).join('');

  Array.prototype.forEach.call(list.querySelectorAll('.tester-btn'), function(btn) {
    btn.onclick = function() {
      var uid = btn.getAttribute('data-user-id');
      var action = btn.getAttribute('data-action');
      markTesterInvited(uid, action, btn);
    };
  });
}

function markTesterInvited(userId, nextStatus, btnEl) {
  if (!userId) return;
  if (btnEl) { btnEl.disabled = true; btnEl.textContent = '처리 중…'; btnEl.style.opacity = '.6'; }
  fetch('/api/admin-mark-invited', {
    method: 'POST',
    headers: authHeaders(),
    body: JSON.stringify({ user_id: userId, status: nextStatus }),
  })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
      if (!res.ok) throw new Error((res.data && res.data.error) || '업데이트 실패');
      showToast(nextStatus === 'invited' ? '초대 완료로 표시했어요' : '대기 상태로 되돌렸어요');
      loadTesters();
    })
    .catch(function(e) {
      showToast(e.message || '업데이트 실패');
      if (btnEl) { btnEl.disabled = false; btnEl.style.opacity = '1'; }
    });
}
</script>
</body>
</html>
