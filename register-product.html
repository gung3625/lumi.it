<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="루미 — 사진 올리기">
  <title>사진 올리기 · 루미</title>

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <meta name="view-transition" content="same-origin">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/motion.css">
  <link rel="stylesheet" href="/css/tabbar.css">
  <link rel="stylesheet" href="/css/legal.css">

  <style>
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 56px); }

    .topbar {
      position: sticky; top: 0;
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      z-index: var(--z-sticky); min-height: 52px;
    }
    .topbar__back {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius-full); color: var(--ink);
    }
    .topbar__back:hover { background: var(--bg-soft); }
    .topbar__back svg { width: 20px; height: 20px; stroke-width: 2.2; }
    .topbar__title { font-size: var(--text-headline); font-weight: var(--weight-semibold); color: var(--ink); flex: 1; }

    .wrap { padding: var(--space-4); max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--space-5); }

    .field { display: flex; flex-direction: column; gap: var(--space-2); }
    .field__label {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--ink-soft);
      letter-spacing: 0.02em;
    }

    /* 드롭존 */
    .dropzone {
      display: block;
      position: relative;
      padding: var(--space-12) var(--space-5);
      background: var(--bg-soft);
      border: 2px dashed var(--line-strong);
      border-radius: var(--radius-lg);
      text-align: center;
      color: var(--ink-muted);
      transition:
        border-color var(--duration-snap) var(--ease-toss),
        background var(--duration-snap) var(--ease-toss);
      cursor: pointer;
    }
    .dropzone:hover { border-color: var(--pink-300); background: var(--pink-50); }
    .dropzone.is-dragover {
      border-color: var(--pink-500);
      background: var(--pink-50);
      transform: scale(1.01);
    }
    .dropzone__icon {
      width: 56px; height: 56px;
      margin: 0 auto var(--space-3);
      border-radius: var(--radius-full);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--pink-500);
      box-shadow: var(--shadow-sm);
      animation: drop-bob 2.4s var(--ease-soft) infinite;
    }
    .dropzone__icon svg { width: 28px; height: 28px; stroke-width: 2; }
    @keyframes drop-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    .dropzone__title {
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      margin-bottom: 4px;
    }
    .dropzone__sub { font-size: var(--text-caption); }
    .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* 사진 그리드 */
    .photos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-2);
    }
    .photo {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-soft);
      animation: rise 360ms var(--ease-toss) backwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    .photo:nth-child(1) { animation-delay: 0ms; }
    .photo:nth-child(2) { animation-delay: 60ms; }
    .photo:nth-child(3) { animation-delay: 120ms; }
    .photo:nth-child(4) { animation-delay: 180ms; }
    .photo:nth-child(5) { animation-delay: 240ms; }
    .photo:nth-child(6) { animation-delay: 300ms; }
    .photo:nth-child(7) { animation-delay: 360ms; }
    .photo:nth-child(8) { animation-delay: 420ms; }
    .photo:nth-child(9) { animation-delay: 480ms; }
    .photo:nth-child(10) { animation-delay: 540ms; }
    .photo img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .photo__remove {
      position: absolute;
      top: 6px; right: 6px;
      width: 24px; height: 24px;
      border-radius: var(--radius-full);
      background: rgba(0,0,0,0.6);
      color: white;
      display: flex; align-items: center; justify-content: center;
      border: none;
    }
    .photo__remove:hover { background: rgba(200,80,122,0.9); }
    .photo__remove svg { width: 14px; height: 14px; stroke-width: 2.5; }
    .photo__add {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-md);
      background: var(--bg-soft);
      border: 1px dashed var(--line-strong);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-muted);
      cursor: pointer;
      width: 100%;
    }
    .photo__add:hover { border-color: var(--pink-300); color: var(--pink-500); }
    .photo__add svg { width: 28px; height: 28px; stroke-width: 2; }
    .photo__add input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* 입력 */
    /* 한 줄 메모 — 예시 칩 */
    .memo-hint {
      font-size: var(--text-caption);
      color: var(--ink-muted);
      line-height: 1.55;
      margin-bottom: var(--space-2);
    }
    .memo-examples {
      display: flex; flex-wrap: wrap;
      gap: 6px;
      margin-bottom: var(--space-2);
    }
    .memo-example {
      padding: 4px 10px;
      border-radius: var(--radius-pill);
      background: var(--bg-soft);
      border: 1px solid var(--line);
      font-size: var(--text-caption);
      color: var(--ink-soft);
      transition:
        background var(--duration-snap) var(--ease-toss),
        border-color var(--duration-snap) var(--ease-toss),
        transform var(--duration-snap) var(--ease-toss);
    }
    .memo-example:active { transform: scale(0.96); }
    @media (hover: hover) {
      .memo-example:hover { background: var(--pink-50); border-color: var(--pink-300); }
    }

    .input, textarea.input {
      padding: var(--space-3) var(--space-4);
      font-size: max(16px, var(--text-body)); /* iOS Safari 자동 줌 방지 */
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--ink);
      width: 100%;
      font-family: inherit;
    }
    textarea.input { resize: vertical; min-height: 80px; }

    .schedule-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }
    .schedule-card {
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-lg);
      text-align: center;
      font-weight: var(--weight-semibold);
      color: var(--ink);
    }
    .schedule-card.is-active {
      background: var(--pink-50);
      border-color: var(--pink-500);
      color: var(--pink-700);
      box-shadow: var(--shadow-glow-sm);
      animation: card-pop 420ms var(--ease-toss);
    }
    @keyframes card-pop {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.03); }
    }

    .cta {
      width: 100%;
      padding: var(--space-4);
      background: var(--gradient-signature);
      color: var(--neutral-0);
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      border-radius: var(--radius-lg);
      border: none;
      box-shadow: var(--shadow-glow-sm);
      position: relative;
      overflow: hidden;
    }
    .cta::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 600ms var(--ease-toss);
      pointer-events: none;
    }
    .cta:hover::before { transform: translateX(100%); }
    .cta:hover { box-shadow: var(--shadow-glow); }
    .cta:disabled { opacity: 0.4; box-shadow: none; cursor: not-allowed; }

    .toast {
      position: fixed;
      left: 50%; bottom: 80px;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: white;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-pill);
      font-size: var(--text-body);
      box-shadow: var(--shadow-lg);
      opacity: 0; pointer-events: none;
      transition: opacity var(--duration-base) var(--ease-soft), transform var(--duration-base) var(--ease-toss);
      z-index: var(--z-modal);
    }
    .toast.is-open { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 풀스크린 진행 오버레이 */
    .progress-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,230,238,0.98) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: var(--space-6);
      padding: var(--space-5);
      z-index: var(--z-modal);
      opacity: 0; pointer-events: none;
      transition: opacity 320ms var(--ease-soft);
    }
    .progress-overlay.is-open { opacity: 1; pointer-events: auto; }
    .progress-mascot {
      width: 96px; height: 96px;
      border-radius: var(--radius-full);
      background: var(--gradient-signature);
      box-shadow: var(--shadow-glow);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 48px;
      animation: mascot-bob 1.6s var(--ease-soft) infinite;
      position: relative;
    }
    @keyframes mascot-bob {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-6px) scale(1.04); }
    }
    .progress-mascot::after {
      content: '';
      position: absolute; inset: -8px;
      border-radius: inherit;
      border: 2px solid rgba(255, 107, 139, 0.3);
      animation: mascot-ring 2.4s var(--ease-soft) infinite;
    }
    @keyframes mascot-ring {
      0%   { transform: scale(0.85); opacity: 0.7; }
      100% { transform: scale(1.4);  opacity: 0; }
    }
    .progress-title {
      font-size: var(--text-headline);
      font-weight: var(--weight-bold);
      color: var(--ink);
      text-align: center;
      transition: opacity 240ms var(--ease-soft);
    }
    .progress-sub {
      font-size: var(--text-body);
      color: var(--ink-muted);
      text-align: center;
      margin-top: -16px;
    }
    .progress-steps {
      display: flex; flex-direction: column;
      gap: var(--space-3);
      width: 100%; max-width: 360px;
      /* <ol> 기본 padding-left/margin/marker 리셋 — 안 그러면 리스트 우측으로 밀림 */
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .progress-steps > li { list-style: none; }
    .progress-step {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      font-size: var(--text-body);
      color: var(--ink-muted);
      transition:
        color var(--duration-base) var(--ease-soft),
        border-color var(--duration-base) var(--ease-soft),
        background var(--duration-base) var(--ease-soft),
        transform var(--duration-snap) var(--ease-toss);
    }
    .progress-step__icon {
      width: 24px; height: 24px;
      border-radius: var(--radius-full);
      border: 2px solid var(--line-strong);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all var(--duration-base) var(--ease-toss);
    }
    .progress-step__icon svg { width: 14px; height: 14px; stroke-width: 3; opacity: 0; }
    .progress-step.is-active {
      color: var(--ink);
      border-color: var(--pink-300);
      background: var(--pink-50);
      box-shadow: var(--shadow-sm);
    }
    .progress-step.is-active .progress-step__icon {
      border-color: var(--pink-500);
      background: var(--pink-50);
      animation: step-pulse 1.2s var(--ease-soft) infinite;
    }
    @keyframes step-pulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(200, 80, 122, 0.5); }
      50%      { box-shadow: 0 0 0 6px rgba(200, 80, 122, 0); }
    }
    .progress-step.is-done {
      color: var(--ink);
      border-color: var(--pink-300);
    }
    .progress-step.is-done .progress-step__icon {
      background: var(--pink-500);
      border-color: var(--pink-500);
      color: white;
    }
    .progress-step.is-done .progress-step__icon svg { opacity: 1; }
    .progress-overlay.is-success .progress-mascot { animation: mascot-pop 540ms var(--ease-toss); }
    @keyframes mascot-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .progress-mascot, .progress-mascot::after, .progress-step.is-active .progress-step__icon { animation: none !important; }
    }

    /* 탭바 — /css/tabbar.css 참조 */
  </style>
</head>
<body>
  <header class="topbar">
    <a class="topbar__back" href="/dashboard" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <h1 class="topbar__title">사진 올리기</h1>
  </header>

  <main class="wrap" role="main">
    <div class="field">
      <span class="field__label">사진 (최대 10장, 한 장당 10MB)</span>
      <div data-photo-area>
        <label class="dropzone" data-dropzone>
          <span class="dropzone__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </span>
          <div class="dropzone__title">사진을 선택하거나 끌어다 놓아주세요</div>
          <div class="dropzone__sub">JPG · PNG · WebP / 1~10장</div>
          <input type="file" accept="image/jpeg,image/png,image/webp" multiple data-input>
        </label>
      </div>
    </div>

    <div class="field">
      <label class="field__label" for="msg">한 줄 메모 (선택)</label>
      <p class="memo-hint">사진에 대한 짧은 설명을 남겨주시면 루미가 캡션 만들 때 참고합니다. 메뉴명·상황·분위기 어느 거든 좋아요.</p>
      <div class="memo-examples" data-memo-examples>
        <button type="button" class="memo-example" data-memo-example>오늘 처음 내린 신메뉴 라떼예요</button>
        <button type="button" class="memo-example" data-memo-example>이번 주 한정 메뉴</button>
        <button type="button" class="memo-example" data-memo-example>매장 인테리어 새로 바꿨어요</button>
        <button type="button" class="memo-example" data-memo-example>단골 손님이 두고 간 꽃다발</button>
        <button type="button" class="memo-example" data-memo-example>비 오는 날 가게 분위기</button>
      </div>
      <textarea class="input" id="msg" maxlength="200" placeholder="예) 어떤 사진인지 / 어떤 상황인지 / 어떤 메뉴인지" data-msg></textarea>
    </div>

    <div class="field">
      <span class="field__label">게시 시점</span>
      <div class="schedule-toggle">
        <button type="button" class="schedule-card is-active" data-schedule="immediate">지금</button>
        <button type="button" class="schedule-card" data-schedule="scheduled">예약</button>
      </div>
      <input class="input" type="datetime-local" data-scheduled-at hidden>
    </div>

    <button class="cta" type="button" data-submit disabled>📷 캡션 만들고 게시</button>

    <footer class="app-footer">
      <div class="app-footer__links">
        <a href="/terms">이용약관</a>
        <span class="app-footer__sep">·</span>
        <a href="/privacy">개인정보처리방침</a>
      </div>
      <div>© 2026 루미 · lumi.it.kr</div>
    </footer>
  </main>

  <div class="toast" data-toast></div>

  <!-- 게시 진행 오버레이 -->
  <div class="progress-overlay" data-progress-overlay aria-live="polite" aria-hidden="true">
    <div class="progress-mascot" aria-hidden="true">📷</div>
    <h2 class="progress-title" data-progress-title>사진 올리는 중…</h2>
    <p class="progress-sub" data-progress-sub>잠시만요, 캡션 만들고 있어요.</p>
    <ol class="progress-steps" aria-label="게시 진행 단계">
      <li class="progress-step" data-step="upload">
        <span class="progress-step__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        사진 업로드
      </li>
      <li class="progress-step" data-step="analyze">
        <span class="progress-step__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        사진 분석
      </li>
      <li class="progress-step" data-step="caption">
        <span class="progress-step__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        캡션 작성
      </li>
      <li class="progress-step" data-step="publish">
        <span class="progress-step__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>
        인스타 게시
      </li>
    </ol>
  </div>

  <nav class="tabbar" aria-label="메뉴">
    <a class="tab" href="/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9M5 10v11h14V10"/></svg>
      홈
    </a>
    <a class="tab" href="/trends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12l-4-4-4 4-6-6-6 6"/><path d="M22 12v6H2"/></svg>
      트렌드
    </a>
    <a class="tab-add" href="/register-product" aria-label="사진 올리기" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </a>
    <a class="tab" href="/history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
      히스토리
    </a>
    <a class="tab" href="/settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      설정
    </a>
  </nav>

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt') || '';
      if (!token) { location.replace('/'); return; }
      const authHeaders = { Authorization: 'Bearer ' + token };

      const MAX_PHOTOS = 10;
      const MAX_BYTES = 10 * 1024 * 1024;          // 입력 한 장 최대 (압축 전)
      // IG carousel 비율 제약: 0.8(4:5) ~ 1.91(1.91:1).
      // 폰 세로 사진(9:16=0.5625)은 IG 가 거절 → 4:5 로 cover crop.
      // IG 가 받는 4:5 최대 권장 해상도 = 1440×1800. 그 이상 업로드 해도 IG 내부에서
      // 다시 다운샘플링됨. 품질·파일크기 균형점.
      const IG_TARGET_W = 1440;
      const IG_TARGET_H = 1800;                    // 1440 × 1800 = 4:5
      const IG_TARGET_RATIO = IG_TARGET_W / IG_TARGET_H;
      const COMPRESS_QUALITY = 0.92;               // JPEG 품질 — 시각적으로 거의 손실 없음
      const ALLOWED = ['image/jpeg', 'image/png', 'image/webp'];

      const photoArea = document.querySelector('[data-photo-area]');
      const msgEl = document.querySelector('[data-msg]');
      const submitBtn = document.querySelector('[data-submit]');
      const scheduleAtEl = document.querySelector('[data-scheduled-at]');
      const toastEl = document.querySelector('[data-toast]');

      // 메모 예시 칩 — 누르면 textarea 채우고 포커스
      document.querySelectorAll('[data-memo-example]').forEach(btn => {
        btn.addEventListener('click', () => {
          msgEl.value = btn.textContent.trim();
          msgEl.focus();
        });
      });

      let photos = [];
      let scheduleMode = 'immediate';

      function toast(msg, ms = 1800) {
        toastEl.textContent = msg;
        toastEl.classList.add('is-open');
        setTimeout(() => toastEl.classList.remove('is-open'), ms);
      }

      function refreshSubmit() {
        submitBtn.disabled = photos.length === 0;
      }

      function addFiles(fileList) {
        const arr = Array.from(fileList || []);
        for (const f of arr) {
          if (photos.length >= MAX_PHOTOS) {
            toast('최대 10장까지 가능해요');
            break;
          }
          if (!ALLOWED.includes(f.type)) {
            toast('JPG·PNG·WebP만 가능해요');
            continue;
          }
          if (f.size > MAX_BYTES) {
            toast('한 장당 10MB를 넘을 수 없어요');
            continue;
          }
          photos.push(f);
        }
        renderPhotos();
        refreshSubmit();
      }

      function renderPhotos() {
        if (photos.length === 0) {
          photoArea.innerHTML = `
            <label class="dropzone" data-dropzone>
              <span class="dropzone__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </span>
              <div class="dropzone__title">사진을 선택하거나 끌어다 놓아주세요</div>
              <div class="dropzone__sub">JPG · PNG · WebP / 1~10장</div>
              <input type="file" accept="image/jpeg,image/png,image/webp" multiple data-input>
            </label>
          `;
          wireDropzone();
          return;
        }
        const grid = document.createElement('div');
        grid.className = 'photos';
        photos.forEach((f, idx) => {
          const url = URL.createObjectURL(f);
          const item = document.createElement('div');
          item.className = 'photo';
          item.innerHTML = `
            <img src="${url}" alt="">
            <button class="photo__remove" type="button" data-remove="${idx}" aria-label="제거">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          `;
          grid.appendChild(item);
        });
        if (photos.length < MAX_PHOTOS) {
          const adder = document.createElement('label');
          adder.className = 'photo__add';
          adder.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <input type="file" accept="image/jpeg,image/png,image/webp" multiple data-input>
          `;
          grid.appendChild(adder);
        }
        photoArea.innerHTML = '';
        photoArea.appendChild(grid);

        photoArea.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            const i = Number(btn.dataset.remove);
            photos.splice(i, 1);
            renderPhotos();
            refreshSubmit();
          });
        });
        wireDropzone();
      }

      function wireDropzone() {
        const dz = photoArea.querySelector('[data-dropzone]');
        if (dz) {
          dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('is-dragover'); });
          dz.addEventListener('dragleave', () => dz.classList.remove('is-dragover'));
          dz.addEventListener('drop', e => {
            e.preventDefault(); dz.classList.remove('is-dragover');
            addFiles(e.dataTransfer.files);
          });
        }
        photoArea.querySelectorAll('[data-input]').forEach(inp => {
          inp.addEventListener('change', e => {
            addFiles(e.target.files);
            e.target.value = '';
          });
        });
      }
      wireDropzone();

      // 로컬 datetime → "YYYY-MM-DDTHH:mm" (datetime-local input 포맷, KST 기준).
      // toISOString() 은 UTC 라 KST 와 9시간 차이 → 로컬 메서드로 직접 만든다.
      function toLocalDtIso(date) {
        const pad = n => String(n).padStart(2, '0');
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}` +
               `T${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      // 예약 범위 — 매번 picker 열 때 새로 계산 (페이지를 오래 켜둔 경우 대비)
      function getScheduleBounds() {
        const now = Date.now();
        return {
          min: new Date(now),
          max: new Date(now + 30 * 24 * 60 * 60 * 1000),
          def: new Date(now + 60 * 60 * 1000),
        };
      }

      // 사용자가 과거를 골라도 즉시 min 으로 끌어올리고, max 초과는 max 로 자른다.
      function clampScheduleValue() {
        if (!scheduleAtEl.value) return;
        const picked = new Date(scheduleAtEl.value).getTime();
        const { min, max } = getScheduleBounds();
        if (picked < min.getTime()) {
          scheduleAtEl.value = toLocalDtIso(min);
          toast('과거 시간은 예약할 수 없어요');
        } else if (picked > max.getTime()) {
          scheduleAtEl.value = toLocalDtIso(max);
          toast('한 달 이내까지만 예약할 수 있어요');
        }
      }
      scheduleAtEl.addEventListener('input', clampScheduleValue);
      scheduleAtEl.addEventListener('change', clampScheduleValue);
      scheduleAtEl.addEventListener('blur', clampScheduleValue);

      // 게시 시점 토글
      document.querySelectorAll('[data-schedule]').forEach(btn => {
        btn.addEventListener('click', () => {
          scheduleMode = btn.dataset.schedule;
          document.querySelectorAll('[data-schedule]').forEach(b => b.classList.toggle('is-active', b === btn));
          if (scheduleMode === 'scheduled') {
            scheduleAtEl.hidden = false;
            const { min, max, def } = getScheduleBounds();
            scheduleAtEl.min = toLocalDtIso(min);
            scheduleAtEl.max = toLocalDtIso(max);
            scheduleAtEl.value = toLocalDtIso(def);
          } else {
            scheduleAtEl.hidden = true;
            scheduleAtEl.value = '';
          }
        });
      });

      // Canvas 로 4:5(1080×1350) cover crop + JPEG 압축.
      // - IG carousel 호환 비율(4:5 = 0.8) 강제 → "aspect ratio not supported" 에러 차단
      // - 폰 세로 사진(9:16) 은 위·아래 살짝 잘리고, 가로 사진은 좌·우 잘림
      // - Netlify 6MB body 한도도 자연스레 충족 (사진당 ~200~500KB)
      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          const url = URL.createObjectURL(file);
          img.onload = () => {
            URL.revokeObjectURL(url);

            const sourceRatio = img.width / img.height;
            let sx, sy, sw, sh;
            if (sourceRatio > IG_TARGET_RATIO) {
              // 원본이 4:5 보다 넓음 → 좌우 자르기
              sh = img.height;
              sw = Math.round(sh * IG_TARGET_RATIO);
              sx = Math.round((img.width - sw) / 2);
              sy = 0;
            } else {
              // 원본이 4:5 보다 좁음(폰 세로) → 위아래 자르기
              sw = img.width;
              sh = Math.round(sw / IG_TARGET_RATIO);
              sx = 0;
              sy = Math.round((img.height - sh) / 2);
            }

            const canvas = document.createElement('canvas');
            canvas.width = IG_TARGET_W;
            canvas.height = IG_TARGET_H;
            const ctx = canvas.getContext('2d');
            // 화이트 배경 — 투명 PNG 입력 대비
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, IG_TARGET_W, IG_TARGET_H);
            ctx.drawImage(img, sx, sy, sw, sh, 0, 0, IG_TARGET_W, IG_TARGET_H);

            canvas.toBlob(blob => {
              if (!blob) return reject(new Error('압축 실패'));
              const name = (file.name || 'photo').replace(/\.\w+$/, '') + '.jpg';
              resolve(new File([blob], name, { type: 'image/jpeg' }));
            }, 'image/jpeg', COMPRESS_QUALITY);
          };
          img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('이미지 읽기 실패')); };
          img.src = url;
        });
      }

      // ── 진행 오버레이 컨트롤 ──
      const overlayEl = document.querySelector('[data-progress-overlay]');
      const progressTitleEl = document.querySelector('[data-progress-title]');
      const progressSubEl = document.querySelector('[data-progress-sub]');
      const STEP_ORDER = ['upload', 'analyze', 'caption', 'publish'];

      function setStep(stepKey, state) {
        // state: 'active' | 'done'
        document.querySelectorAll('.progress-step').forEach(el => {
          if (el.dataset.step === stepKey) {
            el.classList.toggle('is-active', state === 'active');
            el.classList.toggle('is-done', state === 'done');
          }
        });
      }
      function activateUpTo(stepKey) {
        // 해당 step 까지를 done 처리하고 다음 step 을 active 로
        const idx = STEP_ORDER.indexOf(stepKey);
        STEP_ORDER.forEach((k, i) => {
          if (i < idx) setStep(k, 'done');
          else if (i === idx) setStep(k, 'active');
          else setStep(k, null);
        });
      }
      function showOverlay(open) {
        overlayEl.classList.toggle('is-open', open);
        overlayEl.setAttribute('aria-hidden', open ? 'false' : 'true');
      }
      function setOverlayCopy(title, sub) {
        // 페이드 transition 은 글자 길이/폭이 다른 두 텍스트 전환 시 sub-pixel
        // 잔상(예: "ㅅ캡션 쓰는 중ㄷ" 같은 자모 잘림)이 생겨서 즉시 swap.
        if (title && progressTitleEl.textContent !== title) {
          progressTitleEl.textContent = title;
        }
        if (sub != null && progressSubEl.textContent !== sub) {
          progressSubEl.textContent = sub;
        }
      }

      // status → step 매핑
      function statusToStage(s) {
        if (s.is_sent || s.caption_status === 'posted') return { step: 'publish', state: 'done', title: '완료!', sub: '인스타에 게시됐어요.' };
        if (s.caption_status === 'posting') return { step: 'publish', state: 'active', title: '인스타 게시 중', sub: '곧 피드에 올라가요.' };
        if (s.caption_status === 'scheduled' && s.post_mode === 'scheduled') return { step: 'caption', state: 'done', title: '예약 완료', sub: '시간 되면 알아서 올려드려요.' };
        if (s.caption_status === 'scheduled') return { step: 'publish', state: 'active', title: '인스타 게시 중', sub: '곧 피드에 올라가요.' };
        if (s.caption_status === 'ready') return { step: 'caption', state: 'done', title: '캡션 완성', sub: '잠시 후 게시 시작.' };
        if (s.caption_status === 'pending') return { step: 'caption', state: 'active', title: '캡션 쓰는 중', sub: '사진 보면서 어울리는 글 쓰고 있어요.' };
        if (s.caption_status === 'failed' || s.caption_status === 'error') return { step: null, state: 'fail', title: '게시 실패', sub: s.caption_error || '잠시 후 다시 시도해주세요.' };
        return null;
      }

      async function pollUntilDone(reserveKey) {
        const TIMEOUT_MS = 90 * 1000; // 1.5분 한도 — 그 이상이면 예약 페이지로 이동
        const INTERVAL_MS = 1500;
        const start = Date.now();
        // 첫 단계는 caption (분석/작성) 으로 — 업로드는 이미 끝났음.
        // 첫 폴링 응답이 1.5초 후에 오므로 타이틀도 즉시 동기화 (단계와 mismatch 방지)
        activateUpTo('caption');
        setOverlayCopy('캡션 쓰는 중', '사진 보면서 어울리는 글 쓰고 있어요.');
        while (Date.now() - start < TIMEOUT_MS) {
          await new Promise(r => setTimeout(r, INTERVAL_MS));
          let s = null;
          try {
            const r = await fetch('/api/reservation-status?key=' + encodeURIComponent(reserveKey), { headers: authHeaders });
            if (r.ok) {
              const j = await r.json();
              s = j.status;
            }
          } catch (_) { /* 네트워크 깜빡 — 다음 사이클에 재시도 */ }
          if (!s) continue;

          const stage = statusToStage(s);
          if (!stage) continue;
          setOverlayCopy(stage.title, stage.sub);

          if (stage.state === 'fail') {
            return { ok: false, error: stage.sub };
          }
          if (stage.step === 'publish' && stage.state === 'done') {
            // 완료 — 단계 4 까지 마크
            STEP_ORDER.forEach(k => setStep(k, 'done'));
            overlayEl.classList.add('is-success');
            return { ok: true, scheduled: false, ig_post_id: s.ig_post_id || null };
          }
          if (stage.step === 'caption' && stage.state === 'done' && s.post_mode === 'scheduled') {
            // 예약 게시 — 캡션까지만 작성하고 종료
            STEP_ORDER.slice(0, 3).forEach(k => setStep(k, 'done'));
            overlayEl.classList.add('is-success');
            return { ok: true, scheduled: true };
          }
          // 진행 단계 시각화
          activateUpTo(stage.step);
        }
        return { ok: 'timeout' };
      }

      // 제출 — iOS Safari 등에서 더블탭이 짧게 두 번 fire 되는 경우 대비 idempotency 락.
      let isSubmitting = false;
      submitBtn.addEventListener('click', async () => {
        if (isSubmitting) return;
        if (photos.length === 0) return;
        if (scheduleMode === 'scheduled') {
          if (!scheduleAtEl.value) {
            toast('예약 시간을 선택해주세요');
            return;
          }
          // 브라우저가 min/max 무시하는 경우 대비 — JS 측에서도 한 번 더 검증
          const picked = new Date(scheduleAtEl.value).getTime();
          const now = Date.now();
          if (picked < now) {
            toast('과거 시간은 예약할 수 없어요');
            return;
          }
          if (picked > now + 30 * 24 * 60 * 60 * 1000) {
            toast('예약은 한 달 이내까지만 가능해요');
            return;
          }
        }
        isSubmitting = true;
        submitBtn.disabled = true;
        submitBtn.textContent = '준비 중…';
        showOverlay(true);
        setOverlayCopy('사진 준비 중', '잠시만요, 압축 후 업로드를 시작할게요.');
        activateUpTo('upload');

        try {
          // 1) 압축 (병렬)
          const compressed = await Promise.all(photos.map(compressImage));
          setOverlayCopy('사진 업로드 중', '서버로 보내고 있어요.');

          // 2) reserve 호출 (서버에서 storage 업로드 병렬)
          const fd = new FormData();
          compressed.forEach((f, i) => fd.append('file' + i, f, f.name));
          fd.append('userMessage', msgEl.value || '');
          fd.append('postMode', scheduleMode);
          if (scheduleMode === 'scheduled' && scheduleAtEl.value) {
            const iso = new Date(scheduleAtEl.value).toISOString();
            fd.append('scheduledAt', iso);
          }
          const res = await fetch('/api/reserve', {
            method: 'POST',
            headers: authHeaders,
            body: fd,
          });
          const json = await res.json().catch(() => ({}));
          if (!res.ok) {
            if (res.status === 413) throw new Error('사진 용량이 너무 커요. 장수를 줄여주세요.');
            throw new Error(json.error || '게시 실패');
          }
          // upload 완료
          setStep('upload', 'done');

          const reserveKey = json.reserveKey || json.reservationKey;
          if (!reserveKey) throw new Error('예약 키를 받지 못했어요.');

          // 3) 폴링으로 단계 표시
          const final = await pollUntilDone(reserveKey);

          if (final.ok === true) {
            // 성공
            setOverlayCopy(final.scheduled ? '예약 완료' : '게시 완료!', final.scheduled ? '시간 되면 알아서 올려드려요.' : '인스타에서 확인해보세요.');
            setTimeout(() => { location.href = '/history'; }, 1400);
          } else if (final.ok === 'timeout') {
            // 백그라운드 처리 중 — 예약 페이지에서 진행 확인
            setOverlayCopy('백그라운드 처리 중', '예약 페이지에서 진행 상황을 확인할 수 있어요.');
            setTimeout(() => { location.href = '/history'; }, 1200);
          } else {
            throw new Error(final.error || '게시 실패');
          }
        } catch (e) {
          showOverlay(false);
          toast(e.message || '게시 실패');
          submitBtn.disabled = false;
          submitBtn.textContent = '📷 캡션 만들고 게시';
          isSubmitting = false;
        }
      });

      refreshSubmit();
    })();
  </script>
</body>
</html>
