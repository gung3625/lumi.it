<html lang="ko">

  <style>
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 56px); }

    .topbar {
      position: sticky; top: 0;
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      z-index: var(--z-sticky); min-height: 52px;
    }
    .topbar__back {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius-full); color: var(--ink);
    }
    .topbar__back:hover { background: var(--bg-soft); }
    .topbar__back svg { width: 20px; height: 20px; stroke-width: 2.2; }
    .topbar__title { font-size: var(--text-headline); font-weight: var(--weight-semibold); color: var(--ink); flex: 1; }

    .wrap { padding: var(--space-4); max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--space-5); }

    .field { display: flex; flex-direction: column; gap: var(--space-2); }
    .field__label {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--ink-soft);
      letter-spacing: 0.02em;
    }

    /* лУЬл°≠м°і */
    .dropzone {
      display: block;
      position: relative;
      padding: var(--space-12) var(--space-5);
      background: var(--bg-soft);
      border: 2px dashed var(--line-strong);
      border-radius: var(--radius-lg);
      text-align: center;
      color: var(--ink-muted);
      transition:
        border-color var(--duration-snap) var(--ease-toss),
        background var(--duration-snap) var(--ease-toss);
      cursor: pointer;
    }
    .dropzone:hover { border-color: var(--pink-300); background: var(--pink-50); }
    .dropzone.is-dragover {
      border-color: var(--pink-500);
      background: var(--pink-50);
      transform: scale(1.01);
    }
    .dropzone__icon {
      width: 56px; height: 56px;
      margin: 0 auto var(--space-3);
      border-radius: var(--radius-full);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--pink-500);
      box-shadow: var(--shadow-sm);
      animation: drop-bob 2.4s var(--ease-soft) infinite;
    }
    .dropzone__icon svg { width: 28px; height: 28px; stroke-width: 2; }
    @keyframes drop-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    .dropzone__title {
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      margin-bottom: 4px;
    }
    .dropzone__sub { font-size: var(--text-caption); }
    .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* мВђмІД кЈЄл¶ђлУЬ */
    .photos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-2);
    }
    .photo {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-soft);
      animation: rise 360ms var(--ease-toss) backwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    .photo:nth-child(1) { animation-delay: 0ms; }
    .photo:nth-child(2) { animation-delay: 60ms; }
    .photo:nth-child(3) { animation-delay: 120ms; }
    .photo:nth-child(4) { animation-delay: 180ms; }
    .photo:nth-child(5) { animation-delay: 240ms; }
    .photo:nth-child(6) { animation-delay: 300ms; }
    .photo:nth-child(7) { animation-delay: 360ms; }
    .photo:nth-child(8) { animation-delay: 420ms; }
    .photo:nth-child(9) { animation-delay: 480ms; }
    .photo:nth-child(10) { animation-delay: 540ms; }
    .photo img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .photo__remove {
      position: absolute;
      top: 6px; right: 6px;
      width: 24px; height: 24px;
      border-radius: var(--radius-full);
      background: rgba(0,0,0,0.6);
      color: white;
      display: flex; align-items: center; justify-content: center;
      border: none;
    }
    .photo__remove:hover { background: rgba(200,80,122,0.9); }
    .photo__remove svg { width: 14px; height: 14px; stroke-width: 2.5; }
    .photo__add {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-md);
      background: var(--bg-soft);
      border: 1px dashed var(--line-strong);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-muted);
      cursor: pointer;
      width: 100%;
    }
    .photo__add:hover { border-color: var(--pink-300); color: var(--pink-500); }
    .photo__add svg { width: 28px; height: 28px; stroke-width: 2; }
    .photo__add input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* мЮЕл†• */
    .input, textarea.input {
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-body);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--ink);
      width: 100%;
      font-family: inherit;
    }
    textarea.input { resize: vertical; min-height: 80px; }

    .schedule-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }
    .schedule-card {
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-lg);
      text-align: center;
      font-weight: var(--weight-semibold);
      color: var(--ink);
    }
    .schedule-card.is-active {
      background: var(--pink-50);
      border-color: var(--pink-500);
      color: var(--pink-700);
      box-shadow: var(--shadow-glow-sm);
      animation: card-pop 420ms var(--ease-toss);
    }
    @keyframes card-pop {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.03); }
    }

    .cta {
      width: 100%;
      padding: var(--space-4);
      background: var(--gradient-signature);
      color: var(--neutral-0);
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      border-radius: var(--radius-lg);
      border: none;
      box-shadow: var(--shadow-glow-sm);
      position: relative;
      overflow: hidden;
    }
    .cta::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 600ms var(--ease-toss);
      pointer-events: none;
    }
    .cta:hover::before { transform: translateX(100%); }
    .cta:hover { box-shadow: var(--shadow-glow); }
    .cta:disabled { opacity: 0.4; box-shadow: none; cursor: not-allowed; }

    .toast {
      position: fixed;
      left: 50%; bottom: 80px;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: white;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-pill);
      font-size: var(--text-body);
      box-shadow: var(--shadow-lg);
      opacity: 0; pointer-events: none;
      transition: opacity var(--duration-base) var(--ease-soft), transform var(--duration-base) var(--ease-toss);
      z-index: var(--z-modal);
    }
    .toast.is-open { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* нТАмК§нБђл¶∞ мІДнЦЙ мШ§л≤Дл†ИмЭі */
    .progress-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,230,238,0.98) 100%);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: var(--space-6);
      padding: var(--space-5);
      z-index: var(--z-modal);
      opacity: 0; pointer-events: none;
      transition: opacity 320ms var(--ease-soft);
    }
    .progress-overlay.is-open { opacity: 1; pointer-events: auto; }
    .progress-mascot {
      width: 96px; height: 96px;
      border-radius: var(--radius-full);
      background: var(--gradient-signature);
      box-shadow: var(--shadow-glow);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 48px;
      animation: mascot-bob 1.6s var(--ease-soft) infinite;
      position: relative;
    }
    @keyframes mascot-bob {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-6px) scale(1.04); }
    }
    .progress-mascot::after {
      content: '';
      position: absolute; inset: -8px;
      border-radius: inherit;
      border: 2px solid rgba(255, 107, 139, 0.3);
      animation: mascot-ring 2.4s var(--ease-soft) infinite;
    }
    @keyframes mascot-ring {
      0%   { transform: scale(0.85); opacity: 0.7; }
      100% { transform: scale(1.4);  opacity: 0; }
    }
    .progress-title {
      font-size: var(--text-headline);
      font-weight: var(--weight-bold);
      color: var(--ink);
      text-align: center;
      transition: opacity 240ms var(--ease-soft);
    }
    .progress-sub {
      font-size: var(--text-body);
      color: var(--ink-muted);
      text-align: center;
      margin-top: -16px;
    }
    .progress-steps {
      display: flex; flex-direction: column;
      gap: var(--space-3);
      width: 100%; max-width: 360px;
    }
    .progress-step {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      font-size: var(--text-body);
      color: var(--ink-muted);
      transition:
        color var(--duration-base) var(--ease-soft),
        border-color var(--duration-base) var(--ease-soft),
        background var(--duration-base) var(--ease-soft),
        transform var(--duration-snap) var(--ease-toss);
    }
    .progress-step__icon {
      width: 24px; height: 24px;
      border-radius: var(--radius-full);
      border: 2px solid var(--line-strong);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all var(--duration-base) var(--ease-toss);
    }
    .progress-step__icon svg { width: 14px; height: 14px; stroke-width: 3; opacity: 0; }
    .progress-step.is-active {
      color: var(--ink);
      border-color: var(--pink-300);
      background: var(--pink-50);
      transform: translateX(4px);
    }
    .progress-step.is-active .progress-step__icon {
      border-color: var(--pink-500);
      background: var(--pink-50);
      animation: step-pulse 1.2s var(--ease-soft) infinite;
    }
    @keyframes step-pulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(200, 80, 122, 0.5); }
      50%      { box-shadow: 0 0 0 6px rgba(200, 80, 122, 0); }
    }
    .progress-step.is-done {
      color: var(--ink);
      border-color: var(--pink-300);
    }
    .progress-step.is-done .progress-step__icon {
      background: var(--pink-500);
      border-color: var(--pink-500);
      color: white;
    }
    .progress-step.is-done .progress-step__icon svg { opacity: 1; }
    .progress-overlay.is-success .progress-mascot { animation: mascot-pop 540ms var(--ease-toss); }
    @keyframes mascot-pop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .progress-mascot, .progress-mascot::after, .progress-step.is-active .progress-step__icon { animation: none !important; }
    }

    /* нГ≠л∞Ф вАФ /css/tabbar.css м∞Єм°∞ */
  </style>
</head>

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt') || '';
      if (!token) { location.replace('/'); return; }
      const authHeaders = { Authorization: 'Bearer ' + token };

      const MAX_PHOTOS = 10;
      const MAX_BYTES = 10 * 1024 * 1024;          // мЮЕл†• нХЬ мЮ• мµЬлМА (мХХмґХ м†Д)
      const COMPRESS_MAX_DIM = 1440;               // IG carousel кґМмЮ• 1080~1440
      const COMPRESS_QUALITY = 0.85;               // JPEG нТИмІИ
      const ALLOWED = ['image/jpeg', 'image/png', 'image/webp'];

      const photoArea = document.querySelector('[data-photo-area]');
      const msgEl = document.querySelector('[data-msg]');
      const submitBtn = document.querySelector('[data-submit]');
      const scheduleAtEl = document.querySelector('[data-scheduled-at]');
      const toastEl = document.querySelector('[data-toast]');

      let photos = [];
      let scheduleMode = 'immediate';

      function toast(msg, ms = 1800) {
        toastEl.textContent = msg;
        toastEl.classList.add('is-open');
        setTimeout(() => toastEl.classList.remove('is-open'), ms);
      }

      function refreshSubmit() {
        submitBtn.disabled = photos.length === 0;
      }

      function addFiles(fileList) {
        const arr = Array.from(fileList || []);
        for (const f of arr) {
          if (photos.length >= MAX_PHOTOS) {
            toast('мµЬлМА 10мЮ•кєМмІА к∞АлК•нХімЪФ');
            break;
          }
          if (!ALLOWED.includes(f.type)) {
            toast('JPG¬ЈPNG¬ЈWebPлІМ к∞АлК•нХімЪФ');
            continue;
          }
          if (f.size > MAX_BYTES) {
            toast('нХЬ мЮ•лЛє 10MBл•Љ лДШмЭД мИШ мЧЖмЦімЪФ');
            continue;
          }
          photos.push(f);
        }
        renderPhotos();
        refreshSubmit();
      }

      function renderPhotos() {
        if (photos.length === 0) {
          photoArea.innerHTML = `
            <label class="dropzone" data-dropzone>
              <span class="dropzone__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </span>
              <div class="dropzone__title">мВђмІДмЭД мД†нГЭнХШк±∞лВШ лБМмЦілЛ§ лЖУмХДм£ЉмДЄмЪФ</div>
              <div class="dropzone__sub">JPG ¬Ј PNG ¬Ј WebP / 1~10мЮ•</div>
              <input type="file" accept="image/jpeg,image/png,image/webp" multiple data-input>
            </label>
          `;
          wireDropzone();
          return;
        }
        const grid = document.createElement('div');
        grid.className = 'photos';
        photos.forEach((f, idx) => {
          const url = URL.createObjectURL(f);
          const item = document.createElement('div');
          item.className = 'photo';
          item.innerHTML = `
            <img src="${url}" alt="">
            <button class="photo__remove" type="button" data-remove="${idx}" aria-label="м†Ьк±∞">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          `;
          grid.appendChild(item);
        });
        if (photos.length < MAX_PHOTOS) {
          const adder = document.createElement('label');
          adder.className = 'photo__add';
          adder.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <input type="file" accept="image/jpeg,image/png,image/webp" multiple data-input>
          `;
          grid.appendChild(adder);
        }
        photoArea.innerHTML = '';
        photoArea.appendChild(grid);

        photoArea.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            const i = Number(btn.dataset.remove);
            photos.splice(i, 1);
            renderPhotos();
            refreshSubmit();
          });
        });
        wireDropzone();
      }

      function wireDropzone() {
        const dz = photoArea.querySelector('[data-dropzone]');
        if (dz) {
          dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('is-dragover'); });
          dz.addEventListener('dragleave', () => dz.classList.remove('is-dragover'));
          dz.addEventListener('drop', e => {
            e.preventDefault(); dz.classList.remove('is-dragover');
            addFiles(e.dataTransfer.files);
          });
        }
        photoArea.querySelectorAll('[data-input]').forEach(inp => {
          inp.addEventListener('change', e => {
            addFiles(e.target.files);
            e.target.value = '';
          });
        });
      }
      wireDropzone();

      // к≤МмЛЬ мЛЬм†Р нЖ†кЄА
      document.querySelectorAll('[data-schedule]').forEach(btn => {
        btn.addEventListener('click', () => {
          scheduleMode = btn.dataset.schedule;
          document.querySelectorAll('[data-schedule]').forEach(b => b.classList.toggle('is-active', b === btn));
          if (scheduleMode === 'scheduled') {
            scheduleAtEl.hidden = false;
            const now = new Date(Date.now() + 60 * 60 * 1000);
            scheduleAtEl.value = now.toISOString().slice(0, 16);
          } else {
            scheduleAtEl.hidden = true;
            scheduleAtEl.value = '';
          }
        });
      });

      // Canvas л°Ь 1440px л¶ђмВђмЭім¶И + JPEG мХХмґХ (Netlify 6MB body нХЬлПД нЪМнФЉ)
      function compressImage(file) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          const url = URL.createObjectURL(file);
          img.onload = () => {
            URL.revokeObjectURL(url);
            const ratio = Math.min(1, COMPRESS_MAX_DIM / Math.max(img.width, img.height));
            const w = Math.round(img.width * ratio);
            const h = Math.round(img.height * ratio);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            canvas.toBlob(blob => {
              if (!blob) return reject(new Error('мХХмґХ мЛ§нМ®'));
              // мХХмґХл≥ЄмЭі мЫРл≥Єл≥ілЛ§ нБђл©і мЫРл≥Є л∞ШнЩШ (лУЬлђЉмІАлІМ к∞АлК•)
              if (blob.size >= file.size) {
                resolve(file);
                return;
              }
              const name = (file.name || 'photo').replace(/\.\w+$/, '') + '.jpg';
              resolve(new File([blob], name, { type: 'image/jpeg' }));
            }, 'image/jpeg', COMPRESS_QUALITY);
          };
          img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('мЭілѓЄмІА мЭљкЄ∞ мЛ§нМ®')); };
          img.src = url;
        });
      }

      // вФАвФА мІДнЦЙ мШ§л≤Дл†ИмЭі мї®нКЄл°§ вФАвФА
      const overlayEl = document.querySelector('[data-progress-overlay]');
      const progressTitleEl = document.querySelector('[data-progress-title]');
      const progressSubEl = document.querySelector('[data-progress-sub]');
      const STEP_ORDER = ['upload', 'analyze', 'caption', 'publish'];

      function setStep(stepKey, state) {
        // state: 'active' | 'done'
        document.querySelectorAll('.progress-step').forEach(el => {
          if (el.dataset.step === stepKey) {
            el.classList.toggle('is-active', state === 'active');
            el.classList.toggle('is-done', state === 'done');
          }
        });
      }
      function activateUpTo(stepKey) {
        // нХілЛє step кєМмІАл•Љ done м≤Шл¶ђнХШк≥† лЛ§мЭМ step мЭД active л°Ь
        const idx = STEP_ORDER.indexOf(stepKey);
        STEP_ORDER.forEach((k, i) => {
          if (i < idx) setStep(k, 'done');
          else if (i === idx) setStep(k, 'active');
          else setStep(k, null);
        });
      }
      function showOverlay(open) {
        overlayEl.classList.toggle('is-open', open);
        overlayEl.setAttribute('aria-hidden', open ? 'false' : 'true');
      }
      function setOverlayCopy(title, sub) {
        if (title && progressTitleEl.textContent !== title) {
          progressTitleEl.style.opacity = '0';
          setTimeout(() => {
            progressTitleEl.textContent = title;
            progressTitleEl.style.opacity = '1';
          }, 160);
        }
        if (sub != null) progressSubEl.textContent = sub;
      }

      // status вЖТ step лІ§нХС
      function statusToStage(s) {
        if (s.is_sent || s.caption_status === 'posted') return { step: 'publish', state: 'done', title: 'мЩДл£М!', sub: 'мЭЄмК§нГАмЧР к≤МмЛЬлРРмЦімЪФ.' };
        if (s.caption_status === 'posting') return { step: 'publish', state: 'active', title: 'мЭЄмК§нГА к≤МмЛЬ м§С', sub: 'к≥І нФЉлУЬмЧР мШђлЭЉк∞АмЪФ.' };
        if (s.caption_status === 'scheduled' && s.post_mode === 'scheduled') return { step: 'caption', state: 'done', title: 'мШИмХљ мЩДл£М', sub: 'мЛЬк∞Д лРШл©і мХМмХДмДЬ мШђл†§лУЬл†§мЪФ.' };
        if (s.caption_status === 'scheduled') return { step: 'publish', state: 'active', title: 'мЭЄмК§нГА к≤МмЛЬ м§С', sub: 'к≥І нФЉлУЬмЧР мШђлЭЉк∞АмЪФ.' };
        if (s.caption_status === 'ready') return { step: 'caption', state: 'done', title: 'мЇ°мЕШ мЩДмД±', sub: 'мЮ†мЛЬ нЫД к≤МмЛЬ мЛЬмЮС.' };
        if (s.caption_status === 'pending') return { step: 'caption', state: 'active', title: 'мЇ°мЕШ мУ∞лКФ м§С', sub: 'мВђмІД л≥іл©імДЬ мЦімЪЄл¶ђлКФ кЄА мУ∞к≥† мЮИмЦімЪФ.' };
        if (s.caption_status === 'failed' || s.caption_status === 'error') return { step: null, state: 'fail', title: 'к≤МмЛЬ мЛ§нМ®', sub: s.caption_error || 'мЮ†мЛЬ нЫД лЛ§мЛЬ мЛЬлПДнХім£ЉмДЄмЪФ.' };
        return null;
      }

      async function pollUntilDone(reserveKey) {
        const TIMEOUT_MS = 90 * 1000; // 1.5лґД нХЬлПД вАФ кЈЄ мЭімГБмЭіл©і мШИмХљ нОШмЭімІАл°Ь мЭілПЩ
        const INTERVAL_MS = 1500;
        const start = Date.now();
        // м≤Ђ лЛ®к≥ДлКФ caption (лґДмДЭ/мЮСмД±) мЬЉл°Ь л≥імЧђ вАФ мЧЕл°ЬлУЬлКФ мЭілѓЄ лБЭлВђмЭМ
        activateUpTo('caption');
        while (Date.now() - start < TIMEOUT_MS) {
          await new Promise(r => setTimeout(r, INTERVAL_MS));
          let s = null;
          try {
            const r = await fetch('/api/reservation-status?key=' + encodeURIComponent(reserveKey), { headers: authHeaders });
            if (r.ok) {
              const j = await r.json();
              s = j.status;
            }
          } catch (_) { /* лД§нКЄмЫМнБђ кєЬлє° вАФ лЛ§мЭМ мВђмЭінБімЧР мЮђмЛЬлПД */ }
          if (!s) continue;

          const stage = statusToStage(s);
          if (!stage) continue;
          setOverlayCopy(stage.title, stage.sub);

          if (stage.state === 'fail') {
            return { ok: false, error: stage.sub };
          }
          if (stage.step === 'publish' && stage.state === 'done') {
            // мЩДл£М вАФ лЛ®к≥Д 4 кєМмІА лІИнБђ
            STEP_ORDER.forEach(k => setStep(k, 'done'));
            overlayEl.classList.add('is-success');
            return { ok: true, scheduled: false, ig_permalink: s.ig_permalink || null };
          }
          if (stage.step === 'caption' && stage.state === 'done' && s.post_mode === 'scheduled') {
            // мШИмХљ к≤МмЛЬ вАФ мЇ°мЕШкєМмІАлІМ мЮСмД±нХШк≥† мҐЕл£М
            STEP_ORDER.slice(0, 3).forEach(k => setStep(k, 'done'));
            overlayEl.classList.add('is-success');
            return { ok: true, scheduled: true };
          }
          // мІДнЦЙ лЛ®к≥Д мЛЬк∞БнЩФ
          activateUpTo(stage.step);
        }
        return { ok: 'timeout' };
      }

      // м†ЬмґЬ
      submitBtn.addEventListener('click', async () => {
        if (photos.length === 0) return;
        if (scheduleMode === 'scheduled' && !scheduleAtEl.value) {
          toast('мШИмХљ мЛЬк∞ДмЭД мД†нГЭнХім£ЉмДЄмЪФ');
          return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = 'м§АлєД м§СвА¶';
        showOverlay(true);
        setOverlayCopy('мВђмІД м§АлєД м§С', 'мЮ†мЛЬлІМмЪФ, мХХмґХ нЫД мЧЕл°ЬлУЬл•Љ мЛЬмЮСнХ†к≤МмЪФ.');
        activateUpTo('upload');

        try {
          // 1) мХХмґХ (л≥Сл†ђ)
          const compressed = await Promise.all(photos.map(compressImage));
          setOverlayCopy('мВђмІД мЧЕл°ЬлУЬ м§С', 'мДЬл≤Дл°Ь л≥ілВік≥† мЮИмЦімЪФ.');

          // 2) reserve нШЄмґЬ (мДЬл≤ДмЧРмДЬ storage мЧЕл°ЬлУЬ л≥Сл†ђ)
          const fd = new FormData();
          compressed.forEach((f, i) => fd.append('file' + i, f, f.name));
          fd.append('userMessage', msgEl.value || '');
          fd.append('postMode', scheduleMode);
          if (scheduleMode === 'scheduled' && scheduleAtEl.value) {
            const iso = new Date(scheduleAtEl.value).toISOString();
            fd.append('scheduledAt', iso);
          }
          const res = await fetch('/api/reserve', {
            method: 'POST',
            headers: authHeaders,
            body: fd,
          });
          const json = await res.json().catch(() => ({}));
          if (!res.ok) {
            if (res.status === 413) throw new Error('мВђмІД мЪ©лЯЙмЭі лДИлђі мї§мЪФ. мЮ•мИШл•Љ м§ДмЧђм£ЉмДЄмЪФ.');
            throw new Error(json.error || 'к≤МмЛЬ мЛ§нМ®');
          }
          // upload мЩДл£М
          setStep('upload', 'done');

          const reserveKey = json.reserveKey || json.reservationKey;
          if (!reserveKey) throw new Error('мШИмХљ нВ§л•Љ л∞ЫмІА л™їнЦИмЦімЪФ.');

          // 3) нПілІБмЬЉл°Ь лЛ®к≥Д нСЬмЛЬ
          const final = await pollUntilDone(reserveKey);

          if (final.ok === true) {
            // мД±к≥µ
            setOverlayCopy(final.scheduled ? 'мШИмХљ мЩДл£М' : 'к≤МмЛЬ мЩДл£М!', final.scheduled ? 'мЛЬк∞Д лРШл©і мХМмХДмДЬ мШђл†§лУЬл†§мЪФ.' : 'мЭЄмК§нГАмЧРмДЬ нЩХмЭЄнХіл≥імДЄмЪФ.');
            setTimeout(() => { location.href = '/reservations'; }, 1400);
          } else if (final.ok === 'timeout') {
            // л∞±кЈЄлЭЉмЪілУЬ м≤Шл¶ђ м§С вАФ мШИмХљ нОШмЭімІАмЧРмДЬ мІДнЦЙ нЩХмЭЄ
            setOverlayCopy('л∞±кЈЄлЭЉмЪілУЬ м≤Шл¶ђ м§С', 'мШИмХљ нОШмЭімІАмЧРмДЬ мІДнЦЙ мГБнЩ©мЭД нЩХмЭЄнХ† мИШ мЮИмЦімЪФ.');
            setTimeout(() => { location.href = '/reservations'; }, 1200);
          } else {
            throw new Error(final.error || 'к≤МмЛЬ мЛ§нМ®');
          }
        } catch (e) {
          showOverlay(false);
          toast(e.message || 'к≤МмЛЬ мЛ§нМ®');
          submitBtn.disabled = false;
          submitBtn.textContent = 'рЯУЈ мЇ°мЕШ лІМлУ§к≥† к≤МмЛЬ';
        }
      });

      refreshSubmit();
    })();
  </script>
</body>
