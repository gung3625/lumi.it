<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="루미 — 사진 올리기">
  <title>사진 올리기 · 루미</title>

  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <meta name="view-transition" content="same-origin">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/motion.css">

  <style>
    body { padding-bottom: calc(env(safe-area-inset-bottom) + 56px); }

    .topbar {
      position: sticky; top: 0;
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--line);
      z-index: var(--z-sticky); min-height: 52px;
    }
    .topbar__back {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: var(--radius-full); color: var(--ink);
    }
    .topbar__back:hover { background: var(--bg-soft); }
    .topbar__back svg { width: 20px; height: 20px; stroke-width: 2.2; }
    .topbar__title { font-size: var(--text-headline); font-weight: var(--weight-semibold); color: var(--ink); flex: 1; }

    .wrap { padding: var(--space-4); max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: var(--space-5); }

    .field { display: flex; flex-direction: column; gap: var(--space-2); }
    .field__label {
      font-size: var(--text-caption);
      font-weight: var(--weight-semibold);
      color: var(--ink-soft);
      letter-spacing: 0.02em;
    }

    /* 드롭존 */
    .dropzone {
      position: relative;
      padding: var(--space-12) var(--space-5);
      background: var(--bg-soft);
      border: 2px dashed var(--line-strong);
      border-radius: var(--radius-lg);
      text-align: center;
      color: var(--ink-muted);
      transition:
        border-color var(--duration-snap) var(--ease-toss),
        background var(--duration-snap) var(--ease-toss);
      cursor: pointer;
    }
    .dropzone:hover { border-color: var(--pink-300); background: var(--pink-50); }
    .dropzone.is-dragover {
      border-color: var(--pink-500);
      background: var(--pink-50);
      transform: scale(1.01);
    }
    .dropzone__icon {
      width: 56px; height: 56px;
      margin: 0 auto var(--space-3);
      border-radius: var(--radius-full);
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      color: var(--pink-500);
      box-shadow: var(--shadow-sm);
      animation: drop-bob 2.4s var(--ease-soft) infinite;
    }
    .dropzone__icon svg { width: 28px; height: 28px; stroke-width: 2; }
    @keyframes drop-bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    .dropzone__title {
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      color: var(--ink);
      margin-bottom: 4px;
    }
    .dropzone__sub { font-size: var(--text-caption); }
    .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* 사진 그리드 */
    .photos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-2);
    }
    .photo {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-soft);
      animation: rise 360ms var(--ease-toss) backwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    .photo:nth-child(1) { animation-delay: 0ms; }
    .photo:nth-child(2) { animation-delay: 60ms; }
    .photo:nth-child(3) { animation-delay: 120ms; }
    .photo:nth-child(4) { animation-delay: 180ms; }
    .photo:nth-child(5) { animation-delay: 240ms; }
    .photo:nth-child(6) { animation-delay: 300ms; }
    .photo:nth-child(7) { animation-delay: 360ms; }
    .photo:nth-child(8) { animation-delay: 420ms; }
    .photo:nth-child(9) { animation-delay: 480ms; }
    .photo:nth-child(10) { animation-delay: 540ms; }
    .photo img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .photo__remove {
      position: absolute;
      top: 6px; right: 6px;
      width: 24px; height: 24px;
      border-radius: var(--radius-full);
      background: rgba(0,0,0,0.6);
      color: white;
      display: flex; align-items: center; justify-content: center;
      border: none;
    }
    .photo__remove:hover { background: rgba(200,80,122,0.9); }
    .photo__remove svg { width: 14px; height: 14px; stroke-width: 2.5; }
    .photo__add {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: var(--radius-md);
      background: var(--bg-soft);
      border: 1px dashed var(--line-strong);
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-muted);
      cursor: pointer;
    }
    .photo__add:hover { border-color: var(--pink-300); color: var(--pink-500); }
    .photo__add svg { width: 28px; height: 28px; stroke-width: 2; }
    .photo__add input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* 입력 */
    .input, textarea.input {
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-body);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--ink);
      width: 100%;
      font-family: inherit;
    }
    textarea.input { resize: vertical; min-height: 80px; }

    .schedule-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
    }
    .schedule-card {
      padding: var(--space-4);
      background: var(--bg);
      border: 1px solid var(--line-strong);
      border-radius: var(--radius-lg);
      text-align: center;
      font-weight: var(--weight-semibold);
      color: var(--ink);
    }
    .schedule-card.is-active {
      background: var(--pink-50);
      border-color: var(--pink-500);
      color: var(--pink-700);
      box-shadow: var(--shadow-glow-sm);
      animation: card-pop 420ms var(--ease-toss);
    }
    @keyframes card-pop {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.03); }
    }

    .cta {
      width: 100%;
      padding: var(--space-4);
      background: var(--gradient-signature);
      color: var(--neutral-0);
      font-size: var(--text-body-lg);
      font-weight: var(--weight-semibold);
      border-radius: var(--radius-lg);
      border: none;
      box-shadow: var(--shadow-glow-sm);
      position: relative;
      overflow: hidden;
    }
    .cta::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 600ms var(--ease-toss);
      pointer-events: none;
    }
    .cta:hover::before { transform: translateX(100%); }
    .cta:hover { box-shadow: var(--shadow-glow); }
    .cta:disabled { opacity: 0.4; box-shadow: none; cursor: not-allowed; }

    .toast {
      position: fixed;
      left: 50%; bottom: 80px;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: white;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-pill);
      font-size: var(--text-body);
      box-shadow: var(--shadow-lg);
      opacity: 0; pointer-events: none;
      transition: opacity var(--duration-base) var(--ease-soft), transform var(--duration-base) var(--ease-toss);
      z-index: var(--z-modal);
    }
    .toast.is-open { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 탭바 */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: space-around; align-items: center;
      padding: var(--space-2) var(--space-3) calc(var(--space-2) + env(safe-area-inset-bottom));
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid var(--line);
      z-index: var(--z-sticky);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: var(--space-2) 0;
      font-size: 11px; font-weight: var(--weight-medium);
      color: var(--ink-muted); text-decoration: none;
    }
    .tab:active { transform: scale(0.94); }
    .tab.is-active { color: var(--ink); }
    .tab svg { width: 22px; height: 22px; stroke-width: 2; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="topbar__back" href="/dashboard" aria-label="뒤로">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </a>
    <h1 class="topbar__title">사진 올리기</h1>
  </header>

  <main class="wrap" role="main">
    <div class="field">
      <span class="field__label">사진 (최대 10장, 한 장당 10MB)</span>
      <div data-photo-area>
        <label class="dropzone" data-dropzone>
          <span class="dropzone__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </span>
          <div class="dropzone__title">사진을 선택하거나 끌어다 놓아주세요</div>
          <div class="dropzone__sub">JPG · PNG · WebP / 1~10장</div>
          <input type="file" accept="image/jpeg,image/png,image/webp" multiple data-input>
        </label>
      </div>
    </div>

    <div class="field">
      <label class="field__label" for="msg">한 줄 메모 (선택)</label>
      <textarea class="input" id="msg" maxlength="200" placeholder="예: 오늘 신메뉴 / 매장 분위기 사진" data-msg></textarea>
    </div>

    <div class="field">
      <span class="field__label">게시 시점</span>
      <div class="schedule-toggle">
        <button type="button" class="schedule-card is-active" data-schedule="immediate">지금</button>
        <button type="button" class="schedule-card" data-schedule="scheduled">예약</button>
      </div>
      <input class="input" type="datetime-local" data-scheduled-at hidden>
    </div>

    <button class="cta" type="button" data-submit disabled>📷 캡션 만들고 게시</button>
  </main>

  <div class="toast" data-toast></div>

  <nav class="tabbar" aria-label="메뉴">
    <a class="tab" href="/dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 3l9 9M5 10v11h14V10"/></svg>
      홈
    </a>
    <a class="tab" href="/trends">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12l-4-4-4 4-6-6-6 6"/><path d="M22 12v6H2"/></svg>
      트렌드
    </a>
    <a class="tab is-active" href="/register-product" aria-current="page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      올리기
    </a>
    <a class="tab" href="/reservations">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      예약
    </a>
    <a class="tab" href="/settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      설정
    </a>
  </nav>

  <script>
    (function () {
      const token =
        localStorage.getItem('lumi-auth') ||
        localStorage.getItem('lumi_auth') ||
        localStorage.getItem('seller_jwt') || '';
      if (!token) { location.replace('/'); return; }
      const authHeaders = { Authorization: 'Bearer ' + token };

      const MAX_PHOTOS = 10;
      const MAX_BYTES = 10 * 1024 * 1024;
      const ALLOWED = ['image/jpeg', 'image/png', 'image/webp'];

      const photoArea = document.querySelector('[data-photo-area]');
      const msgEl = document.querySelector('[data-msg]');
      const submitBtn = document.querySelector('[data-submit]');
      const scheduleAtEl = document.querySelector('[data-scheduled-at]');
      const toastEl = document.querySelector('[data-toast]');

      let photos = [];
      let scheduleMode = 'immediate';

      function toast(msg, ms = 1800) {
        toastEl.textContent = msg;
        toastEl.classList.add('is-open');
        setTimeout(() => toastEl.classList.remove('is-open'), ms);
      }

      function refreshSubmit() {
        submitBtn.disabled = photos.length === 0;
      }

      function addFiles(fileList) {
        const arr = Array.from(fileList || []);
        for (const f of arr) {
          if (photos.length >= MAX_PHOTOS) {
            toast('최대 10장까지 가능해요');
            break;
          }
          if (!ALLOWED.includes(f.type)) {
            toast('JPG·PNG·WebP만 가능해요');
            continue;
          }
          if (f.size > MAX_BYTES) {
            toast('한 장당 10MB를 넘을 수 없어요');
            continue;
          }
          photos.push(f);
        }
        renderPhotos();
        refreshSubmit();
      }

      function renderPhotos() {
        if (photos.length === 0) {
          photoArea.innerHTML = `
            <label class="dropzone" data-dropzone>
              <span class="dropzone__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              </span>
              <div class="dropzone__title">사진을 선택하거나 끌어다 놓아주세요</div>
              <div class="dropzone__sub">JPG · PNG · WebP / 1~10장</div>
              <input type="file" accept="image/jpeg,image/png,image/webp" multiple data-input>
            </label>
          `;
          wireDropzone();
          return;
        }
        const grid = document.createElement('div');
        grid.className = 'photos';
        photos.forEach((f, idx) => {
          const url = URL.createObjectURL(f);
          const item = document.createElement('div');
          item.className = 'photo';
          item.innerHTML = `
            <img src="${url}" alt="">
            <button class="photo__remove" type="button" data-remove="${idx}" aria-label="제거">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          `;
          grid.appendChild(item);
        });
        if (photos.length < MAX_PHOTOS) {
          const adder = document.createElement('label');
          adder.className = 'photo__add';
          adder.innerHTML = `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            <input type="file" accept="image/jpeg,image/png,image/webp" multiple data-input>
          `;
          grid.appendChild(adder);
        }
        photoArea.innerHTML = '';
        photoArea.appendChild(grid);

        photoArea.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.preventDefault();
            const i = Number(btn.dataset.remove);
            photos.splice(i, 1);
            renderPhotos();
            refreshSubmit();
          });
        });
        wireDropzone();
      }

      function wireDropzone() {
        const dz = photoArea.querySelector('[data-dropzone]');
        if (dz) {
          dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('is-dragover'); });
          dz.addEventListener('dragleave', () => dz.classList.remove('is-dragover'));
          dz.addEventListener('drop', e => {
            e.preventDefault(); dz.classList.remove('is-dragover');
            addFiles(e.dataTransfer.files);
          });
        }
        photoArea.querySelectorAll('[data-input]').forEach(inp => {
          inp.addEventListener('change', e => {
            addFiles(e.target.files);
            e.target.value = '';
          });
        });
      }
      wireDropzone();

      // 게시 시점 토글
      document.querySelectorAll('[data-schedule]').forEach(btn => {
        btn.addEventListener('click', () => {
          scheduleMode = btn.dataset.schedule;
          document.querySelectorAll('[data-schedule]').forEach(b => b.classList.toggle('is-active', b === btn));
          if (scheduleMode === 'scheduled') {
            scheduleAtEl.hidden = false;
            const now = new Date(Date.now() + 60 * 60 * 1000);
            scheduleAtEl.value = now.toISOString().slice(0, 16);
          } else {
            scheduleAtEl.hidden = true;
            scheduleAtEl.value = '';
          }
        });
      });

      // 제출
      submitBtn.addEventListener('click', async () => {
        if (photos.length === 0) return;
        if (scheduleMode === 'scheduled' && !scheduleAtEl.value) {
          toast('예약 시간을 선택해주세요');
          return;
        }
        submitBtn.disabled = true;
        submitBtn.textContent = '올리는 중…';
        try {
          const fd = new FormData();
          photos.forEach((f, i) => fd.append('file' + i, f, f.name));
          fd.append('userMessage', msgEl.value || '');
          fd.append('postMode', scheduleMode);
          if (scheduleMode === 'scheduled' && scheduleAtEl.value) {
            const iso = new Date(scheduleAtEl.value).toISOString();
            fd.append('scheduledAt', iso);
          }
          const res = await fetch('/api/reserve', {
            method: 'POST',
            headers: authHeaders,
            body: fd,
          });
          const json = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(json.error || '게시 실패');
          toast('루미가 캡션을 만들고 있어요');
          setTimeout(() => location.href = '/reservations', 800);
        } catch (e) {
          toast(e.message || '게시 실패');
          submitBtn.disabled = false;
          submitBtn.textContent = '📷 캡션 만들고 게시';
        }
      });

      refreshSubmit();
    })();
  </script>
</body>
</html>
